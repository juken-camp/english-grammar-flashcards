trong>。readは過去形も原形もスペルが同じだけど、ルールとしては「原形」を使っているんだ。</p>\n\n<div class=\"tip\">didn'tのうしろは必ず原形。「didn't played」「didn't went」は×！</div>","p":"Part2"}],"11":[{"b":"Here We Go!","g":1,"u":"U7","en":"It was fun.","ja":"楽しかったです。","ex":"<p>be動詞にも過去形がある。<strong>am/is → was</strong>、<strong>are → were</strong>。</p>\n<table class=\"t\"><tr><th>現在形</th><th>過去形</th><th>使う主語</th></tr><tr><td>am / is</td><td><strong>was</strong></td><td>I / he / she / it</td></tr><tr><td>are</td><td><strong>were</strong></td><td>you / we / they</td></tr></table>\n<div class=\"es\"><h5>📝 疑問文と否定文</h5>\n<p><strong>Was</strong> it fun? → Yes, it <strong>was</strong>. / No, it <strong>wasn't</strong>.</p></div>\n<div class=\"tip\">感想の定番：「It was fun.」「It was interesting.」「It was great!」</div>","p":"Part4"},{"b":"Here We Go!","g":1,"u":"U7","en":"The traditional buildings were beautiful.","ja":"伝統的な建物は美しかったです。","ex":"<p>主語が複数（buildings）のときはbe動詞の過去形は<strong>were</strong>を使うよ。</p>\n<p>The traditional buildings <strong>were</strong> beautiful. ＝ 伝統的な建物は美しかった<strong>です</strong>。</p>\n<div class=\"tip\">「traditional」は「伝統的な」。文化や建物について話すときによく使う形容詞だよ。</div>","p":"Part4"},{"b":"Here We Go!","g":2,"u":"U1","en":"How was your trip to Korea?","ja":"韓国旅行はどうでしたか？","ex":"<p><strong>How was 〜?</strong>は「<strong>〜はどうだった？</strong>」と<strong>感想</strong>を聞くときの定番フレーズ。</p>\n<div class=\"es\"><h5>📝 How was 〜? の答え方</h5>\n<table class=\"t\"><tr><th>答え</th><th>意味</th></tr><tr><td>It was great!</td><td>最高だった！</td></tr><tr><td>It was fun.</td><td>楽しかった。</td></tr><tr><td>It was so-so.</td><td>まあまあだった。</td></tr></table></div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U1","en":"They were really interested in Japan.","ja":"彼らは本当に日本に興味を持っていました。","ex":"<p>主語が複数（They）なのでbe動詞の過去形は<strong>were</strong>を使うよ。</p>\n<p><strong>interested in 〜</strong>は「〜に興味がある」という表現。よく使うので丸暗記しよう。</p>\n<div class=\"es\"><h5>🎯 -edと-ingの形容詞の違い</h5>\n<table class=\"t\"><tr><th>形</th><th>意味</th><th>例</th></tr><tr><td>interest<strong>ed</strong></td><td>興味を持った（人の気持ち）</td><td>I'm interested in music.</td></tr><tr><td>interest<strong>ing</strong></td><td>おもしろい（物の性質）</td><td>The book is interesting.</td></tr></table></div>\n<div class=\"warn\">「I'm interesting」は「わたしはおもしろい人間です」の意味に。「興味がある」なら「I'm interest<strong>ed</strong>」！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L8","en":"The red leaves were beautiful that day.","ja":"その日の紅葉は美しかったです。","ex":"<p><strong>be動詞の過去形</strong>を使って「<strong>〜でした</strong>」と過去の状態を表しているよ。</p>\n\n<p>The red leaves <strong>were</strong> beautiful that day.<br>\n＝ その日の紅葉は<strong>きれいだった</strong>。</p>\n\n<p>「leaves（葉っぱ）」は複数形だからbe動詞は<strong>were</strong>を使うんだ。単数ならwas、複数ならwere、という使い分けを思い出そう。</p>\n\n<div class=\"tip\">「that day」は「その日」という意味で、過去の文によく出てくるキーワードだよ。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L8","en":"It was sunny that day.","ja":"その日は晴れでした。","ex":"<p>be動詞にも過去形があるよ。<strong>am/is → was</strong>、<strong>are → were</strong>に変わるんだ。</p>\n\n<p>現在：It <strong>is</strong> sunny today.（今日は晴れ<strong>です</strong>。）<br>\n過去：It <strong>was</strong> sunny that day.（その日は晴れ<strong>でした</strong>。）</p>\n\n<table class=\"t\"><tr><th>現在形</th><th>過去形</th><th>使う主語</th></tr><tr><td>am / is</td><td><strong>was</strong></td><td>I / he / she / it / 名前1人</td></tr><tr><td>are</td><td><strong>were</strong></td><td>you / we / they / 名前複数</td></tr></table>\n\n<div class=\"es\"><h5>📝 疑問文と否定文</h5>\n<p>ルールは現在のbe動詞とまったく同じ。wasを前に出せば疑問文、was notで否定文。</p>\n<p><strong>Was</strong> it sunny? → Yes, it <strong>was</strong>. / No, it <strong>wasn't</strong>.</p>\n<p>It <strong>was not (wasn't)</strong> sunny.</p></div>\n\n<div class=\"tip\">天気はitが主語。「It was rainy.」「It is cloudy.」のように。天気のitは「それ」と訳さなくてOKだよ。</div>","p":"Part1"}],"12":[{"b":"Here We Go!","g":1,"u":"U8","en":"I'm baking a cake now.","ja":"わたしは今ケーキを焼いています。","ex":"<p><strong>現在進行形</strong>は「<strong>今まさに〜しているところ</strong>」を表す形。</p>\n<p>「I bake cakes.」は「ケーキを焼く（習慣）」。「I <strong>am baking</strong> a cake <strong>now</strong>.」は「<strong>今この瞬間</strong>焼いている」。</p>\n<p>作り方は<strong>be動詞 + 動詞のing形</strong>。</p>\n<div class=\"es\"><h5>📝 ingのつけ方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>例</th></tr><tr><td>ふつう → そのままing</td><td>play→playing</td></tr><tr><td>eで終わる → eを取ってing</td><td>bake→baking, make→making</td></tr><tr><td>短母音+子音 → 子音を重ねてing</td><td>run→running, swim→swimming</td></tr></table></div>\n<div class=\"tip\">「<strong>now</strong>」「<strong>Look!</strong>」「<strong>Listen!</strong>」が文にあったら進行形のサイン！</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U8","en":"Are you baking a cake? — Yes, I am. / No, I'm not.","ja":"ケーキを焼いていますか？ — はい。/ いいえ。","ex":"<p>進行形の疑問文は<strong>be動詞を文の先頭に出す</strong>だけ。Do/Doesは使わないよ。</p>\n<p>肯定文：You <strong>are baking</strong> a cake.<br>疑問文：<strong>Are</strong> you <strong>baking</strong> a cake<strong>?</strong></p>\n<div class=\"warn\">進行形にはbe動詞があるから、Doは不要！「Do you baking?」は×。「Are you baking?」が○。</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U8","en":"What are you doing? — We are decorating the cake now.","ja":"何をしていますか？ — 今ケーキを飾り付けしています。","ex":"<p>「<strong>What are you doing?</strong>」は「<strong>何をしてるの？</strong>」を聞く超定番フレーズ。現在進行形の疑問文にWhatをつけた形だよ。</p>\n<div class=\"es\"><h5>📝 答え方</h5>\n<p>What are you doing? → I'm <strong>studying</strong> English. / We're <strong>decorating</strong> the cake.</p></div>\n<div class=\"tip\">電話やLINEで「今何してる？」と聞くときにも使えるよ！</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L6","en":"Kevin is throwing a football now.","ja":"ケビンは今フットボールを投げています。","ex":"<p><strong>現在進行形</strong>は「<strong>今まさに〜しているところ</strong>」を表す形。ふつうの現在形（習慣を表す）とは意味が違うよ。</p>\n\n<p>たとえば「I play tennis.」は「テニスをする（習慣）」。でも「I <strong>am playing</strong> tennis <strong>now</strong>.」は「<strong>今この瞬間</strong>テニスをしている」という意味なんだ。</p>\n\n<p>作り方は<strong>be動詞 + 動詞のing形</strong>。be動詞と-ingのセットで「〜している」を表すよ。</p>\n\n<div class=\"es\"><h5>📝 ingのつけ方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>例</th></tr><tr><td>ふつう → そのままing</td><td>play→playing, eat→eating</td></tr><tr><td>eで終わる → eを取ってing</td><td>make→making, write→writing</td></tr><tr><td>短母音+子音 → 子音を重ねてing</td><td>run→running, swim→swimming</td></tr></table></div>\n\n<div class=\"tip\">「<strong>now</strong>」「<strong>Look!</strong>」「<strong>Listen!</strong>」が文にあったら進行形のサイン！テストで時制を選ぶときのヒントになるよ。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L6","en":"Are the students eating lunch in the classroom? — Yes, they are.","ja":"生徒たちは教室で昼食を食べていますか？ — はい、食べています。","ex":"<p>進行形の疑問文は<strong>be動詞を文の先頭に出す</strong>だけ。進行形にはbe動詞が含まれているから、Do/Doesは使わないよ。</p>\n\n<p>肯定文：The students <strong>are eating</strong> lunch.<br>\n疑問文：<strong>Are</strong> the students <strong>eating</strong> lunch<strong>?</strong></p>\n\n<p>答えもbe動詞で返すよ。Yes, they <strong>are</strong>. / No, they <strong>aren't</strong>.</p>\n\n<div class=\"es\"><h5>📝 否定文も確認</h5>\n<p>進行形の否定文は、be動詞のうしろにnotを置くだけ。ルールはbe動詞の否定文とまったく同じだよ。</p>\n<p>The students <strong>are not (aren't) eating</strong> lunch.</p></div>\n\n<div class=\"warn\">進行形にはbe動詞があるから、Doは不要！「<strong>Do</strong> you <strong>playing</strong>?」は×。「<strong>Are</strong> you <strong>playing</strong>?」が○。</div>","p":"Part2"}],"13":[{"b":"Here We Go!","g":1,"u":"U8","en":"What were you doing? — I was shopping.","ja":"何をしていましたか？ — 買い物をしていました。","ex":"<p><strong>過去進行形</strong>は「<strong>そのとき〜していた</strong>」を表す形。be動詞を<strong>過去形（was/were）</strong>にするだけ！</p>\n<p>現在進行形：I <strong>am shopping</strong>.（今買い物している）<br>過去進行形：I <strong>was shopping</strong>.（そのとき買い物していた）</p>\n<div class=\"es\"><h5>📝 進行形の現在と過去</h5>\n<table class=\"t\"><tr><th></th><th>形</th><th>意味</th><th>キーワード</th></tr><tr><td>現在進行形</td><td>am/is/are + ing</td><td>今〜している</td><td>now</td></tr><tr><td>過去進行形</td><td>was/were + ing</td><td>そのとき〜していた</td><td>then, at that time</td></tr></table></div>\n<div class=\"tip\">「then」「at that time」「when 〜」があったら過去進行形のサイン。</div>","p":"Part3"},{"b":"New Crown","g":1,"u":"L8","en":"I was skiing then.","ja":"わたしはそのときスキーをしていました。","ex":"<p><strong>過去進行形</strong>は「<strong>そのとき〜していた</strong>」を表す形。「過去のある時点で、まさにやっている最中だった」というイメージだよ。</p>\n\n<p>作り方は現在進行形のbe動詞を<strong>過去形（was/were）</strong>にするだけ！</p>\n\n<p>現在進行形：I <strong>am skiing</strong>.（今スキーをしている）<br>\n過去進行形：I <strong>was skiing</strong> then.（そのときスキーをしていた）</p>\n\n<div class=\"es\"><h5>📝 進行形の現在と過去の比較</h5>\n<table class=\"t\"><tr><th></th><th>形</th><th>意味</th><th>キーワード</th></tr><tr><td>現在進行形</td><td>am/is/are + ing</td><td>今〜している</td><td>now</td></tr><tr><td>過去進行形</td><td>was/were + ing</td><td>そのとき〜していた</td><td>then, at that time</td></tr></table></div>\n\n<div class=\"tip\">「then」「at that time」「when 〜」があったら過去進行形のサイン。「When I came home, she <strong>was cooking</strong> dinner.」のように、when〜とセットで使うことが多いよ。</div>","p":"Part2"}],"14":[{"b":"Here We Go!","g":2,"u":"U3","en":"I'm going to visit my cousins in Okinawa.","ja":"沖縄のいとこを訪ねる予定です。","ex":"<p><strong>be going to + 動詞の原形</strong>で「<strong>〜する予定です</strong>」。前から計画していたことを表す。</p>\n<div class=\"es\"><h5>📝 willとbe going toの違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>ニュアンス</th></tr><tr><td>will</td><td>その場で決めた / 予想</td></tr><tr><td>be going to</td><td>前から計画していた予定</td></tr></table></div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U3","en":"Are you going to visit your cousins? — Yes, I am. / No, I'm not.","ja":"いとこを訪ねる予定ですか？ — はい。/ いいえ。","ex":"<p>be going toの疑問文は<strong>be動詞を前に出す</strong>だけ。</p>\n<div class=\"es\"><h5>✅ 答え方</h5><p>→ Yes, I <strong>am</strong>. / No, I'm <strong>not</strong>.</p></div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U3","en":"It will be hot next week.","ja":"来週は暑くなるでしょう。","ex":"<p><strong>will + 動詞の原形</strong>で未来を表す。willのうしろは<strong>必ず原形</strong>！</p>\n<div class=\"es\"><h5>📝 willの肯定・疑問・否定</h5>\n<table class=\"t\"><tr><th>形</th><th>例</th></tr><tr><td>肯定</td><td>It <strong>will be</strong> hot.</td></tr><tr><td>疑問</td><td><strong>Will</strong> it be hot?</td></tr><tr><td>否定</td><td>It <strong>won't</strong> be hot.</td></tr></table></div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U3","en":"Will it be hot next week? — Yes, it will. / No, it won't.","ja":"来週は暑いですか？ — はい。/ いいえ。","ex":"<p>willの疑問文は<strong>willを先頭に出す</strong>だけ。</p>\n<div class=\"es\"><h5>✅ 答え方</h5><p>→ Yes, it <strong>will</strong>. / No, it <strong>won't</strong>.</p></div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L9","en":"It will be rainy tomorrow.","ja":"明日は雨でしょう。","ex":"<p><strong>will</strong>は<strong>未来のこと</strong>を表す助動詞。「〜するでしょう」「〜するつもりです」という意味だよ。canと同じ助動詞の仲間で、うしろは<strong>必ず動詞の原形</strong>。主語に関係なく形が変わらないから使いやすい！</p>\n\n<p>It is rainy. → It <strong>will be</strong> rainy tomorrow.（beは原形！isにしない！）</p>\n\n<div class=\"es\"><h5>📝 willの肯定・疑問・否定</h5>\n<p>助動詞の疑問文は<strong>助動詞を前に出すだけ</strong>。Do/Doesは使わないよ。</p>\n<table class=\"t\"><tr><th>形</th><th>作り方</th><th>例</th></tr><tr><td>肯定文</td><td>主語 + will + 動詞の原形</td><td>It <strong>will be</strong> rainy.</td></tr><tr><td>疑問文</td><td>Will + 主語 + 動詞の原形?</td><td><strong>Will</strong> it be rainy<strong>?</strong></td></tr><tr><td>否定文</td><td>主語 + won't + 動詞の原形</td><td>It <strong>won't</strong> be rainy.</td></tr></table></div>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<p>Will it be rainy? → Yes, it <strong>will</strong>. / No, it <strong>won't</strong>.</p>\n<p>willで聞かれたらwillで返す。いつもの「聞かれた言葉で返す」ルール！</p></div>\n\n<div class=\"tip\">won'tはwill notの短縮形。発音は「ウォント」。wantと似てるけど意味がぜんぜん違うので注意！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L9","en":"Will it be rainy tomorrow? — Yes, it will.","ja":"明日は雨でしょうか？ — はい、そうでしょう。","ex":"<p>2年生でも改めて確認！willの疑問文は<strong>willを文の先頭に出す</strong>だけ。答えはwillで返すよ。</p>\n\n<p><strong>Will</strong> it be rainy tomorrow? → Yes, it <strong>will</strong>. / No, it <strong>won't</strong>.</p>\n\n<div class=\"tip\">willで聞かれたらwillで返す。「聞かれた言葉で返す」ルールだよ！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L9","en":"I am going to see Mr. Oka this afternoon.","ja":"わたしは今日の午後、岡先生に会う予定です。","ex":"<p>2年生でも改めて確認！<strong>be going to + 動詞の原形</strong>で「<strong>〜する予定です</strong>」と前から決めていた計画を表すよ。</p>\n\n<p>I <strong>am going to see</strong> Mr. Oka this afternoon.<br>\n＝ 今日の午後、岡先生に<strong>会う予定です</strong>。</p>\n\n<div class=\"tip\">willは「その場で決めた」、be going toは「前から計画していた」。この違いをしっかり覚えよう！</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L9","en":"Are you going to see Mr. Oka this afternoon? — Yes, I am.","ja":"あなたは今日の午後、岡先生に会う予定ですか？ — はい、そうです。","ex":"<p>be going toの疑問文は<strong>be動詞を文の先頭に出す</strong>だけ。ルールはbe動詞の疑問文とまったく同じだよ。</p>\n\n<p>肯定文：You <strong>are</strong> going to see Mr. Oka.<br>\n疑問文：<strong>Are</strong> you going to see Mr. Oka<strong>?</strong></p>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<p>Are you going to 〜? → Yes, I <strong>am</strong>. / No, I'm <strong>not</strong>.</p>\n<p>be going toはbe動詞の文なので、<strong>be動詞で返す</strong>よ。</p></div>\n\n<div class=\"tip\">be going toの疑問文では、Do/Doesは不要。be動詞があるから、be動詞を前に出すだけでOK！</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L1","en":"We will start in about ten minutes.","ja":"わたしたちは約10分後に出発します。","ex":"<p><strong>will + 動詞の原形</strong>で未来のことを表すよ。1年生で学んだwillの復習だね。</p>\n\n<p>We <strong>will start</strong> in about ten minutes.<br>\n＝ 約10分後に<strong>出発します</strong>。</p>\n\n<p>「in about ten minutes」は「約10分後に」という意味。<strong>in + 時間</strong>で「〜後に」を表すよ。</p>\n\n<div class=\"tip\">「in 10 minutes」＝「10分後に」。inは未来の時間を表すときにも使うよ。</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L1","en":"Will it be rainy tomorrow? — Yes, it will.","ja":"明日は雨でしょうか？ — はい、そうでしょう。","ex":"<p>2年生でも改めて確認！willの疑問文は<strong>willを文の先頭に出す</strong>だけ。答えはwillで返すよ。</p>\n\n<p><strong>Will</strong> it be rainy tomorrow? → Yes, it <strong>will</strong>. / No, it <strong>won't</strong>.</p>\n\n<div class=\"tip\">willで聞かれたらwillで返す。「聞かれた言葉で返す」ルールだよ！</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L1","en":"I am going to see Mr. Oka this afternoon.","ja":"わたしは今日の午後、岡先生に会う予定です。","ex":"<p>2年生でも改めて確認！<strong>be going to + 動詞の原形</strong>で「<strong>〜する予定です</strong>」と前から決めていた計画を表すよ。</p>\n\n<p>I <strong>am going to see</strong> Mr. Oka this afternoon.<br>\n＝ 今日の午後、岡先生に<strong>会う予定です</strong>。</p>\n\n<div class=\"tip\">willは「その場で決めた」、be going toは「前から計画していた」。この違いをしっかり覚えよう！</div>","p":"Part1"}],"15":[{"b":"Here We Go!","g":1,"u":"U6","en":"She likes singing and dancing.","ja":"彼女は歌うことと踊ることが好きです。","ex":"<p>主語が<strong>he / she / it / 名前（1人）</strong>のとき、一般動詞に<strong>sをつける</strong>のが「<strong>三単現のs</strong>」ルール！</p>\n<div class=\"es\"><h5>📝 sのつけ方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>原形 → 三単現</th></tr><tr><td>ふつう → s</td><td>like → likes</td></tr><tr><td>-ch,-sh,-s,-x,-o → es</td><td>teach → teaches, go → goes</td></tr><tr><td>子音+y → yをiに変えてes</td><td>study → studies</td></tr><tr><td>特殊</td><td>have → has</td></tr></table></div>\n<div class=\"warn\">三単現のsは<strong>現在形のときだけ</strong>！過去形やcan/willのうしろではsはつかない。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U6","en":"Does she have a cold? — Yes, she does. / No, she doesn't.","ja":"彼女は風邪をひいていますか？ — はい。/ いいえ。","ex":"<p>三単現の疑問文は<strong>Doesを使う</strong>よ。Doesを使ったら<strong>動詞は原形に戻す</strong>！</p>\n<p>肯定文：She ha<strong>s</strong> a cold.<br>疑問文：<strong>Does</strong> she <strong>have</strong> a cold?（sが消える！）</p>\n<div class=\"warn\">「Does she has?」は×！Doesを使ったら動詞のsは取る。</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U6","en":"She doesn't go to school.","ja":"彼女は学校に行きません。","ex":"<p>三単現の否定文は<strong>doesn't + 動詞の原形</strong>。動詞は<strong>原形に戻す</strong>。</p>\n<p>肯定文：She go<strong>es</strong> to school.<br>否定文：She <strong>doesn't go</strong> to school.</p>\n<div class=\"es\"><h5>📝 一般動詞の疑問文・否定文</h5>\n<table class=\"t\"><tr><th></th><th>I/you/複数</th><th>he/she/名前(1人)</th></tr><tr><td>肯定</td><td>I <strong>play</strong>.</td><td>She <strong>plays</strong>.</td></tr><tr><td>疑問</td><td><strong>Do</strong> you play?</td><td><strong>Does</strong> she play?</td></tr><tr><td>否定</td><td>I <strong>don't</strong> play.</td><td>She <strong>doesn't</strong> play.</td></tr></table></div>","p":"Part3"},{"b":"New Crown","g":1,"u":"L5","en":"My mother lives in London.","ja":"わたしの母はロンドンに住んでいます。","ex":"<p>英語には「主語がI・you以外の<strong>1人・1つ</strong>のとき、現在形の動詞に<strong>s/es</strong>をつける」というルールがあるんだ。これを<strong>三人称単数現在のs（三単現のs）</strong>と呼ぶよ。</p>\n\n<p>「三人称」＝ I（一人称）でもyou（二人称）でもない人やもの。つまり<strong>he, she, it, 名前1人, もの1つ</strong>のこと。</p>\n\n<p>I <strong>live</strong> in London.（sなし）<br>\nMy mother <strong>lives</strong> in London.（My mother ＝ she → sがつく！）</p>\n\n<div class=\"es\"><h5>📝 sのつけ方ルール</h5>\n<table class=\"t\"><tr><th>ルール</th><th>例</th></tr><tr><td>ふつう → s</td><td>live→lives, play→plays</td></tr><tr><td>s,sh,ch,x,o → es</td><td>teach→teaches, go→goes</td></tr><tr><td>子音+y → yをiに変えてes</td><td>study→studies</td></tr><tr><td>have → has</td><td>特別！丸暗記！</td></tr></table></div>\n\n<div class=\"es\"><h5>🇯🇵↔🇬🇧 日本語との違い</h5><p>日本語は「住んでいます」で主語が変わっても動詞は同じ形。英語は<strong>主語によって動詞の形が変わる</strong>のが大きな特徴。最初は面倒だけど、だんだん慣れるよ！</p></div>\n\n<div class=\"warn\">三単現のsは<strong>現在形のときだけ</strong>！過去形やcan/willのうしろではsはつかない。「She cans swim」は×、「She can swim」が○。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L5","en":"My mother teaches art.","ja":"わたしの母は美術を教えています。","ex":"<p>teachは<strong>-chで終わる動詞</strong>だから、三単現のsは普通の-sではなく<strong>-es</strong>をつけるよ。teach → teach<strong>es</strong></p>\n\n<p>なぜesなの？ 「teachs」と書いたら発音しにくいよね。だからesにして「ティーチ<strong>イズ</strong>」と読めるようにしているんだ。</p>\n\n<div class=\"es\"><h5>📝 -esをつける動詞の語尾パターン</h5>\n<table class=\"t\"><tr><th>語尾</th><th>原形</th><th>三単現</th></tr><tr><td>-ch</td><td>teach</td><td>teach<strong>es</strong></td></tr><tr><td>-sh</td><td>wash</td><td>wash<strong>es</strong></td></tr><tr><td>-s</td><td>miss</td><td>miss<strong>es</strong></td></tr><tr><td>-x</td><td>fix</td><td>fix<strong>es</strong></td></tr><tr><td>-o</td><td>go</td><td>go<strong>es</strong></td></tr></table></div>\n\n<div class=\"tip\">三単現のs/esのルールは、<strong>名詞の複数形（-s/-es）のルールとほぼ同じ</strong>。bus→buses, box→boxes…セットで覚えると効率的！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L5","en":"Does Ann live in London? — Yes, she does.","ja":"アンはロンドンに住んでいますか？ — はい、住んでいます。","ex":"<p>主語がhe/she/名前（1人）のとき、一般動詞の疑問文は<strong>Doesを使う</strong>よ。Doの三単現バージョンだと思えばOK。</p>\n\n<p>肯定文：Ann live<strong>s</strong> in London.<br>\n疑問文：<strong>Does</strong> Ann <strong>live</strong> in London?（sが消える！）</p>\n\n<p>Doesを使ったら<strong>動詞は原形に戻す</strong>のがルール。Doesが動詞のsを「引き受けてくれる」イメージだよ。だから動詞からsは消えるんだ。</p>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<p>Does she 〜? → Yes, she <strong>does</strong>. / No, she <strong>doesn't</strong>.</p></div>\n\n<div class=\"warn\">「Does she likes 〜?」は×！Doesを使ったら動詞のsは取る。sが2箇所についたら間違いのサイン。</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L5","en":"Ann does not live in London.","ja":"アンはロンドンに住んでいません。","ex":"<p>三単現の否定文は<strong>doesn't + 動詞の原形</strong>。Doesの否定バージョンだよ。疑問文と同じく、doesn'tがsを引き受けるから<strong>動詞は原形に戻す</strong>。</p>\n\n<p>肯定文：Ann live<strong>s</strong> in London.<br>\n否定文：Ann <strong>doesn't live</strong> in London.（sが消える！）</p>\n\n<div class=\"es\"><h5>📝 一般動詞の疑問文・否定文の全パターン</h5>\n<p>これを覚えれば一般動詞の変形はカンペキ！</p>\n<table class=\"t\"><tr><th></th><th>I/you/複数</th><th>he/she/名前(1人)</th></tr><tr><td>肯定文</td><td>I <strong>play</strong>.</td><td>She <strong>plays</strong>.</td></tr><tr><td>疑問文</td><td><strong>Do</strong> you play?</td><td><strong>Does</strong> she play?</td></tr><tr><td>否定文</td><td>I <strong>don't</strong> play.</td><td>She <strong>doesn't</strong> play.</td></tr></table></div>\n\n<div class=\"tip\">Do/Don't → I/you/複数のとき。Does/Doesn't → he/she/名前1人のとき。この使い分けをしっかり覚えよう！</div>","p":"Part2"}],"19":[{"b":"Here We Go!","g":2,"u":"U1","en":"When I have free time, I study Japanese.","ja":"暇なとき、日本語を勉強します。","ex":"<p><strong>when</strong>は「<strong>〜のとき</strong>」という意味の<strong>接続詞</strong>。2つの文を時間でつなげるよ。</p>\n<div class=\"es\"><h5>📝 whenの位置とカンマのルール</h5>\n<table class=\"t\"><tr><th>語順</th><th>カンマ</th><th>例</th></tr><tr><td>When節が<strong>前</strong></td><td>✅ 必要</td><td><strong>When</strong> I have free time<strong>,</strong> I study.</td></tr><tr><td>When節が<strong>うしろ</strong></td><td>× 不要</td><td>I study <strong>when</strong> I have free time.</td></tr></table></div>\n<div class=\"tip\">whenは疑問詞（いつ？）と接続詞（〜のとき）の2つの使い方がある。文の中での位置と意味で判断しよう。</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U2","en":"I think (that) you did a great job.","ja":"あなたはよくやったと思います。","ex":"<p><strong>I think that 〜</strong>は「<strong>〜だと思う</strong>」と自分の意見を言う定番表現。<strong>thatは省略OK</strong>！</p>\n<p>thatのうしろには<strong>ふつうの文（主語＋動詞〜）</strong>がそのまま続くんだ。</p>\n<div class=\"es\"><h5>📝 thatを使うパターン</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>I think that 〜</td><td>〜だと思う</td></tr><tr><td>I know that 〜</td><td>〜だと知っている</td></tr><tr><td>I hope that 〜</td><td>〜だと願う</td></tr><tr><td>I'm sure that 〜</td><td>〜だと確信している</td></tr></table></div>\n<div class=\"tip\">英作文の最強テンプレ：「I think that 〜. I have two reasons. First, … Second, …」</div>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U2","en":"I'm sure (that) you like playing basketball now.","ja":"あなたはきっと今バスケが好きでしょう。","ex":"<p><strong>I'm sure (that) 〜</strong>は「<strong>きっと〜だと確信している</strong>」という表現。thinkより<strong>自信がある</strong>ニュアンスだよ。</p>\n<div class=\"es\"><h5>📝 確信度の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>確信度</th></tr><tr><td>I think 〜</td><td>〜だと思う（50-70%）</td></tr><tr><td>I believe 〜</td><td>〜だと信じる（70-90%）</td></tr><tr><td>I'm sure 〜</td><td>きっと〜だ（90%+）</td></tr></table></div>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U3","en":"If you're tired, we can go straight home.","ja":"もし疲れているなら、まっすぐ家に帰れるよ。","ex":"<p><strong>if</strong>は「もし〜なら」。超重要：<strong>if節の中は未来でも現在形</strong>！</p>\n<div class=\"es\"><h5>📝 if節のルール</h5>\n<table class=\"t\"><tr><th>if節（条件）</th><th>主節（結果）</th></tr><tr><td>If it <strong>rains</strong>（現在形！）</td><td>we <strong>will</strong> stay home.</td></tr></table></div>\n<div class=\"warn\">「if/whenの中ではwillを使わない」は入試超頻出ルール！</div>","p":"Part3"},{"b":"New Crown","g":2,"u":"L2","en":"When I was a child, I loved stories with animals.","ja":"わたしは子どものとき、動物の物語が大好きでした。","ex":"<p><strong>when</strong>は疑問詞で「いつ？」という意味もあるけど、ここでは<strong>接続詞</strong>として「<strong>〜のとき</strong>」という意味で使われているよ。2つの出来事を<strong>時間でつなげる</strong>役割なんだ。</p>\n\n<p>「子どものとき」＋「動物の物語が好きだった」→ <strong>When</strong> I was a child<strong>,</strong> I loved stories with animals.</p>\n\n<div class=\"es\"><h5>📝 whenの位置とカンマのルール</h5>\n<p>when節は文の前にも後ろにも置ける。ただし<strong>前に置いたときだけカンマが必要</strong>だよ。</p>\n<table class=\"t\"><tr><th>語順</th><th>カンマ</th><th>例</th></tr><tr><td>When節が<strong>前</strong></td><td>✅ 必要</td><td><strong>When</strong> I was a child<strong>,</strong> I loved stories.</td></tr><tr><td>When節が<strong>うしろ</strong></td><td>× 不要</td><td>I loved stories <strong>when</strong> I was a child.</td></tr></table></div>\n\n<div class=\"warn\">when節の中の時制も合わせよう！過去の話ならwhen節の中も過去形にする。「When I <strong>am</strong> a child」ではなく「When I <strong>was</strong> a child」。</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：because / while</h5>\n<p><strong>because</strong>は「<strong>〜なので</strong>」「<strong>〜だから</strong>」と<strong>理由</strong>を伝える接続詞。<strong>while</strong>は「<strong>〜している間に</strong>」と<strong>期間</strong>を表す接続詞だよ。</p>\n\n<p>I like English <strong>because</strong> it is fun. ＝ 英語は楽しい<strong>ので</strong>好きです。</p>\n\n<div class=\"es\"><h5>📝 becauseの使い方</h5>\n<p>becauseは<strong>Whyの答え</strong>にもなるよ。</p>\n<table class=\"t\"><tr><th>質問</th><th>答え</th></tr><tr><td>Why do you like English?</td><td><strong>Because</strong> it is fun.（楽しいから。）</td></tr></table>\n<p>文頭でも途中でもOK。文頭に置くときはカンマで区切ろう。</p>\n<p><strong>Because</strong> it was rainy<strong>,</strong> I stayed home.</p></div>\n\n<div class=\"es\"><h5>📝 whileの使い方</h5>\n<p>whileは<strong>進行形とセット</strong>で使うことが多いよ。</p>\n<p><strong>While</strong> I was studying, he called me.<br>＝ 勉強<strong>している間に</strong>、彼が電話をかけてきた。</p></div>\n\n<div class=\"tip\">whenは「〜のとき（ある時点）」、whileは「〜している間に（ある期間）」。whenが点、whileが線のイメージ。</div></div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L2","en":"If you have time tomorrow, come to the teachers' room.","ja":"もし明日時間があれば、職員室に来てください。","ex":"<p><strong>if</strong>は「<strong>もし〜なら</strong>」という意味の接続詞。「もし時間があれば」のような<strong>条件</strong>を表すよ。</p>\n\n<p>If you have time tomorrow, come to the teachers' room.<br>＝ もし明日時間が<strong>あれば</strong>、職員室に来てください。</p>\n\n<p>ここで超重要ルール！<strong>if節の中は、未来のことでも現在形を使う</strong>！「明日」の話なのにwillは使わないんだ。</p>\n\n<div class=\"es\"><h5>📝 if節のルール</h5>\n<table class=\"t\"><tr><th>if節（条件）</th><th>主節（結果）</th></tr><tr><td>If it <strong>rains</strong> tomorrow,（現在形！）</td><td>we <strong>will</strong> stay home.</td></tr><tr><td>If you <strong>are</strong> tired,（現在形！）</td><td>take a rest.（命令文もOK）</td></tr></table>\n<p>× If you <strong>will have</strong> time → ○ If you <strong>have</strong> time</p></div>\n\n<div class=\"warn\">「時・条件のif/whenの中ではwillを使わない」は入試超頻出ルール！英作文でも穴埋めでも出るよ。絶対覚えよう！</div>\n<div class=\"tip\">whenの文と同じく、if節が前なら<strong>カンマあり</strong>、うしろならカンマなし。</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L2","en":"I think that Peter is an interesting character.","ja":"わたしはピーターはおもしろいキャラクターだと思います。","ex":"<p><strong>I think that 〜</strong>は「<strong>〜だと思います</strong>」と自分の意見を言うときの定番表現だよ。thatは<strong>省略してもOK</strong>！</p>\n\n<p>I think <strong>(that)</strong> Peter is an interesting character.<br>＝ ピーターはおもしろいキャラクター<strong>だと思います</strong>。</p>\n\n<p>thatのうしろには<strong>ふつうの文（主語＋動詞〜）</strong>がそのまま続くんだ。thatが「文と文をつなぐ接着剤」の役割をしているよ。</p>\n\n<div class=\"es\"><h5>📝 thatを使うパターン</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td>I think that 〜</td><td>〜だと思う</td><td>I think that he is kind.</td></tr><tr><td>I know that 〜</td><td>〜だと知っている</td><td>I know that she is busy.</td></tr><tr><td>I hope that 〜</td><td>〜だと願う</td><td>I hope that it will be sunny.</td></tr><tr><td>I believe that 〜</td><td>〜だと信じる</td><td>I believe that we can win.</td></tr></table></div>\n\n<div class=\"tip\">英作文の最強テンプレ：「<strong>I think that 〜. I have two reasons. First, … Second, …</strong>」。この型を覚えれば入試の英作文はバッチリ！</div>","p":"Part2"}],"20":[{"b":"Here We Go!","g":2,"u":"U6","en":"They also learn basic social rules because it's essential for guide dogs.","ja":"盲導犬にとって不可欠なので、基本的な社会のルールも学びます。","ex":"<p><strong>because</strong>は「<strong>なぜなら〜だから</strong>」と<strong>理由</strong>を表す接続詞。</p>\n<div class=\"es\"><h5>📝 becauseの使い方</h5>\n<p>Why do you like English? → <strong>Because</strong> it is fun.（楽しいから。）</p></div>\n<div class=\"tip\">becauseは文頭でも途中でもOK。文頭のときはカンマで区切ろう。</div>","p":"Part2"}],"21":[{"b":"Here We Go!","g":2,"u":"U4","en":"There is a big garden near there.","ja":"その近くに大きな庭園があります。","ex":"<p><strong>There is/are 〜</strong>で「<strong>〜がある・いる</strong>」。</p>\n<div class=\"es\"><h5>📝 isとareの使い分け</h5>\n<table class=\"t\"><tr><th>あとの名詞</th><th>be動詞</th></tr><tr><td>単数</td><td>There <strong>is</strong> a cat.</td></tr><tr><td>複数</td><td>There <strong>are</strong> two cats.</td></tr></table></div>\n<div class=\"warn\">There is/areのthereは「そこに」の意味ではない！存在を表す形式語だよ。</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U4","en":"Is there a big garden near there? — Yes, there is. / No, there isn't.","ja":"大きな庭園はありますか？ — はい。/ いいえ。","ex":"<p>There is の疑問文は<strong>IsとThereをひっくり返す</strong>だけ。</p>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U4","en":"There are several Merlions.","ja":"マーライオンがいくつかあります。","ex":"<p>名詞が<strong>複数</strong>のときは<strong>There are</strong>。<strong>several</strong>は「いくつかの」。</p>","p":"Part1"},{"b":"New Crown","g":2,"u":"L4","en":"There are some books about the topic at the library.","ja":"図書館にそのトピックについての本が何冊かあります。","ex":"<p><strong>There is / There are</strong>は「<strong>〜がある</strong>」「<strong>〜がいる</strong>」と<strong>存在を伝える</strong>表現。場所に何があるかを説明するときに使うよ。</p>\n\n<p>There <strong>are</strong> some books. ＝ 本が何冊か<strong>ある</strong>。<br>\nThere <strong>is</strong> a cat. ＝ 猫が1匹<strong>いる</strong>。</p>\n\n<p>このThereは「そこに」という意味ではなく、<strong>「存在」を表す特別な使い方</strong>。本当の主語はうしろの名詞（booksやcat）で、<strong>単数ならis、複数ならare</strong>を使うよ。</p>\n\n<div class=\"es\"><h5>📝 疑問文と否定文</h5>\n<p>be動詞をthereの前に出せば疑問文、be動詞のうしろにnotを置けば否定文。いつものbe動詞のルールとまったく同じだよ。</p>\n<table class=\"t\"><tr><th>形</th><th>例</th></tr><tr><td>肯定文</td><td>There <strong>is</strong> a library.</td></tr><tr><td>疑問文</td><td><strong>Is</strong> there a library<strong>?</strong> → Yes, there <strong>is</strong>. / No, there <strong>isn't</strong>.</td></tr><tr><td>否定文</td><td>There <strong>isn't</strong> a library.</td></tr></table></div>\n\n<div class=\"warn\">答えるとき「Yes, it is.」は×！There構文には<strong>there</strong>で答えるよ。</div>\n<div class=\"tip\">否定文では「some → any」に変わるよ。There are <strong>some</strong> books. → There aren't <strong>any</strong> books.</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L4","en":"Is there a big library in this city? — Yes, there is.","ja":"この街に大きな図書館はありますか？ — はい、あります。","ex":"<p>There is/are の疑問文は、<strong>be動詞をthereの前に出す</strong>だけ。be動詞の疑問文のルールとまったく同じだよ。</p>\n\n<p>肯定文：There <strong>is</strong> a big library.<br>\n疑問文：<strong>Is</strong> there a big library<strong>?</strong><br>\n答え：Yes, there <strong>is</strong>. / No, there <strong>isn't</strong>.</p>\n\n<div class=\"warn\">答えるとき「Yes, it is.」は×！There構文には<strong>there</strong>で答えるよ。</div>\n<div class=\"tip\">否定文では「some → any」に変わるよ。There are <strong>some</strong> books. → There aren't <strong>any</strong> books.</div>","p":"Part1"}],"22":[{"b":"Here We Go!","g":1,"u":"U3","en":"I want to get that blue one.","ja":"あの青いのが欲しいです。","ex":"<p><strong>want to + 動詞の原形</strong>で「<strong>〜したい</strong>」。toのうしろは必ず<strong>動詞の原形</strong>。</p>\n<p><strong>one</strong>は前に出てきた名詞の繰り返しを避けるための代名詞。「the blue one」＝「青いもの」。</p>\n<div class=\"es\"><h5>📝 want to のパターン</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>I want to go.</td><td>行きたい。</td></tr><tr><td>I want to eat sushi.</td><td>寿司が食べたい。</td></tr><tr><td>I want to be a doctor.</td><td>医者になりたい。</td></tr></table></div>\n<div class=\"warn\">「I want to playing」は×！toのうしろは必ず動詞の<strong>原形</strong>。</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"U3","en":"Do you want to try it?","ja":"それを試してみたいですか？","ex":"<p>「〜したいですか？」は<strong>Do you want to + 動詞の原形?</strong>。ふつうの一般動詞の疑問文と同じ。</p>\n<div class=\"es\"><h5>✅ 答え方</h5>\n<p>Do you want to try it? → Yes, I <strong>do</strong>. / No, I <strong>don't</strong>.</p></div>\n<div class=\"tip\">お店で「試着したいですか？」と聞かれるイメージ。日常でもよく使うフレーズだよ！</div>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U2","en":"Hajin wants to shoot.","ja":"ハジンはシュートしたがっています。","ex":"<p>三人称単数（Hajin）が主語なので、wantに<strong>s</strong>がつくよ。want<strong>s</strong> to + 動詞の原形で「<strong>〜したがっている</strong>」。</p>\n<div class=\"tip\">toのうしろは必ず<strong>動詞の原形</strong>。主語が三人称単数でもtoのうしろの動詞にsはつかないよ！</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U2","en":"The important thing is to pass the ball to Hajin.","ja":"大事なことはハジンにボールをパスすることです。","ex":"<p><strong>to + 動詞の原形</strong>が<strong>補語</strong>の位置で「<strong>〜すること</strong>」を表す<strong>名詞的用法</strong>だよ。</p>\n<p>The important thing is <strong>to pass</strong> the ball to Hajin. ＝ 大事なことは<strong>パスすること</strong>です。</p>\n<div class=\"es\"><h5>📝 不定詞の3つの用法</h5>\n<table class=\"t\"><tr><th>用法</th><th>意味</th><th>例</th></tr><tr><td>名詞的用法</td><td>〜すること</td><td>My dream is <strong>to be</strong> a vet.</td></tr><tr><td>副詞的用法</td><td>〜するために</td><td>I came <strong>to see</strong> you.</td></tr><tr><td>形容詞的用法</td><td>〜するための</td><td>something <strong>to drink</strong></td></tr></table></div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L4","en":"I want to go to Hokkaido.","ja":"わたしは北海道に行きたいです。","ex":"<p><strong>want to + 動詞の原形</strong>で「〜したい」という意味。自分のやりたいことを伝える超基本表現だよ。</p>\n\n<p>I want to go to Hokkaido. ＝ 北海道に<strong>行きたい</strong>。</p>\n\n<p>toのうしろは<strong>必ず動詞の原形</strong>（もとの形）。主語がhe/sheでもtoのうしろの動詞にはsをつけないよ。ただしwant自体にはsがつく！</p>\n\n<p>He want<strong>s</strong> to go.（wantにはsがつくけど、goにはつかない！）</p>\n\n<div class=\"es\"><h5>📝 want to を使った表現</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>I want to eat pizza.</td><td>ピザが食べたい</td></tr><tr><td>She wants to be a doctor.</td><td>医者になりたい</td></tr><tr><td>Do you want to come?</td><td>来たい？</td></tr><tr><td>I don't want to study.</td><td>勉強したくない</td></tr></table></div>\n\n<div class=\"tip\">これは2年生の「不定詞（to＋動詞の原形）」の先取り。今のうちにwant toに慣れておくと、2年生の不定詞がグンとラクになるよ。</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L3","en":"My dream is to be a vet.","ja":"わたしの夢は獣医になることです。","ex":"<p><strong>to + 動詞の原形</strong>を<strong>不定詞</strong>と呼ぶよ。不定詞は中学英語の超重要文法で、<strong>3つの意味（用法）</strong>がある。この文は「〜<strong>すること</strong>」という<strong>名詞的用法</strong>だよ。</p>\n\n<p>My dream is <strong>to be</strong> a vet. ＝ わたしの夢は獣医に<strong>なること</strong>です。</p>\n\n<p>「to be a vet」が「なること」→名詞のかたまりとして使われているから「名詞的用法」なんだ。</p>\n\n<div class=\"es\"><h5>📝 不定詞の3つの用法（超重要！）</h5>\n<table class=\"t\"><tr><th>用法</th><th>意味</th><th>見分け方</th><th>例</th></tr><tr><td>名詞的用法</td><td>〜すること</td><td>主語・目的語・補語になる</td><td>My dream is <strong>to be</strong> a vet.</td></tr><tr><td>副詞的用法</td><td>〜するために</td><td>「何のために？」に答える</td><td>I came <strong>to see</strong> you.</td></tr><tr><td>形容詞的用法</td><td>〜するための</td><td>前の名詞を説明</td><td>something <strong>to drink</strong></td></tr></table></div>\n\n<div class=\"warn\">toのうしろは必ず<strong>動詞の原形</strong>！主語がhe/sheでもtoのうしろの動詞にsはつけない。</div>\n<div class=\"tip\">不定詞は入試の配点が高い超重要単元！「〜すること」「〜するために」「〜するための」の3つの訳し分けを確実にしよう。</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：It is ... for 人 to 〜 構文</h5>\n<p>「英語を勉強することは大切だ」のように、<strong>「〜することは…だ」</strong>と言いたいとき、英語では<strong>It is … for 人 to 動詞</strong>の形を使うよ。</p>\n\n<p><strong>It</strong> is important <strong>for us to</strong> study English.<br>＝ 英語を勉強することは<strong>私たちにとって</strong>大切です。</p>\n\n<p>この<strong>It</strong>は「それ」という意味ではなく、うしろの「to study English」を指す<strong>仮の主語</strong>。本当の主語が長いから先にItを置いて、主語を後ろに回しているんだ。</p>\n\n<div class=\"es\"><h5>📝 文の構造</h5>\n<table class=\"t\"><tr><th>パーツ</th><th>役割</th></tr><tr><td><strong>It is</strong> + 形容詞</td><td>「〜だ」（重要だ、簡単だ等）</td></tr><tr><td><strong>for</strong> + 人</td><td>「（人）にとって」（省略OK）</td></tr><tr><td><strong>to</strong> + 動詞の原形</td><td>「〜すること」（本当の主語）</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 よく使う形容詞</h5>\n<p>important（大切）, easy（簡単）, difficult / hard（難しい）, necessary（必要）, dangerous（危険）, interesting（おもしろい）, possible（可能）</p></div>\n\n<div class=\"tip\">「for 人」を「of 人」にする場合もある。kind, nice, clever, careless などの「人の性格を表す形容詞」のときは of を使うよ。It is kind <strong>of</strong> you to help me.</div></div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L3","en":"I want to help animals.","ja":"わたしは動物を助けたいです。","ex":"<p><strong>want to + 動詞の原形</strong>で「〜したい」。不定詞の名詞的用法のひとつだよ。</p>\n\n<p>I <strong>want to help</strong> animals.<br>\n＝ 動物を<strong>助けたい</strong>。</p>\n\n<p>1年生で「I want to go to Hokkaido.」を学んだね。今回は不定詞（to + 動詞の原形）の名詞的用法として改めて確認しよう。want toのうしろは<strong>必ず動詞の原形</strong>だよ。</p>\n\n<div class=\"tip\">want toは不定詞の名詞的用法の代表例。「〜すること」を望む＝「〜したい」という意味になるんだ。</div>","p":"Part1"}],"23":[{"b":"Here We Go!","g":2,"u":"U4","en":"You need something to cover your shoulders.","ja":"肩を覆うための何かが必要です。","ex":"<p>不定詞の<strong>形容詞的用法</strong>＝「<strong>〜するための</strong>」。前の名詞を説明する。</p>\n<div class=\"es\"><h5>📝 形容詞的用法の例</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>something <strong>to eat</strong></td><td>食べるもの</td></tr><tr><td>something <strong>to drink</strong></td><td>飲み物</td></tr><tr><td>a place <strong>to visit</strong></td><td>訪れる場所</td></tr></table></div>","p":"Part3"},{"b":"New Crown","g":2,"u":"L3","en":"Let's have something to drink.","ja":"何か飲み物を飲みましょう。","ex":"<p>不定詞の<strong>形容詞的用法</strong>は「<strong>〜するための○○</strong>」「<strong>〜するべき○○</strong>」のように、<strong>前の名詞を説明（修飾）</strong>する使い方だよ。</p>\n\n<p>something <strong>to drink</strong> ＝ 飲む<strong>ための</strong>何か → つまり「<strong>飲み物</strong>」</p>\n\n<p>somethingやanythingのように「何か」を表す語と相性バツグン。テストでも日常会話でもよく使うよ。</p>\n\n<div class=\"es\"><h5>📝 よく出るパターン</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>something to eat</td><td>食べ物（何か食べるもの）</td></tr><tr><td>something to drink</td><td>飲み物（何か飲むもの）</td></tr><tr><td>something to do</td><td>やること（何かやるもの）</td></tr><tr><td>nothing to do</td><td>やることがない</td></tr><tr><td>anything to say</td><td>何か言うこと</td></tr></table></div>\n\n<div class=\"tip\">something/anything/nothingに形容詞をつけるときは<strong>後ろ</strong>に置くよ。something <strong>cold</strong> to drink（何か冷たい飲み物）。形容詞が後ろにくる珍しいパターン！</div>","p":"Part2"}],"24":[{"b":"Here We Go!","g":2,"u":"U6","en":"She's here to help Fred.","ja":"彼女はフレッドを助けるためにここにいます。","ex":"<p>不定詞の<strong>副詞的用法</strong>＝「<strong>〜するために</strong>」。「何のためにそうしたの？」の答えになる。</p>\n<p>She's here <strong>to help</strong> Fred. ＝ フレッドを<strong>助けるために</strong>ここにいます。</p>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U6","en":"I study English to travel abroad.","ja":"わたしは海外旅行をするために英語を勉強します。","ex":"<p>不定詞の<strong>副詞的用法</strong>。「<strong>目的</strong>」を表す。</p>\n<div class=\"es\"><h5>📝 不定詞3用法の見分け方</h5>\n<table class=\"t\"><tr><th>用法</th><th>訳</th><th>見分け方</th></tr><tr><td>名詞的</td><td>〜すること</td><td>主語・目的語・補語になる</td></tr><tr><td>副詞的</td><td>〜するために</td><td>「何のために？」に答える</td></tr><tr><td>形容詞的</td><td>〜するための</td><td>前の名詞を説明する</td></tr></table></div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U6","en":"I'm glad to hear that.","ja":"それを聞いてうれしいです。","ex":"<p>不定詞の副詞的用法の一種で、<strong>感情の原因</strong>を表す。「<strong>〜して（うれしい/驚いた）</strong>」。</p>\n<div class=\"es\"><h5>📝 パターン</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>I'm glad <strong>to hear</strong> that.</td><td>聞いてうれしい</td></tr><tr><td>I'm happy <strong>to see</strong> you.</td><td>会えてうれしい</td></tr><tr><td>I'm surprised <strong>to know</strong> that.</td><td>知って驚いた</td></tr></table></div>","p":"Part3"},{"b":"New Crown","g":2,"u":"L3","en":"Many customers came to the shop to buy lunch.","ja":"たくさんのお客さんが昼食を買うためにその店に来ました。","ex":"<p>不定詞の<strong>副詞的用法</strong>は「<strong>〜するために</strong>」という<strong>目的</strong>を表すよ。「何のためにそうしたの？」の答えになるんだ。</p>\n\n<p>Many customers came to the shop <strong>to buy</strong> lunch.<br>＝ 昼食を<strong>買うために</strong>その店に来ました。</p>\n\n<p>「came」（来た）の理由・目的が「to buy lunch」（昼食を買うため）。こうやって<strong>動作の理由を後ろから説明</strong>するのが副詞的用法だよ。</p>\n\n<div class=\"es\"><h5>📝 名詞的用法との見分け方</h5>\n<table class=\"t\"><tr><th>用法</th><th>テスト</th><th>例</th></tr><tr><td>名詞的用法</td><td>「〜すること」で訳せる</td><td>I want <strong>to eat</strong>.（食べ<strong>ること</strong>を望む）</td></tr><tr><td>副詞的用法</td><td>「〜するために」で訳せる</td><td>I came <strong>to eat</strong>.（食べ<strong>るために</strong>来た）</td></tr></table></div>\n\n\n\n<div class=\"es\"><h5>🎯 もうひとつの副詞的用法：感情の原因</h5>\n<p>「〜して（うれしい/悲しい）」のように<strong>感情の原因</strong>も副詞的用法だよ。</p>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>I'm <strong>glad to meet</strong> you.</td><td>会えて<strong>うれしい</strong></td></tr><tr><td>I'm <strong>sad to hear</strong> that.</td><td>それを聞いて<strong>悲しい</strong></td></tr><tr><td>I was <strong>surprised to see</strong> him.</td><td>彼を見て<strong>驚いた</strong></td></tr></table></div>\n<div class=\"tip\">「Why did they come?」（なぜ来た？）→「<strong>To buy</strong> lunch.」（昼食を買うために。）目的を聞かれたら不定詞で答えられるよ！</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：too ... to 〜 構文</h5>\n<p><strong>too … to 〜</strong>は「<strong>〜すぎて…できない</strong>」という意味。「限界を超えていてムリ！」というニュアンスだよ。</p>\n\n<p>This bag is <strong>too heavy to</strong> carry.<br>＝ このかばんは<strong>重すぎて運べない</strong>。</p>\n\n<div class=\"es\"><h5>📝 文の構造</h5>\n<p><strong>too</strong> + 形容詞/副詞 + <strong>to</strong> + 動詞の原形<br>＝ あまりに〜なので…できない</p></div>\n\n<div class=\"es\"><h5>🎯 so 〜 that … can't への書き換え（テスト定番！）</h5>\n<p>too 〜 to … と so 〜 that … can't は同じ意味で書き換えられるよ。</p>\n<table class=\"t\"><tr><th>too 〜 to</th><th>so 〜 that can't</th></tr><tr><td>He is <strong>too young to</strong> drive.</td><td>He is <strong>so young that</strong> he <strong>can't</strong> drive.</td></tr><tr><td>This is <strong>too hard to</strong> solve.</td><td>This is <strong>so hard that</strong> I <strong>can't</strong> solve it.</td></tr></table></div>\n\n<div class=\"warn\">書き換えるとき、so〜that側には<strong>主語</strong>と<strong>can't</strong>が必要！too to側にはない主語が出てくるのでテストで要注意。</div></div>","p":"Part2"}],"25":[{"b":"Here We Go!","g":2,"u":"U5","en":"It's important to prepare well for emergencies.","ja":"緊急事態にしっかり備えることは大切です。","ex":"<p><strong>It is + 形容詞 + to + 動詞</strong>で「<strong>〜することは…だ</strong>」。Itは仮の主語で、本当の主語はto以下。</p>\n<div class=\"es\"><h5>📝 よく使う形容詞</h5>\n<p>important（大切）, easy（簡単）, difficult（難しい）, necessary（必要）, dangerous（危険）</p></div>\n<div class=\"tip\">It is … <strong>for 人</strong> to 〜 で「人にとって〜は…だ」も言えるよ。It is important <strong>for us</strong> to prepare.</div>","p":"Part3"}],"26":[{"b":"Here We Go!","g":2,"u":"U8","en":"I want you to help me.","ja":"わたしはあなたに手伝ってほしいです。","ex":"<p><strong>want + 人 + to + 動詞の原形</strong>で「<strong>（人）に〜してほしい</strong>」。自分の希望ではなく<strong>相手に何かしてほしい</strong>ときの表現。</p>\n<p>I want <strong>you</strong> to help <strong>me</strong>. ＝ あなたに手伝って<strong>ほしい</strong>。</p>\n<div class=\"es\"><h5>📝 want to と want 人 to の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>I want <strong>to go</strong>.</td><td>わたしが行きたい（自分が行く）</td></tr><tr><td>I want <strong>you to go</strong>.</td><td>あなたに行ってほしい（相手が行く）</td></tr></table>\n<p>ポイントは <strong>want と to の間に「人」が入るかどうか</strong>。人が入ると「その人に〜してほしい」に変わる！</p></div>\n<div class=\"es\"><h5>📝 want・ask・tell の3兄弟</h5>\n<table class=\"t\"><tr><th>パターン</th><th>意味</th><th>ニュアンス</th></tr><tr><td>want + 人 + to 〜</td><td>（人）に〜してほしい</td><td>希望・お願い</td></tr><tr><td>ask + 人 + to 〜</td><td>（人）に〜するよう頼む</td><td>お願い・依頼</td></tr><tr><td>tell + 人 + to 〜</td><td>（人）に〜するよう言う</td><td>指示・命令</td></tr></table>\n<p>3つとも<strong>「動詞 + 人 + to + 動詞の原形」</strong>という同じ形！セットで覚えよう。</p></div>\n<div class=\"tip\">wantは「心の中の希望」、askは「実際に頼む行動」、tellは「言って指示する行動」。強さの順番は want（弱）→ ask（中）→ tell（強）とイメージしよう！</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U8","en":"I asked him to open the window.","ja":"わたしは彼に窓を開けるように頼みました。","ex":"<p>「窓を開けて」って友達に<strong>お願い</strong>するとき、英語では<strong>ask + 人 + to 〜</strong>を使うよ。want（希望）より一歩進んで、<strong>実際に頼む行動</strong>を表す表現。</p>\n<p>I <strong>asked him</strong> to open the window. ＝ 彼に窓を開けるように<strong>頼んだ</strong>。</p>\n<div class=\"es\"><h5>📝 askには2つの意味がある！</h5>\n<table class=\"t\"><tr><th>パターン</th><th>意味</th><th>例</th></tr><tr><td>ask + 人 + <strong>to 〜</strong></td><td>〜するよう<strong>頼む</strong></td><td>I asked him <strong>to help</strong> me.</td></tr><tr><td>ask + 人 + <strong>疑問詞節</strong></td><td>〜か<strong>たずねる</strong></td><td>I asked him <strong>where he lived</strong>.</td></tr></table>\n<p>同じaskでも、うしろがtoなら「お願い」、疑問詞なら「質問」。ここでは「お願い」の方だよ！</p></div>\n<div class=\"tip\">askは「頼む・お願いする」で丁寧なニュアンス。友達にも先生にも使えるよ。一方tellは「言う・指示する」で強め。先生→生徒、親→子のような関係で使うことが多いんだ。</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U8","en":"She told me to study hard.","ja":"彼女はわたしに一生懸命勉強するように言いました。","ex":"<p>お母さんに「勉強しなさい！」って<strong>言われた</strong>こと、あるよね？それが<strong>tell + 人 + to 〜</strong>。askより強くて、<strong>指示・命令</strong>のニュアンスがある表現だよ。</p>\n<p>She <strong>told me</strong> to study hard. ＝ 彼女はわたしに一生懸命勉強するように<strong>言った</strong>。</p>\n<div class=\"es\"><h5>📝 tellとsayの違い — テスト超頻出！</h5>\n<table class=\"t\"><tr><th>動詞</th><th>ルール</th><th>例</th></tr><tr><td><strong>tell</strong></td><td>必ず<strong>「人」が必要</strong></td><td>He <strong>told me</strong> to go. ○</td></tr><tr><td><strong>say</strong></td><td>「人」はつけない</td><td>He <strong>said</strong> to go. ○</td></tr></table>\n<p>× He <strong>said me</strong> to go.（sayに人はつけない！）<br>× He <strong>told</strong> to go.（tellには人が必要！）</p></div>\n<div class=\"warn\">tellの過去形は<strong>told</strong>（不規則変化）。tell - told - told。スペルミス注意！</div>\n<div class=\"tip\">「〜<strong>しないように</strong>言う」は <strong>tell + 人 + not to 〜</strong>。notは<strong>toの前</strong>に置くよ！<br>She told me <strong>not to</strong> run.（走らないように言った）</div>","p":"Part1"}],"27":[{"b":"Here We Go!","g":1,"u":"U3","en":"I like dancing.","ja":"わたしはダンスが好きです。","ex":"<p>動詞のing形を<strong>名詞のように</strong>使うことを<strong>「動名詞」</strong>と呼ぶよ。「dancing」＝「踊ること」。</p>\n<p>I like <strong>dancing</strong>. ＝ わたしは<strong>踊ること</strong>が好きです。</p>\n<div class=\"es\"><h5>📝 動名詞の作り方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>例</th></tr><tr><td>ふつう → そのままing</td><td>play→playing, eat→eating</td></tr><tr><td>eで終わる → eを取ってing</td><td>dance→dancing, make→making</td></tr><tr><td>短母音+子音 → 子音を重ねてing</td><td>run→running, swim→swimming</td></tr></table></div>\n<div class=\"tip\">likeのうしろは「-ing」も「to+動詞」もOK！「I like dancing. = I like to dance.」</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U3","en":"Do you like dancing?","ja":"あなたはダンスが好きですか？","ex":"<p>「〜することが好きですか？」もふつうの一般動詞の疑問文と同じ。<strong>Do + 主語 + like + 動名詞?</strong></p>\n<div class=\"es\"><h5>✅ 答え方</h5>\n<p>Do you like dancing? → Yes, I <strong>do</strong>. / No, I <strong>don't</strong>.</p></div>\n<div class=\"tip\">動名詞が目的語になっても、疑問文の作り方はふつうの一般動詞の文と同じ！</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U2","en":"I don't like playing basketball.","ja":"わたしはバスケをするのが好きではありません。","ex":"<p>2年生でも動名詞は重要！「<strong>like + 動名詞（-ing）</strong>」の否定文だよ。</p>\n<p>I <strong>don't like playing</strong> basketball. ＝ バスケをするのが<strong>好きではありません</strong>。</p>\n<div class=\"tip\">likeは-ingもtoもどちらもOK。「I don't like playing」＝「I don't like to play」</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U2","en":"I'm not good at passing the ball.","ja":"わたしはパスが上手ではありません。","ex":"<p><strong>be good at 〜</strong>は「<strong>〜が得意</strong>」。atは前置詞なので、うしろに動詞が来るときは<strong>-ing形</strong>にするよ。</p>\n<p>I'm <strong>not</strong> good <strong>at passing</strong> the ball. ＝ パスが上手<strong>ではない</strong>。</p>\n<div class=\"es\"><h5>📝 前置詞のうしろは名詞か-ing！</h5>\n<p>前置詞（at, in, of, about, for…）のうしろには名詞か動名詞（-ing）を置くよ。</p>\n<table class=\"t\"><tr><th>例</th><th>日本語</th></tr><tr><td>good <strong>at</strong> swimming</td><td>水泳が得意</td></tr><tr><td>interested <strong>in</strong> reading</td><td>読書に興味がある</td></tr><tr><td>tired <strong>of</strong> waiting</td><td>待つのに疲れた</td></tr></table></div>\n<div class=\"warn\">「good at to play」は×！前置詞のうしろにtoは使えない。-ingを使おう。</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U2","en":"Passing the ball isn't easy.","ja":"パスをすることは簡単ではありません。","ex":"<p>動名詞（-ing）は<strong>文の主語</strong>にもなれるんだ。「<strong>〜すること</strong>は…」という意味になるよ。</p>\n<p><strong>Passing</strong> the ball <strong>isn't</strong> easy. ＝ パスをする<strong>こと</strong>は簡単<strong>ではない</strong>。</p>\n<p>動名詞が主語のとき、be動詞は<strong>is</strong>を使う（単数扱い）。</p>\n<div class=\"tip\">「〜することは…だ」は動名詞主語のほか「It is … to 〜」の形でも言えるよ。It isn't easy to pass the ball.</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L4","en":"I enjoyed swimming.","ja":"わたしは水泳を楽しみました。","ex":"<p><strong>enjoy</strong>は「〜を楽しむ」という意味の動詞。特別なルールがあって、<strong>enjoyのうしろには必ず-ing形（動名詞）</strong>を置くんだ。「to＋動詞」の形は使えないよ。</p>\n\n<p>enjoy <strong>swimming</strong>（○）＝ 泳ぐことを楽しんだ<br>\nenjoy <strong>to swim</strong>（×）＝ これは間違い！</p>\n\n<p>enjoyのように<strong>うしろに-ingだけとる動詞</strong>がいくつかある。テストに出やすいものを覚えよう。</p>\n\n<div class=\"es\"><h5>📝 -ingだけとる動詞（暗記！）</h5>\n<table class=\"t\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td>enjoy</td><td>楽しむ</td><td>enjoy reading（読書を楽しむ）</td></tr><tr><td>finish</td><td>終える</td><td>finish eating（食べ終える）</td></tr><tr><td>stop</td><td>やめる</td><td>stop talking（話すのをやめる）</td></tr><tr><td>mind</td><td>気にする</td><td>mind waiting（待つのを気にする）</td></tr><tr><td>practice</td><td>練習する</td><td>practice singing（歌の練習をする）</td></tr></table></div>\n\n<div class=\"tip\">「enjoyのうしろはing！」と呪文のように覚えちゃおう。テストの穴埋めで「enjoy to 〜」を選んだら不正解だよ。</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：動名詞と不定詞の使い分け</h5>\n<p>動詞の中には「うしろに<strong>-ingだけ</strong>とるもの」と「<strong>to〜だけ</strong>とるもの」と「<strong>どちらもOK</strong>なもの」がある。これを知らないとテストで落とし穴にはまるよ。</p>\n\n<div class=\"es\"><h5>📝 3つのグループ</h5>\n<table class=\"t\"><tr><th>グループ</th><th>動詞と例</th></tr><tr><td><strong>-ingだけ</strong><br>（動名詞のみ）</td><td>enjoy, finish, stop, mind, practice, give up<br>→ I <strong>finished reading</strong>.（読み終えた）<br>→ <strong>Stop talking</strong>.（話すのをやめて）</td></tr><tr><td><strong>toだけ</strong><br>（不定詞のみ）</td><td>want, hope, wish, decide, promise, agree<br>→ I <strong>want to go</strong> home.（帰りたい）<br>→ I <strong>hope to see</strong> you.（会いたい）</td></tr><tr><td><strong>両方OK</strong></td><td>like, love, start, begin, continue<br>→ I <strong>like playing</strong> = I <strong>like to play</strong></td></tr></table></div>\n\n<div class=\"warn\">「enjoy to swim」「finish to read」は×！enjoy/finishは-ingだけ。「want playing」も×！wantはtoだけ。</div>\n<div class=\"tip\">迷ったら「enjoyとfinishのうしろはing！wantとhopeのうしろはto！」これだけ覚えればテストは乗り切れる。</div></div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L4","en":"We need water for doing the laundry.","ja":"わたしたちは洗濯をするために水が必要です。","ex":"<p><strong>動名詞</strong>とは、<strong>動詞に -ing をつけて「〜すること」という名詞にしたもの</strong>。動詞なのに、名詞と同じように文の中で使えるのが最大のポイントだよ。</p>\n\n<p>この課の文も、動名詞を使った文だよ。</p>\n\n<p>We need water <strong>for doing</strong> the laundry.<br>＝ 洗濯<strong>をするために</strong>水が必要です。</p>\n\n<p>「for」は前置詞。前置詞のうしろは名詞が来るルールだから、動詞 do を <strong>doing</strong>（ing形）にして、名詞のような形にしているんだ。これが動名詞！</p>\n\n<div class=\"es\"><h5>📝 動名詞が使える4つの場所</h5>\n<p>動名詞は「動詞を名詞にしたもの」だから、<strong>名詞が入る場所すべて</strong>に置けるよ。</p>\n<table class=\"t\"><tr><th>使う場所</th><th>例文</th></tr><tr><td><strong>① 主語</strong><br>〜することは</td><td><strong>Playing</strong> soccer <strong>is</strong> fun.<br>（サッカーをすることは楽しい）</td></tr><tr><td><strong>② 動詞の目的語</strong><br>〜することを</td><td>I enjoy <strong>playing</strong> soccer.<br>（サッカーをすることを楽しむ）</td></tr><tr><td><strong>③ 補語</strong><br>〜することです</td><td>My hobby is <strong>playing</strong> soccer.<br>（私の趣味はサッカーをすることです）</td></tr><tr><td><strong>④ 前置詞のうしろ</strong><br>〜することの…</td><td>water <strong>for doing</strong> the laundry<br>（洗濯をするための水）← この課の文！</td></tr></table></div>\n\n<div class=\"tip\">①主語のときは「1つのこと」として扱うから、動詞は <strong>is / was</strong>（単数）になるよ。「Playing soccer <strong>are</strong> fun.」は×！ テストでよく狙われるポイント。</div>\n\n<div class=\"es\"><h5>📝 ④前置詞＋動名詞のよく出るパターン</h5>\n<p>前置詞（for / at / in / of / without など）のうしろの動詞は、必ず<strong>動名詞（ing形）</strong>にするよ。</p>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td>Thank you <strong>for 〜ing</strong></td><td>〜してくれてありがとう</td><td>Thank you for helping me.</td></tr><tr><td>be good <strong>at 〜ing</strong></td><td>〜が得意</td><td>I'm good at cooking.</td></tr><tr><td>How about <strong>〜ing</strong>?</td><td>〜するのはどう？</td><td>How about going to the park?</td></tr><tr><td>without <strong>〜ing</strong></td><td>〜せずに</td><td>He left without saying goodbye.</td></tr></table></div>\n\n<div class=\"warn\">前置詞のうしろに to不定詞は×！「Thank you for <strong>to help</strong>」は×、「Thank you for <strong>helping</strong>」が○。</div>\n\n<div class=\"es\"><h5>🎯 ②動詞の目的語：動名詞しか取らない動詞に注意</h5>\n<p><strong>enjoy / finish / stop / practice</strong> などの動詞のうしろは、<strong>動名詞だけ</strong>。to不定詞は使えないんだ。</p>\n<p>I enjoy <strong>swimming</strong>.（○）／ I enjoy <strong>to swim</strong>.（×）<br>I finished <strong>reading</strong>.（読み終えた）／ Please stop <strong>talking</strong>.（話すのをやめて）</p></div>","p":"Part2"}],"28":[{"b":"Here We Go!","g":2,"u":"U7","en":"This festival is bigger than the Honcho Summer Festival.","ja":"この祭りは本町夏祭りより大きいです。","ex":"<p><strong>比較級</strong>は2つのものを比べて「<strong>AはBより〜だ</strong>」と言うときに使うよ。</p>\n<div class=\"es\"><h5>📝 比較級の作り方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>原級 → 比較級</th></tr><tr><td>ふつう → er</td><td>big → bigg<strong>er</strong>, tall → tall<strong>er</strong></td></tr><tr><td>eで終わる → r</td><td>large → large<strong>r</strong></td></tr><tr><td>子音+y → ier</td><td>easy → eas<strong>ier</strong></td></tr><tr><td>長い語 → more</td><td>beautiful → <strong>more</strong> beautiful</td></tr><tr><td>不規則</td><td>good → <strong>better</strong>, bad → <strong>worse</strong></td></tr></table></div>\n<div class=\"tip\">比較級のうしろには必ず<strong>than</strong>がくる。「bigger <strong>than</strong> 〜」のセットで覚えよう。</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U7","en":"A school in space is more exciting than a normal one.","ja":"宇宙の学校はふつうの学校よりわくわくします。","ex":"<p><strong>長い形容詞</strong>（exciting, importantなど）は-erではなく<strong>more</strong>をつけて比較級にするよ。</p>\n<p>A school in space is <strong>more exciting than</strong> a normal one.</p>\n<div class=\"tip\">目安：音節が3つ以上の形容詞はmoreを使う。exciting, beautiful, important, interesting…</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U7","en":"He plays soccer better than me.","ja":"彼はわたしよりサッカーが上手です。","ex":"<p>goodの比較級は「gooder」…<strong>じゃない！</strong>good/wellは特別で、形がガラッと変わるよ。テストで一番間違えやすいところ！</p>\n<div class=\"es\"><h5>📝 不規則変化する比較級・最上級</h5>\n<table class=\"t\"><tr><th>原級</th><th>比較級</th><th>最上級</th></tr><tr><td>good / well（良い）</td><td><strong>better</strong></td><td><strong>best</strong></td></tr><tr><td>bad（悪い）</td><td><strong>worse</strong></td><td><strong>worst</strong></td></tr><tr><td>many / much（多い）</td><td><strong>more</strong></td><td><strong>most</strong></td></tr></table></div>\n<div class=\"warn\">× more good / × gooder → ○ <strong>better</strong><br>× more bad / × badder → ○ <strong>worse</strong><br>この3セットは丸暗記！書けるまで何度も練習しよう。</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U7","en":"Which is bigger, Tokyo or Osaka?","ja":"東京と大阪ではどちらが大きいですか？","ex":"<p>「犬と猫、どっちが好き？」のように<strong>2つを比べて聞く</strong>ときの言い方だよ。</p>\n<p>Which is <strong>bigger</strong>, Tokyo <strong>or</strong> Osaka? ＝ 東京と大阪、<strong>どっちが大きい？</strong></p>\n<div class=\"es\"><h5>📝 よく出るパターン</h5>\n<table class=\"t\"><tr><th>聞き方</th><th>例</th></tr><tr><td>Which is + <strong>比較級</strong>, A or B?</td><td>Which is <strong>taller</strong>, Ken or Tom?</td></tr><tr><td>Which do you like <strong>better</strong>, A or B?</td><td>Which do you like <strong>better</strong>, dogs or cats?</td></tr></table></div>\n<div class=\"tip\">「2つのうちどっちが好き？」は<strong>like better</strong>を使う。betterを忘れて「Which do you like, A or B?」だけだと不自然だよ。</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L6","en":"Singapore is smaller than Tokyo.","ja":"シンガポールは東京より小さいです。","ex":"<p><strong>比較級</strong>は<strong>2つのものを比べて「AはBより〜だ」</strong>と言うときに使うよ。短い形容詞の場合は語尾に<strong>-er</strong>をつけて、そのあとに<strong>than</strong>を置くんだ。</p>\n\n<p>Singapore is <strong>smaller than</strong> Tokyo.<br>＝ シンガポールは東京<strong>より小さい</strong>。</p>\n\n<div class=\"es\"><h5>📝 -erのつけ方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>例</th></tr><tr><td>ふつう → er</td><td>small→smaller, tall→taller</td></tr><tr><td>eで終わる → r</td><td>large→larger, nice→nicer</td></tr><tr><td>子音+y → yをiに変えてer</td><td>easy→easier, happy→happier</td></tr><tr><td>短母音+子音 → 重ねてer</td><td>big→bigger, hot→hotter</td></tr><tr><td>不規則</td><td>good→<strong>better</strong> / bad→<strong>worse</strong></td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 長い形容詞はmore！</h5>\n<p>3音節以上の長い語（popular, beautifulなど）は-erではなく<strong>more</strong>を前に置くよ。（次のカードで詳しく！）</p></div>\n\n<div class=\"tip\">「<strong>than</strong>」がキーワード。文にthanがあれば比較級だと判断できるよ。</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L6","en":"Sightseeing is more popular than shopping.","ja":"観光は買い物より人気があります。","ex":"<p>popular（人気がある）のような<strong>長い形容詞</strong>（ふつう3音節以上）は、-erではなく<strong>前にmoreを置いて</strong>比較級を作るよ。</p>\n\n<p>Sightseeing is <strong>more popular than</strong> shopping.<br>＝ 観光は買い物<strong>より人気がある</strong>。</p>\n\n<p>なぜ-erじゃないの？ 「popularer」は長すぎて言いにくいよね。だから長い語はmoreを前に置く方式にしているんだ。</p>\n\n<div class=\"es\"><h5>📝 -er か more か？ 見分け方</h5>\n<table class=\"t\"><tr><th>形容詞のタイプ</th><th>比較級の作り方</th><th>例</th></tr><tr><td>短い語（1音節）</td><td>-er</td><td>tall → tall<strong>er</strong></td></tr><tr><td>-yで終わる（2音節）</td><td>yをiに変えて-ier</td><td>easy → eas<strong>ier</strong></td></tr><tr><td>長い語（3音節〜）</td><td>more + 原形</td><td>popular → <strong>more</strong> popular</td></tr><tr><td>-ful, -ous, -ing, -ive等</td><td>more + 原形</td><td>careful → <strong>more</strong> careful</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 入試でよく出るmore型の形容詞</h5>\n<p>popular, beautiful, interesting, important, difficult, exciting, expensive, famous, careful, useful</p></div>\n\n<div class=\"warn\">-erとmoreを両方つけるのは絶対NG！「<strong>more taller</strong>」「<strong>more easier</strong>」は×。どちらか一方だけ使おう。</div>","p":"Part2"}],"29":[{"b":"Here We Go!","g":2,"u":"U7","en":"This festival is the biggest event of the year.","ja":"この祭りは1年で最も大きなイベントです。","ex":"<p><strong>最上級</strong>は3つ以上の中で「<strong>いちばん〜だ</strong>」を表す。形容詞の前に<strong>the</strong>をつけるのがルール！</p>\n<div class=\"es\"><h5>📝 最上級の作り方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>原級 → 最上級</th></tr><tr><td>ふつう → est</td><td>big → bigg<strong>est</strong></td></tr><tr><td>長い語 → most</td><td>beautiful → <strong>most</strong> beautiful</td></tr><tr><td>不規則</td><td>good → <strong>best</strong>, bad → <strong>worst</strong></td></tr></table></div>\n<div class=\"es\"><h5>📝 inとofの使い分け</h5>\n<table class=\"t\"><tr><th>使う語</th><th>うしろに来るもの</th><th>例</th></tr><tr><td>in</td><td>場所・範囲</td><td>the tallest <strong>in</strong> the class</td></tr><tr><td>of</td><td>数・グループ</td><td>the biggest <strong>of</strong> the three</td></tr></table></div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U7","en":"Teamwork is the most important thing.","ja":"チームワークは最も大事なことです。","ex":"<p>長い形容詞の最上級は<strong>the most + 形容詞</strong>。</p>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U7","en":"I like summer the best of all seasons.","ja":"わたしはすべての季節の中で夏がいちばん好きです。","ex":"<p>「いちばん好き！」って言いたいとき、<strong>like ~ the best</strong>を使うよ。3つ以上のものの中で「一番」を言うときの表現！</p>\n<div class=\"es\"><h5>📝 likeの比較まとめ — テスト超頻出！</h5>\n<table class=\"t\"><tr><th>場面</th><th>質問</th><th>答え方</th></tr><tr><td>2つを比べる</td><td>Which do you like <strong>better</strong>, A or B?</td><td>I like A <strong>better</strong>.</td></tr><tr><td>3つ以上で一番</td><td>What 〜 do you like <strong>the best</strong>?</td><td>I like A <strong>the best</strong>.</td></tr></table></div>\n<div class=\"warn\">bestの前には必ず<strong>the</strong>をつけよう！<br>× I like summer best. → ○ I like summer <strong>the</strong> best.</div>\n<div class=\"tip\">「2つならbetter、3つ以上ならthe best」。比較級か最上級かで使い分けるのは、ふつうの形容詞と同じ考え方だよ！</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L6","en":"Singapore is the smallest country in Southeast Asia.","ja":"シンガポールは東南アジアでいちばん小さい国です。","ex":"<p><strong>最上級</strong>は<strong>3つ以上の中で「いちばん〜だ」</strong>と言うときに使うよ。短い形容詞の場合は<strong>the + 形容詞est</strong>で作るんだ。</p>\n\n<p>Singapore is <strong>the smallest</strong> country in Southeast Asia.<br>＝ シンガポールは東南アジアで<strong>いちばん小さい</strong>国です。</p>\n\n<p>「〜の中で」を表すときは<strong>in（場所・範囲）</strong>か<strong>of（グループ）</strong>を使うよ。</p>\n\n<div class=\"es\"><h5>📝 inとofの使い分け</h5>\n<table class=\"t\"><tr><th>前置詞</th><th>使うとき</th><th>例</th></tr><tr><td>in</td><td>場所・範囲</td><td>the tallest <strong>in</strong> my class（クラスで）</td></tr><tr><td>of</td><td>グループ・人数</td><td>the tallest <strong>of</strong> the three（3人の中で）</td></tr></table></div>\n\n<div class=\"warn\">最上級には必ず<strong>the</strong>をつける！「She is tallest」は×。「She is <strong>the</strong> tallest」が○。theを忘れるとテストで減点だよ。</div>\n<div class=\"tip\">不規則変化の最上級も覚えよう：good→better→<strong>the best</strong> / bad→worse→<strong>the worst</strong></div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L6","en":"Sightseeing is the most popular activity on the list.","ja":"観光はリストの中でいちばん人気のある活動です。","ex":"<p>長い形容詞の最上級は<strong>the most + 形容詞</strong>で作るよ。more型の形容詞はそのままmostに変えるだけだから簡単！</p>\n\n<p>Sightseeing is <strong>the most popular</strong> activity on the list.<br>＝ リストの中で<strong>いちばん人気のある</strong>活動です。</p>\n\n<div class=\"es\"><h5>📝 比較の3段階まとめ（これで比較はカンペキ！）</h5>\n<table class=\"t\"><tr><th></th><th>短い語</th><th>長い語</th><th>不規則</th></tr><tr><td>原級（もとの形）</td><td>tall</td><td>popular</td><td>good / bad</td></tr><tr><td>比較級（2つ比較）</td><td>taller</td><td>more popular</td><td>better / worse</td></tr><tr><td>最上級（いちばん）</td><td>the tallest</td><td>the most popular</td><td>the best / the worst</td></tr></table></div>\n\n<div class=\"warn\">more/mostを使う形容詞に-er/-estをつけない！「most popularest」「most beautifulest」は×。</div>\n<div class=\"tip\">最上級のtheを忘れがち！「<strong>the</strong> most popular」のtheは絶対必要だよ。</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L6","en":"I like tigers the best.","ja":"わたしはトラがいちばん好きです。","ex":"<p><strong>like 〜 the best</strong>は「<strong>〜がいちばん好き</strong>」という表現。bestはgoodの最上級（good→better→<strong>best</strong>）だよ。</p>\n\n<p>I like tigers <strong>the best</strong>. ＝ トラが<strong>いちばん好き</strong>です。</p>\n\n<p>likeは一般動詞だから、ふつうの形容詞の最上級（the tallest/the most popularなど）とは少し形が違う。<strong>動詞 + 〜 + the best</strong>で「いちばん〜する」になるんだ。</p>\n\n<div class=\"es\"><h5>📝 「いちばん好き」の聞き方と答え方</h5>\n<table class=\"t\"><tr><th>質問</th><th>答え</th></tr><tr><td>Which season do you like <strong>the best</strong>?</td><td>I like summer <strong>the best</strong>.</td></tr><tr><td>What subject do you like <strong>the best</strong>?</td><td>I like English <strong>the best</strong>.</td></tr></table></div>\n\n<div class=\"tip\">the bestの代わりに<strong>the most</strong>を使うこともある。「I like tigers the most.」でも同じ意味だよ。</div>","p":"Part3"}],"30":[{"b":"Here We Go!","g":2,"u":"U7","en":"We're as tired as Kota.","ja":"わたしたちはコウタと同じくらい疲れています。","ex":"<p><strong>as + 形容詞 + as</strong>で「<strong>…と同じくらい〜</strong>」。2つが<strong>同程度</strong>であることを表すよ。</p>\n<div class=\"es\"><h5>📝 as … as の肯定と否定</h5>\n<table class=\"t\"><tr><th>形</th><th>意味</th><th>例</th></tr><tr><td>as 〜 as</td><td>…と同じくらい〜</td><td>We're <strong>as</strong> tired <strong>as</strong> Kota.</td></tr><tr><td>not as 〜 as</td><td>…ほど〜ではない</td><td>We're <strong>not as</strong> tired <strong>as</strong> Kota.</td></tr></table></div>\n<div class=\"tip\">not as 〜 as は「劣っている」ことを<strong>やわらかく</strong>言う表現。「〜より劣る」ではなく「〜ほどではない」。</div>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U7","en":"We're not as tired as Kota.","ja":"わたしたちはコウタほど疲れていません。","ex":"<p><strong>not as 〜 as</strong>＝「<strong>…ほど〜ではない</strong>」。比較級の否定を柔らかく表現する方法。</p>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U7","en":"We're trying as hard as Kota.","ja":"わたしたちはコウタと同じくらい頑張っています。","ex":"<p>as … asは<strong>副詞</strong>にも使えるよ。この文の hard は「一生懸命に」という副詞だよ（hardly「ほとんど〜ない」とは別の単語！）。</p>\n<div class=\"tip\">hardは形容詞「難しい」と副詞「一生懸命に」の2つの意味がある。hardlyは「ほとんど〜ない」で全く別の意味！</div>","p":"Part3"},{"b":"New Crown","g":2,"u":"L6","en":"This mouse is as small as a peanut.","ja":"このネズミはピーナッツと同じくらい小さいです。","ex":"<p><strong>as 〜 as</strong>は「<strong>…と同じくらい〜</strong>」という意味。2つのものが<strong>同じ程度</strong>であることを表すよ。間に入るのは<strong>形容詞の原級（もとの形）</strong>で、比較級（-er）ではないから注意！</p>\n\n<p>This mouse is <strong>as small as</strong> a peanut.<br>＝ このネズミはピーナッツ<strong>と同じくらい小さい</strong>。</p>\n\n<div class=\"es\"><h5>📝 否定形（入試超頻出！）</h5>\n<p><strong>not as 〜 as</strong>は「<strong>…ほど〜ではない</strong>」。否定形のほうがテストに出やすいよ！</p>\n<p>Tom is <strong>not as tall as</strong> Ken. ＝ トムはケン<strong>ほど背が高くない</strong>。→ つまりケンのほうが高い。</p></div>\n\n<div class=\"es\"><h5>🎯 書きかえ問題（テスト定番！）</h5>\n<p>比較級の文とnot as〜asの文は書きかえられるよ。主語が入れ替わることに注意！</p>\n<table class=\"t\"><tr><th>元の文</th><th>書きかえ</th></tr><tr><td>Ken is <strong>taller than</strong> Tom.</td><td>Tom is <strong>not as tall as</strong> Ken.</td></tr><tr><td>Math is <strong>easier than</strong> English.</td><td>English is <strong>not as easy as</strong> math.</td></tr></table></div>\n\n<div class=\"warn\">as〜asの間は必ず<strong>原級</strong>！「as smaller as」「as more popular as」は×。</div>","p":"Part3"}],"31":[{"b":"Here We Go!","g":2,"u":"U4","en":"Show me your guidebook.","ja":"ガイドブックを見せて。","ex":"<p><strong>show + 人 + もの</strong>で「人にものを見せる」。目的語が2つの<strong>第4文型（SVOO）</strong>。</p>\n<div class=\"es\"><h5>📝 第4文型の動詞</h5>\n<table class=\"t\"><tr><th>動詞</th><th>例</th></tr><tr><td>give</td><td>Give <strong>me</strong> <strong>the book</strong>.</td></tr><tr><td>show</td><td>Show <strong>me</strong> <strong>your photo</strong>.</td></tr><tr><td>tell</td><td>Tell <strong>me</strong> <strong>the truth</strong>.</td></tr><tr><td>teach</td><td>Teach <strong>me</strong> <strong>English</strong>.</td></tr></table></div>\n<div class=\"tip\">第4文型は「人が先、ものが後」の語順！</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U4","en":"I'll give you a message.","ja":"あなたにメッセージを伝えます。","ex":"<p><strong>I'll</strong>はI willの短縮形。<strong>give + 人 + もの</strong>で「人にものをあげる」。</p>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U4","en":"I gave a present to her.","ja":"わたしは彼女にプレゼントをあげました。","ex":"<p>「Give <strong>me</strong> the book.」と「Give the book <strong>to me</strong>.」は<strong>同じ意味</strong>！でも語順が違うだけで、使う前置詞が<strong>toかforか</strong>変わるんだ。テスト超頻出！</p>\n<div class=\"es\"><h5>📝 書き換えのしくみ</h5>\n<table class=\"t\"><tr><th>「人が先」パターン</th><th>「ものが先」パターン</th></tr><tr><td>I gave <strong>her</strong> a present.</td><td>I gave a present <strong>to</strong> her.</td></tr><tr><td>She bought <strong>me</strong> a bag.</td><td>She bought a bag <strong>for</strong> me.</td></tr></table></div>\n<div class=\"es\"><h5>📝 toとforの使い分け</h5>\n<table class=\"t\"><tr><th>to を使う動詞</th><th>for を使う動詞</th></tr><tr><td>give（あげる）</td><td>buy（買う）</td></tr><tr><td>show（見せる）</td><td>make（作る）</td></tr><tr><td>tell（伝える）</td><td>cook（料理する）</td></tr><tr><td>teach（教える）</td><td></td></tr><tr><td>send（送る）</td><td></td></tr></table></div>\n<div class=\"tip\">toかforか迷ったら→<strong>「相手に届ける」動作はto</strong>（give, show, send…）、<strong>「相手のためにする」動作はfor</strong>（buy, make, cook…）。「渡す系はto、してあげる系はfor」と覚えよう！</div>","p":"Part2"},{"b":"Here We Go!","g":3,"u":"U1","en":"Ms. Thusi told us (that) you also do conservation.","ja":"トゥシ先生は、あなたも保護活動をしていると言っていました。","ex":"<p><strong>tell + 人 + that + 文</strong>で「（人）に〜だと言う」。thatは省略OK。</p>\n<div class=\"es\"><h5>📝 sayとtellの違い</h5>\n<table class=\"t\"><tr><th>動詞</th><th>使い方</th></tr><tr><td>say</td><td>say (that) 〜 ※人は直接つけない</td></tr><tr><td>tell</td><td>tell <strong>人</strong> (that) 〜 ※人が必要</td></tr></table></div>","p":"Part3"},{"b":"New Crown","g":2,"u":"L5","en":"I will show you some pictures.","ja":"わたしはあなたに写真を何枚か見せましょう。","ex":"<p><strong>SVOO（第4文型）</strong>は「<strong>（人）に（もの）を〜する</strong>」という形。動詞のうしろに<strong>「人」→「もの」</strong>の順番で2つの目的語が並ぶよ。</p>\n\n<p>I will show <strong>you</strong> <strong>some pictures</strong>.<br>＝ <strong>あなたに</strong>写真を<strong>見せましょう</strong>。</p>\n\n<p>語順は「<strong>動詞 → 人 → もの</strong>」。日本語は「あなたに写真を見せる」で人が先、英語も同じく人が先だから覚えやすいね。</p>\n\n<div class=\"es\"><h5>📝 SVOOでよく使う動詞</h5>\n<table class=\"t\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td>give</td><td>あげる</td><td>give me a pen（ペンをくれる）</td></tr><tr><td>show</td><td>見せる</td><td>show you pictures（写真を見せる）</td></tr><tr><td>tell</td><td>伝える</td><td>tell me the truth（本当のことを教えて）</td></tr><tr><td>teach</td><td>教える</td><td>teach us English（英語を教える）</td></tr><tr><td>send</td><td>送る</td><td>send her a letter（手紙を送る）</td></tr><tr><td>buy</td><td>買う</td><td>buy me a drink（飲み物を買ってくれる）</td></tr></table></div>\n\n<div class=\"tip\">語順を入れ替えるなら前置詞が必要：show pictures <strong>to</strong> you / buy a gift <strong>for</strong> her。to/forの使い分けは動詞ごとに決まっているよ。</div>","p":"Part1"}],"32":[{"b":"Here We Go!","g":2,"u":"U8","en":"That makes me nervous.","ja":"それはわたしを緊張させます。","ex":"<p><strong>make + 人 + 形容詞</strong>で「<strong>（人）を…の状態にさせる</strong>」。<strong>第5文型（SVOC）</strong>だよ。</p>\n<p>That <strong>makes me nervous</strong>. ＝ それはわたしを<strong>緊張させる</strong>。（me = nervous）</p>\n<div class=\"es\"><h5>📝 makeを使った表現</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>make me happy</td><td>わたしを幸せにする</td></tr><tr><td>make me nervous</td><td>わたしを緊張させる</td></tr><tr><td>make me sad</td><td>わたしを悲しくさせる</td></tr></table></div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U8","en":"We call our cat Felix.","ja":"わたしたちは猫をフェリックスと呼びます。","ex":"<p><strong>call + O + C</strong>で「OをCと呼ぶ」。O=Cの関係が成り立つ<strong>第5文型</strong>。</p>\n<p>We <strong>call</strong> our cat <strong>Felix</strong>. ＝ 猫を<strong>フェリックスと呼ぶ</strong>。（our cat = Felix）</p>\n<div class=\"es\"><h5>📝 第5文型をとる動詞</h5>\n<table class=\"t\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td>call</td><td>〜を…と呼ぶ</td><td>call him Ken</td></tr><tr><td>make</td><td>〜を…にする</td><td>make me happy</td></tr><tr><td>name</td><td>〜を…と名づける</td><td>name her Hana</td></tr></table></div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L5","en":"I am Elizabeth Jones. Please call me Betty.","ja":"わたしはエリザベス・ジョーンズです。ベティと呼んでください。","ex":"<p><strong>SVOC</strong>は「AをBと呼ぶ」「AをBにする」のように、<strong>A＝Bの関係</strong>が成り立つ文型だよ。</p>\n\n<p>Please call <strong>me</strong> <strong>Betty</strong>.<br>＝ わたしを<strong>ベティと呼んで</strong>ください。</p>\n\n<p>me ＝ Betty（わたし＝ベティ）という関係。callは「AをBと呼ぶ」という意味のSVOC動詞で、<strong>A（目的語）とB（補語）がイコール</strong>になっているんだ。</p>\n\n<div class=\"es\"><h5>📝 SVOCで使う動詞</h5>\n<table class=\"t\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td>call A B</td><td>AをBと呼ぶ</td><td>We call him Ken.</td></tr><tr><td>name A B</td><td>AをBと名づける</td><td>They named the dog Pochi.</td></tr><tr><td>make A B</td><td>AをBにする</td><td>The news made me happy.</td></tr></table></div>\n\n<div class=\"tip\">SVOOとSVOCの見分け方：「人＝もの」ならSVOC（call me Betty → me＝Betty）、「人≠もの」ならSVOO（give me a pen → me≠pen）</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L5","en":"I like this picture. It makes me happy.","ja":"わたしはこの絵が好きです。それはわたしを幸せにします。","ex":"<p><strong>make A B</strong>は「<strong>AをBの状態にする</strong>」という意味のSVOC。Bに形容詞が入って、Aがどんな状態になったかを表すよ。</p>\n\n<p>It makes <strong>me</strong> <strong>happy</strong>.<br>＝ それはわたしを<strong>幸せにする</strong>。（＝幸せな気持ちになる）</p>\n\n<p>me ＝ happy（わたし＝幸せ）というイコール関係。「何かがきっかけで、人がある感情になった」と言いたいときにピッタリの表現だよ。</p>\n\n<div class=\"es\"><h5>📝 make A B の例</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>The movie made me <strong>sad</strong>.</td><td>その映画で悲しくなった</td></tr><tr><td>The news made her <strong>angry</strong>.</td><td>そのニュースで彼女は怒った</td></tr><tr><td>This song makes me <strong>happy</strong>.</td><td>この歌は幸せにしてくれる</td></tr></table></div>\n\n<div class=\"tip\">同じ形の仲間：<strong>keep A B</strong>（AをBに保つ）、<strong>leave A B</strong>（AをBのままにする）も覚えよう。Keep the door open.（ドアを開けたままにして。）</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：感嘆文</h5>\n<p><strong>感嘆文</strong>は「<strong>なんて〜なんだ！</strong>」と<strong>驚き・感動を強く表す</strong>文。WhatかHowで始めて、文末にビックリマーク（!）をつけるよ。</p>\n\n<div class=\"es\"><h5>📝 2つのパターン</h5>\n<table class=\"t\"><tr><th>型</th><th>作り方と例</th></tr><tr><td><strong>What</strong>型</td><td>What (a/an) + 形容詞 + 名詞 + 主語 + 動詞!<br>→ <strong>What a beautiful</strong> flower (this is)<strong>!</strong><br>（なんてきれいな花なんだ！）</td></tr><tr><td><strong>How</strong>型</td><td>How + 形容詞/副詞 + 主語 + 動詞!<br>→ <strong>How fast</strong> he runs<strong>!</strong><br>（なんて速く走るんだ！）</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 WhatとHowの使い分け</h5>\n<p><strong>名詞があるかどうか</strong>で決まるよ！</p>\n<table class=\"t\"><tr><th>判断</th><th>使うもの</th></tr><tr><td>形容詞＋<strong>名詞あり</strong></td><td><strong>What</strong> a beautiful <strong>flower</strong>!</td></tr><tr><td>形容詞/副詞<strong>だけ</strong></td><td><strong>How</strong> beautiful!</td></tr></table></div>\n\n<div class=\"warn\">What型でa/anがつくのは単数の名詞のとき。複数名詞にはa/anなし。「What beautiful flowers!」</div></div>","p":"Part2"}],"33":[{"b":"Here We Go!","g":2,"u":"U1","en":"They looked happy.","ja":"彼らは幸せそうに見えました。","ex":"<p><strong>look + 形容詞</strong>で「<strong>〜に見える</strong>」。lookはbe動詞のように<strong>S=C</strong>の関係をつくる<strong>リンキング動詞</strong>だよ。</p>\n<p>They <strong>looked happy</strong>. ＝ 彼らは幸せ<strong>そうに見えた</strong>。（They = happy）</p>\n<div class=\"es\"><h5>📝 リンキング動詞一覧</h5>\n<table class=\"t\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td>look</td><td>〜に見える</td><td>She looks happy.</td></tr><tr><td>sound</td><td>〜に聞こえる</td><td>That sounds great.</td></tr><tr><td>feel</td><td>〜に感じる</td><td>I feel tired.</td></tr><tr><td>become</td><td>〜になる</td><td>He became famous.</td></tr></table></div>\n<div class=\"warn\">「She looks happy.」は第2文型（S=C）。でも「She looks <strong>at</strong> him.」は「彼を見る」で別の意味！atがつくかどうかで意味が変わる。</div>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U1","en":"It sounds exciting.","ja":"ワクワクしそうですね。","ex":"<p><strong>sound + 形容詞</strong>で「<strong>〜に聞こえる</strong>」「<strong>〜そうだ</strong>」。話を聞いて感想を言うときの定番！</p>\n<p>It <strong>sounds exciting</strong>. ＝ それは<strong>ワクワクしそう</strong>だね。</p>\n<div class=\"es\"><h5>📝 よく使うsoundのパターン</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>That sounds great!</td><td>いいね！</td></tr><tr><td>That sounds fun.</td><td>楽しそう。</td></tr><tr><td>That sounds difficult.</td><td>難しそう。</td></tr></table></div>\n<div class=\"tip\">日本語では「〜そう」と言うけど、英語では「it sounds + 形容詞」でOK！</div>","p":"Part3"}],"34":[{"b":"Here We Go!","g":2,"u":"U8","en":"It was well received by everyone.","ja":"それはみんなに好評でした。","ex":"<p><strong>受動態（受け身）</strong>は「<strong>〜される</strong>」と<strong>される側</strong>を主語にする表現。<strong>be動詞 + 過去分詞</strong>で作るよ。</p>\n<div class=\"es\"><h5>📝 能動態→受動態の変換</h5>\n<table class=\"t\"><tr><th>能動態</th><th>受動態</th></tr><tr><td>Everyone <strong>received</strong> it well.</td><td>It <strong>was received</strong> well <strong>by</strong> everyone.</td></tr></table>\n<p>①目的語を主語に ②動詞を「be動詞+過去分詞」に ③元の主語をby〜で後ろに</p></div>\n<div class=\"tip\">byは「〜によって」。行為者がわかりきっている場合はby〜を省略することも多いよ。</div>","p":"Part3"},{"b":"Here We Go!","g":2,"u":"U8","en":"It's made of chocolate.","ja":"それはチョコレートでできています。","ex":"<p><strong>be made of 〜</strong>は「<strong>〜でできている</strong>」。材料が見た目でわかるときに使うよ。</p>\n<div class=\"es\"><h5>📝 made of と made from の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td>made <strong>of</strong></td><td>材料がわかる</td><td>made of wood（木製）</td></tr><tr><td>made <strong>from</strong></td><td>原料がわからない</td><td>made from grapes（ぶどうから）</td></tr></table></div>","p":"Part3"},{"b":"Here We Go!","g":3,"u":"U1","en":"English is spoken as an official language.","ja":"英語は公用語として話されています。","ex":"<p>3年最初は受動態の復習。<strong>is spoken</strong>は「話されている」。English（英語）が<strong>される側</strong>として主語になっている。</p>\n<div class=\"tip\">「as 〜」は「〜として」。よく使う前置詞なので覚えよう！</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U6","en":"It is said that the Internet has changed the world.","ja":"インターネットが世界を変えたと言われています。","ex":"<p><strong>It is said that 〜</strong>は「<strong>〜と言われている</strong>」。Itは仮主語で、that以下が本当の内容。</p>\n<div class=\"es\"><h5>📝 似た表現</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>It is said that 〜</td><td>〜と言われている</td></tr><tr><td>It is believed that 〜</td><td>〜と信じられている</td></tr><tr><td>It is known that 〜</td><td>〜と知られている</td></tr></table></div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L3","en":"Thousands of paper cranes are sent to Hiroshima every year.","ja":"毎年何千もの折り鶴が広島に送られます。","ex":"<p><strong>受動態</strong>は「<strong>〜される</strong>」「<strong>〜された</strong>」のように、<strong>動作を受ける側が主語</strong>になる表現。形は<strong>be動詞 + 過去分詞</strong>だよ。</p>\n\n<p>Thousands of paper cranes <strong>are sent</strong> to Hiroshima every year.<br>＝ 毎年何千もの折り鶴が広島に<strong>送られます</strong>。</p>\n\n<p>ふつうの文（能動態）は「誰が〜する」と<strong>する側</strong>が主語。受動態は「〜が〜される」と<strong>される側</strong>が主語になるんだ。</p>\n\n<div class=\"es\"><h5>📝 能動態→受動態の変換</h5>\n<table class=\"t\"><tr><th>能動態（する側が主語）</th><th>受動態（される側が主語）</th></tr><tr><td>People <strong>send</strong> cranes.</td><td>Cranes <strong>are sent</strong>.</td></tr><tr><td>She <strong>wrote</strong> this book.</td><td>This book <strong>was written</strong> by her.</td></tr></table></div>\n\n<div class=\"es\"><h5>📝 受動態の時制変化</h5>\n<table class=\"t\"><tr><th>時制</th><th>形</th><th>例</th></tr><tr><td>現在</td><td>is/am/are + 過去分詞</td><td>Cranes <strong>are sent</strong>.</td></tr><tr><td>過去</td><td>was/were + 過去分詞</td><td>The statue <strong>was built</strong>.</td></tr><tr><td>未来</td><td>will be + 過去分詞</td><td>The game <strong>will be played</strong>.</td></tr></table></div>\n\n\n\n<div class=\"es\"><h5>🎯 入試必須！受動態の重要連語</h5>\n<table class=\"t\"><tr><th>連語</th><th>意味と例</th></tr><tr><td>be made <strong>of</strong></td><td>〜で作られている（材料がわかる）<br>→ This desk is made <strong>of</strong> wood.</td></tr><tr><td>be made <strong>from</strong></td><td>〜から作られている（材料が変化）<br>→ Wine is made <strong>from</strong> grapes.</td></tr><tr><td>be interested <strong>in</strong></td><td>〜に興味がある<br>→ I am interested <strong>in</strong> science.</td></tr><tr><td>be known <strong>to</strong></td><td>〜に知られている<br>→ He is known <strong>to</strong> everyone.</td></tr><tr><td>be born</td><td>生まれる<br>→ I was <strong>born</strong> in Okinawa.</td></tr><tr><td>be covered <strong>with</strong></td><td>〜でおおわれている<br>→ The mountain is covered <strong>with</strong> snow.</td></tr></table></div>\n<div class=\"tip\">「by 〜」（〜によって）がないことも多いよ。「誰がやったかわからない」「一般的な人々がやった」ときはbyが省略されるんだ。</div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L3","en":"The statue was built by Sadako's friends.","ja":"その像はサダコの友達によって建てられました。","ex":"<p>受動態の<strong>過去形</strong>は<strong>was/were + 過去分詞</strong>で作るよ。現在の受動態（is/are + 過去分詞）のbe動詞を過去形にするだけ！</p>\n\n<p>The statue <strong>was built</strong> by Sadako's friends.<br>＝ 像はサダコの友達に<strong>よって建てられた</strong>。</p>\n\n<p>「建てた」のは友達（する側）だけど、この文では「像」（される側）が主語になっている。<strong>by 〜</strong>で「誰によって」されたかを示しているよ。</p>\n\n<div class=\"es\"><h5>📝 よく出る不規則動詞の過去分詞</h5>\n<p>受動態で使う過去分詞は不規則変化が多い。セットで覚えよう！</p>\n<table class=\"t\"><tr><th>原形</th><th>過去形</th><th>過去分詞</th></tr><tr><td>build</td><td>built</td><td>built</td></tr><tr><td>write</td><td>wrote</td><td>written</td></tr><tr><td>speak</td><td>spoke</td><td>spoken</td></tr><tr><td>make</td><td>made</td><td>made</td></tr><tr><td>know</td><td>knew</td><td>known</td></tr><tr><td>take</td><td>took</td><td>taken</td></tr></table></div>\n\n<div class=\"tip\">受動態の文で「by 〜」がないことも多いよ。「English is spoken in many countries.」のように、する側が一般的な人々のときはbyが省略される。</div>","p":"Part2"}],"36":[{"b":"Here We Go!","g":2,"u":"DL4","en":"Shall I take your order?","ja":"ご注文をお伺いしましょうか？","ex":"<p><strong>Shall I 〜?</strong>は「<strong>わたしが〜しましょうか？</strong>」と申し出をする表現。</p>\n<div class=\"es\"><h5>📝 Shall I と Shall we</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>Shall <strong>I</strong> 〜?</td><td>わたしが〜しましょうか？</td></tr><tr><td>Shall <strong>we</strong> 〜?</td><td>一緒に〜しませんか？</td></tr></table></div>"},{"b":"Here We Go!","g":2,"u":"DL4","en":"Would you like a drink?","ja":"お飲み物はいかがですか？","ex":"<p><strong>Would you like 〜?</strong>は「<strong>〜はいかが？</strong>」。Do you want 〜? の丁寧版。</p>\n<div class=\"es\"><h5>📝 パターン</h5>\n<table class=\"t\"><tr><th>パターン</th><th>例</th></tr><tr><td>+ 名詞</td><td>Would you like a drink?</td></tr><tr><td>+ to 動詞</td><td>Would you like to sit down?</td></tr></table></div>"},{"b":"Here We Go!","g":2,"u":"DL5","en":"May I ask you something?","ja":"何かお聞きしてもいいですか？","ex":"<p><strong>May I 〜?</strong>はCan I 〜?より<strong>丁寧な許可の求め方</strong>。フォーマルな場面で使うよ。</p>"},{"b":"Here We Go!","g":2,"u":"DL5","en":"Could you tell me the way to Sapporo Maruyama Zoo?","ja":"札幌丸山動物園への道を教えていただけますか？","ex":"<p><strong>Could you 〜?</strong>はCan you 〜?より<strong>丁寧な依頼</strong>。知らない人に道を聞くときなどに使うよ。</p>"},{"b":"Here We Go!","g":2,"u":"DL6","en":"I think you should take a rest.","ja":"休んだ方がいいと思います。","ex":"<p><strong>should</strong>は「<strong>〜すべきだ</strong>」「<strong>〜した方がいい</strong>」とアドバイスする助動詞。mustより柔らかい。</p>\n<div class=\"es\"><h5>📝 義務の強さ比較</h5>\n<table class=\"t\"><tr><th>表現</th><th>強さ</th></tr><tr><td>must</td><td>しなければならない（強制）</td></tr><tr><td>should</td><td>した方がいい（助言）</td></tr><tr><td>can</td><td>してもいい（許可）</td></tr></table></div>"}],"37":[{"b":"Here We Go!","g":2,"u":"U5","en":"You must check the location of the evacuation shelters.","ja":"避難所の場所を確認しなければなりません。","ex":"<p><strong>must</strong>は「<strong>〜しなければならない</strong>」。うしろは<strong>動詞の原形</strong>。</p>\n<div class=\"es\"><h5>⚡ must not と don't have to の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>must <strong>not</strong></td><td>〜しては<strong>いけない</strong>（禁止）</td></tr><tr><td><strong>don't have to</strong></td><td>〜し<strong>なくてもよい</strong>（不要）</td></tr></table></div>\n<div class=\"warn\">must notは「禁止」、don't have toは「不要」。テスト超頻出！</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U5","en":"You must not forget to include information about shelters.","ja":"避難所の情報を含めることを忘れてはいけません。","ex":"<p><strong>must not</strong>＝「<strong>〜してはいけない</strong>」。強い禁止。</p>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U5","en":"We have to protect ourselves.","ja":"わたしたちは自分自身を守らなければなりません。","ex":"<p><strong>have to</strong>も「〜しなければ」。mustとの違いは、have toは<strong>外部の事情</strong>によるニュアンス。</p>\n<div class=\"es\"><h5>📝 mustとhave toの違い</h5>\n<table class=\"t\"><tr><th></th><th>must</th><th>have to</th></tr><tr><td>ニュアンス</td><td>話し手の気持ち</td><td>外部のルール</td></tr><tr><td>過去形</td><td>なし</td><td>had to</td></tr></table></div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U5","en":"You don't have to evacuate.","ja":"避難する必要はありません。","ex":"<p><strong>don't have to</strong>＝「<strong>〜しなくてもよい</strong>」。must notの「禁止」とは全く違う！</p>\n<div class=\"es\"><h5>📝 比較</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td>must not</td><td>してはダメ（禁止）</td><td>You <strong>must not</strong> run.</td></tr><tr><td>don't have to</td><td>しなくてOK（不要）</td><td>You <strong>don't have to</strong> run.</td></tr></table></div>","p":"Part2"}],"43":[{"b":"Here We Go!","g":3,"u":"U2","en":"Have you ever seen him like that? — Yes, I have. / No, never.","ja":"彼があんな風なのを見たことがありますか？ — はい。/ いいえ、一度も。","ex":"<p>現在完了の<strong>経験用法</strong>は「<strong>〜したことがある</strong>」。<strong>ever</strong>は疑問文で「今までに」。</p>\n<div class=\"es\"><h5>📝 経験用法のキーワード</h5>\n<table class=\"t\"><tr><th>語</th><th>意味</th><th>例</th></tr><tr><td>ever</td><td>今までに（疑問文）</td><td>Have you <strong>ever</strong> been to Tokyo?</td></tr><tr><td>never</td><td>一度も〜ない</td><td>I hav
