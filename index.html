<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#FFF8FC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="英文法フラッシュカード">
<meta name="mobile-web-app-capable" content="yes">
<title>英文法フラッシュカード</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#FF6B9D;--pink-l:#FFD1E0;--pink-bg:#FFF2F6;
  --purple:#A07CE8;--purple-l:#DDD0FF;--purple-bg:#F5F0FF;
  --mint:#4ECDA5;--mint-l:#C5F5E3;--mint-bg:#EDFFF7;
  --orange:#FFA15C;--orange-l:#FFD9B8;--orange-bg:#FFF5EC;
  --sky:#5CB8FF;--sky-l:#BDE3FF;--sky-bg:#EDF6FF;
  --yellow:#FFD644;--yellow-l:#FFF0B8;--yellow-bg:#FFFCF0;
  --bg:#FFF8FC;--card:#FFFFFF;--surface:#F5F0FA;
  --text:#3D2E50;--dim:#7A6F8A;--muted:#B0A8C0;
  --border:#E0D8F0;--accent:#A07CE8;
  --r:20px;--rs:13px;
  --sh:0 2px 10px rgba(160,124,232,.10);
  --sh-card:none;
  --g1c:#D4507A;--g1bg:#FFE0EC;--g2c:#4A7FD4;--g2bg:#D9E8FF;--g3c:#2E8A5A;--g3bg:#DCF5E8;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;height:100%;touch-action:manipulation}
body{
  font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
  overscroll-behavior:none;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
button{font-family:inherit;cursor:pointer}
::selection{background:var(--purple-l)}

/* ===== TOP BAR ===== */
.top{flex:0 0 auto;padding:10px 14px 6px;background:linear-gradient(180deg,var(--bg) 70%,rgba(255,248,252,0));z-index:20}
.titlebar{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.brand{display:flex;align-items:baseline;gap:8px;min-width:0}
.brand .jp{font-weight:800;font-size:17px;letter-spacing:.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.iconbtn{width:36px;height:36px;border-radius:11px;border:1.5px solid var(--surface);background:var(--card);display:flex;align-items:center;justify-content:center;color:var(--dim);box-shadow:var(--sh)}
.iconbtn:active{transform:scale(.93)}
.iconbtn svg{width:20px;height:20px}
.iconbtn.master{color:#2E8A6A;border-color:var(--mint-l);background:var(--mint-bg)}
.iconbtn.master.on{background:var(--mint);border-color:var(--mint);color:#fff}
.iconbtn.master svg{width:18px;height:18px}

/* search */
.search{display:flex;align-items:center;gap:8px;background:var(--card);border:1.5px solid var(--surface);border-radius:14px;padding:0 12px;height:42px;box-shadow:var(--sh);margin-bottom:9px}
.search svg{width:18px;height:18px;color:var(--muted);flex-shrink:0}
.search input{flex:1;border:none;background:none;outline:none;font-family:inherit;font-size:15px;color:var(--text);min-width:0}
.search input::placeholder{color:var(--muted)}
.search .clr{display:none;width:22px;height:22px;border-radius:50%;border:none;background:var(--surface);color:var(--dim);font-size:13px;line-height:1;align-items:center;justify-content:center}
.search.has .clr{display:flex}

/* filter chips row (scrollable) */
.chips{display:flex;gap:7px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.toolbar{display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;padding:0 0 9px}
.toolbar::-webkit-scrollbar{display:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1.5px solid var(--surface);background:var(--card);color:var(--dim);font-size:13px;font-weight:700;padding:7px 13px;border-radius:20px;white-space:nowrap;box-shadow:var(--sh);display:flex;align-items:center;gap:5px;transition:.15s}
.chip:active{transform:scale(.95)}
.chip.on{color:#fff;border-color:transparent}
.chip[data-grade="all"].on{background:linear-gradient(135deg,var(--pink),var(--purple))}
.chip[data-grade="中1"].on{background:var(--g1c)}
.chip[data-grade="中2"].on{background:var(--g2c)}
.chip[data-grade="中3"].on{background:var(--g3c)}
.chip.tool.on{background:var(--purple);color:#fff}
.chip .dot{font-size:14px;line-height:1}
.chip.book-active{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-l)}
.chip.book-active .x{margin-left:1px;font-weight:800;opacity:.7}
.chip-sep{flex:0 0 auto;width:1px;align-self:stretch;background:var(--border);margin:4px 1px}

/* ===== STAGE ===== */
.stage{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;padding:12px 16px 8px;min-height:0}
.backfx{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);z-index:30;display:none;align-items:center;gap:6px;border:none;background:var(--purple);color:#fff;font-family:inherit;font-weight:800;font-size:12.5px;padding:9px 16px;border-radius:999px;box-shadow:0 6px 18px rgba(124,58,237,.4);cursor:pointer;white-space:nowrap;-webkit-tap-highlight-color:transparent}
.backfx.on{display:inline-flex}
.backfx:active{transform:translateX(-50%) scale(.96)}

.card{position:relative;width:100%;max-width:440px;height:100%;perspective:1400px;touch-action:pan-y;will-change:transform;outline:none;user-select:none;-webkit-user-select:none}
.card-inner,.face,.front-top,.front-body,.front-topic,.front-ja,.front-sents,.back-head,.back-topic,.back-scroll,.back-scroll *{touch-action:pan-y}
.card:focus-visible{border-radius:var(--r);box-shadow:0 0 0 3px var(--purple-l)}
.back-scroll{user-select:text;-webkit-user-select:text}
.card-inner{position:absolute;inset:0;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.2,.85,.25,1)}
.card-inner.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:var(--r);background:var(--card);border:1.5px solid #F1ECF8;display:flex;flex-direction:column;overflow:hidden}

/* grade corner tab */
.grade-tab{display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;flex-shrink:0;font-family:'Outfit','Noto Sans JP',sans-serif;font-weight:800;font-size:12px;padding:4px 11px;border-radius:20px;letter-spacing:.5px}
.grade-tab.g1{background:var(--g1bg);color:var(--g1c)}
.grade-tab.g2{background:var(--g2bg);color:var(--g2c)}
.grade-tab.g3{background:var(--g3bg);color:var(--g3c)}
.grade-tab.small{font-size:11px;padding:3px 9px}

/* FRONT */
.front{align-items:stretch}
.front-accent{height:6px;flex:0 0 auto}
.front-accent.g1{background:linear-gradient(90deg,var(--g1c),var(--pink))}
.front-accent.g2{background:linear-gradient(90deg,var(--g2c),var(--sky))}
.front-accent.g3{background:linear-gradient(90deg,var(--g3c),var(--mint))}
.front-top{display:flex;justify-content:space-between;align-items:center;padding:16px 18px 0}
.front-no{font-family:'Outfit',sans-serif;font-weight:700;font-size:12px;color:var(--muted);letter-spacing:1px}
.front-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:14px 22px}
.front-topic{font-weight:800;font-size:27px;line-height:1.32;letter-spacing:.3px;word-break:auto-phrase;overflow-wrap:anywhere}
.front-ja{margin-top:18px;font-size:16.5px;line-height:1.65;color:var(--text);font-weight:600;max-width:100%;word-break:auto-phrase}
.front-ja:empty{display:none}

/* BACK */
.back{transform:rotateY(180deg);align-items:stretch}
.back-head{flex:0 0 auto;display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--surface);background:var(--card)}
.back-topic{font-weight:800;font-size:15.5px;color:var(--purple);line-height:1.3}
.back-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 16px 22px;transform:translateZ(0)}
.back-scroll.fm{display:flex;flex-direction:column;justify-content:center}
.back-scroll.fm.has-ov{justify-content:flex-start;padding-top:18px}
.back-scroll::-webkit-scrollbar{width:5px}
.back-scroll::-webkit-scrollbar-thumb{background:var(--purple-l);border-radius:3px}
.rule{font-size:13.5px;line-height:1.85;color:var(--dim)}
.rule b{color:#e0457a}
.ex-block{margin-top:14px}
.ex-head{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;color:var(--pink);margin-bottom:8px}
.ex{background:var(--purple-bg);border-radius:12px;padding:12px 13px;font-size:13.5px;line-height:1.9;border-left:3px solid var(--purple);color:var(--text)}
.ex b{color:#e0457a}
.spk{margin-left:auto;width:30px;height:30px;border-radius:50%;border:1.5px solid var(--purple-l);background:var(--card);color:var(--purple);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.spk:active{background:var(--purple-bg);transform:scale(.9)}
.spk.playing{background:var(--purple);color:#fff;border-color:var(--purple)}
/* textbook basic sentences on back */
.tb-sec{margin-top:16px;border-top:1px dashed var(--border);padding-top:14px}
.tb-sec-h{display:flex;align-items:center;justify-content:space-between;font-size:12.5px;font-weight:800;color:#7a5fc0;margin-bottom:10px}
.tb-cnt{font-family:'Outfit';font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-bg);padding:2px 9px;border-radius:10px}
.tb-book{font-size:11.5px;font-weight:800;color:var(--text);margin:11px 0 7px;display:flex;align-items:center;gap:7px}
.tb-book:before{content:'';width:4px;height:13px;border-radius:2px;background:var(--purple);flex-shrink:0}
.tb-sent{background:var(--surface);border-radius:11px;padding:10px 12px;margin-bottom:7px}
.tb-unit{font-size:10px;font-weight:700;color:var(--muted);font-family:'Outfit';margin-bottom:4px;letter-spacing:.5px}
.tb-en{display:flex;align-items:flex-start;gap:8px}
.tb-en-t{flex:1;font-size:13.5px;font-weight:600;color:var(--text);line-height:1.5}
.tb-ja{font-size:12px;color:var(--dim);line-height:1.5;margin-top:4px}
.spk-s{margin-left:auto;width:27px;height:27px;border-radius:50%;border:1.5px solid var(--purple-l);background:var(--card);color:var(--purple);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.spk-s:active{transform:scale(.9);background:var(--purple-bg)}
.spk-s.playing{background:var(--purple);color:#fff;border-color:var(--purple)}
/* source label on front */
.front-src{margin-top:13px;font-size:11.5px;font-weight:700;color:#7a5fc0;background:var(--purple-bg);border:1px solid var(--purple-l);padding:4px 12px;border-radius:12px;display:inline-flex;align-items:center;gap:4px;max-width:100%}
.front-src:empty{display:none}
/* per-sentence textbook explanation (expandable) */
.tb-ex-toggle{margin-top:8px;border:1.5px solid var(--purple-l);background:var(--card);color:var(--purple);font-family:inherit;font-size:11.5px;font-weight:700;padding:5px 12px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
.tb-ex-toggle:active{transform:scale(.96);background:var(--purple-bg)}
.tb-ex-toggle.open{background:var(--purple-bg)}
.tb-ex{margin-top:9px;padding:11px 12px;background:#fff;border:1px solid var(--purple-l);border-radius:11px;font-size:12.5px;line-height:1.8;color:var(--dim)}
.tb-ex p{margin:0 0 8px}.tb-ex p:last-child{margin-bottom:0}
.tb-ex strong{color:#e0457a}
.tb-ex .es{margin-top:9px;padding-top:8px;border-top:1px dashed var(--border)}
.tb-ex .es h5{font-size:11.5px;font-weight:800;color:var(--purple);margin:0 0 5px}
.tb-ex table.t{width:100%;border-collapse:separate;border-spacing:0;font-size:11.5px;margin:8px 0;border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.tb-ex table.t th{background:var(--purple-bg);padding:5px 7px;text-align:left;font-weight:700;color:var(--text);border-bottom:1px solid var(--border)}
.tb-ex table.t td{padding:5px 7px;border-bottom:1px solid #f0ebf7;background:#fff}
.tb-ex table.t tr:last-child td{border-bottom:none}
.tb-ex .tip{background:var(--orange-bg);border-left:3px solid var(--orange);padding:7px 11px;border-radius:0 9px 9px 0;font-size:11.5px;margin-top:9px;line-height:1.8;color:#B07030}
.tb-ex .tip::before{content:'💡 '}
.tb-ex .warn{background:var(--pink-bg);border-left:3px solid var(--pink);padding:7px 11px;border-radius:0 9px 9px 0;font-size:11.5px;margin-top:8px;line-height:1.8;color:#C04060}
.tb-ex .warn::before{content:'⚠️ '}
.tb-ex .point{background:var(--purple-bg);border-left:3px solid var(--purple);padding:9px 11px;border-radius:0 11px 11px 0;margin:11px 0;font-size:12px;line-height:1.85}
.tb-ex .point::before{content:'💡 '}
.tb-ex .versus{background:var(--purple-bg);border:1.5px solid var(--purple-l);border-radius:11px;padding:11px;margin:11px 0}
.tb-ex .versus h4{font-size:11.5px;font-weight:800;color:var(--purple);margin:0 0 7px}
.tb-ex .wrong{color:#d45050;font-weight:700;text-decoration:line-through}
.tb-ex .right{color:#2E8A5A;font-weight:700}
.tb-ex .en{font-weight:600;color:var(--text)}
.tb-ex .ja{color:var(--dim)}

/* shared rich-content styles (from source app, so d/e render identically) */
.rule .gref-tbl,.ex .gref-tbl{width:100%;border-collapse:collapse;margin:9px 0;font-size:12px}
.gref-tbl th,.gref-tbl td{border:1px solid #e6e1f0;padding:5px 6px;text-align:center}
.gref-tbl th{background:#f3f0fb;font-weight:700;color:#5a5172}
.gref-tbl td:first-child{background:#faf8fe;font-weight:600;text-align:left}
.gref-tbl b{color:#e0457a}
.gref-tip{display:block;background:var(--orange-bg);border-left:3px solid var(--orange);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0 0;font-size:12px;line-height:1.85;color:#B07030}
.gref-rel{display:block;background:var(--mint-bg);border-left:3px solid var(--mint);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0 0;font-size:12px;line-height:1.85;color:#2E8A6A}
.gref-warn{display:block;background:var(--pink-bg);border-left:3px solid var(--pink);padding:10px 14px;border-radius:0 8px 8px 0;margin:12px 0 0;font-size:12px;line-height:1.85;color:#C04060}

/* ===== EMPTY STATE ===== */
.empty{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;gap:12px}
.empty .ico{font-size:40px}
.empty .msg{font-size:15px;font-weight:700;color:var(--dim)}
.empty .sub{font-size:13px;color:var(--muted)}
.empty button{margin-top:6px;border:none;background:var(--purple);color:#fff;font-weight:700;font-size:14px;padding:11px 22px;border-radius:14px;box-shadow:var(--sh)}

/* deck position counter (in header) */
.counter{flex:0 0 auto;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;color:var(--dim);white-space:nowrap;letter-spacing:.3px}

/* ===== SHEETS ===== */
.scrim{position:fixed;inset:0;background:rgba(60,46,80,.34);opacity:0;pointer-events:none;transition:opacity .25s;z-index:40;backdrop-filter:blur(2px)}
.scrim.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--bg);border-radius:24px 24px 0 0;transform:translateY(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);max-height:82dvh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.sheet.on{transform:translateY(0);box-shadow:0 -8px 30px rgba(80,60,120,.2)}
.sheet-grip{width:40px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 4px}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:6px 18px 12px;border-bottom:1px solid var(--surface)}
.sheet-head .h{font-weight:800;font-size:16px}
.sheet-head .h small{display:block;font-weight:500;font-size:11.5px;color:var(--muted);margin-top:2px}
.sheet-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--surface);color:var(--dim);font-size:16px}
.sheet-body{overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 16px 20px}

/* index list */
.idx-grade{font-family:'Outfit';font-weight:700;font-size:11px;letter-spacing:1px;color:var(--muted);margin:14px 4px 7px;text-transform:uppercase}
.idx-grade:first-child{margin-top:2px}
.idx-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:13px;background:var(--card);border:1.5px solid var(--surface);margin-bottom:7px;box-shadow:var(--sh)}
.idx-item:active{transform:scale(.985);background:var(--purple-bg)}
.idx-item.cur{border-color:var(--purple-l);background:var(--purple-bg)}
.idx-check{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;color:transparent;font-size:13px;font-weight:800}
.idx-item.done .idx-check{background:var(--mint);border-color:var(--mint);color:#fff}
.idx-name{flex:1;font-size:13.5px;font-weight:600;line-height:1.4}
.idx-no{font-family:'Outfit';font-size:11px;color:var(--muted);flex-shrink:0}
.idx-stat{display:flex;align-items:center;justify-content:space-between;background:var(--mint-bg);border:1.5px solid var(--mint-l);border-radius:13px;padding:11px 14px;margin-bottom:4px}
.idx-stat .n{font-weight:700;font-size:13.5px;color:#2E8A6A}
.idx-stat .n b{font-family:'Outfit';font-size:17px}
.idx-stat button{border:none;background:var(--card);color:var(--dim);font-size:12px;font-weight:700;padding:7px 12px;border-radius:10px;border:1px solid var(--border)}
.idx-empty{text-align:center;color:var(--muted);font-size:13px;padding:30px}

/* book sheet */
.book-intro{font-size:12.5px;line-height:1.7;color:var(--dim);background:var(--orange-bg);border-left:3px solid var(--orange);border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:14px}
.book-grp{margin-bottom:18px}
.book-name{font-weight:800;font-size:14px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
.lesson-wrap{display:flex;flex-wrap:wrap;gap:7px}
.lchip{border:1.5px solid var(--surface);background:var(--card);color:var(--dim);font-size:12.5px;font-weight:700;padding:7px 12px;border-radius:11px;box-shadow:var(--sh)}
.lchip:active{transform:scale(.95)}
.lchip.sel{background:var(--purple);color:#fff;border-color:var(--purple)}
.lchip .c{opacity:.7;font-weight:500;margin-left:3px;font-size:11px}
.book-actions{display:flex;gap:9px;margin-top:16px}
.book-actions button{flex:1;border:none;border-radius:13px;padding:13px;font-weight:700;font-size:14px}
.book-apply{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 4px 14px rgba(160,124,232,.3)}
.book-apply:disabled{opacity:.45;box-shadow:none}
.book-clear{background:var(--surface);color:var(--dim);flex:0 0 auto;padding:13px 18px}

/* toast */
.toast{position:fixed;left:50%;bottom:calc(96px + env(safe-area-inset-bottom));transform:translate(-50%,16px);background:rgba(45,33,64,.92);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:14px;opacity:0;pointer-events:none;transition:.25s;z-index:55;white-space:nowrap}
.toast.on{opacity:1;transform:translate(-50%,0)}

.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition-duration:.08s!important}
  .card-inner{transition:transform .12s ease}
}
@media (min-width:480px){.front-topic{font-size:30px}}

/* ===== tabs (saved sets) ===== */
.tb-actions{display:flex;gap:6px;align-items:center}
.tabs{display:flex;gap:7px;overflow-x:auto;padding:0 0 9px;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;display:flex;align-items:center;gap:6px;border:1.5px solid var(--surface);background:var(--card);color:var(--dim);font-size:13px;font-weight:700;padding:8px 14px;border-radius:13px;white-space:nowrap;box-shadow:var(--sh);transition:.15s}
.tab:active{transform:scale(.96)}
.tab.on{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(160,124,232,.28)}
.tab .cnt{font-family:'Outfit';font-size:11px;opacity:.9;background:rgba(80,60,120,.08);padding:1px 7px;border-radius:9px}
.tab.on .cnt{background:rgba(255,255,255,.24)}
.tab.add{color:var(--purple);border-style:dashed;border-color:var(--purple-l);font-weight:800}
.tab.add .plus{font-size:16px;line-height:1;margin-top:-1px}
.tab-edit{font-size:12px;opacity:.8;margin-left:1px;padding:0 1px}
.tab.on .tab-edit{opacity:.95}

/* ===== unit tags on card ===== */
.unit-tags{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:16px;max-width:100%}
.unit-tags:empty{display:none}
.utag{display:inline-flex;align-items:center;gap:3px;font-size:10.5px;font-weight:700;color:#7a5fc0;background:var(--purple-bg);border:1px solid var(--purple-l);padding:3px 9px;border-radius:11px;line-height:1.3;white-space:nowrap}
.utag + .utag{margin-left:5px}
.utag .bk{opacity:.65}
.utag.prog{background:var(--purple);color:#fff;border-color:var(--purple);font-family:'Outfit'}
.back-units{display:flex;flex-wrap:wrap;gap:5px;margin:0 0 12px}
.back-units:empty{display:none}
.back-units .utag{font-size:11px}

/* ===== 共通テンプレート表（重要表の併載） ===== */
.ext-tbl{margin:14px 0 6px;border:1.5px solid var(--purple-l);border-radius:10px;padding:8px 12px 10px;background:#fff}
.ext-tbl-h{font-weight:800;font-size:12px;color:var(--purple);margin-bottom:6px;letter-spacing:.04em}
.ext-tbl .gref-tbl{margin:0;font-size:11.5px}
.ext-tbl .iv-grp{font-weight:800;font-size:11px;color:var(--purple);margin:7px 0 3px;padding-left:2px}
.ext-tbl .iv-grp:first-child{margin-top:0}
.ext-tbl .iv-list{display:flex;flex-wrap:wrap;gap:3px 12px;font-size:10.5px;line-height:1.6}
.ext-tbl .iv-list span{white-space:nowrap}

/* ===== book sheet (textbook → grade → units) ===== */
.book-intro{font-size:12.5px;line-height:1.7;color:var(--dim);background:var(--orange-bg);border-left:3px solid var(--orange);border-radius:0 10px 10px 0;padding:10px 12px;margin-bottom:12px}
.bk-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:4px}
.bk-tab{border:1.5px solid var(--surface);background:var(--card);color:var(--dim);font-weight:700;font-size:13px;padding:8px 14px;border-radius:12px;box-shadow:var(--sh)}
.bk-tab:active{transform:scale(.96)}
.bk-tab.on{background:var(--text);color:#fff;border-color:var(--text)}
.bk-grade{font-weight:800;font-size:13px;margin:17px 2px 9px;display:flex;align-items:center;gap:8px}
.bk-grade .gpill{font-size:11px;padding:3px 11px;border-radius:11px}
.bk-grade .ga{margin-left:auto;font-size:11px;font-weight:700;color:var(--purple);background:var(--purple-bg);border:1px solid var(--purple-l);padding:5px 11px;border-radius:10px}
.bk-grade .ga:active{transform:scale(.94)}
.unit-wrap{display:flex;flex-wrap:wrap;gap:7px;align-items:flex-start}
.uchip{border:1.5px solid var(--surface);background:var(--card);color:var(--dim);font-size:12.5px;font-weight:700;padding:8px 12px;border-radius:11px;box-shadow:var(--sh);display:flex;align-items:center;gap:5px}
.uchip:active{transform:scale(.95)}
.uchip.sel{background:var(--purple);color:#fff;border-color:var(--purple)}
.uchip .c{opacity:.7;font-weight:500;font-size:11px;font-family:'Outfit'}
.uchip.part{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-l)}
.unit-cell{display:flex;flex-direction:column;gap:5px}
.part-wrap{display:flex;flex-wrap:wrap;gap:4px;padding-left:6px}
.pchip{border:1.5px solid var(--surface);background:var(--card);color:var(--dim);font-size:11px;font-weight:700;padding:5px 9px;border-radius:9px;box-shadow:var(--sh);display:flex;align-items:center;gap:4px}
.pchip.sel{background:var(--purple);color:#fff;border-color:var(--purple)}
.pchip .pc{opacity:.7;font-weight:500;font-size:10px;font-family:'Outfit'}
.front-sents{display:flex;flex-direction:column;align-items:center;width:100%}
.front-sents .fs-row{display:flex;flex-direction:column;align-items:center;max-width:100%}
.front-sents.multi{gap:16px;margin-top:8px}
.front-sents.multi .front-ja{margin-top:0;font-size:15px;line-height:1.55}
.front-sents.multi .front-src{margin-top:7px}
.front-next{margin-top:18px;font-size:11.5px;color:var(--dim);font-weight:600;opacity:.75;display:none;text-align:center;max-width:100%}
.front-next.on{display:block}
.front-next b{color:var(--purple);font-weight:700}
.bk-bar{position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--bg) 30%);padding:14px 0 4px;margin-top:8px}
.bk-summary{font-size:12.5px;color:var(--dim);text-align:center;margin-bottom:10px;font-weight:600}
.bk-summary b{color:var(--purple);font-family:'Outfit';font-size:16px}
.bk-actions{display:flex;gap:9px}
.bk-actions button{border:none;border-radius:13px;padding:13px;font-weight:700;font-size:13.5px;white-space:nowrap}
.bk-show{flex:1;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 4px 14px rgba(160,124,232,.3)}
.bk-show:disabled{opacity:.45;box-shadow:none}
.bk-save{flex:0 0 auto;background:var(--purple-bg);color:var(--purple);border:1.5px solid var(--purple-l)}
.bk-clear{flex:0 0 auto;background:var(--surface);color:var(--dim)}
.bk-note{font-size:11.5px;color:var(--muted);text-align:center;margin-top:12px;line-height:1.7;padding:0 6px}

/* ===== save sheet ===== */
.save-body{padding:16px}
.save-label{font-size:12.5px;font-weight:700;color:var(--dim);margin-bottom:8px}
.save-input{width:100%;border:1.5px solid var(--border);border-radius:13px;padding:13px 14px;font-family:inherit;font-size:15px;color:var(--text);background:var(--card);outline:none}
.save-input:focus{border-color:var(--purple)}
.save-preview{font-size:12px;color:var(--muted);margin-top:10px;line-height:1.7;background:var(--surface);border-radius:11px;padding:10px 12px}
.save-preview:empty{display:none}
.save-actions{display:flex;gap:9px;margin-top:18px}
.save-actions button{flex:1;border:none;border-radius:13px;padding:14px;font-weight:700;font-size:14px}
.save-ok{background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;box-shadow:0 4px 14px rgba(160,124,232,.3)}
.save-ok:disabled{opacity:.45;box-shadow:none}
.save-del{flex:0 0 auto;background:var(--ng-bg);color:var(--ng);padding:14px 18px}
.save-cancel{flex:0 0 auto;background:var(--surface);color:var(--dim);padding:14px 18px}
/* ===== 公式モード ===== */
.modebar{display:inline-flex;flex:0 0 auto;gap:3px;background:var(--surface);border-radius:11px;padding:3px;margin:0}
.modeseg{flex:0 0 auto;border:none;background:transparent;color:var(--dim);font-weight:800;font-size:12.5px;padding:6px 11px;border-radius:8px;letter-spacing:.2px;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap}
.modeseg.on{background:var(--card);color:var(--purple);box-shadow:var(--sh)}
.formula-main{font-family:'Outfit','Noto Sans JP',sans-serif;font-weight:800;font-size:25px;line-height:1.5;color:var(--text);text-align:center;padding:26px 14px 22px;letter-spacing:.3px;word-break:keep-all;overflow-wrap:break-word}
.formula-main .ant, .front-topic .ant, .back-topic .ant{display:inline-block;border:2px solid currentColor;border-radius:5px;padding:0 7px;margin:0 2px;line-height:1.25}
.formula-main b{color:var(--purple)}
.formula-main .fnote,.front-topic .fnote{display:block;margin-top:9px;font-size:.6em;font-weight:600;color:var(--dim);letter-spacing:0;line-height:1.35}
.formula-link{display:inline-flex;align-items:center;gap:7px;width:100%;justify-content:center;border:1.5px solid var(--purple-l);background:var(--purple-bg);color:var(--purple);font-weight:800;font-size:14px;padding:13px 14px;border-radius:14px;line-height:1.4;text-align:center;cursor:pointer;transition:.15s}
.formula-link:active{transform:scale(.98)}
.formula-link .arr{font-weight:900;font-size:16px}
.formula-hint{text-align:center;color:var(--muted);font-size:11.5px;font-weight:700;letter-spacing:1px;margin-top:14px}
.rel-sec{margin-top:18px}
.rel-h{font-weight:800;font-size:12.5px;color:var(--purple);margin-bottom:10px;letter-spacing:.04em}
.rel-list{display:flex;flex-direction:column;gap:8px}
.rel-card{display:block;width:100%;text-align:left;border:1.5px solid var(--purple-l);background:#fff;border-radius:12px;padding:10px 13px;cursor:pointer;transition:.15s}
.rel-card:active{transform:scale(.98);background:var(--purple-bg)}
.rel-card .rel-no{display:inline-block;font-size:10.5px;color:var(--dim);font-weight:600;font-family:'Outfit'}
.rel-card .rel-s{display:block;font-weight:700;font-size:14px;color:var(--text);margin-top:3px;line-height:1.4}
.rel-card .rel-s .fnote{display:block;margin-top:5px;font-size:11px;font-weight:500;color:var(--dim);line-height:1.3;opacity:.75}
.rel-card .rel-f{display:block;font-size:11.5px;color:var(--purple);margin-top:5px;line-height:1.4}
.rel-card .rel-f .fnote{display:block;margin-top:3px;font-size:.92em;font-weight:600;color:var(--dim);letter-spacing:0}
.ov-sec{margin-top:18px}
.ov-h{font-weight:800;font-size:12.5px;color:var(--purple);margin-bottom:10px;letter-spacing:.04em;display:flex;align-items:center;gap:6px}
.ov-tbl{width:100%;border-collapse:collapse;font-size:12.5px;color:var(--text);background:#fff;border-radius:8px;overflow:hidden;border:1px solid var(--purple-l);table-layout:fixed;word-wrap:break-word}
.ov-tbl th,.ov-tbl td{padding:8px 10px;border:none;border-bottom:1px solid #EEE5FF;text-align:left;line-height:1.45;vertical-align:top}
.ov-tbl tr:last-child td{border-bottom:none}
.ov-tbl td:first-child{font-weight:600}
.ov-tbl th:nth-child(1),.ov-tbl td:nth-child(1){width:22%}
.ov-tbl th:nth-child(2),.ov-tbl td:nth-child(2){width:30%}
.ov-tbl th{background:var(--purple-bg);color:var(--purple);font-weight:800;font-size:11.5px}
.ov-tbl td b{color:var(--purple);font-weight:800}
.ov-tbl td.ng{color:#d63031}
.ov-tbl td.ng s{opacity:.7}
</style>
</head>
<body>

<!-- ===== TOP ===== -->
<div class="top">
  <div class="titlebar">
    <div class="brand"><span class="jp">英文法フラッシュカード</span></div>
    <div class="tb-actions">
      <span class="counter" id="counter">0 / 0</span>
      <button class="iconbtn master" id="masterBtn" aria-pressed="false" aria-label="このカードを覚えた">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="iconbtn" id="bookBtn" aria-label="教科書の範囲" style="font-size:18px">📚</button>
      <button class="iconbtn" id="listBtn" aria-label="カード一覧を開く">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="20" y2="12"/><line x1="8" y1="18" x2="20" y2="18"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
      </button>
    </div>
  </div>
  <div class="toolbar" id="toolbar">
    <div class="modebar" id="modebar">
      <button class="modeseg on" data-mode="grammar">📖 文法</button>
      <button class="modeseg" data-mode="formula">⚡ 公式</button>
    </div>
    <span class="chip-sep"></span>
    <div class="chips" id="chips" style="display:contents">
      <button class="chip" data-grade="all">すべて</button>
      <button class="chip" data-grade="中1">中1</button>
      <button class="chip" data-grade="中2">中2</button>
      <button class="chip" data-grade="中3">中3</button>
      <span class="chip-sep"></span>
      <button class="chip tool" id="shuffleBtn"><span class="dot">🔀</span>シャッフル</button>
      <button class="chip tool" id="reviewBtn"><span class="dot">📍</span>復習</button>
      <span id="bookActiveSlot" style="display:contents"></span>
    </div>
    <span class="chip-sep" id="toolSep"></span>
    <div class="tabs" id="tabs" style="display:contents"></div>
  </div>
  <div class="search" id="searchWrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35" stroke-linecap="round"/></svg>
    <input type="search" id="search" placeholder="文法を検索（例: 現在完了, who, 比較）" autocomplete="off" enterkeyhint="search">
    <button class="clr" id="searchClear" aria-label="検索をクリア">×</button>
  </div>
</div>

<!-- ===== STAGE ===== -->
<div class="stage" id="stage">
  <button class="backfx no-swipe" id="backFx" type="button">← 公式カードに戻る</button>
  <div class="card" id="card" tabindex="0" role="group" aria-roledescription="フラッシュカード" aria-label="英文法フラッシュカード">
    <div class="card-inner" id="cardInner">
      <!-- FRONT -->
      <div class="face front" aria-hidden="false">
        <div class="front-accent g1" id="frontAccent"></div>
        <div class="front-top">
          <span class="grade-tab g1" id="frontGrade">中1</span>
          <span class="front-no" id="frontNo">01</span>
        </div>
        <div class="front-body">
          <div class="front-topic" id="frontTopic">—</div>
          <div class="front-sents" id="frontSents"></div>
          <div class="front-next" id="frontNext"></div>
        </div>
      </div>
      <!-- BACK -->
      <div class="face back" aria-hidden="true">
        <div class="back-head">
          <span class="grade-tab small g1" id="backGrade">中1</span>
          <span class="back-topic" id="backTopic">—</span>
        </div>
        <div class="back-scroll" id="backScroll">
          <div class="back-units" id="backUnits"></div>
          <div class="rule" id="rule"></div>
          <div class="ex-block" id="exBlock">
            <div class="ex-head">📝 例文<button class="spk no-swipe" id="speakBtn" aria-label="例文を読み上げる">🔊</button></div>
            <div class="ex" id="ex"></div>
          </div>
          <div id="tbSentences"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- empty -->
  <div class="empty" id="empty">
    <div class="ico">🔍</div>
    <div class="msg">該当する文法カードがありません</div>
    <div class="sub">検索語や絞り込みを変えてみてください</div>
    <button id="emptyReset">絞り込みを解除</button>
  </div>
</div>

<!-- ===== INDEX SHEET ===== -->
<div class="scrim" id="indexScrim"></div>
<div class="sheet" id="indexSheet" role="dialog" aria-label="カード一覧">
  <div class="sheet-grip"></div>
  <div class="sheet-head">
    <div class="h">カード一覧<small id="indexCount"></small></div>
    <button class="sheet-close" id="indexClose" aria-label="閉じる">×</button>
  </div>
  <div class="sheet-body" id="indexBody"></div>
</div>

<!-- ===== BOOK SHEET ===== -->
<div class="scrim" id="bookScrim"></div>
<div class="sheet" id="bookSheet" role="dialog" aria-label="教科書の範囲">
  <div class="sheet-grip"></div>
  <div class="sheet-head">
    <div class="h">教科書の範囲<small>教科書・学年・単元を選ぶと、その範囲のカードが並びます</small></div>
    <button class="sheet-close" id="bookClose" aria-label="閉じる">×</button>
  </div>
  <div class="sheet-body" id="bookBody"></div>
</div>

<!-- ===== SAVE SHEET ===== -->
<div class="scrim" id="saveScrim"></div>
<div class="sheet" id="saveSheet" role="dialog" aria-label="セットを保存">
  <div class="sheet-grip"></div>
  <div class="sheet-head">
    <div class="h" id="saveTitle">セットを保存</div>
    <button class="sheet-close" id="saveClose" aria-label="閉じる">×</button>
  </div>
  <div class="save-body">
    <div class="save-label">セット名（タブに表示されます）</div>
    <input class="save-input" id="saveInput" type="text" placeholder="例: 中3 期末テスト範囲" maxlength="24" enterkeyhint="done">
    <div class="save-preview" id="savePreview"></div>
    <div class="save-actions">
      <button class="save-del" id="saveDel" style="display:none">削除</button>
      <button class="save-cancel" id="saveCancel">やめる</button>
      <button class="save-ok" id="saveOk">保存</button>
    </div>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="toast" id="toast"></div>

<!-- ===== aria live ===== -->
<div class="visually-hidden" aria-live="polite" id="live"></div>

<script>
// ============================================================
//  文法カード（中学英文法フラッシュカード）
//  単一ファイル / 依存なし。GitHub→Vercel にそのまま置けます。
//  文法データ（grammarRef）は元アプリの英文法トレーニングから
//  そのまま流用（59項目・あなたが作成・検証済みの内容）。
// ============================================================
const grammarRef=[{"gr":"中1","t":"be動詞（am/is/are）","d":"<b>「〜です」「〜にいる/ある」</b>。主語と後の語句を<b>イコールで結ぶ</b>。<table class=\"gref-tbl\"><tr><th>主語</th><th>現在</th><th>過去</th><th>否定(現在)</th></tr><tr><td>I</td><td><b>am</b></td><td>was</td><td>am not</td></tr><tr><td>you/複数</td><td><b>are</b></td><td>were</td><td>aren't</td></tr><tr><td>he/she/it/単数</td><td><b>is</b></td><td>was</td><td>isn't</td></tr></table><span class=\"gref-tip\">💡 短縮形：I'm / You're / He's / She's / It's / I'm not / isn't / aren't / wasn't / weren't<br>※ <b>am not</b> には標準的な短縮形はない（amn't は使わない）。常に <b>I'm not</b> を使う。</span><span class=\"gref-rel\">🔍 <b>なぜ「I is」じゃなく「I am」？</b>：英語のbe動詞は古英語時代から、主語ごとに別々の動詞だった名残。「私」のam、「君」のare、「彼」のisは、もともと違う動詞の形が一つに集約されたもの。<b>「主語によって形が変わる」のではなく「3種類のbe動詞を主語で使い分ける」</b>と考えると自然。<br><br>🟰 <b>be動詞の本質は「＝」</b>：「I am happy」は「私＝幸せ」、「She is a doctor」は「彼女＝医者」。動作ではなく<b>状態・関係を結ぶ動詞</b>。日本語の「〜だ／〜である」に近い。だから一般動詞（play, study など動作を表す）とは性格が違って、絶対に混ぜてはいけない。</span>","e":"I <b>am</b> a student.（私は学生です）\nShe <b>is</b> kind.（彼女は親切です）\nWe <b>are</b> in Okinawa.（私たちは沖縄にいます）"},{"gr":"中1","t":"一般動詞","d":"be動詞以外の<b>すべての動詞</b>。play, study, eatなど。<b>動作や気持ち</b>を表す。<br><br>📝 <b>否定文の作り方</b>：<table class=\"gref-tbl\"><tr><th>主語</th><th>現在</th><th>過去</th></tr><tr><td>I/you/複数</td><td><b>don't</b> + 原形</td><td rowspan=\"2\"><b>didn't</b> + 原形</td></tr><tr><td>三人称単数</td><td><b>doesn't</b> + 原形</td></tr></table><span class=\"gref-warn\">⚠️ be動詞と一般動詞は絶対に混ぜない！ × I am play / × I don't am</span>","e":"I <b>play</b> tennis.（私はテニスをします）\nI <b>don't like</b> math.（私は数学が好きではない）"},{"gr":"中1","t":"be動詞の疑問文","d":"<b>be動詞を文頭に出す</b>だけ！<br><br>📌 <b>Is</b> he a student?（彼は学生ですか？）/ <b>Are</b> you happy?（あなたは幸せですか？）<br><span class=\"gref-warn\">⚠️ 答えるときは主語を<b>代名詞に置き換える</b>のが自然！<br>Tom → he：<b>Is Tom from Tokyo? — Yes, he is.</b></span><br><span class=\"gref-tip\">💡 入試で狙われる：主語をhe/she/theyに<b>置き換えて</b>答える！</span>","e":"<b>Are</b> you a student? — Yes, I <b>am</b>.（あなたは学生？—はい）\n<b>Is</b> she from Tokyo? — No, she <b>isn't</b>.（彼女は東京出身？—いいえ）"},{"gr":"中1","t":"一般動詞の疑問文（Do/Does）","d":"<b>Do/Does/Did</b>を文頭に、動詞は<b>原形に戻す</b>！<table class=\"gref-tbl\"><tr><th>主語</th><th>現在</th><th>過去</th></tr><tr><td>I/you/複数</td><td><b>Do</b> you play?</td><td rowspan=\"2\"><b>Did</b> you play?</td></tr><tr><td>三人称単数</td><td><b>Does</b> he play?</td></tr></table><span class=\"gref-warn\">⚠️ Does/Didがあったら動詞の<b>sもedも消える</b>！<br>× Does she <b>plays</b> → ○ Does she <b>play</b></span><span class=\"gref-rel\">🔍 <b>Do / Does / Did の正体は「助動詞」</b>：be動詞のように、<b>疑問文・否定文を作るための専用の助っ人</b>。<br><br>📐 普通文：I play tennis.（doは隠れている）<br><br>📐 疑問文：<b>Do</b> I play tennis?（隠れていた do が文頭に登場）<br><br>🤝 can / will と同じ位置（文頭）に出てくる仲間。だから後ろの動詞は can/will と同じく<b>原形に戻る</b>（自然と sやed が消える）。<br><br>📐 <b>時制と主語を do が背負う</b>：三人称単数なら <b>does</b>、過去なら <b>did</b>。<br>・She plays. → <b>Does</b> she <b>play</b>?（doesが3単現の代わり、playは原形に解放）<br>・He played. → <b>Did</b> he <b>play</b>?（didが過去の代わり、playは原形に解放）<br><br>💡 だから「Does she plays」「Did you went」は<b>時制が二重</b>になってしまう間違い。do/does/didが時制を担う以上、本動詞は原形に戻る。</span>","e":"<b>Do</b> you like music?（音楽好き？）\n<b>Does</b> he play soccer?（彼はサッカーする？）"},{"gr":"中1","t":"疑問詞（What/Who/Where/When/Why/How）","d":"疑問詞は文の<b>先頭</b>に置く。<table class=\"gref-tbl\"><tr><th>疑問詞</th><th>意味</th><th>答え方の例</th></tr><tr><td><b>What</b></td><td>何</td><td>モノ・事</td></tr><tr><td><b>Who</b></td><td>誰</td><td>人</td></tr><tr><td><b>Where</b></td><td>どこ</td><td>場所</td></tr><tr><td><b>When</b></td><td>いつ</td><td>時</td></tr><tr><td><b>Why</b></td><td>なぜ</td><td>Because〜</td></tr><tr><td><b>How</b></td><td>どう</td><td>方法・様子</td></tr></table><span class=\"gref-tip\">💡 How many（いくつ）/ How much（いくら）/ How long（期間）/ How old（年齢）/ How far（距離）/ How often（頻度）</span><span class=\"gref-rel\">🔍 <b>5W1Hの正体</b>：英語の主要な疑問詞6つは、頭文字をとって<b>5W1H</b>と呼ばれる（What/Who/Where/When/Why と How）。これは情報を漏れなく集めるための<b>基本フレーム</b>として、英文ライティングや報告書でも使われる。<br><br>🌱 <b>すべて wh- で始まる理由</b>：who / what / where / when / why / which は古英語で <b>hw-</b> で始まる<b>共通の語源</b>を持つ仲間。だから<b>形が似ている</b>。How だけは wh- に見えないが、もともとは同じ hw- グループで、スペルが <b>hu</b> → <b>how</b> へと変わっただけ。<b>6つすべてが「hw-」家族の兄弟</b>。<br><br>🎯 <b>位置のルール</b>：疑問詞は<b>必ず文頭</b>。これは「<b>聞きたいことを真っ先に示す</b>」英語の合理的な発想。日本語の「君はどこに住んでいるの？」は、英語では「<b>どこに</b> 君は住んでいる？(<b>Where</b> do you live?)」と<b>知りたいことが先</b>。<br><br>💡 <b>How の柔軟さ</b>：How は単独で「どう？」（How are you?）、後ろに形容詞を付けると「どのくらい〜？」（How <b>old</b>, How <b>tall</b>, How <b>many</b>, How <b>far</b>, How <b>often</b>）と<b>無限に拡張できる</b>。最も使い回しがきく疑問詞。<br><br>📐 <b>Yes/Noで答えない</b>：疑問詞で始まる疑問文は<b>具体的な情報</b>を答える（What→モノ、Where→場所、Why→Becauseで理由など）。Yes/Noで答えるのは be動詞・助動詞で始まる疑問文だけ。</span>","e":"<b>What</b> do you want?（何がほしい？）\n<b>Where</b> does he live?（彼はどこに住んでる？）\n<b>How old</b> are you?（何歳？）"},{"gr":"中1","t":"人称代名詞と所有代名詞","d":"<table class=\"gref-tbl\"><tr><th></th><th>主格<br>(〜は)</th><th>所有格<br>(〜の)</th><th>目的格<br>(〜を)</th><th>所有代名詞<br>(〜のもの)</th></tr><tr><td>私</td><td><b>I</b></td><td>my</td><td>me</td><td>mine</td></tr><tr><td>あなた</td><td><b>you</b></td><td>your</td><td>you</td><td>yours</td></tr><tr><td>彼</td><td><b>he</b></td><td>his</td><td>him</td><td>his</td></tr><tr><td>彼女</td><td><b>she</b></td><td>her</td><td>her</td><td>hers</td></tr><tr><td>それ</td><td><b>it</b></td><td>its</td><td>it</td><td>-</td></tr><tr><td>私たち</td><td><b>we</b></td><td>our</td><td>us</td><td>ours</td></tr><tr><td>彼ら</td><td><b>they</b></td><td>their</td><td>them</td><td>theirs</td></tr></table><span class=\"gref-tip\">💡 <b>his</b>だけ所有格と所有代名詞が同じ形！ <b>her</b>は所有格と目的格が同じ形！</span>","e":"<b>I</b> like <b>him</b>.（私は彼が好き）\nIt's <b>mine</b>.（それは私のものです）\nThis is <b>her</b> bag.（これは彼女のカバン）"},{"gr":"中1","t":"指示代名詞（this/that/these/those）","d":"近く→<b>this</b>（これ・この）/ <b>these</b>（これら）、遠く→<b>that</b>（あれ・あの）/ <b>those</b>（あれら）。<br><br>📝 単数 this/that→be動詞は <b>is</b>、複数 these/those→<b>are</b><br><br>💡 名詞の前に置くと「この/その/あの」＝形容詞：this book / those cats<br><br>💡 電話で「こちらは〜です」＝<b>This is 〜.</b>／「どちら様？」＝Who is this?<br><br>⚠️ these/those は複数 → 複数名詞とセット（×this books／×these is）<span class=\"gref-rel\">🔍 <b>距離感で4つに分かれる</b>：英語は<b>近い／遠い × 単数／複数</b>の組み合わせで4つの指示代名詞を持つ。<br><table class=\"gref-tbl\"><tr><th></th><th>単数</th><th>複数</th></tr><tr><td><b>近い</b></td><td>this</td><td>these</td></tr><tr><td><b>遠い</b></td><td>that</td><td>those</td></tr></table>🌏 <b>日本語との比較</b>：日本語の「これ／それ／あれ」は<b>3段階の距離</b>（自分の近く／相手の近く／両方から遠い）。英語は<b>2段階</b>（自分の近く／それ以外）でシンプル。「それ」と「あれ」の区別がないから、日本人にとっては that の使い方に最初は迷う。<br><br>📐 <b>名詞の前に置くと形容詞に</b>：<br>・<b>this book</b>（この本）／ <b>that song</b>（あの歌）<br>・this だけで「これ」、this book で「この本」と用法が広がる。<br><br>📞 <b>電話の This is</b>：「もしもし、こちらは〜です」＝ <b>This is Tom speaking.</b>「どちら様？」＝ <b>Who is this?</b><br>→ なぜ this？「<b>受話器を持っている自分（＝近い側）</b>」を this で指す感覚。英語ならではの慣習。<br><br>💡 <b>these / those は複数</b>：必ず複数名詞とセット（these <b>books</b>／those <b>cats</b>）。「これらの／あれらの」と訳すと不自然なので、自然に「これら／あれら」として理解する。</span>","e":"<b>This</b> is my book.（これは私の本です）\n<b>Those</b> are his shoes.（あれらは彼の靴です）"},{"gr":"中1","t":"命令文・Let's","d":"<b>主語を省略</b>して動詞の原形で始める。<br><br>📌 <b>Open</b> the window.（窓を開けなさい）/ <b>Don't</b> run.（走るな）<br><br>📌 <b>Be</b> quiet.（静かにしなさい）/ <b>Let's</b> go.（行こう）<br><span class=\"gref-tip\">💡 頻出：<b>Let's 〜, shall we?</b> / <b>命令文, will you?</b>（付加疑問文とセット）</span><span class=\"gref-rel\">🔍 <b>なぜ主語がない？</b>：命令文は<b>相手（you）に直接呼びかける</b>から、わざわざ「あなたは」と言わなくても伝わる。<br><br>📐 「Open the window.」は本来「<b>You</b> open the window.」だが、直接命令だから you は省略。<br><br>💡 日本語の「窓を開けて」も同じ。日本語ではもともと主語を省きやすいが、英語でも<b>命令文だけは特別に主語を省く</b>。<br><br>🎯 <b>Let's の正体</b>：<b>Let us</b> の短縮形。「<b>私たちに〜させて（許して）</b>」＝「〜しよう」という勧誘表現。<br>・Let me try.（私に挑戦させて）<br>・Let's go.（私たちに行かせて＝行こう）<br><br>🚫 <b>Don't 〜（〜するな）/ Be 〜（〜でいなさい）</b>も同じ系統：相手に直接の指示。Be quiet.（静かにしなさい←You be quiet.）。<br><br>💡 命令文に付加疑問をつけるとマイルドになる：「Open the window, <b>will you</b>?」＝「窓開けてくれる？」と<b>依頼っぽく</b>なる。</span>","e":"<b>Open</b> the window.（窓を開けなさい）\n<b>Don't</b> be late.（遅れるな）\n<b>Let's</b> play soccer!（サッカーしよう！）"},{"gr":"中1","t":"助動詞 can/will","d":"助動詞の後は<b>必ず動詞の原形</b>！主語が何でも形は変わらない。<table class=\"gref-tbl\"><tr><th>助動詞</th><th>意味</th><th>否定</th></tr><tr><td><b>can</b></td><td>〜できる</td><td>can't</td></tr><tr><td><b>will</b></td><td>〜するだろう/つもり</td><td>won't</td></tr><tr><td><b>may</b></td><td>〜してもよい/かもしれない</td><td>may not</td></tr></table><span class=\"gref-warn\">⚠️ 助動詞+<b>be</b>！ × will is → ○ will <b>be</b></span><span class=\"gref-rel\">🔍 <b>なぜ後ろは原形？</b>：助動詞は文字どおり「動詞を助ける」言葉。「できる」「だろう」などの<b>気持ち・判断</b>だけを担当して、<b>動作の内容そのものは動詞に任せる</b>分担制。だから動詞は何も変化せず素のまま（原形）でいい。<br><br>🤝 <b>主語が変わっても助動詞は不変</b>：can は「できる」という意味そのもの。she だろうが I だろうが「できる」は同じ。だから s もつかないし時制で変化もしない。シンプル！</span>","e":"I <b>can</b> speak English.（英語を話せる）\nShe <b>will</b> come tomorrow.（彼女は明日来るだろう）"},{"gr":"中1","t":"一般動詞の過去形","d":"規則動詞→<b>-ed</b>。不規則動詞→暗記！<br>疑問文：<b>Did</b>+原形? / 否定文：<b>didn't</b>+原形<br><br>📝 edの付け方：ふつう→ed / eで終わる→d / 子音+y→yをiにしてed / 短母音+子音→子音を重ねてed<span class=\"gref-warn\">⚠️ Did/didn'tのあとは<b>必ず原形</b>！ × Did you went → ○ Did you <b>go</b></span><span class=\"gref-rel\">🔍 <b>-edの正体</b>：「-ed」は古英語の「〜した」を意味する語尾「-ode」が短縮されたもの。<b>「行為がすでに終わった」という印</b>を動詞のお尻にくっつけて時間を表す仕組み。日本語の「〜た」と同じ働き（食べる→食べ<b>た</b>）。<br><br>📜 <b>なぜ不規則動詞がある？</b>：英語で<b>最も古くからよく使われる動詞</b>（go/come/see/eat/run など）は、規則化される前の古い形がそのまま残った。<b>よく使う動詞ほど不規則なまま生き残る</b>のは世界中の言語で共通の現象（日本語でも「来る／来た」「する／した」は不規則）。「みんなが覚えてるから変える必要がなかった」というのが正体。だから不規則動詞は<b>「英語の中で一番大切な動詞たち」</b>とも言える。</span>{{TPL:irreg}}","e":"I <b>played</b> soccer yesterday.（昨日サッカーをした）\n<b>Did</b> you <b>eat</b> lunch?（昼ごはん食べた？）"},{"gr":"中1","t":"be動詞の過去形（was/were）","d":"<table class=\"gref-tbl\"><tr><th>主語</th><th>過去形</th><th>否定</th></tr><tr><td>I/he/she/it/単数</td><td><b>was</b></td><td>wasn't</td></tr><tr><td>you/we/they/複数</td><td><b>were</b></td><td>weren't</td></tr></table><span class=\"gref-tip\">💡 <b>過去のサイン</b>を見つけたらwas/wereに！<br>yesterday / last〜 / 〜ago / when I was〜 / then</span><span class=\"gref-rel\">🔍 <b>be動詞の「＝」が過去に移動しただけ</b>：現在の am/is/are は「主語＝説明」を結ぶ動詞だった（#1）。was/were は<b>その「＝」が過去になった形</b>。<br><br>📐 I <b>am</b> happy.（私＝幸せ ／ 今）<br><br>📐 I <b>was</b> happy.（私＝幸せだった ／ 過去）<br>→ 結ぶ意味は同じで、<b>時間軸が「今」から「あの時」へ移った</b>だけ。<br><br>🤝 <b>3種類が2種類に集約される</b>：<br>・現在：am / is / are（3種類）<br>・過去：<b>was / were（2種類だけ）</b><br>→ I/he/she/it/単数 → was（am と is が合流）／ you/we/they/複数 → were（are の過去形）。<b>過去ではシンプルに2つ</b>に整理されている。<br><br>💡 <b>否定・疑問のルールも現在と同じ</b>：be動詞の文だから「be動詞のうしろにnot」「be動詞を文頭に出す」だけでOK。<b>Was he busy? / He wasn't busy.</b> と、現在形の「Is he busy? / He isn't busy.」と作り方は完全に同じ。</span>{{TPL:be}}","e":"I <b>was</b> happy.（私はうれしかった）\nThey <b>were</b> in the park.（彼らは公園にいた）"},{"gr":"中1","t":"現在進行形（be+〜ing）","d":"「今〜しているところ」。<b>be動詞+ing形</b>。<br><br>📝 ingの付け方4パターン：<br>ふつう→ing(playing) / eで終わる→e消す(making) / 短母音+子音→重ねる(running,swimming) / ieで終わる→yingに(die→dying)<span class=\"gref-tip\">💡 study→studying（yはそのまま！edの時だけyをiに変える）</span><span class=\"gref-warn\">⚠️ <b>進行形にしない動詞</b>がある！「状態」を表す know / like / love / want / have（＝持つ）/ see / hear などは ing にしない。<br>× I am <b>knowing</b> → ○ I <b>know</b></span><span class=\"gref-rel\">🔍 <b>なぜbe動詞が必要？</b>：「〜している」は実は<b>「〜の状態」</b>。「私は走っている＝私は『走っている状態』にある」と考えると、<b>状態を表すbe動詞</b>が必要なのが見えてくる。ingは「動作の途中」を表す形容詞のような働きで、<b>be＋形容詞</b>（She is happy など）と同じ構造なんだ。<br><br>🚫 <b>状態動詞がingにならない理由</b>：know（知る）、like（好き）はすでに<b>状態</b>を表す動詞。「知っている状態の状態」はおかしいから、ingにできない。動作（run, eat）だけが「途中」を持てる。</span>","e":"I <b>am studying</b> English now.（今英語を勉強している）\n<b>Is</b> he <b>playing</b> soccer?（彼はサッカーしてる？）"},{"gr":"中1","t":"過去進行形（was/were+〜ing）","d":"「あの時〜していた」＝<b>was/were+〜ing</b><br><span class=\"gref-tip\">💡 <b>超頻出パターン</b>：<br>I was sleeping <b>when</b> he called.<br>→ 過去進行形+<b>when</b>+過去形のセット！<br>「電話が来た<b>とき</b>、寝て<b>いた</b>」</span><br><span class=\"gref-warn\">⚠️ 過去形＝終わった動作 / 過去進行形＝その時まさに<b>途中だった</b></span><span class=\"gref-rel\">🔍 <b>過去形と過去進行形の違い</b>：両方とも「過去のこと」だが、視点が違う。<br><br>📍 <b>過去形</b>：過去の<b>1つの完結した出来事</b>を、外から見る。<br>・I <b>played</b> tennis yesterday.（昨日テニスをした←事実として完了）<br><br>📹 <b>過去進行形</b>：過去のある時点の<b>「途中の瞬間」</b>を、中から見る。<br>・I <b>was playing</b> tennis at 3 yesterday.（昨日3時にテニスをしている途中だった）<br><br>🎬 <b>映画でたとえる</b>：<br>・過去形＝<b>ハイライト映像</b>（事件・行動を1つ1つ並べる）<br>・過去進行形＝<b>その瞬間のスローモーション</b>（途中で止めた1コマ）<br><br>🎯 <b>when + 過去形 とセットで頻出</b>：<br>・I <b>was sleeping</b> when he <b>called</b>.（電話が来た時、寝ていた）<br>・→ <b>背景（過去進行形）と出来事（過去形）</b>のセット。「〜していた」「<b>その時</b>〜が起きた」という構造。入試での超頻出パターン。<br><br>🚫 <b>状態動詞は進行形にしない</b>：know, like, have（持つ）など状態を表す動詞は、現在進行形と同じく過去進行形にもしない。<br>・× I was knowing → ○ I knew（知っていた）<br><br>💡 「ちょうど〜していた」「途中で止まる感じ」が出るのが過去進行形の魅力。物語や日記でドラマを生む。</span>","e":"I <b>was studying</b> at that time.（その時勉強していた）\nThey <b>were watching</b> TV when I came.（私が来た時、彼らはテレビを見ていた）"},{"gr":"中1","t":"未来表現（will/be going to）","d":"<b>will</b>＝その場の判断 / <b>be going to</b>＝前からの予定<table class=\"gref-tbl\"><tr><th></th><th>肯定</th><th>否定</th><th>疑問</th></tr><tr><td>will</td><td>I will go.</td><td>I won't go.</td><td>Will you go?</td></tr><tr><td>be going to</td><td>I am going to go.</td><td>I'm not going to go.</td><td>Are you going to go?</td></tr></table><span class=\"gref-tip\">💡 入試では<b>書き換え</b>で出る！will = be going to</span><span class=\"gref-rel\">🔍 <b>will と be going to のニュアンスの違い</b>：<br>・<b>will</b>＝<b>その場での判断・意志</b>。今この瞬間に決めた未来。<br>・<b>be going to</b>＝<b>前から決めていた予定・流れ</b>。すでに準備が動き始めている未来。<br><br>📐 電話が鳴った → 「<b>I'll get it.</b>（出るよ！）」その場で決めた → will<br><br>📐 来週引っ越す予定 → 「<b>I'm going to move.</b>」前から計画している → be going to<br><br>🌱 <b>going の正体</b>：be going to は本来「<b>〜に向かっている途中</b>」という進行形。だから「未来へ向かう線路がすでに敷かれている」感覚が出る。<br><br>💡 入試では書き換え（will = be going to）で出るが、ネイティブは<b>場面に応じて使い分けている</b>。決断の瞬間か、計画済みかで自然と選ばれる。</span>","e":"I <b>will</b> call you later.（あとで電話するよ）\nWe <b>are going to</b> have a party.（パーティーをする予定だ）"},{"gr":"中1","t":"三人称単数現在形（3単現のs）","d":"I/you<b>以外の単数</b>が主語→現在形の動詞に<b>s/es</b>。<br><br>📝 ふつう→<b>s</b> / s,sh,ch,x,o→<b>es</b> / 子音+y → <b>yをiにしてes</b> / have→<b>has</b><br><span class=\"gref-warn\">⚠️ Doesがあったらsは<b>消える</b>！<br>She <b>plays</b>. → Does she <b>play</b>?</span><br><span class=\"gref-tip\">💡 人名/my father/the dog/it/this →全部<b>三人称単数</b>！</span><span class=\"gref-rel\">🔍 <b>なぜsをつける？</b>：英語は昔、主語ごとに動詞の形が違った（古英語の名残）。今はほとんど消えたけど、<b>三人称単数の現在形だけ</b>例外的に「sをつける」というルールが残った。日本語で言うなら「彼が＋動詞す」みたいな感覚。<b>主語と動詞をペアで一致させる</b>感覚を、英語は今でも大事にしている。</span>","e":"She <b>plays</b> tennis.（彼女はテニスをする）\n<b>Does</b> he <b>like</b> music?（彼は音楽が好き？）"},{"gr":"中1","t":"冠詞（a / an / the）","d":"名詞の前につく印。<b>a/an</b>＝不特定の「1つの」/ <b>the</b>＝特定の「その」。<table class=\"gref-tbl\"><tr><th>冠詞</th><th>使うとき</th></tr><tr><td><b>a</b></td><td>次が子音の音（a book）</td></tr><tr><td><b>an</b></td><td>次が母音の音（an apple）</td></tr><tr><td><b>the</b></td><td>特定・唯一・2回目（the sun）</td></tr><tr><td>無冠詞</td><td>スポーツ・教科・食事</td></tr></table><span class=\"gref-warn\">⚠️ a/anは<b>つづりでなく音</b>で決める！ an hour（hは無音）/ a university（ユは子音の音）</span><span class=\"gref-tip\">💡 theの頻出：play <b>the</b> piano（楽器）/ in <b>the</b> morning / <b>the</b>+最上級</span><span class=\"gref-rel\">🔍 <b>冠詞は「相手も知ってるか」の合図</b>：<br>・<b>a / an</b>＝「<b>たくさんある中の1つ</b>」。聞き手はどれか知らない。<br>・<b>the</b>＝「<b>あれ・それ</b>」。聞き手も<b>特定できる</b>もの。<br><br>📐 「I have <b>a</b> dog. <b>The</b> dog is cute.」←最初は「ある犬」（初登場）、2回目は「その犬」（もう分かってる）。<br><br>🌏 日本語には冠詞がない。だから英語話者は<b>「相手が分かるかどうか」を常に意識して名詞を選ぶ</b>感覚を、日本人は意識的に身につける必要がある。<br><br>💡 <b>楽器に the がつく理由</b>：play <b>the</b> piano の the は、「ピアノというあの楽器」と<b>特定の概念</b>を指す。スポーツは無冠詞（play soccer）なのは「活動・行為」として捉えるから。<br><br>💡 <b>太陽・月に the</b>：「世界に1つしかない＝誰でも分かる＝特定」だから the sun / the moon。</span>","e":"I have <b>a</b> dog. <b>The</b> dog is cute.（犬を飼っている。その犬はかわいい）\nI play <b>the</b> guitar.（ギターを弾く）\nI play soccer.（サッカーをする ← 無冠詞）"},{"gr":"中1","t":"名詞（数えられる／数えられない）","d":"名詞は2種類。<b>a/an</b>がつくか・<b>複数形</b>にできるかで区別！<table class=\"gref-tbl\"><tr><th></th><th>数えられる</th><th>数えられない</th></tr><tr><td>a/an</td><td>○ a book</td><td>× water</td></tr><tr><td>複数形</td><td>○ books</td><td>×（sをつけない）</td></tr><tr><td>数え方</td><td>two books</td><td>two <b>glasses of</b> water</td></tr></table><span class=\"gref-warn\">⚠️ 不可算の代表：water / milk / money / homework / news / information / bread → aをつけない・複数形にしない！</span><span class=\"gref-tip\">💡 量は入れ物で数える：a <b>cup of</b> coffee / a <b>glass of</b> water / a <b>piece of</b> paper</span><span class=\"gref-rel\">🔍 <b>英語の世界観</b>：英語話者は名詞を<b>「一個ずつ数えられる物体」と「形のない物質・抽象」</b>に分けて捉える。<br>・<b>数えられる</b>：book, dog, apple … <b>輪郭がはっきりした個体</b>。1つ、2つと数えられる。<br>・<b>数えられない</b>：water, sugar, advice, news … <b>形がない物質や抽象概念</b>。「1つ、2つ」と切り分けられない。<br><br>📐 水（water）を「2つの水」と言いたいときは、<b>器という単位で数える</b>：two <b>glasses of</b> water（2杯の水）。日本語の「水を2杯」と全く同じ感覚。<br><br>💡 <b>不可算名詞の代表</b>：water / milk（液体）、money / homework（抽象的なまとまり）、news / information / advice（情報）、bread（パンは塊として捉える）。<br><br>🌏 日本語は「本」「冊」「枚」のように<b>すべての名詞に単位</b>をつける言語。英語は<b>数えられる名詞だけ単位なしで数える</b>言語。世界の見方の違いが文法に現れている。</span>{{TPL:art}}","e":"I have two <b>books</b>.（本を2冊持っている）\nI want a <b>glass of</b> water.（コップ1杯の水がほしい）\nI have a lot of <b>homework</b>.（宿題がたくさんある ← homeworksにしない）"},{"gr":"中1","t":"前置詞（in / on / at など）","d":"時や場所を表す語。<b>in / on / at</b> の使い分けが最頻出！<table class=\"gref-tbl\"><tr><th></th><th>at</th><th>on</th><th>in</th></tr><tr><td><b>時</b></td><td>時刻<br>at seven</td><td>曜日・日付<br>on Monday</td><td>月・季節・年<br>in May</td></tr><tr><td><b>場所</b></td><td>地点<br>at the station</td><td>接触・上<br>on the desk</td><td>空間の中<br>in Tokyo</td></tr></table><span class=\"gref-tip\">💡 その他頻出：by（〜のそば／〜までに）/ for（〜の間・〜のために）/ with（〜と一緒に・〜を使って）/ during（〜の間）/ until,till（〜まで）/ between（〜の間に）</span><span class=\"gref-warn\">⚠️ <b>at</b> night / <b>in</b> the morning だが、特定の朝は <b>on</b> Sunday morning！</span><span class=\"gref-rel\">🔍 <b>at / on / in のサイズ感</b>：これらは時も場所も<b>「ピンポイント→面→空間」</b>の順で範囲が広がる。<br><br>📐 <b>場所</b>：<br>・<b>at</b>＝<b>点・地点</b>：at the station（駅で）／ at the door（ドアの所で）<br>・<b>on</b>＝<b>面（接触）</b>：on the desk（机の上）／ on the wall（壁に）／ on the floor（床に）<br>・<b>in</b>＝<b>空間の中</b>：in Tokyo（東京に）／ in the box（箱の中に）／ in the room（部屋の中に）<br><br>📐 <b>時</b>：<br>・<b>at</b>＝<b>時刻（点）</b>：at seven（7時に）／ at noon（正午に）<br>・<b>on</b>＝<b>曜日・日付（区切られた1日）</b>：on Monday（月曜に）／ on July 1st（7月1日に）<br>・<b>in</b>＝<b>月・季節・年（広い期間）</b>：in May（5月に）／ in summer（夏に）／ in 2026（2026年に）<br><br>🎯 <b>同じ「日本に」でも違う</b>：at the station（駅という地点に）／ in Japan（日本という空間の中に）。<b>話し手の感じている範囲</b>で使い分ける。<br><br>🌏 <b>例外：on Sunday morning</b>：朝一般は in the morning だが、<b>「特定の日の朝」</b>は<b>その日付の一部</b>として on（日付）に従う。「on July 1st morning」と同じ感覚。<br><br>💡 <b>by / for / with の核</b>：<br>・<b>by</b>＝<b>そば・経由・期限</b>：by the door（ドアのそば）／ by car（車で＝車を経由）／ by five（5時までに）<br>・<b>for</b>＝<b>方向・期間・利益</b>：for Tokyo（東京行き）／ for 3 hours（3時間）／ for me（私のために）<br>・<b>with</b>＝<b>一緒・道具</b>：with my friend（友達と）／ with a pen（ペンで）<br>→ 前置詞は<b>「核となるイメージ1つ」</b>を押さえれば、複数の意味を貫いて理解できる。</span>","e":"I get up <b>at</b> six <b>on</b> Sundays.（日曜は6時に起きる）\nThe book is <b>on</b> the desk <b>in</b> my room.（本は私の部屋の机の上にある）\nI'll be back <b>by</b> five.（5時までに戻る）"},{"gr":"中2","t":"接続詞 when/if/that","d":"<b>when</b>＝「〜のとき」/ <b>if</b>＝「もし〜なら」/ <b>that</b>＝「〜ということ」<br><span class=\"gref-warn\">⚠️ <b>超重要（毎年出る！）</b>：<br>when/if節の中は<b>未来でも現在形</b>！<br>× when I <b>will</b> arrive → ○ when I <b>arrive</b><br>× if it <b>will</b> rain → ○ if it <b>rains</b></span><br><span class=\"gref-tip\">💡 thatは<b>省略できる</b>！ I think (that) he is right.</span><span class=\"gref-rel\">🔍 <b>接続詞は「2つの文をつなぐ」役割</b>。それぞれの個性：<br>・<b>when</b>＝「〜の時」（時を結ぶ）<br>・<b>if</b>＝「もし〜なら」（仮の条件を結ぶ）<br>・<b>that</b>＝「〜ということ」（内容を結ぶ）<br><br>📐 接続詞でつないだ部分は<b>「節」</b>と呼ばれる。文の中の小さな文。<br><br>🚫 <b>when / if 節の中で未来形を使わない理由</b>：これは英語の決まりごとで、<b>「条件・時を表すサブの文」は未来でも現在形で書く</b>。<br><br>📐 × when I <b>will</b> arrive → ○ when I <b>arrive</b><br><br>💡 イメージ：「明日もし雨が降ったら…」と日本語で言う時、私たちも「雨が降る」と<b>現在形のような形</b>で言う（「降るだろうら」とは言わない）。英語も同じで、条件・時を語る部分は<b>「現在の枠組み」</b>で表現する習慣。<br><br>🎯 メインの文（主節）の方は未来形でOK：If it <b>rains</b> tomorrow, I <b>will</b> stay home.</span>","e":"<b>When</b> I got home, mother was cooking.（帰宅した時、母が料理していた）\n<b>If</b> you are free, let's play.（暇なら遊ぼう）\nI think <b>that</b> English is fun.（英語は楽しいと思う）"},{"gr":"中2","t":"接続詞 because/while","d":"<b>because</b>＝「なぜなら」（理由）/ <b>while</b>＝「〜の間に」（同時進行）<br><span class=\"gref-warn\">⚠️ <b>because</b>+<b>文</b>(主語+動詞) / <b>because of</b>+<b>名詞</b><br>because it rained ≠ because of the rain</span><br><span class=\"gref-tip\">💡 Why〜? → <b>Because〜.</b>で返す！並べ替え超頻出！</span><span class=\"gref-rel\">🔍 <b>because と while の違いの本質</b>：両方とも「2つの文をつなぐ接続詞」だが、つなぐ関係が違う。<br>・<b>because</b>＝<b>因果関係</b>（A だから B）<br>・<b>while</b>＝<b>時間の同時進行</b>（A している間に B）<br><br>📐 I stayed home <b>because</b> it was raining.（雨だから家にいた←原因と結果）<br><br>📐 <b>While</b> I was sleeping, he came.（私が寝ている間に彼が来た←同時進行）<br><br>🤝 <b>because vs because of の違い</b>：<br>・<b>because</b>＝接続詞 → 後ろは<b>文（主語＋動詞）</b>：because <b>it rained</b><br>・<b>because of</b>＝前置詞句 → 後ろは<b>名詞</b>：because of <b>the rain</b><br><br>💡 同じ内容を表せるが、形が違う。「because+文／because of+名詞」と覚える。<br><br>🌏 while は「同時進行」だから、ふつう<b>過去進行形</b>と相性◎。「〜していた間に〜が起きた」というドラマのある描写に使われる。</span>","e":"I stayed home <b>because</b> it was raining.（雨だったから家にいた）\n<b>While</b> I was sleeping, he came.（私が寝ている間に彼が来た）"},{"gr":"中2","t":"There is/are〜","d":"「〜がある・いる」。続く名詞が単数→<b>is</b>、複数→<b>are</b>（過去 was/were）。<br><br>📌 There is a book.（本が1冊ある）/ There are two books.（本が2冊ある）<br><br>❓ 疑問：<b>Is there 〜? / Are there 〜?</b>（答 Yes, there is. / No, there isn't.）<br><br>🚫 否定：There is <b>no</b> 〜. / There <b>aren't any</b> 〜.<br><br>⚠️ the/my/this＋特定の名詞には使わない！ ×There is my bag → ○My bag is here.<br><br>💡 数えられない名詞は単数扱い：There is some water.<span class=\"gref-rel\">🔍 <b>なぜ「there」？</b>：There is/are の there は、<b>「ここではない別の場所」</b>を指す副詞ではなく、<b>「あ、あるよ」と存在を導入する</b>飾りの語（形式主語的）。<br><br>📐 比較：<br>・<b>My bag is here.</b>（私のカバン＝特定）の場所を伝える<br>・<b>There is a bag.</b>（カバンがある＝<b>不特定の存在を初めて聞き手に教える</b>）<br><br>🚫 <b>the / my / this には使わない理由</b>：これらは<b>すでに特定された名詞</b>。「特定のものを初めて紹介する」のは矛盾する。だから「There is my bag.」はおかしい（My bag is here. が正解）。<br><br>💡 日本語の「（あそこに）〜があるよ」と新情報を伝えるニュアンスに近い。</span>","e":"There <b>is</b> a park near here.（この近くに公園がある）\nThere <b>are</b> many students.（たくさんの生徒がいる）"},{"gr":"中2","t":"不定詞の名詞的用法（to+動詞＝〜すること）","d":"to+原形で「〜すること」。主語にも目的語にもなる！<br><br>📌 <b>To study</b> is important.（勉強することは大切だ／主語）/ I want <b>to play</b>.（遊びたい／目的語）<br><br>📌 頻出動詞：want/like/try/start/need/hope/begin/decide + to〜<br><span class=\"gref-warn\">⚠️ <b>3用法の見分け</b>が入試で問われる！<br>名詞的＝「〜すること」/ 形容詞的＝「〜するための」/ 副詞的＝「〜するために」</span><br><span class=\"gref-tip\">💡 enjoy/finish/stopの後は不定詞×→動名詞！</span><span class=\"gref-rel\">🔍 <b>toの本来の意味は「〜に向かって」</b>：to は前置詞でも「学校に行く go to school」と<b>方向</b>を表すよね。不定詞の to も同じで、「これからその動作に向かう」という<b>未来・方向性</b>のイメージ。だから「〜したい(want to)」「〜することを決める(decide to)」のように、<b>これからの動作</b>を語るときに自然に使える。<br><br>🌱 <b>3用法はぜんぶ「向かう」が原点</b>：名詞的「〜すること（これからの行動）」、形容詞的「〜するための（用途）」、副詞的「〜するために（目的）」。どれも<b>これから何かに向かう</b>イメージで統一されている。</span>","e":"I want <b>to be</b> a doctor.（医者になりたい）\nHe began <b>to run</b>.（彼は走り始めた）"},{"gr":"中2","t":"不定詞の形容詞的用法","d":"「<b>〜するための/すべき</b>」名詞を<b>後ろから</b>修飾。<br><br>📌 something <b>to eat</b>（食べるもの）/ time <b>to study</b>（勉強する時間）<br><span class=\"gref-tip\">💡 <b>something/anything + 形容詞 + to〜</b> の語順注意！<br>something <b>cold</b> to drink ← coldが名詞の後！</span><br><span class=\"gref-warn\">⚠️ 3用法見分け：名詞のすぐ後にto〜→<b>形容詞的</b></span><span class=\"gref-rel\">🔍 <b>形容詞的用法の正体</b>：<b>to + 動詞の原形</b>が、ふつうの形容詞のように<b>名詞を修飾する</b>働きをする。<br><br>📐 比較：<br>・a <b>cold</b> drink（冷たい飲み物）← cold が形容詞として drink を前から修飾<br>・something <b>to drink</b>（飲むためのもの）← to drink が形容詞のように something を<b>後ろから</b>修飾<br><br>🌱 <b>なぜ「後ろ」から？</b>：to 不定詞は「to＋動詞」の<b>2語以上のかたまり</b>。英語では、名詞の前に来る修飾語はふつう<b>1語</b>（cold, big, tall など）。<b>2語以上のかたまりは名詞のうしろに置く</b>のが英語の基本ルール。<br><br>🎯 <b>to の「向かう」感覚から見る</b>：「something to drink」＝「飲むことに向かう→飲むための→ 何か」。to の「未来・方向」の感覚が、「これからその動作に使う物」というニュアンスを自然に生む。<br><br>💡 <b>something / anything + 形容詞 + to do</b> の語順は丸暗記：something <b>cold</b> to drink（cold は名詞のうしろ！）。これは something 系の単語の特殊ルール。</span>","e":"I have homework <b>to do</b>.（やるべき宿題がある）\nGive me something <b>to eat</b>.（何か食べるものをちょうだい）"},{"gr":"中2","t":"不定詞の副詞的用法","d":"①<b>目的</b>「〜するために」②<b>原因</b>「〜して（嬉しい等）」<br><br>📌 目的：I went to the library <b>to study</b>.（勉強するために図書館へ行った）<br><br>📌 原因：I'm glad <b>to hear</b> that.（それを聞いてうれしい）<br><span class=\"gref-tip\">💡 <b>感情の形容詞</b>(happy/glad/sad/sorry/surprised)+to〜 →<b>副詞的用法（原因）</b>！</span><br><span class=\"gref-warn\">⚠️ Why〜?に<b>To+動詞</b>で答えられる→目的の副詞的用法！</span><span class=\"gref-rel\">🔍 <b>目的と原因が同じ to で表せる理由</b>：to は本来「<b>〜に向かう／〜に至る</b>」イメージ。<br><br>🎯 <b>目的</b>「勉強する<b>ために</b>図書館へ行く」は、<b>これからその動作に向かう</b>。to study が未来方向を指している。<br><br>💚 <b>原因</b>「それを聞い<b>て</b>嬉しい」は、<b>その動作から感情に至った</b>。to hear が「→嬉しい」への経路を示す。<br><br>📐 つまり「向かう／到達する」という<b>同じ核</b>を、未来方向に使えば「目的」、過去方向に使えば「原因」になる。<b>同じ to でも見ている方向が違うだけ</b>。<br><br>🌱 だから名詞的（〜すること）・形容詞的（〜するための）・副詞的（〜するために／〜して）と分かれていても、根っこは全部<b>「to＝向かう」</b>で繋がっている。</span>","e":"I came <b>to see</b> you.（目的）\nI was surprised <b>to hear</b> the news.（原因）"},{"gr":"中2","t":"It is (for人) to〜（形式主語構文）","d":"「人にとって〜するのは…だ」＝<b>It is+形容詞+for+人+to+動詞</b><br><span class=\"gref-tip\">💡 <b>整序で頻出</b>！語順丸暗記：<br>It is→形容詞→for→人→to→動詞の原形<br>forとtoが選択肢にあったらこの構文！</span><br><span class=\"gref-warn\">⚠️ 人の性格→forが<b>of</b>に！ It is kind <b>of</b> you to help me.</span><span class=\"gref-rel\">🔍 <b>「It」の正体は仮の主語</b>：この It は「それ」と訳さない。<b>本当の主語は後ろの「to + 動詞」</b>。<br><br>📐 本来の語順：<b>To write English</b> is difficult for me.（英語を書くこと＝難しい）<br><br>📐 でも英語は<b>「重い主語を後ろへ送りたい」</b>感覚がある。長い主語を文頭に置くとバランスが悪い。<br><br>📐 そこで <b>It</b> を仮の主語として前に置き、本当の主語を後ろへ送る：<br>→ <b>It</b> is difficult for me <b>to write English</b>.（仮主語）（真主語）<br><br>🎯 <b>for + 人 は「誰にとって」</b>：It is difficult <b>for me</b> = 私にとって。to write の動作主を示す印。<br><br>🚫 <b>of に変わる例外</b>：「kind, nice, foolish, careless」など<b>人の性格・態度を評価する形容詞</b>のときは、for ではなく <b>of</b>。<br>・It is kind <b>of</b> you to help me.（手伝ってくれるなんてあなたは親切）← you の性格を評価<br><br>💡 見分け：「人＝形容詞」が成り立つなら of（you is kind →〇）／成り立たないなら for（me is difficult →×）。</span>","e":"It is <b>difficult for me to</b> write English.（私にとって英語を書くのは難しい）\nIt is <b>important for him to</b> study every day.（彼にとって毎日勉強することは大切だ）\nIt is <b>kind of you to</b> help me.（手伝ってくれてあなたは親切だ）"},{"gr":"中2","t":"tell/ask/want 人 to〜","d":"<b>tell/ask/want+人+to+動詞</b><table class=\"gref-tbl\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td><b>tell</b></td><td>〜しろと言う</td><td>told me <b>to</b> study</td></tr><tr><td><b>ask</b></td><td>〜してと頼む</td><td>asked me <b>to</b> help</td></tr><tr><td><b>want</b></td><td>〜してほしい</td><td>wants me <b>to</b> come</td></tr></table><span class=\"gref-warn\">⚠️ この3つは<b>to必要</b>！make/let/helpは<b>toなし</b>！整序で<b>毎年出る</b>！</span><span class=\"gref-rel\">🔍 <b>to がある理由</b>：to は本来「<b>〜に向かって</b>」という方向・距離のニュアンス。<br><br>📐 <b>tell/ask/want は「ワンクッション」型の動詞</b>：<br>・<b>tell</b> me to study：「私に言う→私が勉強する」← 言葉を介して相手が動く<br>・<b>ask</b> me to help：「私に頼む→私が手伝う」← 依頼を介して相手が動く<br>・<b>want</b> me to come：「私に望む→私が来る」← 気持ちを介して相手が動く<br>→ いずれも「動詞→人→<b>その人がする動作</b>」と<b>2段階</b>で意味がつながる。だから to（向かう先）が必要。<br><br>🔄 <b>make/let/help との対比</b>：<br>・<b>make</b> him clean（させる）/ <b>let</b> me go（させてあげる）/ <b>help</b> me carry（手伝う）<br>・これらは「ワンクッションなく、相手と動作がぴったり密着」している。だから to が入る隙間がない（中3 #53 で詳しく）。<br><br>💡 つまり<b>「動詞と相手の動作の間に距離があるか」</b>で to の有無が決まる。tell/ask/want は距離あり→to あり。make/let/help は距離なし→to なし。</span>","e":"Mother <b>told me to</b> come home.（母に帰って来なさいと言われた）\nShe <b>asked me to</b> help her.（彼女に手伝ってと頼まれた）"},{"gr":"中2","t":"動名詞（〜ing＝〜すること）","d":"動詞にingをつけて名詞化。主語・目的語・前置詞の後で使う。<span class=\"gref-warn\">⚠️ enjoy/finish/stop/mindの後は<b>必ず動名詞</b>！ × enjoy to play → ○ enjoy <b>playing</b></span><span class=\"gref-tip\">💡 前置詞(for/at/in/of/about/without)の後も必ず〜ing！<br>Thank you for <b>helping</b> me. / be good at <b>playing</b></span><span class=\"gref-tip\">💡 <b>両方OKな動詞</b>：<b>like / love / start / begin / continue</b> は <b>to も -ing も</b>使える！<br>I like <b>playing</b> tennis. = I like <b>to play</b> tennis.</span><span class=\"gref-rel\">🔍 <b>不定詞(to)と動名詞(ing)の使い分けの背景</b>：<br>・<b>不定詞(to)</b>は「これから向かう」＝<b>未来・希望・可能性</b>。だから want to / hope to / decide to のように<b>これからの行動</b>と相性◎<br>・<b>動名詞(ing)</b>は「現に起きている／経験している」＝<b>現実・経験・習慣</b>。だから enjoy / finish / stop のように<b>すでに/いま行っている行動</b>と相性◎<br><br>📐 「enjoy to play は変だな」と感じるのは、enjoy（楽しむ）は<b>今やっている経験</b>なのに to で未来を指すからチグハグになるため。<br><br>🎯 like や start は<b>両方OK</b>。「未来寄り」「経験寄り」どちらにも振れる中立的な動詞だから。</span>","e":"<b>Reading</b> books is important.（読書は大切だ）\nI enjoy <b>playing</b> tennis.（テニスを楽しむ）\nThank you for <b>inviting</b> me.（招待ありがとう）"},{"gr":"中2","t":"比較級（-er than / more〜than）","d":"2つを比べて「〜の方が…」。短い語→<b>-er</b>。長い語(famous,interesting等)→<b>more</b>。<br><br>📝 erの付け方：ふつう→er / eで終わる→r / 子音+y→yをiにしてer / 短母音+子音→重ねてer<span class=\"gref-warn\">⚠️ 不規則：good→<b>better</b> / bad→<b>worse</b> / many/much→<b>more</b> / little→<b>less</b></span><span class=\"gref-rel\">🔍 <b>なぜ -er と more の2系統？</b>：英語には<b>2種類の語源</b>が混ざっている。<br><br>📏 <b>短い語（1〜2音節）</b>：tall, big, fast, old など → 古くからの<b>ゲルマン系の英語</b>。短いから語尾に -er をつけても発音しやすい。<br><br>📏 <b>長い語（3音節以上）</b>：beautiful, interesting, important, difficult など → <b>ラテン・フランス系の外来語</b>。長いから -er をつけると言いにくいので、前に more を置く方が自然。<br><br>💡 これは「英語の歴史が二層構造（ゲルマン＋フランス）」だから生まれたルール。<b>1066年のノルマン征服</b>でフランス語が大量に入り込んだ名残。<br><br>📐 <b>境界の語（famous, simple など2音節）</b>は両方使えるものもある。迷ったら「言いやすい方」が正解。</span>","e":"Tom is <b>taller than</b> Ken.（トムはケンより背が高い）\nThis is <b>more interesting than</b> that.（これはあれよりおもしろい）"},{"gr":"中2","t":"最上級（the -est / the most）","d":"3つ以上で「<b>一番</b>〜」。<b>the</b>忘れずに！<br><br>📌 場所→<b>in</b>(in Japan) / 数→<b>of</b>(of all / of the three)<br><span class=\"gref-tip\">💡 <b>最上級の目印3点セット</b>：<br>① <b>the</b>がある ② -est/most ③ <b>in〜/of〜</b><br>→3つ揃ったら最上級確定！</span><br><span class=\"gref-warn\">⚠️ 不規則：good→<b>best</b> / bad→<b>worst</b> / many/much→<b>most</b> / little→<b>least</b></span><span class=\"gref-rel\">🔍 <b>なぜ the が必要？</b>：最上級は「一番〜」と<b>世界に1つに絞り込む</b>表現。<br><br>📐 「the tallest mountain in Japan」＝<b>日本で一番高い山</b>＝富士山ただ1つ。「ある１つ」ではなく「<b>その特定の１つ</b>」だから、定冠詞 <b>the</b>（あの・その）が必須。<br><br>🤝 <b>冠詞カード（#16）と同じ原理</b>：the は「<b>聞き手もどれか特定できる</b>」ときに使う。最上級は世界で1つに絞られるから、誰でも特定できる→ 必ず the。<br><br>🌏 <b>in と of の使い分け</b>：<br>・<b>in</b>＋<b>場所・範囲</b>：in Japan / in the world / in my class（〜の中で）<br>・<b>of</b>＋<b>仲間・グループ</b>：of all / of the three / of us（〜のうちで）<br><br>💡 イメージ：in は「空間の中」、of は「仲間の中から選ぶ」。日本語の「〜で／〜のうちで」と同じ感覚で使い分けられる。<br><br>🎯 <b>不規則変化を含む比較・最上級は丸暗記が最強</b>：good–better–best, bad–worse–worst, many/much–more–most, little–less–least。試験ではこれだけで配点を取れる。</span>","e":"<b>The best</b> food <b>of</b> all.（全部の中で一番おいしい料理）\n<b>The highest</b> mountain <b>in</b> Japan.（日本で一番高い山）"},{"gr":"中2","t":"原級比較（as〜as）","d":"「〜と<b>同じくらい</b>…」。2つのasの間に<b>原級</b>を入れる。<br><br>📌 否定：<b>not as〜as</b>＝「…ほど〜でない」<br><span class=\"gref-tip\">💡 <b>書き換え超頻出</b>！<br>He is <b>not as tall as</b> Ken. = Ken is <b>taller than</b> him.<br>→ 主語が入れ替わる！</span><br><span class=\"gref-warn\">⚠️ asとasの間は<b>必ず原級</b>！-erや-estを入れるな！</span><span class=\"gref-rel\">🔍 <b>as〜as のサンドイッチ構造</b>：2つの as の間に<b>形容詞・副詞の原級</b>をはさむ。<br><br>📐 She is <b>as</b> tall <b>as</b> her mother.（彼女＝母と同じくらい背が高い）<br>・前の as：「<b>同じくらい</b>」（程度を表す副詞）<br>・後ろの as：「<b>〜と</b>」（比較対象を導く接続詞）<br><br>🎯 <b>なぜ原級（変化なし）？</b>：「<b>差がない＝比較で変化させる必要がない</b>」から。<br>・比較級「taller than」＝差がある（より高い）→ 形が変わる<br>・原級「as tall as」＝差がない（同じ）→ 形は変わらないまま<br><br>🔄 <b>否定形 not as〜as の核</b>：「<b>同じには届かない</b>」＝「〜ほど…ではない」。<br>・He is <b>not as</b> tall <b>as</b> Ken.（彼はケンほど高くない＝<b>ケンより低い</b>）<br>・これは <b>Ken is taller than him.</b> と<b>主語を入れ替えて書き換え可能</b>。入試の超頻出書き換え！<br><br>💡 倍数表現も同じ型：<b>twice as 〜 as</b>（2倍）/ <b>three times as 〜 as</b>（3倍）。「as 〜 as」のサンドイッチを土台に倍率を前に置く。</span>","e":"She is <b>as tall as</b> her mother.（彼女は母と同じくらい背が高い）\nHe is <b>not as fast as</b> Ken.（彼はケンほど速くない）"},{"gr":"中2","t":"SVOO（第4文型：人にモノを）","d":"<b>動詞+人+モノ</b>＝「人にモノを〜」<br><br>📌 give/show/teach/tell/send/buy/make<br><span class=\"gref-tip\">💡 <b>書き換え超頻出</b>！<br>give <b>him</b> a book = give a book <b>to him</b><br>buy <b>her</b> a bag = buy a bag <b>for her</b></span><br><span class=\"gref-warn\">⚠️ <b>to</b>：give/show/teach/tell/send<br><b>for</b>：buy/make/cook/get → toかforかで出る！</span><span class=\"gref-rel\">🔍 <b>to と for の使い分けは「動作の性質」で決まる</b>：<br>・<b>to</b>＝<b>「方向」</b>。モノが人に向かって移動する系の動詞。<br>・<b>for</b>＝<b>「相手のため」</b>。相手のベネフィットを生む系の動詞。<br><br>📐 give a book <b>to</b> him.（本＝<b>彼の方へ向かう</b>）：give / show / tell / send / teach / lend …<br><br>📐 buy a bag <b>for</b> her.（バッグを買う＝<b>彼女のため</b>になる）：buy / make / cook / get / find …<br><br>🎯 見分け方：<b>「相手がいなくても成立するか？」</b>で判定できる。<br>・<b>give</b> は相手がいないと成立しない（一方的に渡せない）→ to<br>・<b>buy</b> は相手がいなくても買える（自分のためにも買える）→ for<br><br>💡 「動作のエネルギーが直接相手に届く」のが to、「動作の結果が相手の利益になる」のが for。</span>","e":"She <b>gave me a present</b>.（彼女は私にプレゼントをくれた）\nPlease <b>show me your ticket</b>.（チケットを見せてください）"},{"gr":"中2","t":"SVOC（第5文型：OをCにする）","d":"<b>動詞+O+C</b>＝「OをCにする/呼ぶ」。<b>O=C</b>の関係が成り立つ！<br><br>📌 <b>call</b> him Ken（彼をケンと呼ぶ／him=Ken）/ <b>make</b> me happy（私を幸せにする／me=happy）<br><br>📌 <b>name</b> the dog Pochi（その犬をポチと名づける）/ <b>keep</b> the room clean（部屋をきれいに保つ）<br><span class=\"gref-tip\">💡 O=Cの確認が入試での見分けポイント！</span><span class=\"gref-rel\">🔍 <b>SVOC の核は「O＝C」</b>：O と C の間に<b>イコール関係</b>が成り立つ。<br><br>📐 We call him <b>Ken</b>.（私たちは彼をケンと呼ぶ）← <b>him＝Ken</b><br><br>📐 This song makes me <b>happy</b>.（この歌は私を幸せにする）← <b>me＝happy</b><br><br>📐 Keep the room <b>clean</b>.（部屋をきれいに保つ）← <b>the room＝clean</b><br><br>🆚 <b>SVOO（第4文型）との見分け</b>：これが入試の頻出ポイント。<br>・SVOO：give him a book ← <b>him≠a book</b>（彼は本ではない、別物）<br>・SVOC：call him Ken ← <b>him＝Ken</b>（同じ人を指す）<br><br>🎯 <b>動詞の意味から見分ける</b>：<br>・SVOOの動詞：give/show/tell/teach/send/buy（「人にモノを渡す・伝える」系）<br>・SVOCの動詞：call/name/make/keep/find/leave（「人やモノをある状態にする・呼ぶ」系）<br><br>🌱 <b>C には形容詞・名詞</b>：be動詞の後と同じ。be 動詞も「主語＝C」を作る動詞（#33 SVC）。SVOC は<b>「目的語＝C」を作る</b>と考えると、SVCの仲間だとわかる。<br><br>💡 <b>受動態にすると O が主語に</b>：He is called Ken.（彼はケンと呼ばれる）／I was made happy.（私は幸せにされた）。SVOC の構造を知っていると受動態への変換もスムーズ。</span>","e":"We <b>call</b> him <b>Ken</b>.（私たちは彼をケンと呼ぶ）\nThis song <b>makes</b> me <b>happy</b>.（この歌は私を幸せにする）"},{"gr":"中2","t":"第2文型 SVC（look / become など＋補語）","d":"S＋V＋C で「S＝C」「SがCになる」。Cには be動詞のあとと同じく<b>形容詞・名詞</b>が来る。<br><br>📝 状態：look（〜に見える）/ sound（〜に聞こえる）/ feel（〜の感じ）/ taste / smell<br><br>📝 変化：become / get / turn（〜になる）<br><br>📌 You look happy.（楽しそうに見える）/ That sounds good.（よさそうだね）/ It got dark.（暗くなった）/ She became a doctor.（彼女は医者になった）<br><br>⚠️ うしろは<b>形容詞</b>（副詞ではない！）×You look happily → ○You look happy<br><br>💡 主語＝補語の関係（you＝happy）。SVOO/SVOCと違い目的語はない！<span class=\"gref-rel\">🔍 <b>SVCはbe動詞の親戚</b>：「主語＝補語」の関係を作る動詞たち。<br><br>📐 She <b>is</b> happy.（彼女＝幸せ）← be動詞の基本形<br><br>📐 She <b>looks</b> happy.（彼女＝幸せに見える）← looksがisの代わり<br><br>📐 He <b>became</b> a doctor.（彼＝医者になった）← 状態変化のis<br><br>🤝 つまり <b>look / sound / feel / smell / taste / become / get / turn</b> は、全部<b>be動詞の進化形</b>と考えると分かりやすい。「ただの＝」じゃなく、<b>五感を通じた＝</b>や<b>変化の＝</b>を表す。<br><br>💡 <b>うしろが形容詞の理由</b>：be動詞の後ろが形容詞・名詞（She is <b>happy</b>）なのと同じ。「She looks happily」が×なのは、be動詞も「She is happily」と言わないのと同じ理由。<b>「＝」の右側</b>には<b>形容詞や名詞</b>が来る。<br><br>🆚 SVOO（人にモノを）やSVOC（OをCにする）と違って、<b>目的語がない</b>のが特徴。</span>","e":"You look happy.（あなたは幸せそうに見える）\nThat sounds interesting.（おもしろそうだね）\nIt got dark.（暗くなった）\nHe became famous.（彼は有名になった）"},{"gr":"中2","t":"受動態（be動詞+過去分詞）","d":"「〜される/された」。<b>be動詞+過去分詞</b>（+by〜）。<br>過去分詞は受動態・現在完了・名詞修飾で使う超重要な形！<span class=\"gref-tip\">💡 頻出連語丸暗記：be interested <b>in</b> / be surprised <b>at</b> / be known <b>to</b> / be made <b>of</b>（材料が見たままわかる：a desk made <b>of</b> wood）/ be made <b>from</b>（原料が変化して見た目ではわからない：wine made <b>from</b> grapes）/ be covered <b>with</b> / be filled <b>with</b> / be born</span><span class=\"gref-rel\">🔍 <b>なぜbe+過去分詞？</b>：<b>過去分詞</b>は本来「〜された（状態）」を表す<b>形容詞のような働き</b>を持つ動詞の形。たとえば broken window（壊れた窓）の broken は過去分詞。<br><br>📐 つまり「The window <b>is broken</b>.（窓は壊された状態だ）」は、<b>be＋形容詞</b>と同じ構造。「The window is open.（窓は開いている）」の open が broken に置き換わっただけ。<br><br>🔁 だから受動態は<b>「動作を受けた結果の状態」</b>を表す。過去形（He broke it.「壊した」）は動作そのものを指すのに対し、受動態は「壊された状態」に焦点。<br><br>👀 視点の切り替え：「だれがしたか」より「何が起きたか／されたか」を主役にしたいときに使う表現。</span>{{TPL:be}}{{TPL:irreg}}","e":"English <b>is spoken</b> in many countries.（英語は多くの国で話されている）\nI <b>am interested in</b> manga.（私は漫画に興味がある）"},{"gr":"中2","t":"感嘆文（What a〜! / How〜!）","d":"<table class=\"gref-tbl\"><tr><th>パターン</th><th>構造</th><th>例</th></tr><tr><td><b>What</b></td><td>What (a)+形容詞+名詞!</td><td>What a nice day!</td></tr><tr><td><b>How</b></td><td>How+形容詞/副詞!</td><td>How beautiful!</td></tr></table><span class=\"gref-tip\">💡 名詞があればWhat / なければHow</span><span class=\"gref-rel\">🔍 <b>What と How の選び方の核</b>：<br>・<b>What</b>＋<b>名詞</b>（修飾語＋名詞）：<b>What</b> a beautiful flower!（なんて美しい花！）<br>・<b>How</b>＋<b>形容詞・副詞だけ</b>：<b>How</b> beautiful!（なんて美しい！）<br><br>🎯 ポイントは「<b>後ろに名詞があるか</b>」だけ。名詞があれば What、なければ How。<br><br>📐 同じ内容を両方で表せる：<br>・<b>What</b> a fast runner he is!（彼はなんて速いランナーなんだ！）← runner（名詞）あり<br>・<b>How</b> fast he runs!（彼はなんて速く走るんだ！）← 形容詞・副詞のみ<br><br>🌱 <b>本来は文の一部の強調</b>：「He is a very fast runner.」の very の部分を「なんて〜なんだ！」と強調するのが感嘆文。very を<b>What や How に置き換えて文頭に持ってくる</b>のがカラクリ。<br><br>💡 <b>What の a/an</b>：単数の数えられる名詞には a/an が必要：<b>What a</b> nice day! ／ 複数や不可算には不要：<b>What</b> beautiful flowers! / <b>What</b> nice weather!<br><br>🚫 <b>主語+動詞は省略OK</b>：くだけた会話では「How nice!」「What a pity!」のように <b>he is / it is</b> を省くことが多い。意味は文脈で伝わる。</span>","e":"<b>What a</b> beautiful flower<b>!</b>（なんて美しい花！）\n<b>How</b> fast<b>!</b>（なんて速いの！）"},{"gr":"中2","t":"助動詞②（should・依頼・提案）","d":"後ろは必ず<b>動詞の原形</b>。気持ちや判断を加える。<table class=\"gref-tbl\"><tr><th>表現</th><th>意味</th></tr><tr><td><b>should</b></td><td>〜すべき・したほうがいい</td></tr><tr><td><b>must</b>(推量)</td><td>〜にちがいない</td></tr><tr><td><b>may</b></td><td>〜してよい／〜かもしれない</td></tr><tr><td><b>Will/Can you?</b></td><td>〜してくれる？（依頼）</td></tr><tr><td><b>Would/Could you?</b></td><td>〜していただけますか（丁寧）</td></tr><tr><td><b>Shall I?</b></td><td>〜しましょうか（申し出）</td></tr><tr><td><b>Shall we?</b></td><td>（一緒に）〜しましょう</td></tr></table><span class=\"gref-tip\">💡 <b>would like to</b>＝want to の丁寧版。I'd like to 〜（〜したいのですが）</span><span class=\"gref-warn\">⚠️ <b>Shall I 〜?</b> → Yes, please. / No, thank you.<br><b>Shall we 〜?</b> → <b>Yes, let's. / No, let's not.</b></span><span class=\"gref-rel\">🔍 <b>助動詞はぜんぶ「話し手の気持ち」を加える道具</b>：動作の内容（動詞）はそのままに、その動作に対する<b>判断・感情・態度</b>を上乗せする。<br>・<b>should</b>＝「〜すべき」（mustより<b>柔らかい義務感・助言</b>）<br>・<b>must</b>＝強い確信・必要性<br>・<b>may</b>＝許可／可能性<br><br>🤝 中1で習った can / will と同じ仲間。<b>「気持ちを担当する助動詞」＋「動作を担当する動詞の原形」</b>の分担制。<br><br>💡 <b>過去形にすると丁寧になる理由</b>：Can → Could、Will → Would。これは仮定法と同じ原理で、<b>過去形＝現実から距離</b>＝「もしお願いできるとしたら…」と<b>遠回しに頼む</b>感じになり、丁寧さが出る。だから Could you 〜? / Would you 〜? は超丁寧表現。</span>","e":"You <b>should</b> see a doctor.（医者に診てもらうべきだ）\n<b>Could you</b> open the window?（窓を開けていただけますか）\n<b>Shall I</b> help you? — Yes, please.（手伝いましょうか—お願いします）"},{"gr":"中2","t":"have to/must/don't have to/must not","d":"must＝have to＝「〜しなければならない」。三単現は <b>has to</b>。<br><br>⚠️ 否定は意味が真逆！ <b>must not</b>＝「〜してはいけない（禁止）」／<b>don't have to</b>＝「〜しなくてよい（不要）」<br><br>⚠️ must に過去・未来形はない → 過去は <b>had to</b>、未来は <b>will have to</b><br><br>❓ have to の疑問・否定は do/does：Does she <b>have to</b> go? / She doesn't <b>have to</b> go.<br><br>💡 ニュアンス：must＝話し手の強い気持ち／have to＝周りの事情・ルール<span class=\"gref-rel\">🔍 <b>must と have to の根本的な違い</b>：<br>・<b>must</b>＝<b>自分の中から湧き上がる必要性</b>。「絶対やるんだ！」という話し手の強い気持ち。<br>・<b>have to</b>＝<b>外からの事情・ルール</b>に迫られている。「やらなきゃいけない状況だ」。<br><br>📐 例：「I must call her.」（彼女に絶対電話する！←自分の意志）／「I have to call her.」（電話しないといけない←義務・約束）<br><br>🔄 <b>否定が真逆になる理由</b>：<br>・<b>must not</b>＝「強い気持ちで〜するな」＝禁止<br>・<b>don't have to</b>＝「〜する事情がない」＝不要<br><br>💡 同じ「〜しなければならない」の否定なのに意味がひっくり返るのは、<b>否定する対象（強い気持ち vs 事情）が違う</b>から。</span>","e":"You <b>don't have to</b> come.（来なくてもいい）\nYou <b>must not</b> run here.（走るな！）"},{"gr":"中2","t":"数量を表す語（some/any・many/much）","d":"「いくつ・どれくらい」を表す語。<b>可算</b>（数えられる）か<b>不可算</b>（数えられない）かで使い分ける！<table class=\"gref-tbl\"><tr><th></th><th>数えられる</th><th>数えられない</th></tr><tr><td>たくさんの</td><td><b>many</b> books</td><td><b>much</b> water</td></tr><tr><td>少しある</td><td><b>a few</b> books</td><td><b>a little</b> water</td></tr><tr><td>ほとんどない</td><td><b>few</b> books</td><td><b>little</b> water</td></tr></table><span class=\"gref-warn\">⚠️ <b>some↔any</b>：肯定文は<b>some</b> / 疑問文・否定文は<b>any</b>！ ただし<b>依頼・勧誘</b>はsome → Would you like <b>some</b> tea?</span><span class=\"gref-tip\">💡 <b>a</b>があると「少しある」/ <b>a</b>がないと「ほとんどない」→意味が逆！ <b>a lot of</b>はmany/much両方の代わりに使える</span><span class=\"gref-rel\">🔍 <b>some と any の使い分けの本質</b>：<br>・<b>some</b>＝<b>「ある」と確信</b>している雰囲気。肯定文で使う。<br>・<b>any</b>＝<b>「あるかどうか分からない」</b>雰囲気。疑問文・否定文で使う。<br><br>📐 I have <b>some</b> books.（本がいくつかある＝持っているのは確実）<br><br>📐 Do you have <b>any</b> books?（本が「ある？／ないかも？」と尋ねる）<br><br>📐 I don't have <b>any</b> books.（1冊も持っていない＝<b>any＝どれも</b>の否定で「ゼロ」）<br><br>🎯 <b>例外：依頼・勧誘の疑問文では some</b>：<br>・Would you like <b>some</b> tea?（お茶はいかが？）<br>・なぜ？→ 相手に<b>「ある」前提で勧める</b>ニュアンスだから。「いかが？」は「飲んでね」に近い肯定的な誘い。<br><br>🔄 <b>a few / a little vs few / little</b>：<br>・<b>a</b> がある＝<b>「少しある」</b>（ポジティブ）：I have <b>a few</b> friends.（友達が少しいる）<br>・<b>a</b> がない＝<b>「ほとんどない」</b>（ネガティブ）：I have <b>few</b> friends.（友達がほとんどいない）<br><br>💡 たった1文字の有無で意味が真逆になる。<b>「a」が安心のサイン</b>と覚えると忘れない。</span>","e":"I have <b>some</b> questions. — Do you have <b>any</b> questions?（質問がある／ある？）\nThere is <b>little</b> water.（水はほとんどない）\nI have <b>a few</b> friends.（友達が少しいる）"},{"gr":"中2","t":"比較の発展（最上級の言いかえ）","d":"最上級・比較級を使った頻出の言いかえ。<table class=\"gref-tbl\"><tr><th>表現</th><th>意味</th></tr><tr><td>one of the+<b>最上級</b>+<b>複数</b></td><td>最も〜な…の1つ</td></tr><tr><td>比較級+<b>than any other</b>+単数</td><td>他のどの…より〜</td></tr><tr><td>the+比較級, the+比較級</td><td>〜すればするほど…</td></tr><tr><td>比較級 and 比較級</td><td>だんだん〜</td></tr></table><span class=\"gref-warn\">⚠️ one of the の後は<b>複数形</b>！ one of the <b>tallest boys</b> ／ than any other の後は<b>単数形</b>！ than any other <b>boy</b></span><span class=\"gref-tip\">💡 「一番〜」は最上級だけでなく <b>比較級+than any other</b> でも言える（整序で頻出）</span><span class=\"gref-rel\">🔍 <b>「一番〜」を別の角度から表現する技</b>：最上級だけが「一番〜」を表すわけではない。複数の言い回しを使い分けられると、英語の表現力が一気に増す。<br><br>📐 「富士山は日本で一番高い」を3通りで：<br>・最上級：Mt. Fuji is <b>the highest</b> mountain in Japan.<br>・比較級＋than any other：Mt. Fuji is <b>higher than any other</b> mountain in Japan.<br>・否定＋as〜as：<b>No</b> mountain in Japan is <b>as high as</b> Mt. Fuji.<br><br>🎯 <b>後ろが単数・複数のルール</b>：<br>・<b>one of the 最上級＋複数</b>：「最も〜なうちの<b>1つ</b>」→ 仲間が複数いるから複数形：one of the tallest <b>boys</b>（複数の背の高い男子の中の1人）<br>・<b>比較級＋than any other＋単数</b>：「他のどの<b>1つ</b>より〜」→ 一対一で比べるから単数形：than any other <b>boy</b>（他のどの男子1人より）<br><br>🌱 <b>the+比較級, the+比較級</b>「〜すればするほど…」の語源：もとは「the(その分) 比較級…the(その分) 比較級」という古い英語の名残。日本語の「〜ほど…ほど」と同じ感覚で使える。<br><br>💡 これらの言い換えパターンは<b>整序問題で頻出</b>。「one of the／than any other／no 〜 as〜as」を見たら最上級系と判断できると速い。</span>","e":"Tokyo is <b>one of t
