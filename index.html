he largest cities</b> in the world.（世界最大級の都市の1つ）\nHe runs <b>faster than any other</b> student.（他のどの生徒より速く走る）\n<b>The more</b> you read, <b>the more</b> you learn.（読むほど学べる）"},{"gr":"中2","t":"相関接続詞（both A and B など）","d":"2つのものを結ぶペアの接続詞。<table class=\"gref-tbl\"><tr><th>表現</th><th>意味</th></tr><tr><td><b>both A and B</b></td><td>AもBも両方</td></tr><tr><td><b>either A or B</b></td><td>AかBのどちらか</td></tr><tr><td><b>neither A nor B</b></td><td>AもBも〜ない</td></tr><tr><td><b>not only A but also B</b></td><td>AだけでなくBも</td></tr></table><span class=\"gref-warn\">⚠️ <b>動詞の数</b>に注意！ both A and B→<b>複数</b>扱い／either・neither・not only…but also→<b>Bに合わせる</b></span><span class=\"gref-tip\">💡 not only A but also B = B as well as A（書き換え）</span><span class=\"gref-rel\">🔍 <b>「ペアで結ぶ接続詞」の家族関係</b>：4つの相関接続詞は意味でグループ分けすると覚えやすい。<br>・<b>両方OK系</b>：both A and B（AもBも両方）<br>・<b>選ぶ系</b>：either A or B（AかBのどちらか）<br>・<b>両方ダメ系</b>：neither A nor B（AもBも〜ない）← either の否定版<br>・<b>追加系</b>：not only A but also B（AだけでなくBも）<br><br>🎯 <b>動詞の単数・複数（最頻出ポイント）</b>：<br>・<b>both A and B</b> → 2人いるから<b>複数扱い</b>：Both Ken and Tom <b>are</b> kind.<br>・他の3つ（either/neither/not only…but also）→ <b>Bに合わせる</b>（Bが単数なら is、複数なら are）：<br>　Either Tom or his brothers <b>are</b> coming.（Bが複数→ are）<br>　Either his brothers or Tom <b>is</b> coming.（Bが単数→ is）<br><br>🔄 <b>書き換え</b>：<br>・not only A but also B = B <b>as well as</b> A（語順がひっくり返るので注意！）<br>・neither A nor B = not A and not B（両方を否定）<br><br>💡 <b>nor の正体</b>：neither の「n」は否定、nor も否定の or。「<b>nか、nか</b>」と2回否定することで「どちらでもない」を作る。</span>","e":"<b>Both</b> Ken <b>and</b> Tom <b>are</b> kind.（ケンもトムも親切だ）\nHe can speak <b>not only</b> English <b>but also</b> French.（英語だけでなくフランス語も話せる）"},{"gr":"中2","t":"used to（以前は〜だった）","d":"<b>used to+動詞の原形</b>＝「<b>以前はよく〜した</b>／昔は〜だった」（今はもう違う、という含み）。<br><br>📌 I <b>used to</b> play soccer.（昔はよくサッカーをした）<span class=\"gref-warn\">⚠️ 形が似て意味が違う3つに注意！ <b>used to</b>+原形＝以前は〜した／<b>be used to</b>+〜ing形＝〜に慣れている／<b>be used</b>＝使われる（受動態）</span><span class=\"gref-tip\">💡 過去の状態は <b>used to be</b>。There <b>used to be</b> a shop here.（昔ここに店があった）</span><span class=\"gref-rel\">🔍 <b>used to は「過去の習慣・状態」専用</b>：<b>「以前は〜していた／だった」</b>＝<b>今はもう違う</b>という含意。<br><br>📐 I <b>used to</b> play soccer.（昔はよくサッカーをした＝<b>今はもうしていない</b>）<br><br>📐 There <b>used to be</b> a shop here.（昔ここに店があった＝<b>今はもうない</b>）<br><br>🆚 <b>過去形との違い</b>：<br>・過去形「I played soccer yesterday.」＝<b>過去の1回の出来事</b>（昨日サッカーをした）<br>・used to「I used to play soccer.」＝<b>過去の習慣・継続的状態</b>（昔はよくやっていた）<br><br>🚫 <b>形が似てて意味が真逆の3つ</b>：これが入試の最大の引っかけ！<br>・<b>used to + 動詞の原形</b>（以前は〜していた）：I <b>used to play</b> soccer.<br>・<b>be used to + 動詞のing形</b>（〜に慣れている）：I <b>am used to playing</b> soccer.<br>・<b>be used + by</b>（使われる＝受動態）：This pen <b>is used by</b> him.<br><br>🎯 <b>見分け方</b>：to の後ろが<b>動詞の原形</b>なら「以前は〜」、<b>動詞のing形</b>なら「〜に慣れている」、be 動詞があれば受動態の可能性。<br><br>💡 <b>be used to の「to」は前置詞</b>：だから後ろは名詞か動名詞（ing）。不定詞の to（後ろは原形）とは別物。これが混乱の原因。</span>","e":"I <b>used to</b> live in Tokyo.（以前は東京に住んでいた）\nShe is <b>used to</b> getting up early.（早起きに慣れている）"},{"gr":"中2","t":"再帰代名詞（myself / yourself）","d":"<b>〜self（単数）/ 〜selves（複数）</b>＝「〜自身を」。主語＝目的語のとき使う。<table class=\"gref-tbl\"><tr><th>主語</th><th>再帰代名詞</th></tr><tr><td>I / you</td><td>myself / yourself</td></tr><tr><td>he / she / it</td><td>himself / herself / itself</td></tr><tr><td>we / they</td><td>ourselves / themselves</td></tr></table><span class=\"gref-tip\">💡 頻出熟語：<b>by oneself</b>（ひとりで／自分で）/ <b>enjoy oneself</b>（楽しむ）/ <b>help yourself</b>（ご自由にどうぞ）</span><span class=\"gref-rel\">🔍 <b>なぜ「自分自身」が必要？</b>：英語は<b>主語と目的語が同じ時</b>、それを<b>明示する必要がある</b>。<br><br>📐 × I hurt me.（不自然）<br><br>📐 ○ I hurt <b>myself</b>.（自分を傷つけた）<br><br>🤝 日本語でも「自分を傷つけた」と「自分」を入れる感覚と同じ。「私は私を傷つけた」と言うと変だけど「自分を傷つけた」は自然。<br><br>💡 <b>頻出熟語の感覚</b>：<br>・<b>by oneself</b>（一人で／自力で）：「<b>自分自身に頼って</b>」のニュアンス<br>・<b>enjoy oneself</b>（楽しむ）：「<b>自分自身を楽しませる</b>」＝楽しい時間を過ごす<br>・<b>help yourself</b>（ご自由にどうぞ）：「<b>自分自身を助ける</b>」＝自分で取って食べて／飲んで<br><br>🌏 多くの言語に同じ仕組みがある。フランス語・ドイツ語・スペイン語でも「自分自身」を表す代名詞が存在する。</span>","e":"I made it <b>myself</b>.（私が自分で作った）\nHe did his homework <b>by himself</b>.（彼は自分で宿題をやった）\nPlease help <b>yourself</b>.（ご自由にお取りください）"},{"gr":"中3","t":"現在完了：経験（have+過去分詞）","d":"「〜したことがある」。<table class=\"gref-tbl\"><tr><th>用法</th><th>キーワード</th><th>意味</th></tr><tr><td><b>⭐経験</b></td><td>ever/never/once/twice/before</td><td>〜したことがある</td></tr><tr><td>完了</td><td>just/already/yet</td><td>もう〜した</td></tr><tr><td>継続</td><td>for/since</td><td>ずっと〜している</td></tr></table><span class=\"gref-warn\">⚠️ have <b>been to</b>〜＝行ったことがある(今ここにいる)<br>have <b>gone to</b>〜＝行ってしまった(もうここにいない)<br>→ 意味が全然違う！入試超頻出の引っかけ！</span><span class=\"gref-rel\">🔍 <b>現在完了と過去形の本質的な違い</b>：<br><br>📍 <b>過去形</b>は「過去の<b>点</b>」を指す。「I went there yesterday.」は<b>その時のこと</b>だけを言っていて、今とは切れている。<br><br>📈 <b>現在完了</b>は「過去から今への<b>線</b>」。「I have been there.」は<b>過去の経験が今の自分にある</b>状態を表す。今の自分について語っている。<br><br>💡 だから現在完了は<b>「今どうなっているか」</b>を伝える時制。経験（今までに〜した自分がいる）、完了（もう〜し終えた状態）、継続（今もまだ続いている）— 全部「今」とつながっている。<br><br>🚫 <b>yesterday / last year / 〜ago と一緒に使えない理由</b>：これらは「過去の特定の点」を指す語。現在完了は「点」ではなく「線」なので、点を指定する語と組み合わせるとチグハグになる。</span>{{TPL:be}}{{TPL:irreg}}","e":"I have <b>never been</b> to Hokkaido.（北海道に一度も行ったことがない）\nHave you <b>ever</b> eaten soba?（そばを食べたことある？）"},{"gr":"中3","t":"現在完了：完了（have+過去分詞）","d":"「<b>もう〜した/ちょうど〜したところ</b>」<br><br>📌 キーワード：<b>just</b>（ちょうど）/ <b>already</b>（もう・肯定文）/ <b>yet</b>（疑問文＝もう / 否定文＝まだ）<br><span class=\"gref-tip\">💡 <b>yetの使い分け</b>が出る！<br>疑問：Have you finished <b>yet</b>?（<b>もう</b>終わった？）<br>否定：I haven't finished <b>yet</b>.（<b>まだ</b>終わってない）</span><br><span class=\"gref-warn\">⚠️ alreadyの位置：have <b>already</b> done（haveと過去分詞の間！）</span><span class=\"gref-rel\">🔍 <b>完了用法の核</b>：「<b>動作が終わって、その結果が今に残っている</b>」。<br><br>📐 The bus <b>has just left</b>.（バスはちょうど出た→だから<b>今ホームにバスはない</b>）<br><br>📐 I <b>have finished</b> my homework.（宿題終わった→だから<b>今は自由</b>）<br><br>🆚 <b>過去形との違い</b>：<br>・過去形「The bus left an hour ago.」＝<b>1時間前に出た</b>（その時の事実だけ。今は関係ない）<br>・完了「The bus has just left.」＝<b>たった今出た（今もその影響が続いている）</b><br><br>💡 だから <b>just / already / yet</b> は「今との繋がり」を示すサイン語。これらが出てきたら現在完了。<br><br>🎯 <b>3つの用法はすべて「今に繋がる」が共通</b>：経験（今までに〜した自分がいる）、完了（今〜し終わったところ）、継続（今もまだ続いている）。</span>","e":"The bus has <b>just</b> left.（バスがちょうど出たところ）\nHave you finished <b>yet</b>?（もう終わった？）"},{"gr":"中3","t":"現在完了：継続（have+過去分詞）","d":"「<b>ずっと〜している</b>」<br><br>📌 <b>for+期間</b>（for 3 years）/ <b>since+起点</b>（since 2020）/ <b>How long 〜?</b><br><span class=\"gref-tip\">💡 <b>forとsince</b>の見分け：<br>for＋<b>数字を含む期間</b>（for 3 years / for a long time）<br>since＋<b>始まりの時点</b>（since 2020 / since I was a child）</span><br><span class=\"gref-warn\">⚠️ 状態動詞(know/live/be)→現在完了<br>動作動詞(study/run)→<b>現在完了進行形</b>！</span><span class=\"gref-warn\">⚠️ <b>yesterday / last year / 〜ago</b>と一緒には使えない！<br>× I have lived here <b>yesterday</b> → ○ I <b>lived</b> here yesterday<br>→ 過去の特定の時点には<b>過去形</b>を使う！</span><span class=\"gref-rel\">🔍 <b>継続用法の核</b>：「<b>過去のある時点から始まって、今もずっと続いている</b>」。<br><br>📐 I <b>have lived</b> here for 10 years.（10年前から住み始めて、<b>今も住んでいる</b>）<br><br>🆚 <b>過去形との違い</b>：<br>・過去形「I lived in Tokyo.」＝<b>東京に住んでいた</b>（今は住んでいない）<br>・継続「I have lived in Tokyo for 10 years.」＝<b>10年前から今も</b>東京に住んでいる<br><br>🤝 <b>状態動詞限定の理由</b>：live, know, be, like などは<b>状態</b>を表す動詞。「ずっとその状態」が自然。<br><br>🏃 一方、study, run, play は<b>動作</b>動詞。「ずっと走り続けている」は<b>現在完了進行形</b>（have been running）で表す。状態は「ある」、動作は「し続けている」と区別する。<br><br>💡 for + 期間 / since + 起点 のセット。日本語の「〜から」「〜の間」と同じ感覚。</span>","e":"I have lived here <b>for</b> ten years.（ここに10年住んでいる）\nFriends <b>since</b> 2020.（2020年からの友達）"},{"gr":"中3","t":"現在完了進行形（have been〜ing）","d":"「<b>ずっと〜し続けている</b>」。<b>動作</b>の継続に使う。<br><br>📌 I have <b>been studying</b> for 3 hours.（3時間ずっと勉強している）<br><span class=\"gref-tip\">💡 使い分け：<b>状態</b>動詞(know/live/be)→現在完了 / <b>動作</b>動詞(study/run)→現在完了進行形</span><br><span class=\"gref-warn\">⚠️ for/sinceと一緒に使う点は継続用法と同じ！</span><span class=\"gref-rel\">🔍 <b>現在完了進行形と現在完了「継続」の使い分け</b>：両方とも「ずっと〜している」を表すが、対応する動詞が違う。<br>・<b>現在完了の継続</b>（have+過去分詞）→ <b>状態動詞</b>と相性◎<br>・<b>現在完了進行形</b>（have been+ing）→ <b>動作動詞</b>と相性◎<br><br>📐 <b>状態動詞</b>：live, know, be, like, love, have（持つ）など<br>・I <b>have lived</b> here for 10 years.（10年住んでいる←「住んでいる状態」がずっと）<br><br>📐 <b>動作動詞</b>：study, run, play, work, wait, rain など<br>・I <b>have been studying</b> for 3 hours.（3時間勉強し続けている←「勉強する動作」がずっと）<br><br>🎯 <b>なぜ進行形になる？</b>：状態は「ある」だけで時間が流れる。動作は「やる」を続けると進行形になる。<br>・「ずっと住んでいる」＝ずっと状態が続く＝ have lived（進行形にしない）<br>・「ずっと勉強し続けている」＝動作を継続中＝ have been studying（be+ing で「進行中」を表す）<br><br>🌱 <b>2つの完了形が組み合わさった形</b>：have＋過去分詞（完了）＋be＋ing（進行）＝「過去から今までずっと進行中」。<br><br>💡 for / since の使い方は継続用法と同じ。「for 3 years」「since 2020」と組み合わせる。</span>","e":"I have <b>been studying</b> for 3 hours.（3時間ずっと勉強している）\nIt has <b>been raining</b> since morning.（朝からずっと雨が降っている）"},{"gr":"中3","t":"現在分詞の後置修飾（〜ing）","d":"名詞を後ろから「<b>〜している○○</b>」と説明。<br><br>📌 the boy <b>playing</b> tennis（テニスをしている少年）/ the girl <b>singing</b> on the stage（ステージで歌っている少女）<br><span class=\"gref-warn\">⚠️ 進行形と間違えるな！<br>進行形：The boy <b>is playing</b> tennis.（文の動詞）<br>後置修飾：The boy <b>playing</b> tennis <b>is</b> my friend.（名詞を修飾）</span><br><span class=\"gref-tip\">💡 〜ing（している）vs 過去分詞（された）の使い分けが入試に出る！</span><span class=\"gref-rel\">🔍 <b>進行形と何が違う？</b>：実はどちらも ing は「〜している」という同じ意味。<b>役割の違い</b>だけ。<br><br>📐 <b>進行形</b>「The boy <b>is playing</b> tennis.」では、be動詞 is が「今その状態だ」と<b>断言する文の核</b>になる。<br><br>📐 <b>後置修飾</b>「The boy <b>playing</b> tennis is my friend.」では、ing だけが残って「〜している」という<b>飾り（形容詞）</b>として名詞 boy にくっつく。文の核は別にある（is my friend）。<br><br>🌱 つまり <b>ing は元々「〜している状態」を表す形容詞的な部品</b>。<b>be動詞とセット</b>になれば進行形、<b>名詞の後ろ</b>に置けば後置修飾。<b>同じ部品の使い回し</b>なんだ。<br><br>💡 だから「The boy playing tennis」と「The boy is playing tennis」は意味は重なるけど、役割（飾りか文か）が違う。</span>","e":"The man <b>playing</b> the guitar is my brother.（ギターを弾いている男の人は私の兄だ）\nThe boy <b>running</b> over there is my friend.（あそこで走っている男の子は友達だ）"},{"gr":"中3","t":"過去分詞の後置修飾","d":"名詞を後ろから「<b>〜された○○</b>」と説明。<br><br>📌 a book <b>written</b> in English（英語で書かれた本）/ the picture <b>taken</b> by him（彼が撮った写真）/ the city <b>called</b> Naha（那覇という都市）<br><span class=\"gref-tip\">💡 超頻出パターン丸暗記！<br><b>made in</b>〜（〜製）/ <b>written in</b>〜（〜語で書かれた）/ <b>spoken in</b>〜 / <b>called</b>〜（〜と呼ばれる）</span><br><span class=\"gref-warn\">⚠️ <b>過去分詞+by〜（〜によって）</b>を見たら受動態か後置修飾！</span><span class=\"gref-rel\">🔍 <b>受動態と何が違う？</b>：過去分詞は<b>「〜された状態」を表す形容詞的な部品</b>。<br><br>📐 <b>受動態</b>「The book <b>is written</b> in English.」は、be動詞 is とセットで「〜された状態にある」と<b>文の核</b>を作る。<br><br>📐 <b>後置修飾</b>「a book <b>written</b> in English」は、written だけで名詞 book にくっつく<b>飾り</b>。文の核は別にある。<br><br>🤝 <b>ing と過去分詞は能動／受動のペア</b>：<br>・the boy <b>playing</b> tennis（テニスをしている少年）← 自分でやる側<br>・the book <b>written</b> by him（彼によって書かれた本）← される側<br><br>💡 これは中3で習う関係代名詞（who plays / which was written）の<b>短縮形</b>とも言える。後置修飾を理解しておくと、関係代名詞がスッと入る。</span>","e":"a book <b>written</b> in English（英語で書かれた本）\nthe city <b>called</b> Naha（那覇と呼ばれる都市）"},{"gr":"中3","t":"関係代名詞の主格（who/which/that）","d":"<table class=\"gref-tbl\"><tr><th></th><th>人</th><th>モノ・動物</th><th>両方OK</th></tr><tr><td><b>主格</b></td><td>who</td><td>which</td><td>that</td></tr><tr><td><b>目的格</b></td><td>who(m)<span style=\"font-size:10px;opacity:.65;display:block;line-height:1.2;margin-top:2px\">※whomは発展</span></td><td>which</td><td>that(省略可)</td></tr><tr><td><b>所有格</b></td><td colspan=\"3\">whose</td></tr></table>名詞を後ろから文で説明。(　)の直後に<b>動詞</b>が来たら→<b>主格</b>。<br>人→<b>who</b> / モノ・動物→<b>which</b> / どちらでもOK→<b>that</b><span class=\"gref-tip\">💡 見分けテク：(　)の後が動詞→主格 / (　)の後が主語+動詞→目的格</span><span class=\"gref-rel\">🔍 <b>なぜ日本語と語順が逆？</b>：日本語は<b>修飾語→名詞</b>の順で説明する（「英語を話す＋友達」）。英語は<b>名詞→修飾語</b>の順（friend + who speaks English）。これは英語が<b>「まず話題を出してから補足する」</b>言語だから。<br><br>📐 <b>関係代名詞の正体は「2つの文をつなぐ接着剤」</b>：<br>① I have a friend.<br>② He speaks English.（彼は英語を話す）<br>→ ②の主語 He を <b>who</b>（＝「その人」）に置き換えて、①の friend の<b>すぐ後ろにつなぐ</b>。<br>→ I have a friend <b>who</b> speaks English.<br><br>💡 つまり who / which は<b>「人／モノを指す代名詞」と「文をつなぐ接続詞」の二刀流</b>。だから「関係＋代名詞」と呼ばれる。<br><br>🎯 <b>主格＝置き換えた語が「主語」</b>だったとき。He → who、It → which。</span>{{TPL:pron}}","e":"a friend <b>who speaks</b> English（英語を話す友達）\nthe cat <b>which was</b> born last week（先週生まれた猫）"},{"gr":"中3","t":"関係代名詞の目的格（省略可能）","d":"(　)の後に<b>主語+動詞</b>→<b>目的格</b>！<b>省略できる</b>！<br><br>📌 the book (which) <b>I bought</b>（私が買った本）/ the girl (whom) <b>he likes</b>（彼が好きな少女）<br><span class=\"gref-tip\">💡 <b>省略の見分け</b>：名詞のすぐ後に主語+動詞→関係代名詞が省略！<br>This is the cake <b>my mother made</b>.</span><br><span class=\"gref-warn\">⚠️ 整序で最頻出！関係代名詞節の後に<b>本文の動詞</b>が来る！</span><span class=\"gref-rel\">🔍 <b>なぜ目的格は省略できる？</b>：英語には<b>「名詞のすぐ後ろに〈主語＋動詞〉が来たら、それは前の名詞を説明している」</b>という暗黙のルールがある。<br><br>📐 例：「the book I bought」を見たら、「book という名詞の後ろにいきなり I（主語）＋bought（動詞）が来た→これは『私が買った本』だな」と<b>誰でも推測できる</b>。だから which/that がなくても誤解しない。<br><br>🚫 <b>主格は省略できない理由</b>：「the friend speaks English」だと「友達は英語を話す」という<b>普通の文に見えてしまい</b>、これが修飾なのか文なのか区別できない。主格 who/which を置くことで「ここから修飾だよ」と<b>明示する必要がある</b>。<br><br>💡 つまり省略の可否は<b>「省略しても意味がわかるかどうか」</b>で決まっている。英語の合理的なルール。</span>{{TPL:pron}}","e":"the camera <b>(which) my father gave</b> me（父がくれたカメラ）\nThis is the song <b>(that) I like</b> the most.（これは私が一番好きな歌だ）"},{"gr":"中3","t":"関係代名詞の所有格（whose）","d":"<b>whose</b>＝「〜の」。人にもモノにも使える。<br><br>📌 the boy <b>whose</b> father is a doctor（父親が医者の少年）/ the house <b>whose</b> roof is red（屋根が赤い家）<br><span class=\"gref-tip\">💡 見分け：(　)の後に<b>名詞</b>→<b>whose</b>！<br>who→後に動詞 / which→後に動詞 / <b>whose→後に名詞</b></span><br><span class=\"gref-warn\">⚠️ whose ≠ who's(=who is) 音は同じで意味が違う！</span><span class=\"gref-rel\">🔍 <b>whose の正体</b>：「<b>誰の〜</b>」「<b>その〜の</b>」を関係代名詞にした形。所有格 his/her/its の代わり。<br><br>📐 2文を1文にする：<br>① I know a boy.（私はある少年を知っている）<br>② <b>His</b> father is a doctor.（彼の父は医者だ）<br>→ <b>His</b> を <b>whose</b> に変えて a boy のうしろにつなぐ：<br>→ I know a boy <b>whose</b> father is a doctor.（父親が医者の少年を知っている）<br><br>🎯 <b>見分け方が他と違う</b>：<br>・<b>who / which</b> の後ろ → <b>動詞</b>（主格だから）<br>・<b>目的格 who(m)/which</b> の後ろ → <b>主語＋動詞</b>（省略可能）<br>・<b>whose</b> の後ろ → <b>名詞</b>（所有格だから、必ず「持ち物の名詞」が続く）<br><br>🤝 <b>人にもモノにも使える</b>：所有格は who（人専用）/ which（モノ専用）と違って、whose は<b>両方に使える</b>。<br>・the boy <b>whose</b> father is a doctor（人）<br>・the house <b>whose</b> roof is red（モノ）<br><br>⚠️ <b>whose ≠ who's</b>：音は同じ「フーズ」だが、who's は who is の短縮形。リスニングや会話で混同しやすい要注意ペア。</span>{{TPL:pron}}","e":"a boy <b>whose</b> father is a doctor（父親が医者の男の子）\nthe cat <b>whose</b> eyes are blue（青い目の猫）"},{"gr":"中3","t":"too〜to…（〜すぎて…できない）","d":"<b>too+形容詞+to+動詞</b>＝「〜<b>すぎて</b>…<b>できない</b>」<br><br>📌 too tired <b>to</b> study（疲れすぎて勉強できない）<br><span class=\"gref-tip\">💡 <b>書き換え超頻出！</b><br>too〜to… = <b>so〜that can't…</b><br>too tired to study = so tired that I can't study</span><br><span class=\"gref-warn\">⚠️ not〜enough to…も書き換えパターン！</span><span class=\"gref-rel\">🔍 <b>too の正体</b>：too は本来<b>「〜すぎる」というネガティブニュアンス</b>。「many books」はたくさんの本（中立）だけど「too many books」は<b>多すぎる本</b>（問題）。<br><br>📐 <b>too + 形容詞 + to do</b>の構造：<br>・「too tired」＝<b>疲れすぎ</b>（ネガティブ）<br>・「to study」＝<b>勉強するには／勉強する方向に</b><br>・合わせて＝「勉強するには疲れすぎ」＝勉強できない<br><br>💡 つまり<b>「too（〜すぎる）＋ to（〜には）」</b>を組み合わせるだけで、文法ルールを覚えなくても<b>「〜できない」という否定の結果が自然に表れる</b>。<br><br>🔄 <b>so〜that…can't との書き換え</b>：意味は同じだが too〜to は短く言える便利な形。逆に so〜that は that のあとに「主語＋動詞」が来るので情報量を増やせる。</span>","e":"I'm <b>too tired to</b> study.（疲れすぎて勉強できない）\nThis box is <b>too heavy to</b> carry.（この箱は重すぎて運べない）\nHe is tall <b>enough to</b> reach the shelf.（彼は棚に手が届くほど背が高い）"},{"gr":"中3","t":"原形不定詞（help/make/let+人+原形）","d":"<b>make/let/help+人+動詞の原形</b>（toなし！）<table class=\"gref-tbl\"><tr><th>動詞</th><th>意味</th><th>例</th></tr><tr><td><b>make</b></td><td>〜させる（強制）</td><td>make him clean</td></tr><tr><td><b>let</b></td><td>〜させてあげる（許可）</td><td>let me go</td></tr><tr><td><b>help</b></td><td>〜を手伝う</td><td>help me carry</td></tr></table><span class=\"gref-warn\">⚠️ tell/ask/wantは<b>to必要</b>！ make/let/helpは<b>toなし</b>！</span><span class=\"gref-tip\">💡 <b>知覚動詞</b>(see/hear/feel)も〈人＋動詞の原形〉！<br>I <b>saw him enter</b> the room.（彼が入るのを見た）<br>I <b>heard someone call</b> my name.（誰かが名前を呼ぶのを聞いた）</span><span class=\"gref-rel\">🔍 <b>なぜtoがない？</b>：toは本来「〜に向かって」という<b>距離</b>のニュアンスを持つ語。tell/ask/wantは「言って→相手が動く」「頼んで→相手が動く」と<b>ワンクッション</b>あるからto（向かう先）が必要。一方make/let/helpは「直接させる／させてあげる／手伝う」と<b>相手と動作がぴったりくっついている</b>から、距離を表すtoは不要なんだ。<br><br>👁️ <b>知覚動詞も同じ理由</b>：「見る・聞く・感じる」は<b>その場で直接体験</b>すること。「彼が入る<b>のを</b>見た」は、入る動作と見る動作が同時進行。距離感がないからtoは入らない。</span>","e":"Please <b>help me carry</b> this.（これを運ぶのを手伝って）\nMy mother <b>made me clean</b> my room.（母に部屋を掃除させられた）\nI <b>saw him run</b> fast.（彼が速く走るのを見た）"},{"gr":"中3","t":"間接疑問文","d":"疑問の内容を文中に入れる。<b>疑問詞+主語+動詞</b>（普通の語順に戻す！）<br><br>📌 I know <b>where he lives</b>.（彼がどこに住んでいるか知っている）/ Tell me <b>what you want</b>.（何がほしいか教えて）<br><span class=\"gref-warn\">⚠️ <b>語順ひっくり返る</b>のが最大のポイント！<br>普通：Where <b>does</b> he live?<br>間接：where he <b>lives</b> ← doesが消えてsが戻る！</span><br><span class=\"gref-tip\">💡 <b>疑問詞が主語のとき</b>は〈疑問詞＋動詞〉！主語は入れない。<br>I know <b>who broke</b> the window.（誰が割ったか）<br>Do you know <b>who made</b> this cake?（誰が作ったか）<br>→ doは入れず、動詞の形もそのまま（3単現のsも残る）</span><br><span class=\"gref-tip\">💡 <b>Yes/Noで答える疑問文</b>を入れるときは <b>if / whether</b>「〜かどうか」！<br>Is he busy? → I don't know <b>if</b> he <b>is</b> busy.<br>I'm not sure <b>whether</b> it's true (<b>or not</b>).</span><br><span class=\"gref-tip\">💡 疑問詞+to+動詞もセット！<br>what to buy / how to get there / where to go<br><br>⚠️ <b>why to〜は存在しない</b>！</span><span class=\"gref-rel\">🔍 <b>なぜ語順を「ふつう」に戻す？</b>：疑問文の語順（Do you 〜? / Where does he 〜?）は<b>相手に問いかけるとき</b>の形。<br><br>📐 でも間接疑問文では「彼がどこに住んでいるか」は<b>もう問いかけではなく、ひとつの情報のかたまり</b>として文の中に組み込まれる。<br><br>📐 比較：<br>・ふつうの疑問文：<b>Where does he live?</b>（君に問いかけている）<br>・間接疑問文：I know <b>where he lives</b>.（情報として組み込まれている。「彼の住んでいる場所」というひとかたまり）<br><br>💡 問いかけの語順は不要になるから、<b>ふつうの文の語順（主語＋動詞）に戻す</b>。<br><br>🎯 <b>疑問詞が主語のとき例外</b>：「Who broke it?」は<b>もともと疑問詞＝主語</b>で語順がふつう文と同じ。だからそのまま間接化できる（I know who broke it.）。do も入らない、s も消えない。</span>","e":"Do you know <b>where he lives</b>?（彼がどこに住んでいるか知ってる？）\nI know <b>who broke</b> the window.（誰が窓を割ったか知っている）\nI don't know <b>if</b> she <b>will come</b>.（彼女が来るかどうかわからない）"},{"gr":"中3","t":"疑問詞＋不定詞（how to / what to）","d":"<b>疑問詞＋to＋動詞の原形</b>＝「何を・どこで・いつ・どうやって〜すべきか」<table class=\"gref-tbl\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td><b>how to</b></td><td>〜の<b>しかた</b></td><td>how to make a cake</td></tr><tr><td><b>what to</b></td><td><b>何を</b>〜すべきか</td><td>what to buy</td></tr><tr><td><b>where to</b></td><td><b>どこで</b>〜すべきか</td><td>where to go</td></tr><tr><td><b>when to</b></td><td><b>いつ</b>〜すべきか</td><td>when to start</td></tr></table><span class=\"gref-warn\">⚠️ <b>why to〜は存在しない</b>！whyだけは使えない！</span><span class=\"gref-rel\">🔍 <b>疑問詞＋to＋動詞の原形</b>＝「<b>〜すべきか</b>」というひとかたまりの名詞句として、動詞の目的語などに使われる。<br><br>📐 比較で見るとわかりやすい：<br>・I don't know <b>what I should do</b>.（間接疑問文＝主語＋助動詞＋動詞）<br>・I don't know <b>what to do</b>.（疑問詞＋不定詞＝短く言える便利形）<br>→ 主語が省かれてシンプルになる<b>会話・記述で頻出の表現</b>。<br><br>🚫 <b>why to が存在しない理由</b>：他の疑問詞は「何を／どこで／いつ／どうやって」と<b>具体的な動作を含む</b>から、to + 動詞と相性◎。<br>・what to <b>buy</b>（何を買うか）／how to <b>get</b>（どう行くか）／where to <b>go</b>（どこへ行くか）<br>・しかし why（なぜ）は「<b>動作を尋ねるのではなく理由を尋ねる</b>」言葉。「なぜ〜すべきか」は意味的に「すべきか」よりも「理由」に焦点が当たるため、英語では <b>why to</b> を使わず、必ず<b>間接疑問文</b>（why I should do）で表す。<br><br>💡 中学英語の例外として確実に覚えるべきポイント。他はすべて「疑問詞 to」OK、why だけがNG。</span>","e":"I don't know <b>how to</b> get there.（そこへの行き方がわからない）\nPlease tell me <b>what to</b> do.（何をすべきか教えて）"},{"gr":"中3","t":"付加疑問文","d":"「〜ですよね？」と確認。<b>肯定→否定の付加 / 否定→肯定の付加</b><br><br>📌 You are a student, <b>aren't you</b>?（あなたは学生ですよね？）<br><br>📌 He can't swim, <b>can he</b>?（彼は泳げないですよね？）<br><span class=\"gref-tip\">💡 <b>作り方3ステップ</b>：<br>①肯定文→付加は<b>否定</b>。否定文→付加は<b>肯定</b><br>②主語を<b>代名詞</b>に(Tom→he)<br>③be動詞/助動詞をそのまま。一般動詞→do/does/did</span><br><span class=\"gref-warn\">⚠️ Let's→<b>shall we</b>? / 命令文→<b>will you</b>?</span><span class=\"gref-rel\">🔍 <b>なぜ反対形？</b>：付加疑問文は「念押し」「確認」の表現だから、<b>同じ形を繰り返さず「反対」</b>にすることで、確認のトーンを出している。<br><br>📐 You are a student, <b>aren't you</b>?（あなたは学生だ＋ですよね？）<br>・前半「You are a student」＝<b>自分の認識</b>を伝える<br>・後半「aren't you?」＝<b>反対の形で確認</b>＝「違うかな？」と相手に投げかける<br><br>🤝 もし「You are a student, are you?」と同じ形を繰り返すと<b>強調・驚きの意味</b>になってしまう。<b>反対にすることで「念押し・同意求め」のニュアンス</b>が生まれる。<br><br>🌏 日本語の「〜だよね？」「〜じゃない？」と同じ機能。<br><br>💡 <b>イレギュラー</b>：Let's〜は<b>shall we?</b>（勧誘への確認）、命令文は<b>will you?</b>（依頼に変える）。これも「2回目の表現で違う角度から確認」する共通パターン。</span>","e":"You are a student, <b>aren't you</b>?（あなたは学生ですよね？）\nTom likes pizza, <b>doesn't he</b>?（トムはピザが好きだよね？）"},{"gr":"中3","t":"仮定法過去","d":"「もし〜なら…だろうに」＝<b>現実と反対</b>を想像。<br><br>📌 <b>If+過去形, 主語+would/could+原形</b><br><span class=\"gref-warn\">⚠️ be動詞は主語に関係なく<b>were</b>！<br>× If I was → ○ If I <b>were</b></span><br><span class=\"gref-tip\">💡 見分け：過去形なのに「今の話」→<b>仮定法</b>！<br>If I <b>had</b> money, I <b>could</b> buy it.<br>→hadは過去形だけど「今」の話→仮定法！</span><span class=\"gref-rel\">🔍 <b>なぜ過去形なのに「今」の話？</b>：英語の過去形は実は<b>2つの役割</b>を持つ。<br><br>📐 ①<b>時間的な過去</b>：昨日のこと、去年のこと<br><br>📐 ②<b>現実からの距離</b>：あり得ないこと、想像の話<br><br>💡 「I had a million dollars.」と言われたら、ふつう「<b>今は持っていない</b>」とわかる。過去形を使うことで<b>「今の現実とは違う＝想像の話」</b>という距離感が自然に出る。<br><br>🌏 これは多くの言語に共通する仕組み。日本語でも<b>「もし宝くじが当たっ<b>たら</b>…」</b>と過去形（た形）を使うのと同じ感覚！<br><br>🚫 <b>be動詞は were だけ</b>：「If I were 〜」は、ふつうなら「I was」となるところを<b>あえて were にすることで「これは想像です」というシグナル</b>を強く出している。仮定法の特別な印。<br><br>📚 <b>発展：過去のことを仮定するときは「had+過去分詞」</b>：「もしあのとき〜していたら」と<b>過去の事実に反する仮定</b>は <b>If + 主語 + had + 過去分詞</b> で表す（仮定法過去完了）。教科書でも例文「If I had not met you, I would not be here.（もし出会わなかったら、今ここにいない）」のように、過去の仮定 ＋ 今の結果を組み合わせた形が出てくることがある。中学では深入りせず「<b>had + 過去分詞 が出てきたら過去のIF</b>」と知っておけばOK。</span>{{TPL:be}}","e":"If I had money, I <b>could</b> buy it.（お金があれば買えるのに）\nIf I <b>were</b> you, I <b>would</b> study harder.（もし私があなたなら、もっと勉強するのに）"},{"gr":"中3","t":"I wish+仮定法","d":"<b>I wish+主語+過去形</b>＝「〜だったら<b>いいのになぁ</b>」（現実は違う）<br><br>📌 I wish I <b>could</b> fly.（飛べたらいいのに）<br><br>📌 I wish I <b>were</b> taller.（背が高かったらなぁ）<br><span class=\"gref-tip\">💡 <b>I wish I could〜</b>は整序で頻出！丸暗記！</span><br><span class=\"gref-warn\">⚠️ hope（実現可能）≠ wish（実現不可能）<br>I <b>hope</b> it will be sunny. / I <b>wish</b> I were a bird.</span><span class=\"gref-rel\">🔍 <b>wish と hope の使い分けの本質</b>：両方「願う」と訳せるが、現実への距離が違う。<br>・<b>hope</b>＝<b>実現可能</b>な希望（現実とつながっている）<br>・<b>wish</b>＝<b>実現困難・不可能</b>な願望（現実と切れている）<br><br>📐 I <b>hope</b> it <b>will be</b> sunny tomorrow.（明日晴れるといいな←可能性あり）<br><br>📐 I <b>wish</b> I <b>were</b> a bird.（鳥だったらなぁ←現実ではあり得ない）<br><br>🎯 <b>なぜ wish の後ろは過去形？</b>：仮定法と同じ原理。<b>過去形＝現実からの距離</b>を表す。<br>・「I wish I <b>can</b> fly.」だと「飛べる」が現実っぽくなる<br>・「I wish I <b>could</b> fly.」と過去形にすることで「<b>現実は飛べない</b>」という距離感を出す<br><br>🌏 これは仮定法過去（#57）と同じ仕組み：<b>過去形が「現実とは違う」のサイン</b>。be 動詞は主語に関係なく <b>were</b>。<br><br>💡 <b>整序の頻出形</b>：<br>・I wish I <b>could</b> 〜（〜できたらいいのに）<br>・I wish I <b>were</b> 〜（〜だったらいいのに）<br>・I wish I <b>had</b> 〜（〜を持っていたらいいのに）<br>→ 「現状不可能・現実逆向き」の願望はすべて<b>過去形</b>で表す、と覚えれば応用が利く。</span>","e":"I wish I <b>could</b> fly.（飛べたらいいのに）\nI wish I <b>were</b> taller.（もっと背が高ければなぁ）"},{"gr":"中3","t":"so 〜 that … / such 〜 that …","d":"<b>「とても〜なので…」</b>。原因→結果をつなぐ。<table class=\"gref-tbl\"><tr><th>パターン</th><th>形</th></tr><tr><td><b>so</b></td><td>so+<b>形容詞/副詞</b>+that …</td></tr><tr><td><b>such</b></td><td>such (a)+形容詞+<b>名詞</b>+that …</td></tr></table><span class=\"gref-warn\">⚠️ 後ろが形容詞だけ→<b>so</b> / 名詞があれば→<b>such</b>。 so kind ↔ such a kind person</span><span class=\"gref-tip\">💡 <b>書き換え超頻出！</b> so 〜 that … <b>can't</b> = <b>too 〜 to</b> …<br>He is so tired that he can't walk. = He is too tired to walk.</span><span class=\"gref-rel\">🔍 <b>「程度→結果」を表す家族</b>：英語には「とても〜なので…」を表す表現がいくつかあって、形は違うが<b>意味の核は同じ</b>。<br>・<b>so + 形容詞・副詞 + that …</b>：so tired that I can't walk<br>・<b>such + (a) + 形容詞 + 名詞 + that …</b>：such a kind person that everyone likes him<br>・<b>too + 形容詞 + to do</b>：too tired to walk（次のカード参照）<br>・<b>形容詞 + enough to do</b>：tall enough to reach<br><br>🔄 <b>書き換えのカラクリ</b>：so tired <b>that</b> I <b>can't</b> walk = too tired <b>to</b> walk。否定の意味は too〜to の<b>「to に届かない」</b>感覚で自然に表れる。<br><br>💡 <b>so と such の選び方</b>：後ろが<b>形容詞だけ</b>なら so、<b>形容詞＋名詞</b>なら such。「a kind man」のように<b>名詞のかたまりに修飾する</b>時は such でまとめる。</span>","e":"It was <b>so</b> hot <b>that</b> I couldn't sleep.（とても暑くて眠れなかった）\nShe is <b>such a</b> kind girl <b>that</b> everyone likes her.（とても親切なので皆に好かれる）"},{"gr":"中3","t":"関係副詞（where / when）・what","d":"名詞を後ろから説明する発展形。<table class=\"gref-tbl\"><tr><th>語</th><th>説明する名詞</th><th>例</th></tr><tr><td><b>where</b></td><td>場所</td><td>the town where I live</td></tr><tr><td><b>when</b></td><td>時</td><td>the day when we met</td></tr><tr><td><b>what</b></td><td>（先行詞なし）</td><td>what I want（ほしいもの）</td></tr></table><span class=\"gref-tip\">💡 <b>what</b>＝the thing(s) which。「〜すること・〜するもの」。先行詞がいらない！ This is <b>what</b> I want.（これが私のほしいものだ）</span><span class=\"gref-warn\">⚠️ where/when は教科書により扱いが軽い発展事項。まず関係代名詞 who/which/that を固めてから！</span><span class=\"gref-rel\">🔍 <b>関係副詞は関係代名詞の「場所・時バージョン」</b>：<br>・<b>where</b>＝「その場所で」（in which / at which と同じ）<br>・<b>when</b>＝「その時に」（at which / on which と同じ）<br><br>📐 the town <b>in which</b> I live = the town <b>where</b> I live（私が住んでいる町）<br>→ 「前置詞＋関係代名詞」をスッキリ1語にまとめた<b>便利形</b>。<br><br>🎯 <b>what は特殊</b>：「<b>先行詞を中に含む関係代名詞</b>」。<br>・the thing(s) <b>which</b> I want → <b>what</b> I want（私のほしいもの）<br>・<b>先行詞＋which が一語にまとまった</b>のが what。だから先行詞を別に置く必要がない。<br><br>💡 まとめ：英語は<b>修飾の道具を発展させながら、より簡潔に表現できる形</b>を作ってきた。関係代名詞 → 関係副詞 → what と、後ろに行くほどコンパクト。</span>","e":"This is the house <b>where</b> he lives.（これが彼の住む家だ）\nTell me <b>what</b> you saw.（見たものを教えて）"},{"gr":"中1","t":"動詞 + 前置詞の熟語（look at / listen to）","d":"<b>動詞 + 前置詞</b>のセットで「〜を…する」という意味になる熟語。これらの動詞は単独では目的語をとれず、<b>前置詞があって初めて他動詞のように使える</b>。<table class=\"gref-tbl\"><tr><th>動詞句</th><th>意味</th><th>例</th></tr><tr><td><b>look at</b></td><td>〜を見る</td><td>Look at this.</td></tr><tr><td><b>listen to</b></td><td>〜を聞く</td><td>Listen to me.</td></tr><tr><td><b>wait for</b></td><td>〜を待つ</td><td>Wait for the bus.</td></tr><tr><td><b>look for</b></td><td>〜を探す</td><td>Look for the key.</td></tr><tr><td><b>arrive at</b></td><td>〜に着く</td><td>Arrive at the station.</td></tr><tr><td><b>get to</b></td><td>〜に着く</td><td>Get to school.</td></tr></table><span class=\"gref-warn\">⚠️ <b>look at</b>（意識して見る・atが必要）/ <b>see</b>（自然に目に入る・前置詞なし）/ <b>watch</b>（じっと観察する・前置詞なし）の使い分けが入試超頻出！<br>○ Look <b>at</b> the bird ／ ○ I can <b>see</b> the bird ／ ○ Watch TV</span><span class=\"gref-tip\">💡 これらの動詞は「自動詞」。目的語を取るには<b>前置詞をセットで覚える</b>のがコツ！熟語として丸暗記しよう。</span><span class=\"gref-rel\">🔍 <b>なぜ前置詞が必要？</b>：listen, look, wait などはもともと<b>「動作だけ」を表す自動詞</b>で、後ろに目的語を直接取れない。<br><br>📐 「I listen.」（聞いている）だけでは「何を？」が表せない。「私の話を聞いて」と言いたい時、<b>to me</b>（私の方向に）という<b>方向・対象を示す前置詞</b>が必要になる。<br><br>🤝 つまり前置詞が<b>「動作の方向・対象」を示すパートナー</b>になることで、初めて「〜を聞く」「〜を見る」と表現できる。<br><br>🆚 <b>see / watch との違い</b>：これらは最初から<b>他動詞</b>（目的語を直接取れる）。だから前置詞なしで「I see a bird.」「I watch TV.」と言える。<br><br>💡 listen <b>to</b> / look <b>at</b> / wait <b>for</b> / arrive <b>at</b> ←「動詞＋前置詞」を<b>1つのカタマリ</b>として覚えるのが入試的にも最効率。</span>","e":"<b>Look at</b> this picture.（この絵を見て）\nPlease <b>listen to</b> me.（私の話を聞いて）\nI <b>waited for</b> the bus.（バスを待った）"},{"gr":"中2","t":"句動詞（take off / put on など）","d":"<b>動詞 + 副詞</b>のセットで使う熟語。動詞だけでは想像できない意味になることが多い。<table class=\"gref-tbl\"><tr><th>句動詞</th><th>意味</th><th>例</th></tr><tr><td><b>take off</b></td><td>脱ぐ・離陸する</td><td>Take off your shoes.</td></tr><tr><td><b>put on</b></td><td>身につける</td><td>Put on your jacket.</td></tr><tr><td><b>pick up</b></td><td>拾う・迎えに行く</td><td>I'll pick you up.</td></tr><tr><td><b>turn on</b></td><td>つける</td><td>Turn on the light.</td></tr><tr><td><b>turn off</b></td><td>消す</td><td>Turn off the TV.</td></tr><tr><td><b>get up</b></td><td>起きる</td><td>I get up at 6.</td></tr><tr><td><b>look up</b></td><td>調べる</td><td>Look up the word.</td></tr></table><span class=\"gref-warn\">⚠️ 目的語が<b>代名詞</b>のときは動詞と副詞の<b>間に入れる</b>！<br>○ Take <b>it</b> off ／ × Take off <b>it</b><br>※名詞の目的語ならどちらでもOK：Take off your hat = Take your hat off</span><span class=\"gref-tip\">💡 自動詞+前置詞（look at）との見分け：句動詞は代名詞を<b>間に挟める</b>のが特徴。Look at <b>it</b>（at it のまま）vs Pick <b>it</b> up（it を間に！）</span><span class=\"gref-rel\">🔍 <b>句動詞の正体</b>：動詞＋<b>副詞</b>の組み合わせで、<b>意味が新しい単語に化ける</b>のが特徴。<br>・take（取る）＋ off（離れる）＝ <b>脱ぐ／離陸する</b><br>・pick（つまむ）＋ up（上に）＝ <b>拾う／迎えに行く</b><br>・turn（回す）＋ on（つく）＝ <b>電源を入れる</b><br><br>📐 動詞だけの意味からは想像できない意味になることが多い。だから1つの<b>新しい単語</b>として覚える必要がある。<br><br>🤝 <b>動詞+前置詞（look at）との違い</b>：<br>・<b>句動詞は「動詞＋副詞」</b>：副詞は<b>移動可能</b>。代名詞を間に入れられる（pick <b>it</b> up）。<br>・<b>動詞+前置詞は「動詞＋前置詞」</b>：前置詞は<b>名詞の前から離れない</b>。代名詞を間に入れられない（look <b>at it</b>）。<br><br>💡 文法的な役割（副詞 vs 前置詞）の違いが、語順の柔軟さに現れる。</span>","e":"Please <b>take off</b> your shoes.（靴を脱いでください）\n<b>Turn on</b> the light.（電気をつけて）\nI <b>picked up</b> the pen.（ペンを拾った）"},{"gr":"中3","t":"前置詞句の後置修飾（the book on the desk）","d":"名詞のうしろに<b>前置詞句</b>（on the desk, in the room など）を置いて「<b>〜にある…</b>」「<b>〜の…</b>」と説明する形。<br><br>📌 the book <b>on the desk</b>（机の上の本）/ the man <b>in the car</b>（車の中の男性）<table class=\"gref-tbl\"><tr><th>前置詞</th><th>例</th><th>意味</th></tr><tr><td>on</td><td>the book <b>on</b> the desk</td><td>机の上の本</td></tr><tr><td>in</td><td>the boy <b>in</b> the room</td><td>部屋の中の男の子</td></tr><tr><td>under</td><td>the cat <b>under</b> the chair</td><td>椅子の下の猫</td></tr><tr><td>with</td><td>a girl <b>with</b> blue eyes</td><td>青い目の女の子</td></tr><tr><td>of</td><td>a friend <b>of</b> mine</td><td>私の友達</td></tr><tr><td>from</td><td>a letter <b>from</b> Tom</td><td>トムからの手紙</td></tr></table><span class=\"gref-warn\">⚠️ 日本語と語順が<b>逆</b>！<br>日本語：<b>机の上の</b>本（前から修飾）<br>英語：the book <b>on the desk</b>（後ろから修飾）</span><span class=\"gref-tip\">💡 <b>後置修飾の3兄弟</b>：<b>前置詞句</b> / <b>現在分詞</b>（〜ing）/ <b>過去分詞</b>。すべて名詞の<b>うしろ</b>に置いて説明する形！中3で関係代名詞を習う前の土台になるよ。</span><span class=\"gref-rel\">🔍 <b>英語は「名詞→説明」の順で並べる言語</b>：日本語と逆。<br>・日本語：<b>机の上の</b>本（前から説明）<br>・英語：the book <b>on the desk</b>（後ろから説明）<br><br>📐 <b>後置修飾の4家族</b>（短いものから長いものへ）：<br>① <b>前置詞句</b>：the book <b>on the desk</b>（机の上の本）<br>② <b>現在分詞</b>：the boy <b>playing tennis</b>（テニスをしている少年）<br>③ <b>過去分詞</b>：a book <b>written in English</b>（英語で書かれた本）<br>④ <b>関係代名詞節（中3で習う）</b>：a friend <b>who lives in Tokyo</b>（東京に住んでいる友達）<br><br>🌱 すべて<b>「名詞のうしろから飾る」共通の構造</b>。短いもの（前置詞句）から長いもの（関係代名詞節）まで、英語は一貫してこの順序。<br><br>💡 だから後置修飾に慣れると、関係代名詞もスムーズに入ってくる。</span>","e":"the book <b>on the desk</b>（机の上の本）\nthe boy <b>in the red shirt</b>（赤シャツの男の子）\nThe man <b>by the door</b> is my father.（ドアのそばの男性は父です）"}];

const bookSentences = {"1":[{"b":"Here We Go!","g":1,"u":"U1","en":"I'm Eri.","ja":"わたしはエリです。","ex":"<p>英語で「わたしは〜です」と自分のことを伝えるときの、いちばん最初に覚える基本形だよ。</p>\n<p><strong>「am」は「〜です」にあたる言葉</strong>で、「be動詞」というグループの仲間。be動詞は英語の中でいちばん大切な動詞で、<strong>「主語（だれが）」と「説明（なにか・どんな状態か）」をイコールでつなぐ</strong>のが役割なんだ。</p>\n<p>「I'm Eri.」は「わたし ＝ エリ」という意味。<strong>I'm</strong>は<strong>I am</strong>の短縮形だよ。</p>\n<div class=\"es\"><h5>📝 be動詞は主語で変わる！</h5>\n<table class=\"t\"><tr><th>主語</th><th>be動詞</th><th>短縮形</th></tr><tr><td>I（わたし）</td><td>am</td><td>I'm</td></tr><tr><td>you / we / they</td><td>are</td><td>you're / we're / they're</td></tr><tr><td>he / she / it / 名前1人</td><td>is</td><td>he's / she's / it's</td></tr></table></div>\n<div class=\"tip\">be動詞は「＝（イコール）」のイメージ！「I ＝ Eri」「I ＝ happy」のように、主語と後ろの言葉をつなぐ接着剤の役割だよ。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U1","en":"I'm a student there.","ja":"わたしはそこの生徒です。","ex":"<p>be動詞を使って「わたしは〜です」と<strong>自分の身分や立場</strong>を伝えるパターンだよ。</p>\n<p><strong>a</strong>は「ひとりの」を表す冠詞。student（生徒）のように<strong>数えられる名詞の前</strong>にはa/anをつけるのが英語のルール。</p>\n<div class=\"es\"><h5>📝 a と an の使い分け</h5>\n<table class=\"t\"><tr><th>使い方</th><th>条件</th><th>例</th></tr><tr><td><strong>a</strong></td><td>子音で始まる語の前</td><td>a student, a book</td></tr><tr><td><strong>an</strong></td><td>母音(a,e,i,o,u)で始まる語の前</td><td>an apple, an egg</td></tr></table></div>\n<div class=\"tip\">「there」は「そこ」。場所を表す副詞で、ここでは「そこの（学校の）」というニュアンスだよ。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U1","en":"I'm from Japan.","ja":"わたしは日本出身です。","ex":"<p>自分の<strong>出身地</strong>を伝えるときは<strong>from + 場所</strong>を使うよ。</p>\n<p>I'm <strong>from Japan</strong>. ＝ わたしは<strong>日本出身です</strong>。</p>\n<div class=\"es\"><h5>📝 出身を聞くフレーズ</h5>\n<p><strong>Where are you from?</strong>（どこの出身ですか？）→ I'm from Japan.</p></div>\n<div class=\"tip\">国名や地名は<strong>大文字で始める</strong>のが英語のルール。Japan, Tokyo, Okinawa…固有名詞は常に大文字スタートだよ。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U2","en":"You are a new student.","ja":"あなたは新入生です。","ex":"<p>主語が<strong>you（あなた）</strong>のときは、be動詞は<strong>are</strong>を使うよ。</p>\n<p>You <strong>are</strong> a new student. ＝ あなたは新入生<strong>です</strong>。</p>\n<div class=\"es\"><h5>📝 be動詞の使い分け</h5>\n<table class=\"t\"><tr><th>主語</th><th>be動詞</th></tr><tr><td>I</td><td>am</td></tr><tr><td>you / we / they / 複数</td><td>are</td></tr><tr><td>he / she / it / 名前1人</td><td>is</td></tr></table></div>\n<div class=\"tip\">youは「あなた」だけでなく「あなたたち」の意味もある。どちらの場合もbe動詞はare！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L1","en":"I am Kato Riku.","ja":"わたしは加藤リクです。","ex":"<p>英語で「わたしは〜です」と自分のことを伝えるときの、いちばん最初に覚える基本形だよ。</p>\n\n<p><strong>「am」は「〜です」にあたる言葉</strong>で、「be動詞」というグループの仲間。be動詞は英語の中でいちばん大切な動詞で、<strong>「主語（だれが）」と「説明（なにか・どんな状態か）」をイコールでつなぐ</strong>のが役割なんだ。</p>\n\n<p>「I am Kato Riku.」は「わたし ＝ 加藤リク」という意味。日本語は「わたしは加藤リク<strong>です</strong>」と最後に「です」がくるけど、英語は<strong>主語のすぐあとに動詞がくる</strong>のが最大の違いだよ。</p>\n\n<div class=\"es\"><h5>📝 be動詞は主語で変わる！</h5>\n<p>be動詞は「am / is / are」の3つがあって、<strong>主語によって使い分ける</strong>よ。ここが日本語にはない英語独自のルール。</p>\n<table class=\"t\"><tr><th>主語</th><th>be動詞</th><th>短縮形</th></tr><tr><td>I（わたし）</td><td>am</td><td>I'm</td></tr><tr><td>you / we / they</td><td>are</td><td>you're / we're / they're</td></tr><tr><td>he / she / it / 名前1人</td><td>is</td><td>he's / she's / it's</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 どんなとき使う？</h5><p>自己紹介で名前・年齢・出身・気持ちなどを伝えるときに使うよ。</p><p>I am Riku.（名前）/ I am 13.（年齢）/ I am from Okinawa.（出身）/ I am happy.（気持ち）</p></div>\n\n<div class=\"tip\">be動詞は「＝（イコール）」のイメージ！「I ＝ Kato Riku」「I ＝ happy」のように、主語と後ろの言葉をつなぐ接着剤の役割だよ。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L1","en":"I am not a basketball fan.","ja":"わたしはバスケのファンではありません。","ex":"<p>「〜ではありません」と<strong>否定する</strong>ときは、<strong>be動詞のうしろにnot</strong>を置くだけ！これがbe動詞の否定文のルールだよ。</p>\n\n<p>肯定文：I <strong>am</strong> a fan.<br>\n否定文：I <strong>am not</strong> a fan.</p>\n\n<p>日本語は「ファンでは<strong>ありません</strong>」と文末で否定するけど、英語はbe動詞の<strong>すぐうしろ</strong>にnotを置く。否定語の位置がまったく違うのが日本語との大きな違いだね。</p>\n\n<div class=\"es\"><h5>📝 短縮形も覚えよう</h5>\n<table class=\"t\"><tr><th>肯定</th><th>否定</th><th>短縮形</th></tr><tr><td>I am</td><td>I am not</td><td>I'm not</td></tr><tr><td>you are</td><td>you are not</td><td>you aren't / you're not</td></tr><tr><td>he is</td><td>he is not</td><td>he isn't / he's not</td></tr></table></div>\n\n<div class=\"tip\">be動詞の文を変形するルールは2つだけ！「疑問文→be動詞を文の先頭に」「否定文→be動詞のうしろにnot」。この2パターンをマスターすればbe動詞は完璧！</div>","p":"Part2"}],"2":[{"b":"Here We Go!","g":1,"u":"U1","en":"I like spring.","ja":"わたしは春が好きです。","ex":"<p>英語の動詞には大きく分けて2種類ある。ひとつはbe動詞（am/is/are）、もうひとつがこの<strong>「一般動詞」</strong>だよ。</p>\n<p>一般動詞は<strong>「動作」や「気持ち」を表す言葉</strong>のこと。like（好き）、play（する）、eat（食べる）…ぜんぶ一般動詞。be動詞以外の動詞はぜんぶ一般動詞だと思ってOK！</p>\n<div class=\"es\"><h5>🇯🇵↔🇬🇧 日本語と語順が真逆！</h5>\n<p>日本語：わたしは　春が　好き<strong>です</strong>。（動詞が最後）<br>英語：I　<strong>like</strong>　spring.（動詞がすぐくる！）</p></div>\n<div class=\"tip\">「I like ＋ 好きなもの.」はいちばんシンプルで、いちばんよく使う形だよ！</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U1","en":"I don't like spring.","ja":"わたしは春が好きではありません。","ex":"<p>一般動詞の否定文は<strong>don't + 動詞の原形</strong>で作るよ。don'tは「do not」の短縮形。</p>\n<p>肯定文：I <strong>like</strong> spring.<br>否定文：I <strong>don't like</strong> spring.</p>\n<div class=\"es\"><h5>📝 be動詞と一般動詞の否定文の違い</h5>\n<table class=\"t\"><tr><th>種類</th><th>否定の作り方</th><th>例</th></tr><tr><td>be動詞</td><td>be動詞 + not</td><td>I'm <strong>not</strong> happy.</td></tr><tr><td>一般動詞</td><td>don't + 動詞の原形</td><td>I <strong>don't like</strong> spring.</td></tr></table></div>\n<div class=\"warn\">「I'm not like spring.」は×！likeは一般動詞だからdon'tを使う。be動詞と一般動詞を絶対に混ぜないでね。</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L1","en":"I like music.","ja":"わたしは音楽が好きです。","ex":"<p>英語の動詞には大きく分けて2種類ある。ひとつは前に習った<strong>be動詞（am/is/are）</strong>、もうひとつがこの<strong>「一般動詞」</strong>だよ。</p>\n\n<p>一般動詞は<strong>「動作」や「気持ち」を表す言葉</strong>のこと。like（好き）、play（する・遊ぶ）、eat（食べる）、study（勉強する）、run（走る）など、ぜんぶ一般動詞だよ。be動詞以外の動詞はぜんぶ一般動詞だと思ってOK！</p>\n\n<p>この文では<strong>like</strong>が一般動詞。「わたしは音楽が好きです」と<strong>気持ち</strong>を表しているね。</p>\n\n<div class=\"es\"><h5>🇯🇵↔🇬🇧 日本語と語順が真逆！</h5>\n<p>日本語：わたしは　音楽が　好き<strong>です</strong>。（動詞が最後）<br>英語：I　<strong>like</strong>　music.（動詞がすぐくる！）</p>\n<p>英語の語順は「<strong>だれが → 何する → 何を</strong>」。日本語と動詞の位置が真逆なんだ。最初はヘンに感じるけど、英語はいつもこの順番だから慣れていこう。</p></div>\n\n<div class=\"es\"><h5>📝 ルール</h5><p>主語がI / you / 複数のときは動詞は<strong>そのままの形（原形）</strong>でOK。he/she/名前（1人）のときだけ動詞にsをつける「三単現のs」が必要になるよ（あとで学ぶ）。</p></div>\n\n<div class=\"tip\">「I like ＋ 好きなもの.」はいちばんシンプルで、いちばんよく使う形。好きな食べ物、スポーツ、アニメ…何でも入れて練習してみよう！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L1","en":"I do not practice soccer every day.","ja":"わたしは毎日サッカーを練習しません。","ex":"<p>一般動詞の否定文は、<strong>動詞の前にdo not（don't）を置く</strong>んだ。be動詞の否定（be動詞+not）とは場所が違うから注意しよう。</p>\n\n<p>肯定文：I practice soccer.<br>\n否定文：I <strong>don't</strong> practice soccer.</p>\n\n<p>「don't」は「do not」の短縮形。ふだんの会話やテストではdon'tをよく使うよ。</p>\n\n<div class=\"es\"><h5>📝 be動詞と一般動詞の否定文を比較</h5>\n<p>この2つは中学英語でいちばん混同しやすいポイント！しっかり区別しよう。</p>\n<table class=\"t\"><tr><th>種類</th><th>否定の作り方</th><th>例</th></tr><tr><td>be動詞</td><td>be動詞 + not</td><td>I am <strong>not</strong> happy.</td></tr><tr><td>一般動詞</td><td>don't + 動詞の原形</td><td>I <strong>don't</strong> play soccer.</td></tr></table></div>\n\n<div class=\"warn\">don'tのうしろの動詞は<strong>必ず原形</strong>！「I don't plays」「I don't practiced」は×。don'tがいるから動詞は原形のままでOKなんだ。</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：命令文</h5>\n<p><strong>命令文</strong>は「<strong>〜しなさい</strong>」「<strong>〜するな</strong>」のように、<strong>相手に指示やお願いをする</strong>文だよ。主語（You）を省略して、<strong>動詞の原形で文を始める</strong>のが特徴。</p>\n\n<p>Open your textbook. ＝ 教科書を<strong>開きなさい</strong>。<br>\nDon't run here. ＝ ここで<strong>走るな</strong>。</p>\n\n<div class=\"es\"><h5>📝 命令文の4パターン</h5>\n<table class=\"t\"><tr><th>パターン</th><th>作り方と例</th></tr><tr><td>ふつうの命令</td><td>動詞の原形で始める<br>→ <strong>Sit</strong> down.（座りなさい）</td></tr><tr><td>丁寧なお願い</td><td>Pleaseをつける<br>→ <strong>Please</strong> open the door.（開けてください）</td></tr><tr><td>禁止</td><td>Don't + 動詞の原形<br>→ <strong>Don't</strong> touch it.（さわるな）</td></tr><tr><td>be動詞の命令</td><td>Beで始める<br>→ <strong>Be</strong> quiet.（静かにしなさい）</td></tr></table></div>\n\n<div class=\"warn\">一般動詞の命令文にDoはつけない！「Do open」は×（強調の特殊用法を除く）。いきなり動詞の原形で始めるよ。</div>\n<div class=\"tip\">「Be careful.（気をつけて）」「Be kind.（優しくしなさい）」のようにbe動詞の命令文もテストに出るよ！</div></div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：Let\\'sの文</h5>\n<p><strong>Let's + 動詞の原形</strong>で「<strong>〜しましょう</strong>」「<strong>〜しよう</strong>」という<strong>提案・誘い</strong>の文になるよ。自分も含めて「一緒にやろう！」と相手を誘うときに使うんだ。</p>\n\n<p>Let's play soccer after school. ＝ 放課後サッカーを<strong>しよう</strong>。</p>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<table class=\"t\"><tr><th>答え</th><th>例</th></tr><tr><td>賛成</td><td>Yes, <strong>let's</strong>. / Sure! / Sounds good!</td></tr><tr><td>反対</td><td>No, <strong>let's not</strong>. / Sorry, I can't.</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 書き換え（テスト定番！）</h5>\n<p>Let's 〜. ＝ <strong>Shall we 〜?</strong>（〜しましょうか？）</p>\n<p>Let's play soccer. ＝ <strong>Shall we</strong> play soccer?</p></div>\n\n<div class=\"tip\">「Let's not + 動詞」で「〜するのはやめよう」。Let's not give up.（あきらめないでおこう）。否定はdon'tではなくnotを使うよ。</div></div>","p":"Part2"}],"3":[{"b":"Here We Go!","g":1,"u":"U2","en":"Are you a new student? — Yes, I am. / No, I'm not.","ja":"あなたは新入生ですか？ — はい、そうです。/ いいえ、違います。","ex":"<p>「あなたは〜ですか？」は<strong>be動詞を文の先頭に持ってくる</strong>んだ。</p>\n<p>ふつうの文：You <strong>are</strong> a new student.<br>疑問文：<strong>Are</strong> you a new student<strong>?</strong></p>\n<div class=\"es\"><h5>✅ 答え方</h5>\n<table class=\"t\"><tr><th>質問</th><th>はい</th><th>いいえ</th></tr><tr><td>Are you 〜?</td><td>Yes, I <strong>am</strong>.</td><td>No, I'm <strong>not</strong>.</td></tr><tr><td>Is he 〜?</td><td>Yes, he <strong>is</strong>.</td><td>No, he <strong>isn't</strong>.</td></tr></table></div>\n<div class=\"warn\">Yesの答えでは絶対に短縮しない！「Yes, I'm.」は×。Noのときだけ短縮OK。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L1","en":"Are you a basketball fan? — Yes, I am.","ja":"あなたはバスケのファンですか？ — はい、そうです。","ex":"<p>「あなたは〜ですか？」と相手にたずねるとき、英語では<strong>be動詞を文の先頭に持ってくる</strong>んだ。これが英語の疑問文の基本ルール！</p>\n\n<p>ふつうの文（肯定文）：You <strong>are</strong> a fan.<br>\n疑問文：<strong>Are</strong> you a fan<strong>?</strong></p>\n\n<p>日本語は「〜です<strong>か？</strong>」と語尾に「か」をつけるだけだよね。でも英語は<strong>語順を入れ替える</strong>のがポイント。文末に<strong>?（クエスチョンマーク）</strong>も忘れずにつけよう。</p>\n\n<div class=\"es\"><h5>✅ 答え方（聞かれたbe動詞で返す！）</h5>\n<p>英語では<strong>質問に使われた動詞と同じ種類の動詞で返す</strong>のが鉄則。be動詞で聞かれたらbe動詞で、Do/Doesで聞かれたらdo/doesで返すよ。</p>\n<table class=\"t\"><tr><th>質問</th><th>はい</th><th>いいえ</th></tr><tr><td>Are you 〜?</td><td>Yes, I <strong>am</strong>.</td><td>No, I'm <strong>not</strong>.</td></tr><tr><td>Is he 〜?</td><td>Yes, he <strong>is</strong>.</td><td>No, he <strong>isn't</strong>.</td></tr><tr><td>Are they 〜?</td><td>Yes, they <strong>are</strong>.</td><td>No, they <strong>aren't</strong>.</td></tr></table></div>\n\n<div class=\"warn\">Yesの答えでは絶対に短縮しない！「Yes, I'm.」「Yes, he's.」は×。Noのときだけ短縮OK。</div>\n<div class=\"tip\">答えるときは主語を代名詞に変えよう。「Is Ken happy?」→「Yes, <strong>he</strong> is.」（Kenはheに変わる）</div>","p":"Part2"}],"4":[{"b":"Here We Go!","g":1,"u":"U2","en":"Do you play an instrument? — Yes, I do. / No, I don't.","ja":"あなたは楽器を演奏しますか？ — はい、します。/ いいえ、しません。","ex":"<p>一般動詞の疑問文は<strong>Doを文の先頭に置く</strong>よ。<strong>Doという「お助けマン」</strong>を呼ぶんだ。</p>\n<p>ふつうの文：You <strong>play</strong> an instrument.<br>疑問文：<strong>Do</strong> you <strong>play</strong> an instrument<strong>?</strong></p>\n<div class=\"es\"><h5>📝 be動詞と一般動詞の疑問文の違い</h5>\n<table class=\"t\"><tr><th>種類</th><th>疑問文の作り方</th><th>例</th></tr><tr><td>be動詞</td><td>be動詞を前に出す</td><td><strong>Are</strong> you happy?</td></tr><tr><td>一般動詞</td><td>Doを追加する</td><td><strong>Do</strong> you play?</td></tr></table></div>\n<div class=\"warn\">「Are you play tennis?」は×！一般動詞にはDoを使う。</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L1","en":"Do you practice soccer every day? — Yes, I do.","ja":"あなたは毎日サッカーを練習しますか？ — はい、します。","ex":"<p>一般動詞（like, play, eatなど）の疑問文は、be動詞の疑問文とは作り方がまったく違うよ。一般動詞では<strong>文の先頭に「Do」をつける</strong>んだ。</p>\n\n<p>肯定文：You practice soccer.<br>\n疑問文：<strong>Do</strong> you practice soccer<strong>?</strong></p>\n\n<p>この「Do」は「お助けマン」のようなもの。一般動詞の文を疑問文や否定文にするとき、<strong>Doが助けに来てくれる</strong>イメージだよ。日本語は語尾を「〜しますか？」に変えるだけだけど、英語は先頭にDoを追加するのがルール。</p>\n\n<div class=\"es\"><h5>✅ 答え方（Do/Doesで聞かれたらdo/doesで返す！）</h5>\n<table class=\"t\"><tr><th>質問</th><th>はい</th><th>いいえ</th></tr><tr><td>Do you 〜?</td><td>Yes, I do.</td><td>No, I don't.</td></tr><tr><td>Does she 〜?</td><td>Yes, she does.</td><td>No, she doesn't.</td></tr></table></div>\n\n<div class=\"warn\">be動詞の質問にdoで答えたり、Doの質問にamで答えたりする間違いが多い！「Are you 〜?」にはam/are、「Do you 〜?」にはdoで答える。質問の最初の単語を見て判断しよう。</div>\n<div class=\"tip\">「聞かれた言葉で返す」のがルール！Doで聞かれたらdo、Doesで聞かれたらdoes、Areで聞かれたらam/are。</div>","p":"Part2"}],"5":[{"b":"Here We Go!","g":1,"u":"U3","en":"What do you do during the summer vacation? — I usually visit my grandparents.","ja":"夏休みの間、何をしますか？ — たいてい祖父母を訪ねます。","ex":"<p><strong>What</strong>は「何」を聞く疑問詞。語順は「<strong>疑問詞 + Do/Does + 主語 + 動詞の原形</strong>」だよ。</p>\n<div class=\"es\"><h5>🎯 頻度を表す副詞</h5>\n<table class=\"t\"><tr><th>副詞</th><th>意味</th><th>頻度</th></tr><tr><td>always</td><td>いつも</td><td>100%</td></tr><tr><td>usually</td><td>たいてい</td><td>80%</td></tr><tr><td>often</td><td>よく</td><td>60%</td></tr><tr><td>sometimes</td><td>ときどき</td><td>40%</td></tr><tr><td>never</td><td>一度も〜ない</td><td>0%</td></tr></table></div>\n<div class=\"tip\">頻度の副詞は<strong>一般動詞の前、be動詞の後ろ</strong>に置く。「I <strong>usually</strong> visit」「I <strong>am</strong> usually busy」</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U4","en":"Who's that? — He's a new student.","ja":"あの人は誰ですか？ — 新入生です。","ex":"<p><strong>Who</strong>は「誰」をたずねる疑問詞。<strong>Who's</strong> = Who isの短縮形。</p>\n<div class=\"es\"><h5>📝 Whoの使い方</h5>\n<table class=\"t\"><tr><th>パターン</th><th>例</th><th>意味</th></tr><tr><td>Who is 〜?</td><td>Who is that girl?</td><td>あの女の子は誰？</td></tr><tr><td>Who + 動詞?</td><td>Who plays the piano?</td><td>誰がピアノを弾く？</td></tr></table></div>\n<div class=\"warn\">Who's（Who isの短縮形）とWhose（誰の）は発音が同じ「フーズ」で意味は別物！注意！</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"DL1","en":"Whose pencil case is that?","ja":"あれは誰の筆箱ですか？","ex":"<p><strong>Whose</strong>は「<strong>誰の</strong>」をたずねる疑問詞。持ち主を聞くときに使うよ。</p>\n<div class=\"es\"><h5>📝 Whoseの2つの使い方</h5>\n<table class=\"t\"><tr><th>パターン</th><th>例</th></tr><tr><td>Whose + 名詞 + is 〜?</td><td>Whose pencil case is that?</td></tr><tr><td>Whose is 〜?</td><td>Whose is it?</td></tr></table></div>\n<div class=\"es\"><h5>✅ 答え方（所有代名詞）</h5>\n<table class=\"t\"><tr><th>〜の</th><th>〜のもの</th></tr><tr><td>my</td><td>mine</td></tr><tr><td>your</td><td>yours</td></tr><tr><td>his</td><td>his</td></tr><tr><td>her</td><td>hers</td></tr></table></div>\n<div class=\"warn\">Who's（Who is）とWhose（誰の）は発音が同じ「フーズ」で意味は別物！</div>"},{"b":"Here We Go!","g":1,"u":"DL1","en":"Whose is it?","ja":"それは誰のですか？","ex":"<p>名詞を省略して<strong>Whose is it?</strong>と聞くパターン。「それは誰の（もの）？」という意味。</p>\n<div class=\"tip\">所有代名詞（mine, yours, his, hers…）は名詞の代わりになるから「my bag → mine」のように使えるよ。</div>"},{"b":"Here We Go!","g":1,"u":"U5","en":"Where's the science lab? — It's on the first floor.","ja":"理科室はどこですか？ — 1階にあります。","ex":"<p><strong>Where</strong>は「<strong>どこ</strong>」をたずねる疑問詞。</p>\n<div class=\"es\"><h5>📝 場所を表す前置詞</h5>\n<table class=\"t\"><tr><th>前置詞</th><th>意味</th><th>例</th></tr><tr><td>on</td><td>〜の上に / 〜階に</td><td>on the first floor</td></tr><tr><td>in</td><td>〜の中に</td><td>in the room</td></tr><tr><td>at</td><td>〜に（地点）</td><td>at the station</td></tr><tr><td>near</td><td>〜の近くに</td><td>near the park</td></tr></table></div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U5","en":"Where do you have lunch? — We usually eat in the cafeteria.","ja":"どこでお昼を食べますか？ — たいてい食堂で食べます。","ex":"<p>Whereは一般動詞の文でも使える。「<strong>Where + do/does + 主語 + 動詞?</strong>」の形。</p>\n<div class=\"es\"><h5>📝 Whereの2パターン</h5>\n<table class=\"t\"><tr><th>種類</th><th>例</th></tr><tr><td>be動詞</td><td>Where <strong>is</strong> the library?</td></tr><tr><td>一般動詞</td><td>Where <strong>do</strong> you study?</td></tr></table></div>\n<div class=\"tip\">「cafeteria」は学校や会社のセルフサービス形式の食堂のこと。</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U5","en":"When's your next match? — It's next month.","ja":"次の試合はいつですか？ — 来月です。","ex":"<p><strong>When</strong>は「<strong>いつ</strong>」をたずねる疑問詞。</p>\n<div class=\"es\"><h5>📝 Whenを使った疑問文</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>When is your birthday?</td><td>誕生日はいつ？</td></tr><tr><td>When do you study?</td><td>いつ勉強する？</td></tr></table></div>\n<div class=\"tip\">「next month」「next week」にはtheやinをつけない。そのまま使うよ。</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"U5","en":"When do you practice? — After school and on weekends.","ja":"いつ練習しますか？ — 放課後と週末です。","ex":"<p>Whenも一般動詞の文で使える。「<strong>When + do/does + 主語 + 動詞?</strong>」の形。</p>\n<div class=\"es\"><h5>📝 時を表す表現</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>after school</td><td>放課後</td></tr><tr><td>on weekends</td><td>週末に</td></tr><tr><td>every day</td><td>毎日</td></tr></table></div>\n<div class=\"tip\">曜日・週末には前置詞<strong>on</strong>。時刻には<strong>at</strong>。月・季節には<strong>in</strong>。</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"DL2","en":"Which would you like, tomato spaghetti or basil spaghetti? — I'd like tomato spaghetti, please.","ja":"トマトスパゲッティとバジルスパゲッティ、どちらがいいですか？ — トマトスパゲッティをお願いします。","ex":"<p><strong>Which</strong>は「<strong>どちら・どれ</strong>」を聞く疑問詞。<strong>I'd like 〜</strong>は「〜が欲しいです」の丁寧な言い方。I'd = I wouldの短縮形。</p>\n<div class=\"es\"><h5>📝 注文で使える表現</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>I'd like 〜, please.</td><td>〜をお願いします。</td></tr><tr><td>Can I have 〜?</td><td>〜をもらえますか？</td></tr></table></div>"},{"b":"Here We Go!","g":1,"u":"DL2","en":"How much is it?","ja":"いくらですか？","ex":"<p><strong>How much</strong>は「<strong>いくら</strong>」と値段を聞くときの超定番フレーズ！</p>\n<div class=\"es\"><h5>📝 How much と How many の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>使い方</th></tr><tr><td>How much</td><td>いくら / どのくらい</td><td>値段・量</td></tr><tr><td>How many</td><td>いくつ</td><td>数</td></tr></table></div>"},{"b":"Here We Go!","g":1,"u":"DL2","en":"How many pieces do you want?","ja":"何個欲しいですか？","ex":"<p><strong>How many</strong>は「<strong>いくつ</strong>」と数を聞く表現。うしろには<strong>数えられる名詞の複数形</strong>が来る。</p>\n<div class=\"warn\">How manyのうしろの名詞は<strong>必ず複数形</strong>！「How many book」は×、「How many book<strong>s</strong>」が○。</div>"},{"b":"Here We Go!","g":1,"u":"DL3","en":"What time does the next bus come?","ja":"次のバスは何時に来ますか？","ex":"<p><strong>What time</strong>は「何時に」を聞く疑問表現。主語が三人称単数だから<strong>Does</strong>を使うよ。</p>\n<div class=\"es\"><h5>📝 What timeの使い方</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>What time do you get up?</td><td>何時に起きる？</td></tr><tr><td>What time does the movie start?</td><td>映画は何時から？</td></tr><tr><td>What time is it now?</td><td>今何時？</td></tr></table></div>\n<div class=\"tip\">What timeは<strong>具体的な時刻</strong>、Whenは<strong>もっと広い時期</strong>を聞くよ。</div>"},{"b":"Here We Go!","g":1,"u":"DL4","en":"How can I get to Honcho Station?","ja":"本町駅にはどうやって行けますか？","ex":"<p><strong>How</strong>は「<strong>どうやって</strong>」と方法を聞く疑問詞。「get to + 場所」は「〜に行く」。</p>\n<div class=\"es\"><h5>📝 道案内で使える表現</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>Go straight.</td><td>まっすぐ行って。</td></tr><tr><td>Turn right/left.</td><td>右/左に曲がって。</td></tr></table></div>"},{"b":"Here We Go!","g":1,"u":"DL4","en":"How long does it take from here?","ja":"ここからどのくらいかかりますか？","ex":"<p><strong>How long</strong>は「<strong>どのくらい</strong>」を聞く表現。「it takes + 時間」で「〜かかる」。</p>\n<div class=\"es\"><h5>📝 答え方</h5>\n<p>→ <strong>It takes</strong> about 10 minutes.（約10分かかります。）</p></div>\n<div class=\"tip\">道案内のセット：「How can I get to 〜?」→「How long does it take?」ペアで覚えよう！</div>"},{"b":"New Crown","g":1,"u":"L1","en":"What do you do on weekends?","ja":"あなたは週末に何をしますか？","ex":"<p>英語には「はい／いいえ」では答えられない質問がある。「<strong>何を</strong>食べる？」「<strong>どこに</strong>住んでる？」のように、<strong>具体的な情報を聞く</strong>ときに使うのが<strong>疑問詞</strong>だよ。</p>\n\n<p><strong>What</strong>は「何」という意味の疑問詞。疑問詞は<strong>必ず文の先頭</strong>に置くのがルール。「What do you do on weekends?」は「週末に<strong>何を</strong>しますか？」という意味だね。</p>\n\n<div class=\"es\"><h5>🎯 主な疑問詞一覧</h5>\n<p>疑問詞は6つ覚えれば中学英語はほぼカバーできるよ。</p>\n<table class=\"t\"><tr><th>疑問詞</th><th>意味</th><th>例</th></tr><tr><td>What</td><td>何</td><td>What do you eat?（何を食べる？）</td></tr><tr><td>Who</td><td>誰</td><td>Who is she?（彼女は誰？）</td></tr><tr><td>Where</td><td>どこ</td><td>Where do you live?（どこに住んでる？）</td></tr><tr><td>When</td><td>いつ</td><td>When is the test?（テストはいつ？）</td></tr><tr><td>Why</td><td>なぜ</td><td>Why do you study English?（なぜ英語を勉強する？）</td></tr><tr><td>How</td><td>どのように</td><td>How are you?（元気？）</td></tr></table></div>\n\n<div class=\"warn\">疑問詞の質問に「Yes」「No」で答えるのは絶対NG！「What do you eat?」→「I eat rice.」のように、<strong>具体的な中身</strong>を答えよう。テストで減点されるよ。</div>","p":"Part3"},{"b":"New Crown","g":1,"u":"L1","en":"What music do you like? — I like J-pop.","ja":"あなたはどんな音楽が好きですか？ — わたしはJ-popが好きです。","ex":"<p><strong>What + 名詞</strong>で「<strong>どんな〜</strong>」「<strong>何の〜</strong>」とたずねることができるよ。Whatだけだと「何？」と広く聞いてしまうけど、<strong>名詞をくっつけると質問の範囲をしぼれる</strong>んだ。</p>\n\n<p>What <strong>music</strong> = どんな<strong>音楽</strong> / What <strong>color</strong> = 何<strong>色</strong> / What <strong>sport</strong> = 何の<strong>スポーツ</strong></p>\n\n<div class=\"es\"><h5>✅ 答え方（具体的に！Yes/No は×）</h5>\n<p>疑問詞（What, Who, Whereなど）で聞かれたときは、<strong>Yes/Noではなく具体的な内容で答える</strong>のがルール。</p>\n<table class=\"t\"><tr><th>質問</th><th>○ 正しい答え方</th><th>× ダメな答え方</th></tr><tr><td>What music do you like?</td><td><strong>I like J-pop.</strong></td><td>Yes, I do.</td></tr><tr><td>What sport do you play?</td><td><strong>I play soccer.</strong></td><td>No, I don't.</td></tr></table></div>\n\n<div class=\"warn\">疑問詞で始まる質問にYes/Noで答えるのはテストで確実に減点！聞かれた内容に合った答えを返そう。</div>\n<div class=\"tip\">Whichとの違い：Whatは広い選択肢から聞く、Whichは「AとBのどっち？」のように限られた中から選ぶとき。テストでは「Which do you like, A or B?」のように選択肢つきで出るよ。</div>","p":"Part3"},{"b":"New Crown","g":1,"u":"L3","en":"What is this?","ja":"これは何ですか？","ex":"<p>目の前のものが何かわからないとき、「<strong>これ何？</strong>」と聞く定番表現。短縮形は<strong>What's this?</strong>だよ。</p>\n\n<p>答えるときは<strong>It is 〜.</strong>（It's 〜.）を使う。this/thatではなく<strong>it</strong>で答えるのがルールだったね（Is this 〜? の答え方と同じ）。</p>\n\n<div class=\"es\"><h5>📝 聞き方と答え方</h5>\n<table class=\"t\"><tr><th>質問</th><th>答え方</th></tr><tr><td>What is this?（これ何？）</td><td><strong>It is</strong> a pen.（ペンです。）</td></tr><tr><td>What is that?（あれ何？）</td><td><strong>It is</strong> a shrine.（神社です。）</td></tr></table></div>\n\n<div class=\"es\"><h5>🇯🇵↔🇬🇧 日本語との違い</h5>\n<p>日本語は「ペン<strong>です</strong>」と主語なしでも通じるけど、英語は必ず<strong>It is（It's）</strong>をつけて答えるよ。英語は「主語＋動詞」のセットが必須なんだ。</p></div>\n\n<div class=\"warn\">答えるとき「This is a pen.」「That is a pen.」ではなく「<strong>It is</strong> a pen.」！thisやthatで答えないように注意。</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L3","en":"Who is your favorite character?","ja":"あなたの好きなキャラクターは誰ですか？","ex":"<p><strong>Who</strong>は「<strong>誰</strong>」とたずねる疑問詞。<strong>人について</strong>聞きたいときに使うよ。答えはYes/Noではなく、<strong>具体的な名前や説明</strong>で返そう。</p>\n\n<div class=\"es\"><h5>📝 Whoの使い方パターン</h5>\n<p>Whoにはいくつかの使い方があるよ。</p>\n<table class=\"t\"><tr><th>パターン</th><th>例</th><th>意味</th></tr><tr><td>Who is 〜?</td><td>Who is that girl?</td><td>あの女の子は誰？</td></tr><tr><td>Who + 動詞?</td><td>Who plays the piano?</td><td>誰がピアノを弾く？</td></tr><tr><td>Who do you 〜?</td><td>Who do you like?</td><td>誰が好き？</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 whoが主語になるパターン</h5>\n<p>「<strong>誰が</strong>〜する？」と聞くとき、whoは主語になる。このときwhoは<strong>三人称単数あつかい</strong>で、動詞にsがつくよ。</p>\n<p>Who <strong>plays</strong> the guitar?（誰がギターを弾く？）→ Ken <strong>does</strong>.（ケンです。）</p></div>\n\n<div class=\"warn\">「Who plays?」の答えは「Ken does.」のようにdo/doesで答えればOK。動詞をもう一度繰り返す必要はないよ。</div>","p":"Part3"},{"b":"New Crown","g":1,"u":"L4","en":"Where do you want to go?","ja":"あなたはどこに行きたいですか？","ex":"<p><strong>Where</strong>は「どこ」という意味の疑問詞。<strong>want to + 動詞の原形</strong>は「〜したい」。この2つを組み合わせた「<strong>どこに〜したい？</strong>」という表現だよ。</p>\n\n<p>Where do you want to go? ＝ あなたは<strong>どこに行きたい</strong>ですか？</p>\n\n<p>疑問詞の文の語順は「<strong>疑問詞 + Do/Does + 主語 + 動詞の原形</strong>」。Whereが先頭に来て、あとはDo youの疑問文の形が続くんだ。</p>\n\n<div class=\"es\"><h5>📝 Whereを使った疑問文の例</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>Where do you live?</td><td>どこに住んでる？</td></tr><tr><td>Where does she study?</td><td>どこで勉強する？</td></tr><tr><td>Where did you go?</td><td>どこに行った？</td></tr></table></div>\n\n<div class=\"tip\">want toの口語形「wanna」はテスト・英作文では使わないでね。書き言葉では必ず「want to」と書こう。</div>","p":"Part2"}],"6":[{"b":"New Crown","g":1,"u":"L3","en":"Harry. He is smart. I like him very much.","ja":"ハリーです。彼は頭がいいです。わたしは彼がとても好きです。","ex":"<p>英語の代名詞（I, you, he, sheなど）は、<strong>文中での役割によって形が変わる</strong>んだ。日本語の「彼は／彼を／彼の」と同じで、英語も「he / him / his」と変化するよ。</p>\n\n<p>この文では1文目で「<strong>He</strong> is smart.」（彼<strong>は</strong>賢い）→主語だから<strong>主格のHe</strong>。2文目では「I like <strong>him</strong>.」（彼<strong>を</strong>好き）→動詞のうしろだから<strong>目的格のhim</strong>。同じ「彼」でも位置によって形が変わるんだね。</p>\n\n<table class=\"t\"><tr><th>〜は（主格）</th><th>〜の（所有格）</th><th>〜を/に（目的格）</th><th>〜のもの（所有代名詞）</th></tr>\n<tr><td>I</td><td>my</td><td>me</td><td>mine</td></tr><tr><td>you</td><td>your</td><td>you</td><td>yours</td></tr><tr><td>he</td><td>his</td><td>him</td><td>his</td></tr><tr><td>she</td><td>her</td><td>her</td><td>hers</td></tr><tr><td>it</td><td>its</td><td>it</td><td>—</td></tr><tr><td>we</td><td>our</td><td>us</td><td>ours</td></tr><tr><td>they</td><td>their</td><td>them</td><td>theirs</td></tr></table>\n\n<div class=\"tip\">見分け方は簡単！<strong>主語の位置（動詞の前）→主格</strong>、<strong>動詞や前置詞のうしろ→目的格</strong>、<strong>名詞の前→所有格</strong>。位置で判断しよう。</div>","p":"Part3"}],"7":[{"b":"Here We Go!","g":1,"u":"U4","en":"This is Ms. Thusi. She's our English teacher.","ja":"こちらはトゥシ先生です。彼女は私たちの英語の先生です。","ex":"<p><strong>This is 〜.</strong>は人やものを<strong>紹介する</strong>ときの定番表現。紹介後は名前を<strong>代名詞</strong>に置き換えるのが英語の基本ルール。</p>\n<div class=\"es\"><h5>📝 紹介のパターン</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>This is Ms. Thusi. <strong>She's</strong> our English teacher.</td><td>こちらはトゥシ先生。英語の先生です。</td></tr><tr><td>That's Mr. Hoshino. <strong>He's</strong> our P.E. teacher.</td><td>あちらは星野先生。体育の先生です。</td></tr></table></div>\n<div class=\"tip\">ourは「わたしたちの」。my / your / our / their をセットで覚えよう。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U4","en":"That's Mr. Hoshino. He's our P.E. teacher.","ja":"あちらは星野先生です。彼は体育の先生です。","ex":"<p><strong>That's 〜.</strong>は少し離れた人やものを指して紹介するとき使うよ。This（これ/こちら）が近く、That（あれ/あちら）が遠くを指すんだ。</p>\n<p>That's Mr. Hoshino. ＝ あちらは星野先生です。<br>He's our P.E. teacher. ＝ 彼は体育の先生です。</p>\n<div class=\"tip\">P.E.は「Physical Education（体育）」の略だよ。英語ではよく略語を使うんだ。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U4","en":"Is this our classroom? — Yes, it is. / No, it isn't.","ja":"これはわたしたちの教室ですか？ — はい。/ いいえ。","ex":"<p>this/thatの疑問文は<strong>isを文の先頭に出す</strong>だけ。答えるときは<strong>it</strong>で受ける！</p>\n<div class=\"es\"><h5>✅ 答え方</h5>\n<table class=\"t\"><tr><th>質問</th><th>はい</th><th>いいえ</th></tr><tr><td>Is this 〜?</td><td>Yes, <strong>it</strong> is.</td><td>No, <strong>it</strong> isn't.</td></tr></table></div>\n<div class=\"warn\">「Yes, this is.」は×！答えは必ず<strong>it</strong>を使う。テスト頻出の引っかけ！</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"U4","en":"This is not our classroom.","ja":"これはわたしたちの教室ではありません。","ex":"<p>this/thatの否定文も<strong>be動詞のうしろにnot</strong>を置くだけ。</p>\n<p>肯定文：This <strong>is</strong> our classroom.<br>否定文：This <strong>is not</strong> our classroom. / This <strong>isn't</strong> our classroom.</p>\n<div class=\"tip\">be動詞の否定文はいつでも「be動詞 + not」！主語が何でも同じルール。</div>","p":"Part3"},{"b":"New Crown","g":1,"u":"L3","en":"This is an ice cream shop.","ja":"これはアイスクリーム店です。","ex":"<p><strong>This</strong>は「これ」、<strong>That</strong>は「あれ」。目の前にあるもの（近いもの）を指すときはthis、遠くにあるものを指すときはthatを使うよ。</p>\n\n<p>どちらもbe動詞は<strong>is</strong>を使うんだ。「This is 〜.」「That is 〜.」で「これは〜です」「あれは〜です」になるよ。</p>\n\n<div class=\"es\"><h5>📝 a と an の使い分け</h5>\n<p>名詞の前につける a / an は、<strong>次にくる単語の最初の音</strong>が母音（ア・イ・ウ・エ・オの音）かどうかで決まるよ。</p>\n<p><strong>an</strong> ice cream shop（「i」は母音の音）/ <strong>a</strong> bookstore（「b」は子音の音）</p></div>\n\n<div class=\"tip\">a/anの判断は<strong>つづりではなく発音</strong>で決まる！「an hour」（hは発音しない→母音の音で始まる）、「a university」（uniの発音は「ユ」→子音の音で始まる）のように、音がポイントだよ。</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：these / those（複数形）</h5>\n<p>this（これ）とthat（あれ）には<strong>複数形</strong>がある。近くの複数のものは<strong>these（これら）</strong>、遠くの複数のものは<strong>those（あれら）</strong>だよ。</p>\n\n<p>These are my books. ＝ <strong>これらは</strong>わたしの本です。<br>\nThose are her cats. ＝ <strong>あれらは</strong>彼女の猫です。</p>\n\n<div class=\"es\"><h5>📝 指示代名詞の単数と複数</h5>\n<table class=\"t\"><tr><th></th><th>単数（1つ）</th><th>複数（2つ以上）</th></tr><tr><td>近い</td><td><strong>this</strong>（これ）→ is</td><td><strong>these</strong>（これら）→ are</td></tr><tr><td>遠い</td><td><strong>that</strong>（あれ）→ is</td><td><strong>those</strong>（あれら）→ are</td></tr></table></div>\n\n<div class=\"warn\">複数形になるとbe動詞もareに変わる！「These is」は×。「These <strong>are</strong>」が○。</div>\n<div class=\"tip\">theseやthoseは代名詞だけでなく形容詞としても使えるよ。「<strong>those</strong> dogs（あの犬たち）」のように名詞の前に置くこともできる。</div></div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L3","en":"That is not chocolate ice cream.","ja":"あれはチョコレートアイスではありません。","ex":"<p>this/thatの否定文も、ルールはbe動詞の否定文とまったく同じ。<strong>be動詞のうしろにnot</strong>を置くだけだよ。</p>\n\n<p>肯定文：That <strong>is</strong> chocolate ice cream.<br>\n否定文：That <strong>is not</strong> chocolate ice cream. / That <strong>isn't</strong> chocolate ice cream.</p>\n\n<div class=\"es\"><h5>📝 this/thatの肯定・否定・疑問のまとめ</h5>\n<p>this/thatの文もbe動詞の文なので、変形のしかたはまったく同じだよ。</p>\n<table class=\"t\"><tr><th>形</th><th>例</th></tr><tr><td>肯定文</td><td>This <strong>is</strong> my pen.</td></tr><tr><td>否定文</td><td>This <strong>is not</strong> my pen. / This <strong>isn't</strong> my pen.</td></tr><tr><td>疑問文</td><td><strong>Is</strong> this your pen?</td></tr></table></div>\n\n<div class=\"tip\">be動詞の否定文はいつでも「be動詞 + not」！主語がI / you / this / that / he / she…何でも同じルール。パターンが同じだから、一度覚えればどの主語でも使えるよ。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L3","en":"Is this Indian tea? — Yes, it is.","ja":"これはインドの紅茶ですか？ — はい、そうです。","ex":"<p>this/thatの疑問文は、be動詞の<strong>isを文の先頭に出す</strong>だけ。ルールはbe動詞の疑問文とまったく同じだよ。</p>\n\n<p>肯定文：This <strong>is</strong> Indian tea.<br>\n疑問文：<strong>Is</strong> this Indian tea<strong>?</strong></p>\n\n<p>答えるときの大事なポイント！this/thatで聞かれても、答えるときは<strong>it</strong>で受けるんだ。</p>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<table class=\"t\"><tr><th>質問</th><th>はい</th><th>いいえ</th></tr><tr><td>Is this 〜?</td><td>Yes, <strong>it</strong> is.</td><td>No, <strong>it</strong> isn't.</td></tr><tr><td>Is that 〜?</td><td>Yes, <strong>it</strong> is.</td><td>No, <strong>it</strong> isn't.</td></tr></table></div>\n\n<div class=\"warn\">「Yes, this is.」「Yes, that is.」は×！答えは必ず<strong>it</strong>を使う。テスト頻出の引っかけだよ！</div>","p":"Part2"}],"8":[{"b":"Here We Go!","g":1,"u":"U5","en":"Turn on your camera.","ja":"カメラをつけてください。","ex":"<p><strong>命令文</strong>は<strong>主語（You）を省略</strong>して<strong>動詞の原形</strong>で文を始めるよ。</p>\n<div class=\"es\"><h5>📝 命令文のパターン</h5>\n<table class=\"t\"><tr><th>種類</th><th>作り方</th><th>例</th></tr><tr><td>命令</td><td>動詞の原形</td><td>Open the door.</td></tr><tr><td>否定の命令</td><td>Don't + 動詞の原形</td><td>Don't run.</td></tr><tr><td>Let's</td><td>Let's + 動詞の原形</td><td>Let's go.</td></tr></table></div>\n<div class=\"tip\">「Please」をつけると丁寧に！「Please turn on your camera.」</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U5","en":"Don't be shy.","ja":"恥ずかしがらないで。","ex":"<p><strong>Don't + 動詞の原形</strong>で「<strong>〜しないで</strong>」「<strong>〜するな</strong>」。be動詞の否定命令は「<strong>Don't be + 形容詞</strong>」。</p>\n<div class=\"es\"><h5>📝 Don'tの命令文の例</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>Don't run.</td><td>走るな。</td></tr><tr><td>Don't be late.</td><td>遅れないで。</td></tr><tr><td>Don't worry.</td><td>心配しないで。</td></tr></table></div>\n<div class=\"warn\">「Be don't shy」は×！Don'tが先に来る。「Don't be shy.」が正しい語順だよ。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U5","en":"Let's begin.","ja":"始めましょう。","ex":"<p><strong>Let's + 動詞の原形</strong>で「<strong>〜しましょう</strong>」と<strong>提案・誘い</strong>を表すよ。</p>\n<div class=\"es\"><h5>📝 Let'sの文と応答</h5>\n<table class=\"t\"><tr><th>提案</th><th>賛成</th><th>反対</th></tr><tr><td>Let's play soccer.</td><td>Yes, let's.</td><td>No, let's not. / Sorry, I can't.</td></tr></table></div>\n<div class=\"tip\">Let'sは「Let us」の短縮形。「みんなで〜しようよ！」というフレンドリーな表現。</div>","p":"Part1"}],"9":[{"b":"Here We Go!","g":1,"u":"U1","en":"I can play the drums.","ja":"わたしはドラムを演奏できます。","ex":"<p><strong>can</strong>は「〜できる」を表す<strong>助動詞</strong>だよ。canには<strong>3つの意味</strong>がある。</p>\n<table class=\"t\"><tr><th>意味</th><th>例</th><th>日本語</th></tr><tr><td>能力「〜できる」</td><td>I can swim.</td><td>泳げる</td></tr><tr><td>許可「〜してもいい」</td><td>You can go home.</td><td>帰っていいよ</td></tr><tr><td>依頼「〜してくれる？」</td><td>Can you help me?</td><td>手伝ってくれる？</td></tr></table>\n<div class=\"es\"><h5>📝 いちばん大事なルール</h5>\n<p>canのうしろは<strong>必ず動詞の原形</strong>！主語がhe/sheでも動詞にsもつけない。</p>\n<p>She play<strong>s</strong> tennis.（ふつうの文）→ She <strong>can play</strong> tennis.（canの文：sが消える！）</p></div>\n<div class=\"tip\">楽器は「play <strong>the</strong> drums」とtheをつける。スポーツにはつけない（play tennis）。</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"U1","en":"I can't play the drums.","ja":"わたしはドラムを演奏できません。","ex":"<p>canの否定形は<strong>can't</strong>（cannotの短縮形）。「〜できない」という意味。</p>\n<p>肯定文：I <strong>can</strong> play the drums.<br>否定文：I <strong>can't</strong> play the drums.</p>\n<div class=\"es\"><h5>📝 can'tの発音に注意</h5>\n<p>canは「キャン」、can'tは「キャ<strong>ント</strong>」。<strong>tの音</strong>があるかどうかがポイント。</p></div>\n<div class=\"warn\">cannotは1語！「can not」と2語に分けるのは間違い。</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"U2","en":"Can you read it? — Yes, I can. / No, I can't.","ja":"あなたはそれを読めますか？ — はい、読めます。/ いいえ、読めません。","ex":"<p>canの疑問文は<strong>canを文の先頭に出す</strong>だけ。be動詞の疑問文と同じ考え方だね。</p>\n<p>肯定文：You <strong>can</strong> read it.<br>疑問文：<strong>Can</strong> you read it<strong>?</strong></p>\n<div class=\"es\"><h5>✅ 答え方</h5>\n<p>Can you 〜? → Yes, I <strong>can</strong>. / No, I <strong>can't</strong>.</p></div>\n<div class=\"es\"><h5>🎯 Can you〜?の2つの意味</h5>\n<table class=\"t\"><tr><th>意味</th><th>例</th></tr><tr><td>能力「〜できる？」</td><td>Can you swim?</td></tr><tr><td>依頼「〜してくれる？」</td><td>Can you help me?</td></tr></table></div>\n<div class=\"tip\">canの疑問文ではDoは不要！canは助動詞だから自分で前に出られるんだ。</div>","p":"Part3"},{"b":"Here We Go!","g":1,"u":"DL2","en":"Can I have the spaghetti?","ja":"スパゲッティをもらえますか？","ex":"<p><strong>Can I 〜?</strong>は「<strong>〜してもいい？</strong>」と許可を求めるときに使う。レストランでは「〜をください」の意味にも。</p>\n<div class=\"es\"><h5>📝 Can I と Can you の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>Can <strong>I</strong> 〜?</td><td>わたしが〜してもいい？</td></tr><tr><td>Can <strong>you</strong> 〜?</td><td>あなたが〜してくれる？</td></tr></table></div>\n<div class=\"tip\">「Can I have 〜?」は注文の超定番フレーズ！</div>"},{"b":"New Crown","g":1,"u":"L2","en":"I like Sakura. She can skateboard very well.","ja":"わたしはサクラが好きです。彼女はとても上手にスケートボードができます。","ex":"<p><strong>can</strong>は「〜できる」を表す<strong>助動詞</strong>だよ。助動詞というのは、動詞を助けて意味を加える言葉のこと。canをつけると「できる」という<strong>能力</strong>の意味がプラスされるんだ。</p>\n\n<p>canには実は<strong>3つの意味</strong>があるよ。</p>\n\n<table class=\"t\"><tr><th>意味</th><th>例</th><th>日本語</th></tr><tr><td>能力「〜できる」</td><td>I can swim.</td><td>泳げる</td></tr><tr><td>許可「〜してもいい」</td><td>You can go home.</td><td>帰っていいよ</td></tr><tr><td>依頼「〜してくれる？」</td><td>Can you help me?</td><td>手伝ってくれる？</td></tr></table>\n\n<div class=\"es\"><h5>📝 いちばん大事なルール</h5>\n<p>canのうしろは<strong>必ず動詞の原形</strong>！主語がhe/sheでも、canの形は変わらないし、動詞にsもつけない。</p>\n<p>She play<strong>s</strong> tennis.（ふつうの文：sがつく）<br>→ She <strong>can play</strong> tennis.（canの文：sが消える！）</p></div>\n\n<div class=\"tip\">楽器は「play <strong>the</strong> guitar」とtheをつける。スポーツにはつけない（play tennis）。これもテストに出やすいよ。</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：can以外の助動詞</h5>\n<p><strong>助動詞</strong>は動詞の前に置いて、<strong>話し手の「気持ち」をプラスする</strong>言葉だよ。canは「できる」だったけど、他にもいくつかの助動詞がある。全部うしろは<strong>動詞の原形</strong>！</p>\n\n<div class=\"es\"><h5>📝 主な助動詞一覧</h5>\n<table class=\"t\"><tr><th>助動詞</th><th>意味と例</th></tr><tr><td><strong>can</strong></td><td>〜できる / 〜してもいい<br>→ I can swim.（泳げる）</td></tr><tr><td><strong>must</strong></td><td>〜しなければならない / 〜にちがいない<br>→ You must study.（勉強しなければ）</td></tr><tr><td><strong>must not</strong></td><td>〜してはいけない（禁止！）<br>→ You must not run here.（走ってはいけない）</td></tr><tr><td><strong>should</strong></td><td>〜すべきだ / 〜したほうがいい<br>→ You should help her.（助けるべきだ）</td></tr><tr><td><strong>may</strong></td><td>〜してもよい / 〜かもしれない<br>→ May I come in?（入ってもいいですか？）</td></tr><tr><td><strong>shall</strong></td><td>〜しましょうか（提案）<br>→ Shall I help you?（手伝いましょうか？）</td></tr><tr><td><strong>will</strong></td><td>〜するつもり / 〜でしょう<br>→ I will go.（行くつもり）</td></tr></table></div>\n\n<div class=\"es\"><h5>⚡ must と have to の違い</h5>\n<p>どちらも「〜しなければならない」だけど、<strong>否定形の意味が真逆</strong>！</p>\n<table class=\"t\"><tr><th>表現</th><th>否定形と意味</th></tr><tr><td>must</td><td>must <strong>not</strong> ＝ 〜しては<strong>いけない</strong>（禁止）</td></tr><tr><td>have to</td><td>don't <strong>have to</strong> ＝ 〜し<strong>なくてもよい</strong>（不要）</td></tr></table></div>\n\n<div class=\"warn\">must notは「禁止」、don't have toは「不要」。意味がまったく違う！テスト超頻出。</div>\n<div class=\"tip\">助動詞の疑問文はすべて「助動詞を前に出すだけ」。Do/Doesは不要だよ。</div></div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L2","en":"I like Sota. He can play shogi very well.","ja":"わたしはソウタが好きです。彼はとても上手に将棋ができます。","ex":"<p>id:13と同じように、<strong>can</strong>は「〜できる」を表す助動詞。ここでは<strong>He can play shogi very well.</strong>で「彼はとても上手に将棋ができます」という意味だよ。</p>\n\n<p>「I like Sota. He can play shogi very well.」は2文で構成されていて、1文目で「ソウタが好き」と言ってから、2文目で「彼は将棋が上手」と<strong>理由を付け加えている</strong>んだ。</p>\n\n<div class=\"es\"><h5>📝 ポイント</h5>\n<p>Sota（男の人の名前）→ 2文目では<strong>He</strong>に変わっている。名前を代名詞に置き換えるのは英語の基本ルールだよ。</p></div>\n\n<div class=\"tip\">「I like ○○. He/She can 〜.」のパターンは、好きな人を紹介するときに使える便利な形だよ。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L2","en":"Can you play the guitar? — Yes, I can.","ja":"あなたはギターを弾けますか？ — はい、弾けます。","ex":"<p>canの疑問文は、<strong>canを文の先頭に出す</strong>だけで作れるよ。be動詞の疑問文（Is he 〜?）と同じ考え方だね。</p>\n\n<p>肯定文：You <strong>can</strong> play the guitar.<br>\n疑問文：<strong>Can</strong> you play the guitar<strong>?</strong></p>\n\n<p>「Can you 〜?」は<strong>能力を聞く</strong>だけでなく、<strong>お願い（依頼）</strong>にも使える超便利フレーズ。日常会話でもいちばんよく使う表現のひとつだよ。</p>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<table class=\"t\"><tr><th>答え</th><th>例</th></tr><tr><td>はい</td><td>Yes, I <strong>can</strong>.</td></tr><tr><td>いいえ</td><td>No, I <strong>can't</strong>.</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 「能力」と「依頼」の見分け方</h5>\n<table class=\"t\"><tr><th>意味</th><th>例</th><th>場面</th></tr><tr><td>能力を聞く</td><td>Can you swim?</td><td>泳げるかどうか聞いてる</td></tr><tr><td>お願いする</td><td>Can you help me?</td><td>手伝ってほしいとお願い</td></tr></table></div>\n\n<div class=\"tip\">canで聞かれたらcanで返す。これはbe動詞やdo/doesと同じ「聞かれた言葉で返す」ルールだよ！</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L2","en":"I cannot play the guitar.","ja":"わたしはギターを弾けません。","ex":"<p>canの否定形は<strong>cannot</strong>（1語！）。短縮形は<strong>can't</strong>だよ。「〜できない」と能力がないことを伝えるときに使うんだ。</p>\n\n<p>肯定文：I <strong>can</strong> play the guitar.<br>\n否定文：I <strong>cannot</strong> play the guitar. / I <strong>can't</strong> play the guitar.</p>\n\n<div class=\"es\"><h5>📝 canの文の作り方まとめ</h5>\n<p>canは助動詞だから、疑問文も否定文もDo/Doesは使わない。canだけで全部できるよ。</p>\n<table class=\"t\"><tr><th>形</th><th>作り方</th><th>例</th></tr><tr><td>肯定文</td><td>主語 + can + 動詞の原形</td><td>I can play.</td></tr><tr><td>疑問文</td><td>Can + 主語 + 動詞の原形?</td><td>Can you play?</td></tr><tr><td>否定文</td><td>主語 + cannot + 動詞の原形</td><td>I cannot play.</td></tr></table></div>\n\n<div class=\"warn\">「can not」と2語に分けて書くのは間違い！テストでは必ず<strong>cannot（1語）</strong>か<strong>can't</strong>で書こう。</div>\n<div class=\"tip\">canの文ではDo/Doesは不要！canが「お助けマン」の役割を兼ねているから、Doの出番がないんだ。</div>","p":"Part2"}],"10":[{"b":"Here We Go!","g":1,"u":"U7","en":"I went to a temple on New Year's Eve.","ja":"大みそかにお寺に行きました。","ex":"<p>過去のことを話すときは動詞を<strong>過去形</strong>にするよ。<strong>went</strong>はgoの過去形で<strong>不規則動詞</strong>。</p>\n<div class=\"es\"><h5>📝 不規則動詞（よく出るもの）</h5>\n<table class=\"t\"><tr><th>原形</th><th>過去形</th><th>意味</th></tr><tr><td>go</td><td>went</td><td>行く</td></tr><tr><td>come</td><td>came</td><td>来る</td></tr><tr><td>eat</td><td>ate</td><td>食べる</td></tr><tr><td>see</td><td>saw</td><td>見る</td></tr><tr><td>get</td><td>got</td><td>得る</td></tr><tr><td>have</td><td>had</td><td>持つ</td></tr></table></div>\n<div class=\"warn\">過去形のとき、主語が誰でも動詞の形は同じ！三単現のsは現在形だけのルール。</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U7","en":"I watched TV with my family.","ja":"家族とテレビを見ました。","ex":"<p><strong>規則動詞</strong>は語尾に<strong>-ed</strong>をつけるだけで過去形になるよ。watch → <strong>watched</strong>。</p>\n<div class=\"es\"><h5>📝 -edのつけ方</h5>\n<table class=\"t\"><tr><th>ルール</th><th>原形 → 過去形</th></tr><tr><td>ふつう → ed</td><td>watch → watched</td></tr><tr><td>eで終わる → dだけ</td><td>like → liked</td></tr><tr><td>子音+y → yをiに変えてed</td><td>study → studied</td></tr><tr><td>短母音+子音 → 子音を重ねてed</td><td>stop → stopped</td></tr></table></div>\n<div class=\"tip\">過去形では主語が誰でも同じ形。三単現のsのような使い分けがないからラク！</div>","p":"Part1"},{"b":"Here We Go!","g":1,"u":"U7","en":"Did you eat any traditional food? — Yes, I did. / No, I didn't.","ja":"伝統的な食べ物を食べましたか？ — はい。/ いいえ。","ex":"<p>過去の疑問文は<strong>Did</strong>を文の先頭に。<strong>Didを使ったら動詞は必ず原形に戻す</strong>！</p>\n<div class=\"es\"><h5>🎯 Do/Does/Didの全パターン</h5>\n<table class=\"t\"><tr><th>時制</th><th>疑問文</th><th>否定文</th></tr><tr><td>現在（I/you）</td><td><strong>Do</strong> you play?</td><td>I <strong>don't</strong> play.</td></tr><tr><td>現在（he/she）</td><td><strong>Does</strong> she play?</td><td>She <strong>doesn't</strong> play.</td></tr><tr><td>過去（全主語）</td><td><strong>Did</strong> you play?</td><td>I <strong>didn't</strong> play.</td></tr></table></div>\n<div class=\"warn\">「Did you ate?」は×！Didを使ったら動詞は原形！</div>","p":"Part2"},{"b":"Here We Go!","g":1,"u":"U7","en":"I didn't eat any traditional food.","ja":"伝統的な食べ物を食べませんでした。","ex":"<p>過去の否定は<strong>didn't + 動詞の原形</strong>。動詞は<strong>必ず原形に戻す</strong>。</p>\n<div class=\"es\"><h5>📝 anyの使い方</h5>\n<table class=\"t\"><tr><th>種類</th><th>使う語</th><th>例</th></tr><tr><td>肯定文</td><td>some</td><td>I ate <strong>some</strong> food.</td></tr><tr><td>否定文</td><td>any</td><td>I didn't eat <strong>any</strong> food.</td></tr><tr><td>疑問文</td><td>any</td><td>Did you eat <strong>any</strong> food?</td></tr></table></div>\n<div class=\"tip\">didn'tのうしろは必ず原形。「didn't went」は×！</div>","p":"Part2"},{"b":"Here We Go!","g":2,"u":"U1","en":"I went to Busan.","ja":"わたしは釜山に行きました。","ex":"<p>2年生の最初は過去形の復習から。<strong>went</strong>はgoの過去形（不規則動詞）だよ。</p>\n<div class=\"tip\">Busanは韓国の都市「釜山」。地名は大文字で始めるのが英語のルール！</div>","p":"Part1"},{"b":"Here We Go!","g":2,"u":"U1","en":"I visited my grandparents.","ja":"わたしは祖父母を訪ねました。","ex":"<p><strong>visited</strong>はvisit（訪ねる）の過去形。規則動詞なので<strong>-ed</strong>をつけるだけ。</p>\n<div class=\"tip\">「grandparents」＝ 祖父母（grandfather + grandmother をまとめた言葉）。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L4","en":"I went to Okinawa last summer.","ja":"わたしは去年の夏に沖縄に行きました。","ex":"<p>過去のことを話すときは、動詞を<strong>過去形</strong>にするよ。英語の過去形には<strong>規則動詞</strong>（-edをつける）と<strong>不規則動詞</strong>（形がガラッと変わる）の2種類がある。</p>\n\n<p>この文の<strong>went</strong>はgoの過去形で、<strong>不規則動詞</strong>。go→wentのように、まったく違う形に変わるから覚えるしかないんだ。</p>\n\n<div class=\"es\"><h5>📝 不規則動詞（よく出るもの）</h5>\n<table class=\"t\"><tr><th>原形</th><th>過去形</th><th>意味</th></tr><tr><td>go</td><td>went</td><td>行く</td></tr><tr><td>come</td><td>came</td><td>来る</td></tr><tr><td>eat</td><td>ate</td><td>食べる</td></tr><tr><td>see</td><td>saw</td><td>見る</td></tr><tr><td>get</td><td>got</td><td>得る</td></tr><tr><td>make</td><td>made</td><td>作る</td></tr><tr><td>have</td><td>had</td><td>持つ</td></tr><tr><td>take</td><td>took</td><td>取る</td></tr><tr><td>read</td><td>read</td><td>読む（※つづり同じ、発音が変わる）</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 「過去のサイン」になるキーワード</h5>\n<p>これらの語が文に出てきたら、動詞を過去形にするサインだよ。</p>\n<p><strong>yesterday</strong>（昨日）/ <strong>last 〜</strong>（この前の〜）/ <strong>〜 ago</strong>（〜前）/ <strong>then</strong>（そのとき）</p></div>\n\n<div class=\"warn\">過去形のとき、主語が誰でも動詞の形は同じ！三単現のsは現在形だけのルール。過去形にはsはつかないよ。</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L7","en":"Renshi played wheelchair basketball in the Paralympics.","ja":"レンシはパラリンピックで車いすバスケをしました。","ex":"<p>playのような<strong>規則動詞</strong>は、語尾に<strong>-ed</strong>をつけるだけで過去形になるよ。play → <strong>played</strong>。不規則動詞（go→wentなど）と違って、ルールどおりに変形するから「規則動詞」と呼ぶんだ。</p>\n\n<div class=\"es\"><h5>📝 -edのつけ方（4パターン）</h5>\n<table class=\"t\"><tr><th>ルール</th><th>原形 → 過去形</th></tr><tr><td>ふつう → ed</td><td>play → played / walk → walked</td></tr><tr><td>eで終わる → dだけ</td><td>like → liked / use → used</td></tr><tr><td>子音+y → yをiに変えてed</td><td>study → studied / cry → cried</td></tr><tr><td>短母音+子音 → 子音を重ねてed</td><td>stop → stopped / drop → dropped</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 -edの発音（3パターン）</h5>\n<p>-edはいつも同じ発音ではないよ。語尾の音で3つに分かれるんだ。</p>\n<table class=\"t\"><tr><th>発音</th><th>条件</th><th>例</th></tr><tr><td>/t/（トゥ）</td><td>語尾が無声音(k,p,f,sなど)</td><td>walked, helped</td></tr><tr><td>/d/（ドゥ）</td><td>語尾が有声音(l,n,vなど)</td><td>played, lived</td></tr><tr><td>/ɪd/（イドゥ）</td><td>語尾がt,d</td><td>wanted, needed</td></tr></table></div>\n\n<div class=\"tip\">過去形では主語が誰でも同じ形。三単現のsのような使い分けがないから、ある意味ラクだよ！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L7","en":"Renshi got an award in the Paralympics.","ja":"レンシはパラリンピックで賞を取りました。","ex":"<p>get→<strong>got</strong>のように、-edをつけずに<strong>形がガラッと変わる</strong>動詞を<strong>「不規則動詞」</strong>と呼ぶよ。規則がないので<strong>覚えるしかない</strong>！でも、よく出るものから優先すれば意外とイケる。</p>\n\n<div class=\"es\"><h5>📝 よく出る不規則動詞（原形→過去形→過去分詞）</h5>\n<p>過去分詞は2年生の現在完了や3年生の受動態で必要になるから、今から3つセットで覚えておくと後がラクだよ。</p>\n<table class=\"t\"><tr><th>原形</th><th>過去形</th><th>過去分詞</th><th>意味</th></tr><tr><td>get</td><td>got</td><td>got(ten)</td><td>得る</td></tr><tr><td>run</td><td>ran</td><td>run</td><td>走る</td></tr><tr><td>swim</td><td>swam</td><td>swum</td><td>泳ぐ</td></tr><tr><td>write</td><td>wrote</td><td>written</td><td>書く</td></tr><tr><td>speak</td><td>spoke</td><td>spoken</td><td>話す</td></tr><tr><td>know</td><td>knew</td><td>known</td><td>知る</td></tr><tr><td>give</td><td>gave</td><td>given</td><td>あげる</td></tr><tr><td>break</td><td>broke</td><td>broken</td><td>壊す</td></tr></table></div>\n\n<div class=\"tip\">「get-got-gotten、run-ran-run…」とリズムよく口に出して唱えると覚えやすい。不規則動詞は中学で約60〜80個あるけど、よく出るものから20個ずつ攻めていこう！</div>","p":"Part1"},{"b":"New Crown","g":1,"u":"L7","en":"Did you read the magazine yesterday? — Yes, I did.","ja":"あなたは昨日その雑誌を読みましたか？ — はい、読みました。","ex":"<p>過去のことについて「〜しましたか？」とたずねるときは<strong>Did</strong>を文の先頭に置くよ。「〜しませんでした」と否定するときは<strong>didn't + 動詞の原形</strong>。</p>\n\n<p>どちらも大事なルールがひとつ：<strong>Didやdidn'tを使ったら、動詞は必ず原形に戻す</strong>！Didが過去の意味を「引き受けてくれる」から、動詞は過去形にしなくていいんだ。</p>\n\n<div class=\"es\"><h5>📝 疑問文の作り方</h5>\n<p>You <strong>read</strong> the magazine. → <strong>Did</strong> you <strong>read</strong> the magazine<strong>?</strong></p>\n<p>答え：Yes, I <strong>did</strong>. / No, I <strong>didn't</strong>.</p></div>\n\n<div class=\"es\"><h5>📝 否定文の作り方</h5>\n<p>I read the magazine. → I <strong>didn't read</strong> the magazine.</p></div>\n\n<div class=\"es\"><h5>🎯 Do/Does/Didの全パターン比較</h5>\n<p>現在形のDo/Doesと過去形のDid、全部同じ考え方だよ。</p>\n<table class=\"t\"><tr><th>時制</th><th>疑問文</th><th>否定文</th></tr><tr><td>現在（I/you）</td><td><strong>Do</strong> you play?</td><td>I <strong>don't</strong> play.</td></tr><tr><td>現在（he/she）</td><td><strong>Does</strong> she play?</td><td>She <strong>doesn't</strong> play.</td></tr><tr><td>過去（全主語）</td><td><strong>Did</strong> you play?</td><td>I <strong>didn't</strong> play.</td></tr></table></div>\n\n<div class=\"warn\">「Did you played?」「I didn't readed」は×！Did/didn'tを使ったら動詞は原形。sもedもつけない！</div>","p":"Part2"},{"b":"New Crown","g":1,"u":"L7","en":"I did not read the magazine yesterday.","ja":"わたしは昨日その雑誌を読みませんでした。","ex":"<p>過去のことを「<strong>〜しませんでした</strong>」と否定するときは<strong>didn't + 動詞の原形</strong>を使うよ。</p>\n\n<p>肯定文：I <strong>read</strong> the magazine yesterday.<br>\n否定文：I <strong>didn't read</strong> the magazine yesterday.</p>\n\n<p>didn'tがいるから動詞は<strong>必ず原形に戻す</s
