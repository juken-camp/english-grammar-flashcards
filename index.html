e <strong>never</strong> seen snow.</td></tr><tr><td>once / twice</td><td>1回 / 2回</td><td>I have been there <strong>once</strong>.</td></tr></table></div>","p":"Part3"},{"b":"Here We Go!","g":3,"u":"U2","en":"I've never seen such a beautiful sunset.","ja":"こんなに美しい夕日は見たことがありません。","ex":"<p><strong>have never + 過去分詞</strong>で「<strong>一度も〜したことがない</strong>」。経験の否定。</p>\n<p><strong>such a + 形容詞 + 名詞</strong>＝「こんなに〜な…」。強調表現だよ。</p>","p":"Part3"},{"b":"Here We Go!","g":3,"u":"U2","en":"I have been to Kyoto twice.","ja":"わたしは京都に2回行ったことがあります。","ex":"<p>「沖縄に行ったことある？」って聞きたいとき、英語では<strong>have been to ~</strong>を使うよ。経験用法のド定番！</p>\n<div class=\"es\"><h5>📝 been to と gone to の違い</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>今どこにいる？</th></tr><tr><td>have <strong>been to</strong> ~</td><td>〜に行った<strong>ことがある</strong></td><td>今は<strong>ここにいる</strong>（戻ってきた）</td></tr><tr><td>have <strong>gone to</strong> ~</td><td>〜に行って<strong>しまった</strong></td><td>今は<strong>そこにいる</strong>（まだ戻っていない）</td></tr></table></div>\n<div class=\"warn\">「京都に2回行ったことがある」は<strong>been</strong>！<br>× I have <strong>gone</strong> to Kyoto twice.（← 2回行ってまだ京都にいる？変だよね！）<br>○ I have <strong>been</strong> to Kyoto twice.</div>\n<div class=\"es\"><h5>📝 回数の言い方</h5>\n<table class=\"t\"><tr><th>回数</th><th>英語</th></tr><tr><td>1回</td><td><strong>once</strong></td></tr><tr><td>2回</td><td><strong>twice</strong></td></tr><tr><td>3回以上</td><td><strong>〜 times</strong>（three times, four times…）</td></tr></table></div>","p":"Part3"},{"b":"New Crown","g":2,"u":"L7","en":"I have seen that decoration in Chinatown before.","ja":"わたしは以前チャイナタウンでその飾りを見たことがあります。","ex":"<p><strong>現在完了</strong>は中学英語の<strong>最重要文法</strong>のひとつ！形は<strong>have/has + 過去分詞</strong>。「過去に起きたことが、今とつながっている」ことを表すよ。</p>\n\n<p>I <strong>have seen</strong> that decoration before.<br>＝ 以前その飾りを<strong>見たことがある</strong>。</p>\n\n<p>この文は「過去に見た→その経験が今の自分にある」という意味。<strong>過去形</strong>（I saw it.）が「過去のある時点」だけを指すのに対して、<strong>現在完了</strong>は「過去と今をつなぐ」表現なんだ。</p>\n\n<div class=\"es\"><h5>📝 3つの用法とキーワード</h5>\n<p>現在完了には3つの意味（用法）がある。キーワードで見分けよう！</p>\n<table class=\"t\"><tr><th>用法</th><th>意味</th><th>キーワード</th></tr><tr><td>経験</td><td>〜したことがある</td><td>before, ever, never, once, 〜 times</td></tr><tr><td>完了</td><td>もう〜した / ちょうど〜した</td><td>just, already, yet</td></tr><tr><td>継続</td><td>ずっと〜している</td><td>for, since, how long</td></tr></table></div>\n\n<div class=\"es\"><h5>🇯🇵↔🇬🇧 過去形と現在完了の違い</h5>\n<table class=\"t\"><tr><th>英語</th><th>意味</th></tr><tr><td>I <strong>saw</strong> it yesterday.</td><td>昨日それを見た（過去の1点の話）</td></tr><tr><td>I <strong>have seen</strong> it before.</td><td>以前見たことがある（今の自分の経験）</td></tr></table></div>\n\n\n\n<div class=\"es\"><h5>🎯 入試超頻出パターン</h5>\n<p><strong>Have you ever + 過去分詞 〜?</strong>＝「今までに〜したことがある？」</p>\n<p>Have you ever <strong>been</strong> to Hokkaido? ＝ 北海道に行ったことある？<br>\n→ Yes, I have. / No, I haven't. (= No, <strong>never</strong>.)</p></div>\n<div class=\"warn\">「行ったことがある」は have <strong>been</strong> to。have <strong>gone</strong> to は「行ってしまった（今ここにいない）」。意味が全然違う！</div>\n<div class=\"warn\">現在完了はyesterday, last year, 〜 agoなど「過去の特定の時点」を表す語と一緒には使えない！</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L7","en":"Have you ever tried flowering tea? — Yes, I have.","ja":"あなたは今までに花茶を飲んだことがありますか？ — はい、あります。","ex":"<p><strong>Have you ever + 過去分詞?</strong>で「<strong>今までに〜したことがありますか？</strong>」と経験をたずねるよ。</p>\n\n<p><strong>Have</strong> you <strong>ever</strong> tried flowering tea?<br>\n＝ 花茶を飲んだこと<strong>ある？</strong></p>\n\n<p><strong>ever</strong>は「今までに」という意味で、経験の疑問文でよく使う副詞。答えるときはhaveで返すよ。</p>\n\n<div class=\"es\"><h5>✅ 答え方</h5>\n<table class=\"t\"><tr><th>答え</th><th>例</th></tr><tr><td>はい</td><td>Yes, I <strong>have</strong>.</td></tr><tr><td>いいえ</td><td>No, I <strong>haven't</strong>. / No, <strong>never</strong>.</td></tr></table></div>\n\n<div class=\"tip\">everは疑問文でだけ使う！肯定文で「今までに〜した」と言うときはbefore（以前に）を使うよ。</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L7","en":"I have never tried flowering tea.","ja":"わたしは一度も花茶を飲んだことがありません。","ex":"<p><strong>have never + 過去分詞</strong>で「<strong>一度も〜したことがない</strong>」と経験がないことを伝えるよ。</p>\n\n<p>I <strong>have never</strong> tried flowering tea.<br>\n＝ 花茶を<strong>一度も飲んだことがない</strong>。</p>\n\n<p><strong>never</strong>は「一度も〜ない」という否定の意味。neverを使ったらnot/don'tは不要！二重否定にならないように注意。</p>\n\n<div class=\"warn\">「I have not never tried」は×！neverだけで否定の意味があるからnotは不要だよ。</div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L1","en":"I have faced the same problem before.","ja":"わたしは以前同じ問題に直面したことがあります。","ex":"<p><strong>have + 過去分詞 + before</strong>で「<strong>以前〜したことがある</strong>」と経験を表すよ。3年生でも現在完了の経験用法を確認しよう。</p>\n\n<p>I <strong>have faced</strong> the same problem <strong>before</strong>.<br>\n＝ 以前同じ問題に<strong>直面したことがある</strong>。</p>\n\n<p><strong>before</strong>は「以前に」という意味で、文の最後に置くよ。everは疑問文で使うけど、beforeは肯定文で使うのがポイント。</p>\n\n<div class=\"tip\">face（直面する）は規則動詞。過去分詞はfaced。face→faced→facedだよ。</div>"}],"44":[{"b":"Here We Go!","g":3,"u":"U2","en":"We have finally reached Kiyomizu-dera Temple.","ja":"ついに清水寺に到着しました。","ex":"<p><strong>現在完了形</strong>は<strong>have/has + 過去分詞</strong>で作るよ。3つの意味があるんだ。</p>\n<div class=\"es\"><h5>📝 現在完了の3つの用法</h5>\n<table class=\"t\"><tr><th>用法</th><th>意味</th><th>キーワード</th></tr><tr><td>完了</td><td>〜し終えた</td><td>already, just, yet</td></tr><tr><td>経験</td><td>〜したことがある</td><td>ever, never, before, once</td></tr><tr><td>継続</td><td>ずっと〜している</td><td>for, since</td></tr></table></div>\n<p>We <strong>have</strong> finally <strong>reached</strong> ＝ ついに到着<strong>した</strong>（完了用法）</p>\n<div class=\"tip\">「finally」は「ついに」。長い努力や時間の末に達成したニュアンス。</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U2","en":"Have you checked your photos yet? — Yes, I have. / No, I haven't.","ja":"もう写真を確認しましたか？ — はい。/ いいえ。","ex":"<p>現在完了の疑問文は<strong>Haveを前に出す</strong>だけ。<strong>yet</strong>は疑問文で「もう」、否定文で「まだ」。</p>\n<div class=\"es\"><h5>📝 already, just, yet の使い分け</h5>\n<table class=\"t\"><tr><th>語</th><th>使う場面</th><th>位置</th></tr><tr><td>already</td><td>肯定文「もう」</td><td>have と 過去分詞の間</td></tr><tr><td>just</td><td>肯定文「ちょうど」</td><td>have と 過去分詞の間</td></tr><tr><td>yet</td><td>疑問文「もう」/ 否定文「まだ」</td><td>文末</td></tr></table></div>","p":"Part2"},{"b":"Here We Go!","g":3,"u":"U2","en":"The bus hasn't left yet.","ja":"バスはまだ出発していません。","ex":"<p>現在完了の否定は<strong>haven't/hasn't + 過去分詞</strong>。<strong>yet</strong>は否定文では「まだ」の意味。</p>","p":"Part2"},{"b":"New Crown","g":2,"u":"L8","en":"I have just finished my homework.","ja":"わたしはちょうど宿題を終えたところです。","ex":"<p><strong>have just + 過去分詞</strong>で「<strong>ちょうど〜したところです</strong>」と完了を表すよ。3年生でも現在完了の完了用法を確認しよう。</p>\n\n<p>I <strong>have just finished</strong> my homework.<br>\n＝ ちょうど宿題を<strong>終えたところです</strong>。</p>\n\n<p><strong>just</strong>は「ちょうど・たった今」という意味で、haveと過去分詞の間に置くよ。</p>\n\n<div class=\"tip\">justの位置に注意！「have <strong>just</strong> finished」のように、haveと過去分詞の間に入れるよ。</div>","p":"Part1"},{"b":"New Crown","g":2,"u":"L8","en":"Have you finished your homework yet? — Yes, I have.","ja":"あなたはもう宿題を終えましたか？ — はい、終えました。","ex":"<p><strong>Have you + 過去分詞 + yet?</strong>で「<strong>もう〜しましたか？</strong>」と完了したかどうかをたずねるよ。</p>\n\n<p><strong>Have</strong> you finished your homework <strong>yet</strong>?<br>\n＝ もう宿題<strong>終わった？</strong></p>\n\n<p><strong>yet</strong>は「もう」という意味で、<strong>疑問文の文末</strong>に置くよ。肯定文のjust（ちょうど）やalready（もう）とセットで覚えよう。</p>\n\n<div class=\"es\"><h5>📝 完了のキーワード</h5>\n<table class=\"t\"><tr><th>語</th><th>意味</th><th>使い方</th></tr><tr><td><strong>just</strong></td><td>ちょうど・たった今</td><td>肯定文（haveとpp.の間）</td></tr><tr><td><strong>already</strong></td><td>もう・すでに</td><td>肯定文</td></tr><tr><td><strong>yet</strong></td><td>もう（疑問）/まだ（否定）</td><td>疑問文・否定文の文末</td></tr></table></div>\n\n<div class=\"tip\">justは「have <strong>just</strong> finished」のようにhaveと過去分詞の間に入れるよ。</div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L1","en":"I have just finished my homework.","ja":"わたしはちょうど宿題を終えたところです。","ex":"<p><strong>have just + 過去分詞</strong>で「<strong>ちょうど〜したところです</strong>」と完了を表すよ。3年生でも現在完了の完了用法を確認しよう。</p>\n\n<p>I <strong>have just finished</strong> my homework.<br>\n＝ ちょうど宿題を<strong>終えたところです</strong>。</p>\n\n<p><strong>just</strong>は「ちょうど・たった今」という意味で、haveと過去分詞の間に置くよ。</p>\n\n<div class=\"tip\">justの位置に注意！「have <strong>just</strong> finished」のように、haveと過去分詞の間に入れるよ。</div>"}],"45":[{"b":"Here We Go!","g":3,"u":"U3","en":"The dome has been like this for about 80 years.","ja":"ドームは約80年間このような状態です。","ex":"<p>現在完了の<strong>継続用法</strong>は「<strong>ずっと〜している</strong>」。<strong>for</strong>は「〜の間」（期間）、<strong>since</strong>は「〜から」（起点）。</p>\n<div class=\"es\"><h5>📝 forとsinceの違い</h5>\n<table class=\"t\"><tr><th>語</th><th>意味</th><th>うしろに来るもの</th></tr><tr><td>for</td><td>〜の間</td><td>期間（for 3 years, for a week）</td></tr><tr><td>since</td><td>〜から・以来</td><td>起点（since 2000, since last year）</td></tr></table></div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U3","en":"How long have you been a volunteer? — I've been a volunteer since 2000.","ja":"いつからボランティアをしていますか？ — 2000年からです。","ex":"<p><strong>How long + 現在完了</strong>で「<strong>どのくらい〜しているの？</strong>」と期間を聞くよ。</p>\n<p>答えはforかsinceを使って期間を伝える。</p>","p":"Part1"},{"b":"New Crown","g":2,"u":"L8","en":"I have been a rakugo performer for many years.","ja":"わたしは長年、落語家をしています。","ex":"<p><strong>have + 過去分詞 + for/since</strong>で「<strong>ずっと〜している</strong>」と状態の継続を表すよ。3年生でも現在完了の継続用法を確認しよう。</p>\n\n<p>I <strong>have been</strong> a rakugo performer <strong>for many years</strong>.<br>\n＝ 何年も落語家を<strong>しています</strong>。</p>\n\n<p>beenはbe動詞の過去分詞。「have been ＋ 名詞/形容詞」で「ずっと〜の状態である」という意味だよ。</p>\n\n<div class=\"tip\">状態動詞（be, live, know, likeなど）の継続は現在完了。動作動詞（run, studyなど）の継続は現在完了進行形を使うよ。</div>","p":"Part2"},{"b":"New Crown","g":2,"u":"L8","en":"How long have you been a rakugo performer? — For about 30 years. Since 1997.","ja":"あなたはどのくらい落語家をしていますか？ — 約30年です。1997年からです。","ex":"<p><strong>How long have you + 過去分詞 〜?</strong>で「<strong>どのくらいの間〜していますか？</strong>」と<strong>継続の期間</strong>をたずねるよ。</p>\n\n<p><strong>How long</strong> have you been a rakugo performer?<br>\n＝ <strong>どのくらい</strong>落語家をしていますか？</p>\n\n<p>答えは<strong>for（期間の長さ）</strong>や<strong>since（始まった時点）</strong>で返すよ。</p>\n\n<div class=\"es\"><h5>📝 forとsinceの使い分け</h5>\n<table class=\"t\"><tr><th>語</th><th>意味</th><th>例</th></tr><tr><td><strong>for</strong></td><td>〜の間（期間の長さ）</td><td>For about 30 years.</td></tr><tr><td><strong>since</strong></td><td>〜以来（始まった時点）</td><td>Since 1997.</td></tr></table></div>\n\n<div class=\"warn\">for＝期間の長さ（数字）、since＝起点（いつから）。「for 1997」「since 30 years」は×。</div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L1","en":"I have been a rakugo performer for many years.","ja":"わたしは何年も落語家をしています。","ex":"<p><strong>have + 過去分詞 + for/since</strong>で「<strong>ずっと〜している</strong>」と状態の継続を表すよ。3年生でも現在完了の継続用法を確認しよう。</p>\n\n<p>I <strong>have been</strong> a rakugo performer <strong>for many years</strong>.<br>\n＝ 何年も落語家を<strong>しています</strong>。</p>\n\n<p>beenはbe動詞の過去分詞。「have been ＋ 名詞/形容詞」で「ずっと〜の状態である」という意味だよ。</p>\n\n<div class=\"tip\">状態動詞（be, live, know, likeなど）の継続は現在完了。動作動詞（run, studyなど）の継続は現在完了進行形を使うよ。</div>"}],"46":[{"b":"Here We Go!","g":3,"u":"U3","en":"I've been thinking about our trip to Hiroshima.","ja":"広島旅行のことをずっと考えています。","ex":"<p><strong>現在完了進行形</strong>は<strong>have/has been + 動詞ing</strong>で「<strong>ずっと〜し続けている</strong>」。動作の継続を強調する形。</p>\n<div class=\"es\"><h5>📝 現在完了 vs 現在完了進行形</h5>\n<table class=\"t\"><tr><th>形</th><th>使い方</th></tr><tr><td>現在完了</td><td>状態の継続（I have lived here.）</td></tr><tr><td>現在完了進行形</td><td>動作の継続（I have been studying.）</td></tr></table></div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L2","en":"We have been discussing it since last week.","ja":"わたしたちは先週からそれについてずっと議論しています。","ex":"<p><strong>現在完了進行形</strong>は「<strong>ずっと〜し続けている</strong>」を表す形。<strong>have/has + been + 動詞のing形</strong>で作るよ。</p>\n\n<p>We <strong>have been discussing</strong> it since last week.<br>＝ 先週から<strong>ずっとそれについて議論し続けています</strong>。</p>\n\n<p>「現在完了の継続用法」と似ているけど、違いがあるんだ。現在完了（have + 過去分詞）は<strong>状態の継続</strong>（住んでいる、知っているなど）、現在完了進行形は<strong>動作の継続</strong>（走り続けている、勉強し続けているなど）を表すよ。</p>\n\n<div class=\"es\"><h5>📝 使い分け</h5>\n<table class=\"t\"><tr><th>形</th><th>使うとき</th><th>例</th></tr><tr><td>現在完了（継続）</td><td>状態動詞（live, know, like）</td><td>I have <strong>lived</strong> here for 5 years.</td></tr><tr><td>現在完了進行形</td><td>動作動詞（run, study, rain）</td><td>I have <strong>been studying</strong> for 3 hours.</td></tr></table></div>\n\n<div class=\"tip\">「How long have you been 〜ing?」で「どのくらい〜し続けてる？」と聞けるよ。</div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L2","en":"How long have you been discussing it? — For two hours. Since last week.","ja":"あなたたちはどのくらいそれについて議論していますか？ — 2時間です。先週からです。","ex":"<p><strong>How long have you been + 動詞ing?</strong>で「<strong>どのくらい〜し続けていますか？</strong>」と動作の継続期間をたずねるよ。</p>\n\n<p><strong>How long</strong> have you been discussing it?<br>\n＝ <strong>どのくらい</strong>それについて議論し続けていますか？</p>\n\n<p>答えはforやsinceで返す。現在完了の継続と同じ答え方だよ。</p>\n\n<div class=\"es\"><h5>📝 答え方の例</h5>\n<table class=\"t\"><tr><th>質問</th><th>答え</th></tr><tr><td>How long have you been discussing it?</td><td><strong>For</strong> two hours.（2時間です）</td></tr><tr><td></td><td><strong>Since</strong> last week.（先週からです）</td></tr></table></div>\n\n<div class=\"tip\">現在完了進行形のHow long 〜?は「動作」の継続を聞く。現在完了のHow long 〜?は「状態」の継続を聞く。使い分けに注意しよう。</div>","p":"Part1"}],"47":[{"b":"Here We Go!","g":3,"u":"U4","en":"I know the boy playing the drums.","ja":"わたしはドラムを叩いている男の子を知っています。","ex":"<p><strong>現在分詞（-ing）</strong>が名詞を後ろから修飾するパターン。「<strong>〜している（名詞）</strong>」。</p>\n<p>the boy <strong>playing the drums</strong> ＝ ドラムを<strong>叩いている</strong>男の子</p>\n<div class=\"es\"><h5>📝 過去分詞と現在分詞の違い</h5>\n<table class=\"t\"><tr><th>種類</th><th>意味</th><th>例</th></tr><tr><td>現在分詞(-ing)</td><td>〜している（能動）</td><td>the boy <strong>playing</strong> drums</td></tr><tr><td>過去分詞(-ed等)</td><td>〜された（受動）</td><td>the song <strong>played</strong> by him</td></tr></table></div>","p":"Part2"},{"b":"Here We Go!","g":3,"u":"U4","en":"She looked at the boy sleeping in a chair.","ja":"彼女は椅子で眠っている男の子を見ました。","ex":"<p>現在分詞の後置修飾のもう1つの例。the boy <strong>sleeping in a chair</strong>＝「椅子で眠っている男の子」。</p>","p":"Part3"},{"b":"New Crown","g":3,"u":"L4","en":"This person standing by the camera is my grandfather.","ja":"カメラのそばに立っているこの人はわたしの祖父です。","ex":"<p><strong>現在分詞（-ing形）</strong>を名詞のうしろに置くと「<strong>〜している○○</strong>」と名詞を説明（修飾）できるよ。進行形のingとは使い方が違うので注意！</p>\n\n<p>This person <strong>standing by the camera</strong> is my grandfather.<br>＝ カメラのそばに<strong>立っている</strong>この人は祖父です。</p>\n\n<p>「standing by the camera」が「this person」を説明している。<strong>名詞のうしろから補足説明を加える</strong>のが分詞の後置修飾だよ。</p>\n\n<div class=\"es\"><h5>📝 1語か2語以上かで位置が変わる</h5>\n<table class=\"t\"><tr><th>語数</th><th>位置</th><th>例</th></tr><tr><td>1語だけ</td><td>名詞の<strong>前</strong></td><td>a <strong>sleeping</strong> baby（眠っている赤ちゃん）</td></tr><tr><td>2語以上</td><td>名詞の<strong>うしろ</strong></td><td>a baby <strong>sleeping in the bed</strong>（ベッドで眠っている赤ちゃん）</td></tr></table></div>\n\n<div class=\"tip\">関係代名詞「who is standing by the camera」を短くしたのが分詞の後置修飾だと考えるとわかりやすい！who isを省略した形なんだ。</div>","p":"Part1"}],"48":[{"b":"Here We Go!","g":3,"u":"U4","en":"He was a musician loved by many people.","ja":"彼は多くの人々に愛された音楽家でした。","ex":"<p><strong>過去分詞が名詞のうしろから説明する</strong>形＝<strong>後置修飾</strong>。日本語と語順が逆！</p>\n<p>日本語：多くの人に<strong>愛された</strong>音楽家（←説明が前）<br>英語：a musician <strong>loved by many people</strong>（←説明が後ろ）</p>\n<div class=\"es\"><h5>📝 後置修飾のパターン</h5>\n<table class=\"t\"><tr><th>修飾語</th><th>例</th><th>意味</th></tr><tr><td>過去分詞</td><td>a book <strong>written</strong> by her</td><td>彼女に書かれた本</td></tr><tr><td>現在分詞</td><td>a girl <strong>playing</strong> the piano</td><td>ピアノを弾いている女の子</td></tr><tr><td>前置詞句</td><td>the book <strong>on the desk</strong></td><td>机の上の本</td></tr></table></div>\n<div class=\"tip\">1語なら前に置く（a <strong>broken</strong> window）、2語以上なら後ろに置く（a window <strong>broken by him</strong>）。</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U4","en":"The piano piece played by Tanaka was very beautiful.","ja":"田中さんが演奏したピアノ曲はとても美しかったです。","ex":"<p>過去分詞のかたまりが<strong>主語の一部</strong>になるパターン。</p>\n<p><strong>The piano piece</strong> [played by Tanaka] <strong>was</strong> very beautiful.</p>\n<p>「田中さんに演奏された曲」＝「田中さんが演奏した曲」。</p>\n<div class=\"tip\">後置修飾は関係代名詞の省略形とも考えられる：a musician (who was) loved by many people</div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L4","en":"This is a comedy movie directed by a famous director.","ja":"これは有名な監督が手がけたコメディ映画です。","ex":"<p><strong>過去分詞</strong>を名詞のうしろに置くと「<strong>〜された○○</strong>」と名詞を説明できるよ。現在分詞（-ing）が「〜している」（能動）なのに対し、過去分詞は「〜された」（受動）の意味。</p>\n\n<p>This is a comedy movie <strong>directed by a famous director</strong>.<br>＝ 有名な監督が<strong>手がけた</strong>コメディ映画です。</p>\n\n<div class=\"es\"><h5>📝 現在分詞と過去分詞の比較</h5>\n<table class=\"t\"><tr><th>分詞</th><th>意味</th><th>例</th></tr><tr><td>現在分詞（-ing）</td><td>〜<strong>している</strong>（能動）</td><td>a boy <strong>running</strong> in the park（走っている男の子）</td></tr><tr><td>過去分詞</td><td>〜<strong>された</strong>（受動）</td><td>a book <strong>written</strong> in English（英語で書かれた本）</td></tr></table></div>\n\n<div class=\"tip\">日本語訳がヒント！「〜<strong>している</strong>」→現在分詞（-ing）、「〜<strong>された</strong>」→過去分詞。どちらを使うか迷ったら、日本語で「している」か「された」かを考えよう。</div>","p":"Part2"}],"49":[{"b":"Here We Go!","g":3,"u":"U5","en":"I have a friend who lives in London.","ja":"わたしにはロンドンに住んでいる友達がいます。","ex":"<p><strong>関係代名詞 who</strong>は<strong>人を説明する文</strong>をつなげる接着剤。<strong>先行詞が人</strong>で、関係代名詞が<strong>主語の役割</strong>をする。</p>\n<p>I have a friend. + The friend lives in London.<br>→ I have a friend <strong>who lives in London</strong>.</p>\n<div class=\"es\"><h5>📝 関係代名詞の種類</h5>\n<table class=\"t\"><tr><th>先行詞</th><th>主格</th><th>目的格</th></tr><tr><td>人</td><td><strong>who</strong></td><td>who(m) / that</td></tr><tr><td>物・動物</td><td><strong>which</strong></td><td>which / that</td></tr><tr><td>人・物どちらも</td><td><strong>that</strong></td><td>that</td></tr></table></div>\n<div class=\"tip\">whoのうしろに<strong>動詞が来る</strong>なら主格！「a friend <strong>who lives</strong>…」</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U5","en":"I have a friend who can speak five languages.","ja":"わたしには5つの言語を話せる友達がいます。","ex":"<p>who節の中に助動詞（can, willなど）が入ることもあるよ。</p>\n<p>a friend <strong>who can speak</strong> five languages ＝ 5つの言語を<strong>話せる</strong>友達</p>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U5","en":"This is the manga which is famous around the world.","ja":"これは世界中で有名なマンガです。","ex":"<p><strong>関係代名詞 which</strong>は<strong>物・動物を説明する文</strong>をつなげる。先行詞が<strong>物</strong>のときに使うよ。</p>\n<p>This is the manga. + The manga is famous.<br>→ This is the manga <strong>which is famous</strong> around the world.</p>\n<div class=\"tip\">whichの代わりに<strong>that</strong>も使える。会話ではthatの方がよく使われるよ。</div>","p":"Part2"},{"b":"Here We Go!","g":3,"u":"U5","en":"She writes stories which have become popular.","ja":"彼女は人気になった物語を書いています。","ex":"<p>which節の中に<strong>現在完了</strong>が入るパターン。物語が「人気に<strong>なった</strong>」という完了・結果のニュアンス。</p>","p":"Part2"},{"b":"New Crown","g":3,"u":"L5","en":"We use cards that have the English translation on them.","ja":"わたしたちは英訳がのっているカードを使います。","ex":"<p><strong>関係代名詞</strong>は<strong>名詞をうしろから説明する</strong>ための文法。日本語は「英訳がのっている<strong>カード</strong>」と<strong>前から</strong>説明するけど、英語は「cards <strong>that have the English translation</strong>」と<strong>うしろから</strong>説明するんだ。</p>\n\n<p>We use cards <strong>that have the English translation</strong> on them.<br>＝ 英訳が<strong>のっているカード</strong>を使います。</p>\n\n<p>この<strong>that</strong>が関係代名詞。thatのうしろの「have the English translation」が、前の名詞「cards」を説明しているよ。</p>\n\n<div class=\"es\"><h5>📝 関係代名詞の使い分け</h5>\n<table class=\"t\"><tr><th>先行詞（説明される名詞）</th><th>使う関係代名詞</th></tr><tr><td>人</td><td><strong>who</strong> または that</td></tr><tr><td>もの・動物</td><td><strong>which</strong> または that</td></tr><tr><td>人でもものでも</td><td><strong>that</strong>（万能！）</td></tr></table></div>\n\n<div class=\"es\"><h5>📝 主格vs目的格の見分け方</h5>\n<p>関係代名詞のうしろを見れば区別できるよ。</p>\n<table class=\"t\"><tr><th>格</th><th>特徴</th><th>省略</th></tr><tr><td>主格</td><td>thatのうしろにすぐ<strong>動詞</strong>がくる</td><td>× できない</td></tr><tr><td>目的格</td><td>thatのうしろに<strong>主語+動詞</strong>がくる</td><td>○ できる</td></tr></table></div>\n\n<div class=\"tip\">日本語は「前から説明」、英語は「うしろから説明」。この<strong>語順の真逆</strong>が関係代名詞を理解するいちばんのカギだよ！</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：関係代名詞 whose（所有格）</h5>\n<p><strong>whose</strong>は「<strong>〜の…が</strong>」と<strong>持ち主を示す</strong>関係代名詞。who（人）やwhich（もの）と違って、<strong>人でもものでも使える</strong>よ。</p>\n\n<p>I know a girl <strong>whose father is</strong> a pilot.<br>＝ <strong>お父さんがパイロットの</strong>女の子を知っている。</p>\n\n<p>「whose father」＝「その女の子の父親」。whoseは<strong>所有格（〜の）</strong>の関係代名詞で、うしろに必ず名詞が来るんだ。</p>\n\n<div class=\"es\"><h5>📝 関係代名詞の全体像</h5>\n<table class=\"t\"><tr><th>格</th><th>人</th><th>もの</th></tr><tr><td>主格（〜が）</td><td>who / that</td><td>which / that</td></tr><tr><td>目的格（〜を）</td><td>whom / that（省略OK）</td><td>which / that（省略OK）</td></tr><tr><td>所有格（〜の）</td><td colspan=\"2\"><strong>whose</strong>（人・もの共通）</td></tr></table></div>\n\n<div class=\"tip\">whoseの見分け方：関係代名詞のうしろに<strong>すぐ名詞が来ていたら</strong>whose！who/whichのうしろは動詞か主語＋動詞だよ。</div></div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L5","en":"The anime is about a soccer player who can do amazing tricks.","ja":"そのアニメはすごい技ができるサッカー選手についてです。","ex":"<p><strong>who</strong>は<strong>人を説明する</strong>ときの関係代名詞。thatでも言い換えOKだけど、先行詞が人のときはwhoが正式だよ。</p>\n\n<p>The anime is about a soccer player <strong>who can do amazing tricks</strong>.<br>＝ すごい技が<strong>できるサッカー選手</strong>についてのアニメです。</p>\n\n<p>「who can do amazing tricks」が「a soccer player」を説明している。日本語は「すごい技ができる<strong>サッカー選手</strong>」と<strong>前から</strong>説明するけど、英語は<strong>うしろから</strong>説明する。この語順の違いが関係代名詞のいちばん大事なポイント！</p>\n\n<div class=\"es\"><h5>📝 who / that / which の使い分け</h5>\n<table class=\"t\"><tr><th>先行詞</th><th>使う関係代名詞</th><th>例</th></tr><tr><td>人</td><td><strong>who</strong> または that</td><td>a player <strong>who</strong> can play</td></tr><tr><td>もの・動物</td><td><strong>which</strong> または that</td><td>a book <strong>which</strong> is popular</td></tr></table></div>\n\n<div class=\"tip\">迷ったらthatを使えば人でもものでもOK。ただし入試では「先行詞が人ならwho、ものならwhich」と正しく使い分けられると高得点！</div>","p":"Part2"}],"50":[{"b":"Here We Go!","g":3,"u":"U5","en":"She is a manga artist that many people respect.","ja":"彼女は多くの人が尊敬するマンガ家です。","ex":"<p><strong>目的格</strong>の関係代名詞。that/who/whichのうしろに<strong>「主語＋動詞」が来る</strong>のが目的格のサイン。</p>\n<p>a manga artist <strong>that</strong> many people <strong>respect</strong> ＝ 多くの人が尊敬するマンガ家</p>\n<div class=\"es\"><h5>📝 主格と目的格の見分け方</h5>\n<table class=\"t\"><tr><th>格</th><th>うしろの語順</th><th>例</th></tr><tr><td>主格</td><td>who/which + <strong>動詞</strong></td><td>a friend who <strong>lives</strong>…</td></tr><tr><td>目的格</td><td>that + <strong>主語+動詞</strong></td><td>a book that I <strong>read</strong>…</td></tr></table></div>\n<div class=\"tip\">目的格の関係代名詞は<strong>省略できる</strong>！「a book (that) I read」。入試でもよく出る。</div>","p":"Part3"},{"b":"Here We Go!","g":3,"u":"U5","en":"This is the book that I bought yesterday.","ja":"これは昨日わたしが買った本です。","ex":"<p>目的格のthatは<strong>省略OK</strong>。実際の会話では省略されることが多い。</p>\n<p>This is the book <strong>(that)</strong> I bought yesterday.</p>","p":"Part3"},{"b":"New Crown","g":3,"u":"L6","en":"Look at the cute ladle that I found at the flea market.","ja":"わたしがフリマで見つけたかわいいおたまを見てください。","ex":"<p><strong>目的格の関係代名詞</strong>は、関係代名詞のうしろに<strong>「主語＋動詞」が続く</strong>パターン。そして<strong>省略できる</strong>のが大きな特徴だよ。</p>\n\n<p>Look at the cute ladle <strong>that I found</strong> at the flea market.<br>＝ フリマで<strong>見つけた</strong>かわいいおたまを見て。</p>\n\n<p>thatのうしろに「I found」（主語＋動詞）が来ている→これが<strong>目的格</strong>のサイン。主格なら「that have 〜」のようにすぐ動詞がくるけど、目的格はthatのうしろにまず主語が来るんだ。</p>\n\n<div class=\"es\"><h5>📝 主格と目的格の見分け方</h5>\n<table class=\"t\"><tr><th>格</th><th>thatのうしろ</th><th>省略</th><th>例</th></tr><tr><td>主格</td><td>すぐ<strong>動詞</strong></td><td>× できない</td><td>cards <strong>that have</strong> 〜</td></tr><tr><td>目的格</td><td><strong>主語+動詞</strong></td><td>○ できる</td><td>the ladle <strong>(that) I found</strong></td></tr></table></div>\n\n\n\n<div class=\"es\"><h5>📝 目的格の関係代名詞の形</h5>\n<p>先行詞が<strong>人</strong>の場合、正式にはwhomを使うけど、<strong>日常やテストではwho/thatのほうが多い</strong>よ。そして目的格はどれも<strong>省略OK</strong>。</p>\n<p>The girl <strong>whom</strong> I met = The girl <strong>(that)</strong> I met = The girl I met（全部同じ意味！）</p></div>\n<div class=\"tip\">目的格のthatはfoundの<strong>目的語がない</strong>ところに注目。「I found ○○」の○○がthatの前に出ているイメージだよ。</div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L6","en":"I am looking for paper cups we will use for the game.","ja":"わたしはゲームに使う紙コップを探しています。","ex":"<p>目的格の関係代名詞は<strong>省略されることが多い</strong>！この文でもthatが省略されているよ。省略されているのに気づけるかどうかが、長文読解のカギ。</p>\n\n<p>paper cups <strong>(that)</strong> we will use for the game<br>＝ ゲームに使う紙コップ</p>\n\n<div class=\"es\"><h5>🎯 省略を見つけるコツ</h5>\n<p>いちばん大事なサイン：<strong>名詞のあとにすぐ「主語＋動詞」が来ていたら</strong>、関係代名詞が省略されている！</p>\n<table class=\"t\"><tr><th>名詞</th><th>（省略）</th><th>主語+動詞</th></tr><tr><td>paper cups</td><td>(that)</td><td>we will use</td></tr><tr><td>the movie</td><td>(that)</td><td>I watched</td></tr><tr><td>the cake</td><td>(that)</td><td>she made</td></tr></table></div>\n\n<div class=\"es\"><h5>📝 省略できる・できないのルール</h5>\n<table class=\"t\"><tr><th>格</th><th>特徴</th><th>省略</th></tr><tr><td>主格</td><td>関係代名詞のうしろに<strong>すぐ動詞</strong></td><td>× できない</td></tr><tr><td>目的格</td><td>関係代名詞のうしろに<strong>主語+動詞</strong></td><td>○ できる</td></tr></table></div>\n\n<div class=\"tip\">長文読解で超重要なスキル。「名詞→すぐ主語→動詞」のパターンを見たら「あ、関係代名詞の省略だ！」と気づけるようになろう。入試の長文で必ず出てくるよ。</div>","p":"Part2"}],"53":[{"b":"Here We Go!","g":3,"u":"U1","en":"Let me show you something interesting.","ja":"おもしろいものをお見せしましょう。","ex":"<p><strong>Let me + 動詞の原形</strong>で「<strong>わたしに〜させて</strong>」。提案や申し出の表現。</p>\n<p><strong>something interesting</strong>は「おもしろいもの」。-thingのうしろに形容詞が来る語順に注意！</p>\n<div class=\"warn\">日本語は「おもしろいもの」（形容詞→名詞）だけど、英語は「something interesting」（名詞→形容詞）。語順が逆！</div>","p":"Part2"},{"b":"Here We Go!","g":3,"u":"U1","en":"This footprint will help us find the elephant.","ja":"この足跡は象を見つける助けになるでしょう。","ex":"<p><strong>help + 人 + 動詞の原形</strong>で「（人）が〜するのを助ける」。toは省略できるよ。</p>","p":"Part2"},{"b":"Here We Go!","g":3,"u":"U1","en":"My teacher made me read the book.","ja":"先生はわたしにその本を読ませました。","ex":"<p>「先生に読まされた…」みたいに、<strong>相手に何かをさせる</strong>ときの表現。makeは「<strong>無理やりさせる・自然とそうさせる</strong>」というニュアンスだよ。</p>\n<p>My teacher <strong>made me read</strong> the book. ＝ 先生がわたしに本を<strong>読ませた</strong>。</p>\n<div class=\"es\"><h5>📝 let / make / help の3兄弟</h5>\n<table class=\"t\"><tr><th>動詞</th><th>意味</th><th>ニュアンス</th><th>例</th></tr><tr><td><strong>let</strong></td><td>〜させてあげる</td><td>許可（いいよ）</td><td>Let me go.</td></tr><tr><td><strong>make</strong></td><td>〜させる</td><td>強制（やりなさい）</td><td>She made me cry.</td></tr><tr><td><strong>help</strong></td><td>〜するのを手伝う</td><td>手助け</td><td>Help me carry this.</td></tr></table>\n<p>この3つは全部うしろに<strong>動詞の原形</strong>が来る。<strong>toはつけない！</strong></p></div>\n<div class=\"warn\">ここが最大の注意点！<br>× make me <strong>to read</strong> → ○ make me <strong>read</strong><br>want/ask/tellは「to + 動詞」だけど、let/make/helpは「toなし」！混ぜるな危険！</div>\n<div class=\"tip\">中2で習った「make me <strong>happy</strong>」（形容詞）と今回の「make me <strong>read</strong>」（動詞の原形）は別パターン。どちらもmakeだけど、うしろが形容詞か動詞かで意味が変わるよ！</div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L2","en":"My friends helped me carry my drum set.","ja":"友達がわたしのドラムセットを運ぶのを手伝ってくれました。","ex":"<p><strong>help + 人 + 動詞の原形</strong>で「<strong>人が〜するのを手伝う</strong>」という意味。ふつう不定詞はtoをつけるけど、helpのうしろでは<strong>toを省略できる</strong>んだ。</p>\n\n<p>My friends helped me <strong>carry</strong> my drum set.<br>＝ 友達がドラムセットを<strong>運ぶのを手伝ってくれた</strong>。</p>\n\n<p>help me <strong>carry</strong>（toなし）でも、help me <strong>to carry</strong>（toあり）でもどちらも正解。このように<strong>toなしで動詞の原形だけ使うパターン</strong>を「<strong>原形不定詞</strong>」と呼ぶよ。</p>\n\n<div class=\"es\"><h5>📝 原形不定詞を使う動詞</h5>\n<table class=\"t\"><tr><th>動詞</th><th>ニュアンス</th><th>例</th><th>意味</th></tr><tr><td>help</td><td>手伝う（toも可）</td><td>Help me do my homework.</td><td>宿題を手伝って</td></tr><tr><td>let</td><td>許可する</td><td>Let me try.</td><td>やらせて</td></tr><tr><td>make</td><td>強制・引き起こす</td><td>The news made me cry.</td><td>泣かせた</td></tr></table></div>\n\n<div class=\"warn\">helpだけはto付きでもto無しでもOK。でもlet/makeはtoなし（原形不定詞）のみ！「Let me to go.」は×。</div>","p":"Part2"}],"54":[{"b":"Here We Go!","g":3,"u":"U6","en":"I want to know what we can do.","ja":"わたしたちに何ができるか知りたいです。","ex":"<p><strong>間接疑問文</strong>は疑問文が<strong>文の中に組み込まれた</strong>形。<strong>語順は「疑問詞 + 主語 + 動詞」</strong>で、ふつうの疑問文の語順とは違う！</p>\n<div class=\"es\"><h5>📝 直接疑問文と間接疑問文の語順</h5>\n<table class=\"t\"><tr><th>種類</th><th>語順</th></tr><tr><td>直接疑問文</td><td>What <strong>can we</strong> do?（疑問文の語順）</td></tr><tr><td>間接疑問文</td><td>I want to know what <strong>we can</strong> do.（ふつうの語順）</td></tr></table></div>\n<div class=\"warn\">間接疑問文の中は「疑問詞+<strong>主語+動詞</strong>」の語順！「what can we do」ではなく「what we can do」！超頻出ミス。</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U6","en":"Do you know where she lives?","ja":"彼女がどこに住んでいるか知っていますか？","ex":"<p>whereを使った間接疑問文。疑問詞のあとは<strong>ふつうの語順（主語+動詞）</strong>。</p>\n<p>直接：<strong>Where does</strong> she live?<br>間接：Do you know <strong>where she lives</strong>?</p>\n<div class=\"tip\">間接疑問文では<strong>doやdoesが消えて</strong>動詞に三単現のsが戻る！</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U6","en":"I don't know when he will come.","ja":"彼がいつ来るかわかりません。","ex":"<p>「彼、<strong>いつ来る</strong>んだろう？」を文の中に入れると、<strong>when + 主語 + 動詞</strong>の語順になるよ。直接聞くときと語順が変わるのがポイント！</p>\n<div class=\"es\"><h5>📝 直接→間接で語順チェンジ！</h5>\n<table class=\"t\"><tr><th>直接疑問文</th><th>間接疑問文</th></tr><tr><td><strong>When will</strong> he come?</td><td>I don't know <strong>when he will</strong> come.</td></tr><tr><td><strong>When does</strong> it start?</td><td>Do you know <strong>when it starts</strong>?</td></tr></table>\n<p>疑問文の語順（will he）→ふつうの語順（he will）に戻る！doesも消えて、動詞にsが戻るよ。</p></div>\n<div class=\"warn\">一番多いミス：<br>× I don't know when <strong>will he</strong> come.<br>○ I don't know when <strong>he will</strong> come.<br>間接疑問文の中は<strong>ふつうの語順</strong>！疑問文の語順にしない！</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U6","en":"Please tell me how I can get to the station.","ja":"駅にはどうやって行けるか教えてください。","ex":"<p>道を聞きたいとき、「How can I get to the station?」って直接聞いてもいいけど、<strong>「Please tell me how I can get to ~」</strong>の方がグッと<strong>丁寧</strong>になるよ。</p>\n<div class=\"es\"><h5>📝 howのいろいろなパターン</h5>\n<table class=\"t\"><tr><th>形</th><th>意味</th><th>例</th></tr><tr><td>how</td><td>どうやって〜か</td><td>Tell me <strong>how you did it</strong>.</td></tr><tr><td>how many</td><td>いくつ〜か</td><td>I don't know <strong>how many people came</strong>.</td></tr><tr><td>how long</td><td>どのくらい〜か</td><td>Do you know <strong>how long it takes</strong>?</td></tr><tr><td>how old</td><td>何歳〜か</td><td>I don't know <strong>how old he is</strong>.</td></tr></table>\n<p>どのhowでも、うしろは<strong>「主語 + 動詞」のふつうの語順</strong>だよ。</p></div>\n<div class=\"tip\">間接疑問文は<strong>丁寧に聞く</strong>テクニック！旅行先やテストの英作文でも使える。<br>直接：Where is the station?（ストレート）<br>丁寧：Could you tell me <strong>where the station is</strong>?（やわらかい）</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U6","en":"I'm not sure whether information is true or not.","ja":"情報が正しいかどうかわかりません。","ex":"<p><strong>whether … or not</strong>は「<strong>〜かどうか</strong>」。Yes/Noで答えられる内容を文中に入れるときに使うよ。</p>\n<p>I'm not sure <strong>whether</strong> the information is true <strong>or not</strong>.</p>\n<div class=\"tip\">whetherの代わりに<strong>if</strong>も使えることが多い。ただし、主語の位置ではifは使えない。</div>","p":"Part3"},{"b":"New Crown","g":3,"u":"L8","en":"I do not remember why you were so surprised.","ja":"わたしはなぜあなたがそんなに驚いたのか覚えていません。","ex":"<p><strong>間接疑問文</strong>は、<strong>疑問文を他の文の中に組み込んだ形</strong>。「なぜ驚いたの？」という疑問をそのまま聞くのではなく、「なぜ驚いたか<strong>覚えていない</strong>」のように別の文の一部にするんだ。</p>\n\n<p>I do not remember <strong>why you were so surprised</strong>.<br>＝ なぜそんなに驚いたのか<strong>覚えていません</strong>。</p>\n\n<p>いちばん大事なルール：間接疑問の中は<strong>疑問文の語順ではなく、ふつうの語順（主語＋動詞）</strong>に戻す！</p>\n\n<div class=\"es\"><h5>📝 語順の変化を確認</h5>\n<table class=\"t\"><tr><th>種類</th><th>語順</th><th>例</th></tr><tr><td>直接疑問文</td><td>疑問詞 + <strong>疑問文の語順</strong></td><td><strong>Why were you</strong> surprised?</td></tr><tr><td>間接疑問文</td><td>疑問詞 + <strong>ふつうの語順</strong></td><td>I don't remember <strong>why you were</strong> surprised.</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 よく使うパターン</h5>\n<table class=\"t\"><tr><th>パターン</th><th>例</th><th>意味</th></tr><tr><td>I know +</td><td>I know <strong>where she lives</strong>.</td><td>どこに住んでるか知ってる</td></tr><tr><td>I don't know +</td><td>I don't know <strong>who she is</strong>.</td><td>誰か知らない</td></tr><tr><td>Do you know +</td><td>Do you know <strong>what time it is</strong>?</td><td>何時か知ってる？</td></tr><tr><td>show/tell + 人 +</td><td>I'll show you <strong>where I am going</strong>.</td><td>どこに行くか見せる</td></tr><tr><td>ask + 人 +</td><td>I asked her <strong>when she came</strong>.</td><td>いつ来たか聞いた</td></tr></table></div>\n\n<div class=\"warn\">「Do you know what time <strong>is it</strong>?」は×！間接疑問の中はふつうの語順。「what time <strong>it is</strong>」が正解。超頻出の引っかけ！</div>\n<div class=\"tip\">間接疑問文は、疑問文を他の文の「パーツ」として組み込むテクニック。語順が変わることだけ注意すれば怖くないよ！</div>\n\n<div class=\"es\"><h5>🎯 あわせて覚えよう：付加疑問文</h5>\n<p><strong>付加疑問文</strong>は文の最後に短い疑問を「くっつけて」、<strong>「〜だよね？」と念を押す</strong>表現だよ。</p>\n\n<p>You like music, <strong>don't you?</strong><br>＝ 音楽好き<strong>だよね？</strong></p>\n\n<p>ルールはシンプル。<strong>肯定文のうしろには否定の短縮形</strong>、<strong>否定文のうしろには肯定形</strong>をつける。つまり<strong>前と後ろが逆</strong>になるんだ。</p>\n\n<div class=\"es\"><h5>📝 付加疑問文のパターン</h5>\n<table class=\"t\"><tr><th>元の文</th><th>付加疑問</th></tr><tr><td>She <strong>is</strong> kind,</td><td><strong>isn't</strong> she?</td></tr><tr><td>You <strong>can</strong> swim,</td><td><strong>can't</strong> you?</td></tr><tr><td>They <strong>played</strong> well,</td><td><strong>didn't</strong> they?</td></tr><tr><td>He <strong>doesn't</strong> like cats,</td><td><strong>does</strong> he?</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 作り方のステップ</h5>\n<p>① 元の文がbe動詞 / 助動詞 / do系のどれかを判断<br>② 肯定なら否定に、否定なら肯定に<br>③ 主語を代名詞に変える</p></div>\n\n<div class=\"tip\">答え方は事実に合わせる。「You don't like cats, do you?」→ 好きなら「Yes, I do.」、好きじゃないなら「No, I don't.」。日本語の「はい/いいえ」とは逆になることがあるから注意！</div></div>","p":"Part1"},{"b":"New Crown","g":3,"u":"L8","en":"I will show you where I am going next.","ja":"次にどこに行くかお見せします。","ex":"<p>間接疑問文は他の文の中に疑問文を組み込む形。ここでは<strong>show + 人 + 疑問詞〜</strong>で「<strong>〜かを見せる</strong>」という表現だよ。</p>\n\n<p>I will show you <strong>where I am going next</strong>.<br>\n＝ 次にどこに行くか<strong>お見せします</strong>。</p>\n\n<p>間接疑問の中は<strong>ふつうの語順（主語＋動詞）</strong>にするのがルール。「where am I going」（疑問文の語順）ではなく「where <strong>I am</strong> going」（ふつうの語順）だよ。</p>\n\n<div class=\"es\"><h5>📝 show/tell + 人 + 間接疑問文</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>I'll show you <strong>where I am going</strong>.</td><td>どこに行くか見せます</td></tr><tr><td>Tell me <strong>what you want</strong>.</td><td>何がほしいか教えて</td></tr><tr><td>Can you tell me <strong>where the station is</strong>?</td><td>駅がどこか教えて</td></tr></table></div>\n\n<div class=\"tip\">間接疑問文は、疑問文を他の文の「パーツ」として組み込むテクニック。語順が変わることだけ注意すれば怖くないよ！</div>","p":"Part2"}],"55":[{"b":"Here We Go!","g":2,"u":"DL5","en":"Do you know how to buy a subway ticket?","ja":"地下鉄の切符の買い方を知っていますか？","ex":"<p><strong>how to + 動詞の原形</strong>で「<strong>〜のしかた</strong>」。疑問詞＋to不定詞の形だよ。</p>\n<div class=\"es\"><h5>📝 疑問詞 + to の表現</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th></tr><tr><td>how to 〜</td><td>〜のしかた</td></tr><tr><td>what to 〜</td><td>何を〜すべきか</td></tr><tr><td>where to 〜</td><td>どこで〜すべきか</td></tr><tr><td>when to 〜</td><td>いつ〜すべきか</td></tr></table></div>"},{"b":"Here We Go!","g":3,"u":"U3","en":"We learned how to work for world peace from her.","ja":"わたしたちは彼女から世界平和のために働く方法を学びました。","ex":"<p>「<strong>泳ぎ方</strong>」「<strong>何をすべきか</strong>」のように、<strong>疑問詞 + to + 動詞の原形</strong>は名詞のかたまりとして使えるよ。いろんな疑問詞とセットにできるんだ！</p>\n<div class=\"es\"><h5>📝 疑問詞 + to の種類</h5>\n<table class=\"t\"><tr><th>形</th><th>意味</th><th>例</th></tr><tr><td><strong>how to</strong> ~</td><td>〜のしかた・方法</td><td>I know <strong>how to</strong> swim.</td></tr><tr><td><strong>what to</strong> ~</td><td>何を〜すべきか</td><td>I don't know <strong>what to</strong> do.</td></tr><tr><td><strong>where to</strong> ~</td><td>どこで〜すべきか</td><td>Tell me <strong>where to</strong> go.</td></tr><tr><td><strong>when to</strong> ~</td><td>いつ〜すべきか</td><td>I don't know <strong>when to</strong> start.</td></tr><tr><td><strong>which to</strong> ~</td><td>どちらを〜すべきか</td><td>I can't decide <strong>which to</strong> buy.</td></tr></table></div>\n<div class=\"warn\">「<strong>why to</strong>」は使わない！疑問詞 + to のセットで唯一の例外。</div>\n<div class=\"tip\">「疑問詞 + to ~」は「疑問詞 + I should ~」に書き換えOK！<br>I don't know <strong>what to do</strong>. ＝ I don't know <strong>what I should do</strong>.</div>","p":"Part3"},{"b":"Here We Go!","g":3,"u":"U3","en":"She showed us how to work for world peace.","ja":"彼女は世界平和のための活動の仕方を教えてくれました。","ex":"<p><strong>show + 人 + how to 〜</strong>で「人に〜のしかたを見せる・教える」。</p>","p":"Part3"},{"b":"Here We Go!","g":3,"u":"U3","en":"Our teacher told us what to see in Hiroshima.","ja":"先生は広島で何を見るべきか教えてくれました。","ex":"<p><strong>tell + 人 + what to 〜</strong>で「人に何を〜すべきか教える」。</p>","p":"Part3"}],"57":[{"b":"Here We Go!","g":3,"u":"U8","en":"If I had enough money, I would buy a large park.","ja":"もし十分なお金があったら、大きな公園を買うのに。","ex":"<p><strong>仮定法過去</strong>は「<strong>もし〜なら、…するのに</strong>」と<strong>現実とは違う仮定</strong>を表す。実際にはお金がない→でももしあったら…という空想。</p>\n<div class=\"es\"><h5>📝 仮定法過去のルール</h5>\n<table class=\"t\"><tr><th>if節</th><th>主節</th></tr><tr><td>If + 主語 + <strong>過去形</strong></td><td>主語 + <strong>would</strong> + 動詞の原形</td></tr></table>\n<p>※be動詞はすべて<strong>were</strong>を使う（主語がIでもwere）</p></div>\n<div class=\"es\"><h5>📝 ふつうのifと仮定法の違い</h5>\n<table class=\"t\"><tr><th>種類</th><th>意味</th><th>例</th></tr><tr><td>ふつうのif</td><td>実現しそうな条件</td><td>If it <strong>rains</strong>, I <strong>will</strong> stay home.</td></tr><tr><td>仮定法</td><td>現実と違う空想</td><td>If I <strong>were</strong> a bird, I <strong>would</strong> fly.</td></tr></table></div>\n<div class=\"warn\">仮定法のbe動詞は主語に関係なく<strong>were</strong>！「If I <strong>were</strong> you…」が正しい形。</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U8","en":"If I were the mayor, I would build more parks.","ja":"もしわたしが市長だったら、もっと公園を作るのに。","ex":"<p>仮定法のbe動詞は<strong>すべてwere</strong>。主語がIでも「If I <strong>were</strong>」を使うのがルール。</p>\n<div class=\"tip\">英語のスピーチやプレゼンでよく使う構文。「もし市長だったら」「もし社長だったら」と空想を述べるパターン。</div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U8","en":"If I had not met you, I would not be here.","ja":"もしあなたに出会わなかったら、わたしはここにいないでしょう。","ex":"<p><strong>仮定法過去完了</strong>は「<strong>もし（あのとき）〜していたら/いなかったら</strong>」と<strong>過去の事実に反する仮定</strong>を表す。if節は必ず <strong>had＋過去分詞</strong>だよ。</p>\n\n<p>この課の文は、<strong>結果が「今」のこと</strong>なので、主節が <strong>would＋動詞の原形</strong>になっているのがポイント。</p>\n<p>If I had not met you, I would not <strong>be</strong> here.<br>＝ もし出会っていなかったら、(今)ここに<strong>いない</strong>だろう。</p>\n\n<div class=\"es\"><h5>📝 if節と主節の形（3パターン）</h5>\n<table class=\"t\"><tr><th>仮定の内容</th><th>if節</th><th>主節</th></tr><tr><td>現在に反する<br>(仮定法過去)</td><td>If + 過去形</td><td>would + 動詞の原形</td></tr><tr><td>過去に反する／結果も過去<br>(仮定法過去完了)</td><td>If + <strong>had + 過去分詞</strong></td><td>would <strong>have + 過去分詞</strong></td></tr><tr><td>過去に反する／結果は現在<br>(この文のタイプ)</td><td>If + <strong>had + 過去分詞</strong></td><td>would + <strong>動詞の原形</strong></td></tr></table></div>\n\n<div class=\"tip\">if節は「過去の話」なら had＋過去分詞。主節は「結果が<strong>今</strong>か<strong>過去</strong>か」で、would＋原形 か would have＋過去分詞 を選ぶよ。</div>","p":"Part3"},{"b":"New Crown","g":3,"u":"L7","en":"If I had some trash bags, I would pick up the trash.","ja":"もしゴミ袋があれば、ゴミを拾うのになあ。","ex":"<p><strong>仮定法過去</strong>は「<strong>もし〜だったら、…するのに</strong>」と<strong>現実とは違うこと</strong>を想像する表現だよ。実際にはゴミ袋を持っていないのに「持っていたら拾うのになあ」と想像しているんだ。</p>\n\n<p>If I <strong>had</strong> some trash bags, I <strong>would pick</strong> up the trash.<br>＝ もしゴミ袋が<strong>あれば</strong>、ゴミを拾う<strong>のに</strong>。</p>\n\n<p>作り方のルール：① if節は<strong>動詞の過去形</strong>（でも意味は過去じゃない！）、② 主節は<strong>would + 動詞の原形</strong>、③ be動詞はすべて<strong>were</strong>が正式。</p>\n\n<div class=\"es\"><h5>⚡ 2年生のifとの違い（超重要！）</h5>\n<p>2年生で習ったif（条件文）と3年生の仮定法、形が似ているけど<strong>意味がまったく違う</strong>！</p>\n<table class=\"t\"><tr><th></th><th>2年if（条件文）</th><th>3年if（仮定法）</th></tr><tr><td>意味</td><td>実際にありえること</td><td>現実じゃないこと</td></tr><tr><td>if節の動詞</td><td>現在形</td><td>過去形</td></tr><tr><td>主節</td><td>will + 原形</td><td>would + 原形</td></tr><tr><td>例</td><td>If it rains, I will stay.</td><td>If I had wings, I would fly.</td></tr></table></div>\n\n\n<div class=\"warn\">仮定法ではbe動詞は<strong>主語が何でもwere</strong>を使うのが正式。「If I <strong>were</strong> a bird」「If he <strong>were</strong> here」。wasを使う人もいるけど、テストではwereと書こう。</div>\n<div class=\"tip\">仮定法は「<strong>過去形なのに意味は過去じゃない</strong>」のが最大のポイント！動詞が過去形なのは「現実から離れている」ことを表すためなんだ。</div>","p":"Part1"}],"58":[{"b":"Here We Go!","g":3,"u":"U8","en":"I wish I could fly like a bird.","ja":"鳥のように飛べたらなあ。","ex":"<p><strong>I wish + 仮定法</strong>で「<strong>〜だったらなあ</strong>」と<strong>現実には叶わない願望</strong>を表す。</p>\n<div class=\"es\"><h5>📝 I wishのパターン</h5>\n<table class=\"t\"><tr><th>英語</th><th>日本語</th></tr><tr><td>I wish I <strong>could</strong> fly.</td><td>飛べたらなあ。</td></tr><tr><td>I wish I <strong>were</strong> taller.</td><td>もっと背が高かったらなあ。</td></tr><tr><td>I wish I <strong>had</strong> a car.</td><td>車があったらなあ。</td></tr></table></div>\n<div class=\"tip\">I wishのうしろはifなしで仮定法の形を使う。「I wish + 過去形」で「今の現実と違うことへの願望」！</div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L7","en":"I wish I had a cleaning robot.","ja":"掃除ロボットがあればいいのになあ。","ex":"<p><strong>I wish + 仮定法過去</strong>は「<strong>〜だったらいいのになあ</strong>」と<strong>現実にはないことへの願望</strong>を表す表現だよ。</p>\n\n<p>I wish I <strong>had</strong> a cleaning robot. ＝ 掃除ロボットが<strong>あればいいのに</strong>。<br>\nI wish I <strong>could</strong> make a cooking robot. ＝ 料理ロボットが作れ<strong>たらいいのに</strong>。</p>\n\n<p>どちらも<strong>現実にはない</strong>ことを「あったらなあ」と願っている。wishのうしろは仮定法だから動詞は<strong>過去形</strong>になるよ（意味は過去じゃない！）。</p>\n\n<div class=\"es\"><h5>📝 I wish のパターン整理</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td>I wish I <strong>had</strong> 〜</td><td>〜があれば</td><td>I wish I had a robot.</td></tr><tr><td>I wish I <strong>could</strong> 〜</td><td>〜できたら</td><td>I wish I could fly.</td></tr><tr><td>I wish I <strong>were</strong> 〜</td><td>〜だったら</td><td>I wish I were taller.</td></tr></table></div>\n\n<div class=\"es\"><h5>🎯 canとcouldの使い分け</h5>\n<p>couldはcanの過去形だけど、I wishのうしろでは「過去」ではなく<strong>仮定法</strong>の意味になるよ。</p>\n<table class=\"t\"><tr><th>形</th><th>意味</th><th>例</th></tr><tr><td>I <strong>can</strong> make 〜</td><td>作れる（現実）</td><td>I can make cookies.</td></tr><tr><td>I wish I <strong>could</strong> make 〜</td><td>作れたらなあ（願望）</td><td>I wish I could make a robot.</td></tr></table></div>\n\n<div class=\"tip\">couldは「できた（過去）」と「できたらなあ（仮定法）」の2つの意味がある！I wishのうしろのcouldは必ず仮定法だよ。</div>","p":"Part2"},{"b":"New Crown","g":3,"u":"L7","en":"I wish I could make a cooking robot.","ja":"料理ロボットが作れたらいいのになあ。","ex":"<p><strong>I wish I could + 動詞の原形</strong>で「<strong>〜できたらいいのになあ</strong>」と<strong>能力や可能性への願望</strong>を表すよ。</p>\n\n<p>I wish I <strong>could make</strong> a cooking robot.<br>\n＝ 料理ロボットが<strong>作れたらいいのに</strong>。</p>\n\n<p>couldはcanの過去形だけど、I wishのうしろでは「過去」ではなく<strong>仮定法</strong>の意味。「実際にはできないけど、できたらなあ」という気持ちを表すんだ。</p>\n\n<div class=\"es\"><h5>📝 I wish のパターン整理</h5>\n<table class=\"t\"><tr><th>表現</th><th>意味</th><th>例</th></tr><tr><td>I wish I <strong>had</strong> 〜</td><td>〜があれば</td><td>I wish I had a robot.</td></tr><tr><td>I wish I <strong>could</strong> 〜</td><td>〜できたら</td><td>I wish I could make a robot.</td></tr><tr><td>I wish I <strong>were</strong> 〜</td><td>〜だったら</td><td>I wish I were taller.</td></tr></table></div>\n\n<div class=\"tip\">couldは「できた（過去）」と「できたらなあ（仮定法）」の2つの意味がある！I wishのうしろのcouldは必ず仮定法だよ。</div>","p":"Part2"}],"60":[{"b":"Here We Go!","g":3,"u":"U7","en":"The park is a place where people can exercise.","ja":"その公園は人々が運動できる場所です。","ex":"<p><strong>関係副詞 where</strong>は<strong>場所を説明する文</strong>をつなげる。先行詞が<strong>場所</strong>のときに使うよ。</p>\n<p>The park is a place. + People can exercise <strong>there</strong>.<br>→ The park is a place <strong>where</strong> people can exercise.</p>\n<div class=\"es\"><h5>📝 関係代名詞と関係副詞の違い</h5>\n<table class=\"t\"><tr><th>種類</th><th>先行詞</th><th>うしろの文</th></tr><tr><td>関係代名詞 which</td><td>物</td><td>主語や目的語が<strong>欠けている</strong></td></tr><tr><td>関係副詞 where</td><td>場所</td><td>文が<strong>完全</strong></td></tr></table></div>","p":"Part1"},{"b":"Here We Go!","g":3,"u":"U7","en":"I think the park is a place where people can relax.","ja":"わたしはその公園は人々がリラックスできる場所だと思います。","ex":"<p>I think that 〜 の中に関係副詞whereが含まれるパターン。文が長くなっても構造は同じ。</p>\n<p>I think [the park is a place <strong>where</strong> people can relax].</p>","p":"Part2"}]};

var cardUnits={};
Object.keys(textbooks).forEach(function(book){

function selCmp(a,b){var pa=a.split('|'),pb=b.split('|');if(pa[0]!==pb[0])return pa[0]-pb[0];var us=unitSort(pa[1])-unitSort(pb[1]);if(us)return us;return (pa[2]?+pa[2].replace(/\D/g,''):0)-(pb[2]?+pb[2].replace(/\D/g,''):0);}

/* ---- フィルタ（教科書範囲 or 学年）→ カード配列 ---- */
function filterCards(f){
  var list=grammarRef.slice();
  if(f.book){
    var fbook=f.book.book, fsels=f.book.sels;
    list=list.filter(function(g){
      var sents=bookSentences[g.no]||[];
      return sents.some(function(s){
        if(s.b!==fbook)return false;
        return fsels.some(function(sel){var p=sel.split('|');
          if(+p[0]!==s.g||p[1]!==s.u)return false;
          return p.length<3||s.p===p[2];
        });
      });
    });
  } else if(f.grade&&f.grade!=='all'){
    list=list.filter(function(g){return g.gr===f.grade;});
  }
  if(f.review)list=list.filter(function(g){return !mastered.has(g.t);});
  if(f.q){var q=f.q.toLowerCase();list=list.filter(function(g){return (g.t+' '+strip(g.d)+' '+strip(g.e)).toLowerCase().indexOf(q)>=0;});}
  return list;
}
function currentFilter(){return {book:st.book,grade:st.book?'all':st.grade,review:st.review,q:st.q};}
function setFilter(s){return {book:s.book,grade:s.grade||'all',review:s.review,q:s.q};}

/* ---- シャッフル ---- */
function makeShuffle(){var pool=st.mode==='formula'?formulas:grammarRef;shuffleOrder=pool.map(function(g){return g.id;});for(var i=shuffleOrder.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=shuffleOrder[i];shuffleOrder[i]=shuffleOrder[j];shuffleOrder[j]=t;}}
function applyShuffle(list){if(!shuffleOrder)makeShuffle();var pos={};shuffleOrder.forEach(function(id,i){pos[id]=i;});return list.slice().sort(function(a,b){return pos[a.id]-pos[b.id];});}

function buildDeck(){
  if(st.mode==='formula'){
    var fl=formulas.slice();
    if(st.grade&&st.grade!=='all')fl=fl.filter(function(f){return f.gr===st.grade;});
    if(st.review)fl=fl.filter(function(f){return !mastered.has('F:'+f.id);});
    if(st.q){var q=st.q.toLowerCase();fl=fl.filter(function(f){return (strip(f.s)+' '+strip(f.f)+' '+f.l).toLowerCase().indexOf(q)>=0;});}
    if(st.book){
      var bn=st.book.book, sels=st.book.sels.slice().sort(selCmp);
      var co={}, ord=0;
      sels.forEach(function(sel){var p=sel.split('|');var nos=(textbooks[bn][p[0]]||{})[p[1]]||[];nos.forEach(function(no){if(co[no]===undefined)co[no]=ord++;});});
      fl=fl.filter(function(f){return co[f.c]!==undefined;});
      fl.sort(function(a,b){var oa=co[a.c],ob=co[b.c];if(oa!==ob)return oa-ob;return a.c-b.c;});
    }
    if(st.shuffle)fl=applyShuffle(fl);
    deck=fl;return;
  }
  var list=filterCards(currentFilter());
  if(st.book){
    var bn=st.book.book, sels=st.book.sels.slice().sort(selCmp);
    var uo={}, ord=0;
    sels.forEach(function(sel){var p=sel.split('|');var key=p[0]+'|'+p[1];if(uo[key]===undefined)uo[key]=ord++;});
    var firstOrd=function(g){var sents=bookSentences[g.no]||[],m=Infinity;sents.forEach(function(s){if(s.b!==bn)return;var k=s.g+'|'+s.u;if(uo[k]!==undefined&&uo[k]<m)m=uo[k];});return m;};
    var origIdx={}; list.forEach(function(g,i){origIdx[g.id]=i;});
    list.sort(function(a,b){var oa=firstOrd(a),ob=firstOrd(b);if(oa!==ob)return oa-ob;return origIdx[a.id]-origIdx[b.id];});
  }
  if(st.shuffle)list=applyShuffle(list);deck=list;
}
function recompute(opts){
  opts=opts||{};
  buildDeck();
  if(opts.keep){var i=deck.findIndex(function(g){return g.id===opts.keep;});st.idx=i>=0?i:0;}
  else if(opts.reset){st.idx=0;st.flip=false;}
  if(st.idx>=deck.length)st.idx=Math.max(0,deck.length-1);
  if(st.idx<0)st.idx=0;
  el.card.style.transition='none';el.card.style.transform='';el.card.style.opacity='';
  saveActive();highlightTabs();render();
}

function go(dir){
  if(deck.length===0)return;
  var n=st.idx+dir, wrapped=false;
  if(n<0){n=deck.length-1;wrapped=true;}
  if(n>=deck.length){n=0;wrapped=true;}
  st.idx=n;st.flip=false;render();
  if(wrapped&&deck.length>1)toast(dir>0?'最初のカードに戻りました':'最後のカードへ');

function snapBack(){el.card.style.transition='transform .3s cubic-bezier(.2,.9,.25,1), opacity .2s';el.card.style.transform='translateX(0) rotate(0)';el.card.style.opacity='1';}
function animateNav(dir){
  if(deck.length<=1){snapBack();return;}
  if(reduceMotion){go(dir);snapBack();return;}
  el.cardInner.style.transition='none';el.cardInner.classList.remove('flipped');st.flip=false;
  void el.cardInner.offsetWidth;el.cardInner.style.transition='';
  var w=el.card.offsetWidth+70;
  el.card.style.transition='transform .2s ease-in, opacity .2s ease-in';
  el.card.style.transform='translateX('+(dir>0?-w:w)+'px) rotate('+(dir>0?-7:7)+'deg)';el.card.style.opacity='0';
  setTimeout(function(){
    go(dir);
    el.card.style.transition='none';el.card.style.transform='translateX('+(dir>0?w:-w)+'px)';el.card.style.opacity='0';
    void el.card.offsetWidth;
    el.card.style.transition='transform .3s cubic-bezier(.2,.8,.2,1), opacity .22s ease';el.card.style.transform='translateX(0)';el.card.style.opacity='1';

  if(!drag.on||e.pointerId!==drag.id)return;
  drag.dx=e.clientX-drag.x0;drag.dy=e.clientY-drag.y0;
  if(drag.lock===null&&(Math.abs(drag.dx)>5||Math.abs(drag.dy)>5)){drag.lock=Math.abs(drag.dx)*1.25>=Math.abs(drag.dy)?'h':'v';if(drag.lock==='h'){try{el.card.setPointerCapture(drag.id)}catch(_){}}}
  if(drag.lock==='h'){var dx=drag.dx;el.card.style.transform='translateX('+dx+'px) rotate('+(dx*0.04)+'deg)';el.card.style.opacity=String(Math.max(.5,1-Math.abs(dx)/620));}
});
function endDrag(e){
  if(!drag.on)return;drag.on=false;
  var dt=Date.now()-drag.t0,dx=drag.dx,dy=drag.dy,ax=Math.abs(dx),ay=Math.abs(dy),lock=drag.lock,wasNoSwipe=drag.noSwipe;drag.lock=null;drag.noSwipe=false;
  try{el.card.releasePointerCapture(e.pointerId)}catch(_){}
  if(lock==='h'){var vel=ax/Math.max(dt,1);var distTh=wasNoSwipe?70:40;var velTh=wasNoSwipe?0.5:0.30;if(ax>distTh||vel>velTh)animateNav(dx<0?1:-1);else snapBack();}
  else if(ax<8&&ay<8&&dt<320&&!wasNoSwipe){snapBack();flip();}

function speakEn(text,btn){
  if(!window.speechSynthesis){toast('この環境では読み上げに対応していません');return;}
  window.speechSynthesis.cancel();
  var clean=text.replace(/<[^>]+>/g,'').split('\n').map(function(line){return line.split('（')[0];}).join('. ')
    .replace(/→/g,', ').replace(/\//g,' or ').replace(/[〜〜]ing/g,'ing').replace(/[〜〜]/g,'').replace(/[＝※]/g,'').replace(/[^\x00-\x7F,.'!? -]/g,'').replace(/\s+/g,' ').trim();
  if(!clean)return;
  var u=new SpeechSynthesisUtterance(clean);u.lang='en-US';u.rate=.85;u.pitch=1.05;
  var voices=window.speechSynthesis.getVoices();
  var v=voices.find(function(x){return x.lang.indexOf('en')===0&&/samantha|karen|victoria|zira|female|google.*us|aria|jenny/i.test(x.name);})||voices.find(function(x){return x.lang.indexOf('en')===0;});
  if(v)u.voice=v;
  if(btn){btn.classList.add('playing');u.onend=u.onerror=function(){btn.classList.remove('playing');};}
  window.speechSynthesis.speak(u);
}

var bookSel={book:null,sels:new Set()};
function buildBook(keep){
  var books=Object.keys(textbooks);
  var html='<div class="book-intro">テストの<b>範囲</b>をタップして選び、下の「この範囲を表示」を押すと、その文法カードだけ並びます。単元の下の<b>P1・P2…（Part）</b>で細かく指定もできます。学年をまたいでもOK。</div>';
  if(books.length===0){html+='<div class="idx-empty">教科書が登録されていません。</div>';el.bookBody.innerHTML=html;return;}
  if(!keep||!textbooks[bookSel.book]){bookSel={book:(st.book&&textbooks[st.book.book]?st.book.book:books[0]),sels:new Set(st.book?st.book.sels:[])};}
  if(books.length>1){html+='<div class="bk-tabs">'+books.map(function(b){return '<button class="bk-tab'+(b===bookSel.book?' on':'')+'" data-book="'+esc(b)+'">'+esc(b)+'</button>';}).join('')+'</div>';}
  else{html+='<div class="bk-grade" style="margin-top:2px"><span class="gpill" style="background:var(--text);color:#fff;font-weight:800">📘 '+esc(books[0])+'</span></div>';}
  html+=renderBookGrades();
  html+='<div class="bk-bar"><div class="bk-summary" id="bkSummary"></div><div class="bk-actions"><button class="bk-clear" id="bkClear">解除</button><button class="bk-save" id="bkSave">名前をつけて保存</button><button class="bk-show" id="bkShow">この範囲を表示</button></div></div>';
  html+='<div class="bk-note">※ 教科書の基本文に出てくる文法に対応づけています。冠詞・前置詞などはどの単元にも紐づいていないため、ここには出ません（「すべて」では出ます）。</div>';
  el.bookBody.innerHTML=html;wireBook();
}
function gradesInner(){
  var b=bookSel.book,html='';
  [1,2,3].forEach(function(g){
    var gu=textbooks[b][g]||{};var units=Object.keys(gu).sort(function(a,b){return unitSort(a)-unitSort(b);});
    if(units.length===0)return;
    var gc=g===1?'g1':g===2?'g2':'g3';
    html+='<div class="bk-grade"><span class="gpill grade-tab '+gc+'">中'+g+'</span><button class="ga" data-gall="'+g+'">この学年を全部</button></div><div class="unit-wrap">';
    units.forEach(function(u){
      var key=g+'|'+u,parts=partsOf(b,g,u),us=unitState(g,u);
      html+='<div class="unit-cell"><button class="uchip'+(us==='full'?' sel':us==='partial'?' part':'')+'" data-sel="'+key+'">'+unitLabel(u)+'<span class="c">'+gu[u].length+'</span></button>';
      if(parts.length>1){
        html+='<div class="part-wrap">'+parts.map(function(p){
          var on=bookSel.sels.has(key)||bookSel.sels.has(key+'|'+p);
          var cnt=partCardCount[b+'|'+g+'|'+u+'|'+p]||0;
          return '<button class="pchip'+(on?' sel':'')+'" data-psel="'+key+'|'+p+'">P'+p.replace(/\D/g,'')+'<span class="pc">'+cnt+'</span></button>';
        }).join('')+'</div>';
      }
      html+='</div>';
    });
    html+='</div>';
  });
  return html;
}
function renderBookGrades(){return '<div id="bkGrades">'+gradesInner()+'</div>';}
function unitState(g,u){var key=g+'|'+u;if(bookSel.sels.has(key))return 'full';var pre=key+'|',any=false;bookSel.sels.forEach(function(s){if(s.indexOf(pre)===0)any=true;});return any?'partial':'none';}
function clearUnit(g,u){var key=g+'|'+u;bookSel.sels.delete(key);var pre=key+'|';Array.from(bookSel.sels).forEach(function(s){if(s.indexOf(pre)===0)bookSel.sels.delete(s);});}
function toggleUnit(key){var pr=key.split('|'),us=unitState(pr[0],pr[1]);clearUnit(pr[0],pr[1]);if(us==='none')bookSel.sels.add(key);}
function togglePart(pk){var p=pk.split('|'),g=p[0],u=p[1],part=p[2],key=g+'|'+u,parts=partsOf(bookSel.book,g,u);
  if(bookSel.sels.has(key)){bookSel.sels.delete(key);parts.forEach(function(pp){if(pp!==part)bookSel.sels.add(key+'|'+pp);});}
  else{if(bookSel.sels.has(pk))bookSel.sels.delete(pk);else bookSel.sels.add(pk);
    if(parts.length&&parts.every(function(pp){return bookSel.sels.has(key+'|'+pp);})){parts.forEach(function(pp){bookSel.sels.delete(key+'|'+pp);});bookSel.sels.add(key);}}
}
function rerenderBookGrades(){var c=$('bkGrades');if(c){c.innerHTML=gradesInner();wireGrades();}updateBkSummary();}
function wireGrades(){
  Array.prototype.forEach.call(el.bookBody.querySelectorAll('.uchip'),function(c){c.onclick=function(){toggleUnit(c.getAttribute('data-sel'));rerenderBookGrades();};});
  Array.prototype.forEach.call(el.bookBody.querySelectorAll('.pchip'),function(c){c.onclick=function(){togglePart(c.getAttribute('data-psel'));rerenderBookGrades();};});
  Array.prototype.forEach.call(el.bookBody.querySelectorAll('.ga'),function(btn){btn.onclick=function(){
    var g=btn.getAttribute('data-gall'),gu=textbooks[bookSel.book][g]||{},us=Object.keys(gu);
    var keys=us.map(function(u){return g+'|'+u;});
    var allSel=keys.every(function(k){return bookSel.sels.has(k);});
    us.forEach(function(u){clearUnit(g,u);});
    if(!allSel)keys.forEach(function(k){bookSel.sels.add(k);});
    rerenderBookGrades();
  };});
}
function wireBook(){
  Array.prototype.forEach.call(el.bookBody.querySelectorAll('.bk-tab'),function(t){t.onclick=function(){bookSel.book=t.getAttribute('data-book');bookSel.sels=new Set();buildBook(true);};});
